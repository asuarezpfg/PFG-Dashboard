  async get(key) { const v = localStorage.getItem(key); return v ? { key, value: v } : null; },
  async set(key, value) { localStorage.setItem(key, value); return { key, value }; },
  async delete(key) { localStorage.removeItem(key); return { key, deleted: true }; },
  async list(prefix) { const keys = []; for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(!prefix||k.startsWith(prefix))keys.push(k);} return { keys }; }

// --- Confetti/Explosion Animation ---
const Confetti = ({ onDone }) => {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = 300, H = 200;
    canvas.width = W; canvas.height = H;
    const colors = ["#10B981","#3B82F6","#F59E0B","#EF4444","#8B5CF6","#EC4899"];
    const particles = Array.from({ length: 40 }, () => ({
      x: W/2, y: H/2,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 0.5) * 12 - 4,
      size: Math.random() * 6 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 15,
    }));
    let frame = 0;
    const animate = () => {
      ctx.clearRect(0, 0, W, H);
      let alive = false;
      particles.forEach(p => {
        if (p.life <= 0) return;
        alive = true;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.25;
        p.life -= 0.018;
        p.rotation += p.rotSpeed;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation * Math.PI / 180);
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
        ctx.restore();
      });
      frame++;
      if (alive && frame < 120) requestAnimationFrame(animate);
      else onDone?.();
    };
    animate();
  }, []);
  return <canvas ref={canvasRef} style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", pointerEvents: "none", zIndex: 50 }} />;
};

// Business days calculation (excludes weekends)
const getBusinessDaysDiff = (date1, date2) => {
  const d1 = new Date(date1); d1.setHours(0,0,0,0);
  const d2 = new Date(date2); d2.setHours(0,0,0,0);
  const sign = d2 >= d1 ? 1 : -1;
  const start = sign === 1 ? d1 : d2;
  const end = sign === 1 ? d2 : d1;
  let count = 0;
  const cur = new Date(start);
  while (cur < end) {
    cur.setDate(cur.getDate() + 1);
    const dow = cur.getDay();
    if (dow !== 0 && dow !== 6) count++;
  }
  return count * sign;
};

// Subtract N business days from a date
const subtractBusinessDays = (dateStr, bizDays) => {
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  let remaining = bizDays;
  while (remaining > 0) {
    d.setDate(d.getDate() - 1);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) remaining--;
  }
  return d.toISOString().split("T")[0];
};

// Generate next occurrence of a recurring task
const generateNextTask = (task, taskTemplates) => {
  if (!task.dueDate || task.frequency === "One-time" || task.frequency === "Ongoing" || task.custom) return null;
  const due = new Date(task.dueDate);
  let nextDate;
  if (task.frequency === "Monthly") nextDate = new Date(due.getFullYear(), due.getMonth() + 1, due.getDate());
  else if (task.frequency === "Quarterly") nextDate = new Date(due.getFullYear(), due.getMonth() + 3, due.getDate());
  else if (task.frequency === "Semi-annually") nextDate = new Date(due.getFullYear(), due.getMonth() + 6, due.getDate());
  else if (task.frequency === "Annually") nextDate = new Date(due.getFullYear() + 1, due.getMonth(), due.getDate());
  else if (task.frequency === "Every 3 years") nextDate = new Date(due.getFullYear() + 3, due.getMonth(), due.getDate());
  else return null;
  return { ...task, id: uid(), dueDate: nextDate.toISOString().split("T")[0], completedAt: null, completedBy: null, note: "" };
};

// Task urgency: "future" (white), "upcoming" (green), "grace" (orange), "overdue" (red), "completed" (done)
const getTaskUrgency = (task) => {
  if (task.completedAt) return "completed";
  if (!task.dueDate) return "future";
  const now = new Date(); now.setHours(0,0,0,0);
  const due = new Date(task.dueDate); due.setHours(0,0,0,0);
  const bizDaysUntilDue = getBusinessDaysDiff(now, due);
  const bizDaysPastDue = getBusinessDaysDiff(due, now);
  if (bizDaysUntilDue > 3) return "future";       // White: future
  if (bizDaysUntilDue >= 0) return "upcoming";     // Green: due today or within 3 biz days
  if (bizDaysPastDue <= 3) return "grace";          // Orange: within 3 biz days after due
  return "overdue";                                  // Red: more than 3 biz days past due
};

const calc401kEligibility = (person) => {
  if (!person?.dateOfHire) return null;
  const start = new Date(person.dateOfHire + "T00:00:00");
  if (isNaN(start)) return null;
  const REQUIRED_DAYS = 365;

  // Build list of leave periods that count as excluded
  const leaves = [...(person.militaryLeaves || []), ...(person.unpaidLeaves || [])]
    .filter(l => l && l.start && l.end)
    .map(l => ({ start: new Date(l.start + "T00:00:00"), end: new Date(l.end + "T00:00:00") }))
    .filter(l => !isNaN(l.start) && !isNaN(l.end) && l.end >= l.start)
    .sort((a, b) => a.start - b.start);

  // Walk forward from start date until we have accumulated REQUIRED_DAYS of NON-leave days
  let cursor = new Date(start);
  let countedDays = 0;
  // Hard cap to prevent runaway in case of bad data
  const MAX_ITERATIONS = 365 * 20;
  let iter = 0;
  while (countedDays < REQUIRED_DAYS && iter < MAX_ITERATIONS) {
    const inLeave = leaves.some(l => cursor >= l.start && cursor <= l.end);
    if (!inLeave) countedDays++;
    if (countedDays >= REQUIRED_DAYS) break;
    cursor.setDate(cursor.getDate() + 1);
    iter++;
  }
  return cursor;
};

// Total excluded leave days (for display)
const totalLeaveDays = (person) => {
  if (!person) return 0;
  const leaves = [...(person.militaryLeaves || []), ...(person.unpaidLeaves || [])];
  let total = 0;
  leaves.forEach(l => {
    if (!l || !l.start || !l.end) return;
    const s = new Date(l.start + "T00:00:00");
    const e = new Date(l.end + "T00:00:00");
    if (isNaN(s) || isNaN(e) || e < s) return;
    total += Math.round((e - s) / (1000 * 60 * 60 * 24)) + 1;
  });
  return total;
};

// ============================================================
// Seniority — calendar duration from hire date to today.
// Returns { years, months, totalMonths, formatted: "2 years, 5 months" }
// ============================================================
const calcSeniority = (person, asOf = new Date()) => {
  if (!person?.dateOfHire) return null;
  const hire = new Date(person.dateOfHire + "T00:00:00");
  if (isNaN(hire)) return null;
  const ref = new Date(asOf);
  let years = ref.getFullYear() - hire.getFullYear();
  let months = ref.getMonth() - hire.getMonth();
  // Adjust if the day-of-month hasn't been reached this month yet
  if (ref.getDate() < hire.getDate()) months -= 1;
  if (months < 0) { years -= 1; months += 12; }
  const totalMonths = years * 12 + months;
  let formatted;
  if (years === 0 && months === 0) formatted = "Less than 1 month";
  else if (years === 0) formatted = `${months} month${months === 1 ? "" : "s"}`;
  else if (months === 0) formatted = `${years} year${years === 1 ? "" : "s"}`;
  else formatted = `${years} year${years === 1 ? "" : "s"}, ${months} month${months === 1 ? "" : "s"}`;
  return { years, months, totalMonths, formatted };
};

// ============================================================
// PTO summary — rolls forward across years, computes balance.
// Returns:
//   {
//     currentYear: "2026",
//     years: [{ year, allot, used, carriedIn, endingBalance }],   // chronological
//     totalAvailable: number,   // current year carriedIn + allot - used
//     totalUsedThisYear: number,
//     totalUsedAllTime: number,
//   }
// ============================================================
const summarizePTO = (person, asOf = new Date()) => {
  const history = person?.ptoHistory || {};
  const years = Object.keys(history).map(Number).sort((a, b) => a - b);
  if (years.length === 0) {
    // Legacy fallback: build from flat ptoUsed/ptoAllot
    const yr = asOf.getFullYear();
    return {
      currentYear: String(yr),
      years: [{ year: yr, allot: person?.ptoAllot || 0, used: person?.ptoUsed || 0, carriedIn: 0, endingBalance: (person?.ptoAllot || 0) - (person?.ptoUsed || 0) }],
      totalAvailable: (person?.ptoAllot || 0) - (person?.ptoUsed || 0),
      totalUsedThisYear: person?.ptoUsed || 0,
      totalUsedAllTime: person?.ptoUsed || 0,
    };
  }
  let running = 0;
  let totalUsed = 0;
  const expanded = years.map(yr => {
    const e = history[String(yr)];
    const carriedIn = running;
    const allot = e?.allot || 0;
    const used = e?.used || 0;
    const ending = carriedIn + allot - used;
    totalUsed += used;
    running = ending;
    return { year: yr, allot, used, carriedIn, endingBalance: ending };
  });
  const thisYr = asOf.getFullYear();
  const thisYearEntry = expanded.find(e => e.year === thisYr) || expanded[expanded.length - 1];
  return {
    currentYear: String(thisYearEntry?.year || thisYr),
    years: expanded,
    totalAvailable: thisYearEntry?.endingBalance ?? 0,
    totalUsedThisYear: thisYearEntry?.used ?? 0,
    totalUsedAllTime: totalUsed,
  };
};

// ============================================================
// 401(k) eligibility status — traffic light.
//   "ineligible"     → red    (eligibility date in the future)
//   "eligible-not-enrolled" → yellow (past eligibility date, enrolled401k !== true)
//   "enrolled"       → green  (past eligibility date, enrolled401k === true)
// ============================================================
const get401kStatus = (person, asOf = new Date()) => {
  const eligDate = calc401kEligibility(person);
  if (!eligDate) return { code: "unknown", label: "Date of hire needed", color: COLORS.textMuted };
  const today = new Date(asOf); today.setHours(0, 0, 0, 0);
  const elig = new Date(eligDate); elig.setHours(0, 0, 0, 0);
  if (elig > today) {
    const daysOut = Math.ceil((elig - today) / (1000 * 60 * 60 * 24));
    return { code: "ineligible", label: `Not yet eligible · ${daysOut} day${daysOut === 1 ? "" : "s"} out`, color: COLORS.danger, eligDate };
  }
  if (person?.enrolled401k === true) return { code: "enrolled", label: "Eligible · Enrolled", color: COLORS.success, eligDate };
  return { code: "eligible-not-enrolled", label: "Eligible · Not enrolled", color: COLORS.gold, eligDate };
};

const Badge = ({ children, color = COLORS.primary, style }) => (
  <span style={{ display: "inline-block", padding: "2px 10px", borderRadius: 999, fontSize: 11, fontWeight: 600, background: color + "22", color, letterSpacing: 0.3, ...style }}>{children}</span>
);

const Button = ({ children, variant = "primary", size = "md", onClick, disabled, style, ...props }) => {
  const base = { border: "none", borderRadius: 8, cursor: disabled ? "not-allowed" : "pointer", fontWeight: 600, display: "inline-flex", alignItems: "center", gap: 6, transition: "all 0.15s", opacity: disabled ? 0.5 : 1, fontFamily: "inherit" };
  const sizes = { sm: { padding: "6px 12px", fontSize: 12 }, md: { padding: "8px 18px", fontSize: 13 }, lg: { padding: "12px 24px", fontSize: 14 } };
  const variants = {
    primary: { background: COLORS.primary, color: "#fff" },
    success: { background: COLORS.success, color: "#fff" },
    danger: { background: COLORS.danger + "22", color: COLORS.danger },
    ghost: { background: "transparent", color: COLORS.textMuted, border: `1px solid ${COLORS.border}` },
    outline: { background: "transparent", color: COLORS.primary, border: `1px solid ${COLORS.primary}44` },
  };
  return <button onClick={onClick} disabled={disabled} style={{ ...base, ...sizes[size], ...variants[variant], ...style }} {...props}>{children}</button>;
};

const Input = ({ label, value, onChange, type = "text", placeholder, style, inputStyle, ...props }) => (
  <div style={{ marginBottom: 12, ...style }}>
    {label && <label style={{ display: "block", fontSize: 12, color: COLORS.textMuted, marginBottom: 4, fontWeight: 500 }}>{label}</label>}
    <input type={type} value={value || ""} onChange={e => onChange(e.target.value)} placeholder={placeholder}
      style={{ width: "100%", padding: "8px 12px", borderRadius: 8, border: `1px solid ${COLORS.border}`, background: "#FFFFFF", color: COLORS.text, fontSize: 13, fontFamily: "inherit", outline: "none", boxSizing: "border-box", ...inputStyle }}
      {...props} />
  </div>
);

const Select = ({ label, value, onChange, options, placeholder, style }) => (
  <div style={{ marginBottom: 12, ...style }}>
    {label && <label style={{ display: "block", fontSize: 12, color: COLORS.textMuted, marginBottom: 4, fontWeight: 500 }}>{label}</label>}
    <select value={value || ""} onChange={e => onChange(e.target.value)}
      style={{ width: "100%", padding: "8px 12px", borderRadius: 8, border: `1px solid ${COLORS.border}`, background: "#FFFFFF", color: COLORS.text, fontSize: 13, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }}>
      {placeholder && <option value="">{placeholder}</option>}
      {options.map(o => typeof o === "string" ? <option key={o} value={o}>{o}</option> : <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
);

const TextArea = ({ label, value, onChange, rows = 3, style }) => (
  <div style={{ marginBottom: 12, ...style }}>
    {label && <label style={{ display: "block", fontSize: 12, color: COLORS.textMuted, marginBottom: 4, fontWeight: 500 }}>{label}</label>}
    <textarea value={value || ""} onChange={e => onChange(e.target.value)} rows={rows}
      style={{ width: "100%", padding: "8px 12px", borderRadius: 8, border: `1px solid ${COLORS.border}`, background: "#FFFFFF", color: COLORS.text, fontSize: 13, fontFamily: "inherit", outline: "none", resize: "vertical", boxSizing: "border-box" }} />
  </div>
);

const Modal = ({ open, onClose, title, children, wide }) => {
  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.3)", backdropFilter: "blur(4px)" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: COLORS.surface, borderRadius: 16, border: `1px solid ${COLORS.border}`, padding: 28, width: wide ? 720 : 500, maxWidth: "92vw", maxHeight: "85vh", overflow: "auto", boxShadow: "0 24px 48px rgba(0,0,0,0.12)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <h3 style={{ margin: 0, color: COLORS.text, fontSize: 18 }}>{title}</h3>
          <button onClick={onClose} style={{ background: "none", border: "none", color: COLORS.textMuted, cursor: "pointer" }}><IconX size={18} /></button>
        </div>
        {children}
      </div>
    </div>
  );
};

const Card = ({ children, style, onClick }) => (
  <div onClick={onClick} style={{ background: COLORS.surface, borderRadius: 12, border: `1px solid ${COLORS.border}`, padding: 20, cursor: onClick ? "pointer" : "default", transition: "border-color 0.15s", boxShadow: "0 1px 3px rgba(0,0,0,0.04)", ...style }}
    onMouseEnter={e => { if(onClick) e.currentTarget.style.borderColor = COLORS.primary + "33"; }}
    onMouseLeave={e => { if(onClick) e.currentTarget.style.borderColor = COLORS.border; }}>
    {children}
  </div>
);

const Tabs = ({ tabs, active, onChange }) => (
  <div style={{ display: "flex", gap: 2, background: COLORS.borderLight, borderRadius: 10, padding: 3, marginBottom: 20 }}>
    {tabs.map(t => (
      <button key={t.key} onClick={() => onChange(t.key)}
        style={{ flex: 1, padding: "8px 16px", borderRadius: 8, border: "none", background: active === t.key ? COLORS.surface : "transparent", color: active === t.key ? COLORS.text : COLORS.textMuted, fontSize: 13, fontWeight: 500, cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s" }}>
        {t.label}
      </button>
    ))}
  </div>
);

const StatCard = ({ label, value, sub, color }) => (
  <Card style={{ textAlign: "center", flex: 1, minWidth: 140 }}>
    <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>{label}</div>
    <div style={{ fontSize: 24, fontWeight: 700, color: color || COLORS.text }}>{value}</div>
    {sub && <div style={{ fontSize: 12, color: sub.startsWith("+") ? COLORS.success : sub.startsWith("-") ? COLORS.danger : COLORS.textMuted, marginTop: 4 }}>{sub}</div>}
  </Card>
);

// ============================================================
// MAIN APP COMPONENT
// ============================================================
function App() {
  // --- State ---
  const [currentUser, setCurrentUser] = useState(null);
  const [loginUser, setLoginUser] = useState("");
  const [loginPass, setLoginPass] = useState("");

  const [people, setPeople] = useState(INITIAL_PEOPLE);
  const [plans, setPlans] = useState([]);
  const [taskTemplates, setTaskTemplates] = useState(TASK_TEMPLATES);
  const [batchTemplates, setBatchTemplates] = useState(BATCH_TEMPLATES);
  const [batchTasks, setBatchTasks] = useState([]);

  const [page, setPage] = useState("dashboard");
  const [selectedPlanId, setSelectedPlanId] = useState(null);
  const [searchQuery, setSearchQuery] = useState("");
  const [segmentFilter, setSegmentFilter] = useState("All");
  const [showArchived, setShowArchived] = useState(false);

  // Load/save to storage
  useEffect(() => {
    const load = async () => {
      try {
        const res = await window.storage.get("crm-data-v5");
        if (res?.value) {
          const d = JSON.parse(res.value);
          if (d.people) setPeople(d.people.map(p => ({ ...p, password: p.password || "changeme", isAdmin: p.isAdmin ?? false })));
          if (d.plans && d.plans.length > 0) setPlans(d.plans);
          else setPlans([SAMPLE_PLAN]);
          if (d.taskTemplates) setTaskTemplates(d.taskTemplates);
          if (d.batchTemplates) setBatchTemplates(d.batchTemplates);
          if (d.batchTasks) setBatchTasks(d.batchTasks);
        } else {
          // First load: seed with the sample plan so users see what fields exist
          setPlans([SAMPLE_PLAN]);
        }
      } catch (e) { setPlans([SAMPLE_PLAN]); }
    };
    load().then(() => {
      // Auto-generate batch tasks 2 years out
      setBatchTasks(prev => {
        const now = new Date();
        const years = [now.getFullYear(), now.getFullYear() + 1];
        const existing = prev || [];
        const existingKeys = new Set(existing.map(t => t.name + "|" + t.dueDate));
        const newTasks = [];
        years.forEach(year => {
          BATCH_TEMPLATES.forEach(tmpl => {
            tmpl.months.forEach(month => {
              const parentDueDate = new Date(year, month - 1, 28).toISOString().split("T")[0];
              if (tmpl.subtasks && tmpl.subtasks.length > 0) {
                const firstKey = (typeof tmpl.subtasks[0] === "string" ? tmpl.subtasks[0] : tmpl.subtasks[0].name) + "|" + parentDueDate;
                if (existingKeys.has(firstKey)) return;
                const groupId = uid();
                tmpl.subtasks.forEach((sub, si) => {
                  const subName = typeof sub === "string" ? sub : sub.name;
                  const subRole = typeof sub === "string" ? tmpl.role : (sub.role || tmpl.role);
                  const bizDays = typeof sub === "string" ? 0 : (sub.bizDaysBefore || 0);
                  const subDue = bizDays > 0 ? subtractBusinessDays(parentDueDate, bizDays) : parentDueDate;
                  newTasks.push({ id: uid(), name: subName, parentTask: tmpl.name, parentDueDate, groupId, frequency: tmpl.frequency, assignedRole: subRole, dueDate: subDue, completedAt: null, completedBy: null, note: "", month, order: si, isBatch: true });
                });
              } else {
                const key = tmpl.name + "|" + parentDueDate;
                if (existingKeys.has(key)) return;
                newTasks.push({ id: uid(), name: tmpl.name, frequency: tmpl.frequency, assignedRole: tmpl.role, dueDate: parentDueDate, completedAt: null, completedBy: null, note: "", month, isBatch: true });
              }
            });
          });
        });
        if (newTasks.length > 0) return [...existing, ...newTasks];
        return existing;
      });
    });
  }, []);

  const saveData = useCallback(async (newPlans, newPeople, newTemplates, newBatchTemplates, newBatchTasks) => {
    const data = { people: newPeople || people, plans: newPlans || plans, taskTemplates: newTemplates || taskTemplates, batchTemplates: newBatchTemplates || batchTemplates, batchTasks: newBatchTasks || batchTasks };
    try { await window.storage.set("crm-data-v5", JSON.stringify(data)); } catch(e) { console.error(e); }
  }, [people, plans, taskTemplates, batchTemplates, batchTasks]);

  const updatePlans = (p) => { setPlans(p); saveData(p, null, null, null, null); };
  const updatePeople = (p) => { setPeople(p); saveData(null, p, null, null, null); };
  const updateTemplates = (t) => { setTaskTemplates(t); saveData(null, null, t, null, null); };
  const updateBatchTasks = (bt) => { setBatchTasks(bt); saveData(null, null, null, null, bt); };

  const [loginError, setLoginError] = useState("");
  const [selectedApp, setSelectedApp] = useState(null);
  const [viewAs, setViewAs] = useState("self"); // "self" | "employee" — owners can preview employee experience

  // Effective user: if the actual user is an owner and they've chosen to preview as employee,
  // we synthesize a downgraded user object that downstream code uses for permission checks.
  const effectiveUser = useMemo(() => {
    if (!currentUser) return null;
    if (viewAs === "employee" && currentUser.isOwner) {
      return { ...currentUser, isOwner: false, isAdmin: false, _previewingAsEmployee: true };
    }
    return currentUser;
  }, [currentUser, viewAs]);

  // --- Login Screen ---
  if (!currentUser) {
    const handleLogin = () => {
      if (!loginUser) return;
      const user = people.find(p => p.id === loginUser);
      if (!user) { setLoginError("User not found"); return; }
      if (user.password !== loginPass) { setLoginError("Incorrect password"); return; }
      setCurrentUser(user); setLoginPass(""); setLoginError("");
    };
    return (
      <div style={{ minHeight: "100vh", background: "#EDF2F8", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'DM Sans', 'Segoe UI', sans-serif" }}>
        <div style={{ width: 380, padding: 40, background: COLORS.surface, borderRadius: 20, border: `1px solid ${COLORS.border}`, boxShadow: "0 24px 64px rgba(0,0,0,0.08)" }}>
          <div style={{ textAlign: "center", marginBottom: 32 }}>
            <div style={{ fontSize: 36, fontWeight: 800, color: COLORS.primary, marginBottom: 4 }}>PointerOS</div>
            <div style={{ color: COLORS.textMuted, fontSize: 13, letterSpacing: 2 }}>Loyalty · Altruism · Expertise</div>
          </div>
          <Select label="User" value={loginUser} onChange={v => { setLoginUser(v); setLoginError(""); }} options={people.filter(p => p.active).map(p => ({ value: p.id, label: p.name }))} placeholder="Select your name" />
          <Input label="Password" type="password" value={loginPass} onChange={v => { setLoginPass(v); setLoginError(""); }} placeholder="Enter password"
            onKeyDown={e => { if (e.key === "Enter") handleLogin(); }} />
          {loginError && <div style={{ color: COLORS.danger, fontSize: 12, marginBottom: 8, textAlign: "center" }}>{loginError}</div>}
          <Button style={{ width: "100%", justifyContent: "center", marginTop: 8, padding: "12px 0" }} onClick={handleLogin}>
            Sign In
          </Button>
          <div style={{ textAlign: "center", marginTop: 16, fontSize: 11, color: COLORS.textDim }}>Default password for all users: changeme</div>
        </div>
      </div>
    );
  }

  // --- Landing Page (App Selector) ---
  if (!selectedApp) {
    return (
      <div style={{ minHeight: "100vh", background: "#EDF2F8", fontFamily: "'DM Sans', 'Segoe UI', sans-serif", color: COLORS.text }}>
        <div style={{ maxWidth: 900, margin: "0 auto", padding: "60px 32px" }}>
          <div style={{ textAlign: "center", marginBottom: 48 }}>
            <div style={{ fontSize: 42, fontWeight: 800, color: COLORS.primary, marginBottom: 6 }}>PointerOS</div>
            <div style={{ color: COLORS.textMuted, fontSize: 14, letterSpacing: 2 }}>Loyalty · Altruism · Expertise</div>
            <div style={{ color: COLORS.textDim, fontSize: 13, marginTop: 12 }}>Welcome back, {currentUser.name}</div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            {/* Active App */}
            <div onClick={() => setSelectedApp("retirement")} style={{ background: COLORS.surface, borderRadius: 16, border: `1px solid ${COLORS.primary}44`, padding: 32, cursor: "pointer", transition: "all 0.2s", position: "relative", overflow: "hidden" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = COLORS.primary; e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 24px rgba(59,130,246,0.15)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = COLORS.primary + "44"; e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}>
              <div style={{ fontSize: 28, marginBottom: 12 }}>📊</div>
              <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 6 }}>Retirement Plan Management</div>
              <div style={{ fontSize: 13, color: COLORS.textMuted, lineHeight: 1.5 }}>Manage 401(k) plans, workflows, tasks, assets, and participants across your entire book.</div>
              <Badge color={COLORS.success} style={{ marginTop: 12 }}>Active</Badge>
            </div>
            {/* Active: Investment Dashboard */}
            <div onClick={() => setSelectedApp("investments")} style={{ background: COLORS.surface, borderRadius: 16, border: `1px solid ${COLORS.primary}44`, padding: 32, cursor: "pointer", transition: "all 0.2s", position: "relative", overflow: "hidden" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = COLORS.primary; e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 24px rgba(59,130,246,0.15)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = COLORS.primary + "44"; e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}>
              <div style={{ fontSize: 28, marginBottom: 12 }}>📈</div>
              <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 6 }}>Investment Dashboard</div>
              <div style={{ fontSize: 13, color: COLORS.textMuted, lineHeight: 1.5 }}>Market snapshot, model performance, options positions, benchmark comparisons.</div>
              <Badge color={COLORS.success} style={{ marginTop: 12 }}>Active</Badge>
            </div>
            {/* Coming Soon: Marketing Hub */}
            <div style={{ background: COLORS.surface, borderRadius: 16, border: `1px solid ${COLORS.border}`, padding: 32, opacity: 0.5 }}>
              <div style={{ fontSize: 28, marginBottom: 12 }}>📣</div>
              <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 6 }}>Marketing Hub</div>
              <div style={{ fontSize: 13, color: COLORS.textMuted, lineHeight: 1.5 }}>Manage campaigns, track outreach, and coordinate webinars and events.</div>
              <Badge color={COLORS.textDim} style={{ marginTop: 12 }}>Coming Soon</Badge>
            </div>
            {/* Active: HR Toolsuite */}
            <div onClick={() => setSelectedApp("hr")} style={{ background: COLORS.surface, borderRadius: 16, border: `1px solid ${COLORS.primary}44`, padding: 32, cursor: "pointer", transition: "all 0.2s", position: "relative", overflow: "hidden" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = COLORS.primary; e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 24px rgba(59,130,246,0.15)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = COLORS.primary + "44"; e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}>
              <div style={{ fontSize: 28, marginBottom: 12 }}>👥</div>
              <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 6 }}>HR Toolsuite</div>
              <div style={{ fontSize: 13, color: COLORS.textMuted, lineHeight: 1.5 }}>Profiles, PTO tracking, reimbursements, master calendar with birthdays and events.</div>
              <Badge color={COLORS.success} style={{ marginTop: 12 }}>Active</Badge>
            </div>
          </div>
          <div style={{ textAlign: "center", marginTop: 32 }}>
            <button onClick={() => { setCurrentUser(null); setSelectedApp(null); }} style={{ background: "none", border: "none", color: COLORS.textDim, fontSize: 12, cursor: "pointer", fontFamily: "inherit", display: "inline-flex", alignItems: "center", gap: 6 }}>
              <IconLogout size={14} /> Sign out
            </button>
          </div>
        </div>
      </div>
    );
  }

  // --- Investment Dashboard Module ---
  if (selectedApp === "investments") {
    return <InvestmentDashboardApp currentUser={effectiveUser} actualUser={currentUser} viewAs={viewAs} setViewAs={setViewAs} people={people} onExit={() => setSelectedApp(null)} />;
  }

  // --- HR Toolsuite Module ---
  if (selectedApp === "hr") {
    return <HRToolsuiteApp currentUser={effectiveUser} actualUser={currentUser} viewAs={viewAs} setViewAs={setViewAs} people={people} onUpdatePeople={updatePeople} onExit={() => setSelectedApp(null)} />;
  }

  const selectedPlan = plans.find(p => p.id === selectedPlanId);
  const activePlans = plans.filter(p => !p.archived);
  const archivedPlans = plans.filter(p => p.archived);
  const filteredPlans = (showArchived ? archivedPlans : activePlans).filter(p => {
    if (segmentFilter !== "All" && p.segment !== segmentFilter) return false;
    if (searchQuery && !p.name.toLowerCase().includes(searchQuery.toLowerCase()) && !p.planNumber?.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    return true;
  });

  const totalAssets = activePlans.reduce((s, p) => s + (p.assetHistory?.length ? p.assetHistory[p.assetHistory.length - 1].total : 0), 0);
  const totalParticipants = activePlans.reduce((s, p) => s + (p.participants?.total || 0), 0);

  // --- Navigation ---
  const navItems = [
    { key: "dashboard", icon: IconHome, label: "Dashboard" },
    { key: "plans", icon: IconList, label: "Plans" },
    { key: "workflows", icon: IconClipboard, label: "Workflows" },
    { key: "templates", icon: IconSettings, label: "Templates" },
    { key: "trends", icon: IconTrend, label: "Trends" },
  ];

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "#EDF2F8", fontFamily: "'DM Sans', 'Segoe UI', sans-serif", color: COLORS.text }}>
      {/* Sidebar */}
      <div style={{ width: 220, background: COLORS.surface, boxShadow: "2px 0 12px rgba(0,0,0,0.06)", zIndex: 2, display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 4, background: COLORS.primary, borderRadius: "0 2px 2px 0" }} />
        <div style={{ padding: "20px 20px 12px", borderBottom: `1px solid ${COLORS.borderLight}` }}>
          <button onClick={() => setSelectedApp(null)} style={{ background: "none", border: "none", cursor: "pointer", padding: 0, fontFamily: "inherit", display: "block" }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: COLORS.primary }}>PointerOS</div>
            <div style={{ fontSize: 10, color: COLORS.textDim, letterSpacing: 1.5 }}>Retirement Plan Management</div>
          </button>
          <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 6 }}>{activePlans.length} plans managed</div>
        </div>
        <nav style={{ flex: 1, padding: "12px 8px" }}>
          {navItems.map(n => (
            <button key={n.key} onClick={() => { setPage(n.key); setSelectedPlanId(null); }}
              style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 10, border: "none",
                background: page === n.key ? COLORS.primary + "0D" : "transparent",
                color: page === n.key ? COLORS.primary : COLORS.textMuted,
                fontSize: 13, fontWeight: page === n.key ? 600 : 500, borderLeft: page === n.key ? `3px solid ${COLORS.primary}` : "3px solid transparent", cursor: "pointer", marginBottom: 2, fontFamily: "inherit", transition: "all 0.15s" }}>
              <n.icon size={18} /> {n.label}
            </button>
          ))}
        </nav>
        <div style={{ padding: 16, borderTop: `1px solid ${COLORS.borderLight}` }}>
          <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 8 }}>{currentUser.name}</div>
          <button onClick={() => setSelectedApp(null)} style={{ background: "none", border: "none", color: COLORS.primary, fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: "inherit", marginBottom: 4 }}>
            <IconChevron size={14} style={{ transform: "rotate(180deg)" }} /> Back to PointerOS
          </button>
          <button onClick={() => { setCurrentUser(null); setSelectedApp(null); }} style={{ background: "none", border: "none", color: COLORS.textDim, fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: "inherit" }}>
            <IconLogout size={14} /> Sign out
          </button>
        </div>
      </div>

      {/* Main Content */}
      <div style={{ flex: 1, overflow: "auto", padding: 28 }}>
        {page === "dashboard" && <DashboardPage plans={activePlans} totalAssets={totalAssets} totalParticipants={totalParticipants} segmentFilter={segmentFilter} setSegmentFilter={setSegmentFilter} onSelectPlan={(id) => { setSelectedPlanId(id); setPage("plans"); }} currentUser={currentUser} people={people} />}
        {page === "plans" && !selectedPlanId && <PlansListPage plans={filteredPlans} searchQuery={searchQuery} setSearchQuery={setSearchQuery} segmentFilter={segmentFilter} setSegmentFilter={setSegmentFilter} onSelectPlan={(id) => setSelectedPlanId(id)} onAddPlan={(plan) => updatePlans([...plans, plan])} people={people} taskTemplates={taskTemplates} showArchived={showArchived} setShowArchived={setShowArchived} isAdmin={currentUser?.isAdmin} onArchivePlan={(id) => updatePlans(plans.map(p => p.id === id ? { ...p, archived: true } : p))} onRestorePlan={(id) => updatePlans(plans.map(p => p.id === id ? { ...p, archived: false } : p))} onDeletePlan={(id) => updatePlans(plans.filter(p => p.id !== id))} />}
        {page === "plans" && selectedPlanId && selectedPlan && <PlanDetailPage plan={selectedPlan} people={people} currentUser={currentUser} onUpdate={(p) => updatePlans(plans.map(x => x.id === p.id ? p : x))} onBack={() => setSelectedPlanId(null)} />}
        {page === "workflows" && <WorkflowsPage plans={activePlans} people={people} currentUser={currentUser} onUpdatePlan={(p) => updatePlans(plans.map(x => x.id === p.id ? p : x))} onSelectPlan={(id) => { setSelectedPlanId(id); setPage("plans"); }} batchTasks={batchTasks} batchTemplates={batchTemplates} onUpdateBatchTasks={updateBatchTasks} />}
        {page === "trends" && <TrendsPage plans={activePlans} />}
        {page === "templates" && <TemplatesPage templates={taskTemplates} onUpdate={updateTemplates} isAdmin={currentUser?.isAdmin} />}
      </div>
    </div>
  );
}

// ============================================================
// DASHBOARD PAGE
// ============================================================
function DashboardPage({ plans, totalAssets, totalParticipants, onSelectPlan, currentUser, people }) {
  const now = new Date();
  const [showAllFlags, setShowAllFlags] = useState(false);

  // Gather my tasks
  const myTasks = [];
  const myCompleted = [];
  plans.forEach(plan => {
    (plan.tasks || []).forEach(task => {
      const assignedPersonId = plan.roles?.[task.assignedRole] || null;
      if (assignedPersonId === currentUser.id) {
        if (!task.completedAt) {
          myTasks.push({ ...task, planName: plan.name, planId: plan.id, planSegment: plan.segment });
        } else {
          myCompleted.push({ ...task, planName: plan.name, planId: plan.id });
        }
      }
    });
  });
  myTasks.sort((a, b) => (a.dueDate || "9999") < (b.dueDate || "9999") ? -1 : 1);
  myCompleted.sort((a, b) => b.completedAt > a.completedAt ? 1 : -1);

  const overdue = myTasks.filter(t => t.dueDate && new Date(t.dueDate) < now);
  const weekEnd = new Date(now.getTime() + 7 * 86400000);
  const dueThisWeek = myTasks.filter(t => t.dueDate && !overdue.includes(t) && new Date(t.dueDate) <= weekEnd);

  // Group tasks by workflow name
  const groupTasks = (tasks) => {
    const groups = {};
    tasks.forEach(t => {
      const key = t.parentTask || t.name;
      if (!groups[key]) groups[key] = { name: key, tasks: [], subtask: t.parentTask ? t.name : null };
      groups[key].tasks.push(t);
    });
    return Object.values(groups);
  };

  const overdueGroups = groupTasks(overdue);
  const weekGroups = groupTasks(dueThisWeek);

  // Completion stats (current quarter)
  const qMonth = Math.floor(now.getMonth() / 3) * 3;
  const qStart = new Date(now.getFullYear(), qMonth, 1);
  const allMyTasks = [...myTasks, ...myCompleted];
  const quarterTasks = allMyTasks.filter(t => t.dueDate && new Date(t.dueDate) >= qStart);
  const quarterCompleted = quarterTasks.filter(t => t.completedAt);
  const completionPct = quarterTasks.length > 0 ? Math.round((quarterCompleted.length / quarterTasks.length) * 100) : 0;

  // Needs Attention flags
  const flags = [];
  const dayMs = 86400000;
  const staleThreshold = 180 * dayMs;

  plans.forEach(plan => {
    // Participant data staleness
    if (!plan.participantsUpdatedAt || (now - new Date(plan.participantsUpdatedAt)) > staleThreshold) {
      const days = plan.participantsUpdatedAt ? Math.floor((now - new Date(plan.participantsUpdatedAt)) / dayMs) : null;
      flags.push({ type: "stale_participants", plan: plan.name, planId: plan.id, msg: days ? `Participant data is ${days} days old` : "Participant data never entered", icon: "⚠" });
    }
    // Asset data staleness
    const lastAsset = plan.assetHistory?.length ? plan.assetHistory[plan.assetHistory.length - 1] : null;
    if (!lastAsset || (now - new Date(lastAsset.date)) > staleThreshold) {
      const days = lastAsset ? Math.floor((now - new Date(lastAsset.date)) / dayMs) : null;
      flags.push({ type: "stale_assets", plan: plan.name, planId: plan.id, msg: days ? `Asset data is ${days} days old` : "No asset snapshots entered", icon: "📊" });
    }
    // Missing roles
    const missingRoles = PLAN_ROLES.filter(r => !plan.roles?.[r]);
    if (missingRoles.length > 0) {
      flags.push({ type: "missing_roles", plan: plan.name, planId: plan.id, msg: `Missing: ${missingRoles.join(", ")}`, icon: "👤" });
    }
    // Missing recordkeeper
    if (!plan.provisions?.recordkeeper && !plan.contacts?.recordkeeper?.name) {
      flags.push({ type: "missing_rk", plan: plan.name, planId: plan.id, msg: "No recordkeeper on file", icon: "🏦" });
    }
    // Missing TPA
    if (!plan.provisions?.tpa && !plan.contacts?.tpa?.name) {
      flags.push({ type: "missing_tpa", plan: plan.name, planId: plan.id, msg: "No TPA on file", icon: "📋" });
    }
    // Missing provisions (check if mostly empty)
    const provKeys = Object.keys(plan.provisions || {});
    const filledProvs = provKeys.filter(k => plan.provisions[k]);
    if (filledProvs.length < 3) {
      flags.push({ type: "missing_provisions", plan: plan.name, planId: plan.id, msg: "Plan provisions mostly empty", icon: "📝" });
    }
  });

  // Show 3 rotating flags (rotate based on current minute to give variety)
  const flagRotation = Math.floor(now.getMinutes() / 2) % Math.max(1, flags.length);
  const visibleFlags = flags.length <= 3 ? flags : flags.slice(flagRotation, flagRotation + 3).concat(flags.slice(0, Math.max(0, 3 - (flags.length - flagRotation)))).slice(0, 3);

  const segCounts = SEGMENTS.reduce((a, s) => ({ ...a, [s]: plans.filter(p => p.segment === s).length }), {});

  const TaskGroup = ({ group, color }) => (
    <div style={{ padding: "8px 0", borderBottom: `1px solid ${COLORS.border}22` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: 13, fontWeight: 600 }}>{group.name}</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 11, color: COLORS.textDim }}>{group.tasks.length} plan{group.tasks.length !== 1 ? "s" : ""}</span>
          {group.tasks[0]?.dueDate && <Badge color={color}>{fmtDate(group.tasks[0].dueDate)}</Badge>}
        </div>
      </div>
      <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 2 }}>
        {group.tasks.slice(0, 5).map(t => t.planName).join(", ")}
        {group.tasks.length > 5 && ` +${group.tasks.length - 5} more`}
      </div>
    </div>
  );

  return (
    <div>
      {/* Greeting */}
      <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>
        Good {now.getHours() < 12 ? "morning" : now.getHours() < 17 ? "afternoon" : "evening"}, {currentUser.name.split(" ")[0]}
      </div>
      <div style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 16 }}>
        {overdue.length > 0 ? <span>You have <strong style={{ color: COLORS.danger }}>{overdue.length} overdue</strong> and </span> : ""}
        <strong style={{ color: COLORS.warning }}>{dueThisWeek.length} due this week</strong>
      </div>

      {/* Compact stat bar */}
      <div style={{ display: "flex", gap: 24, padding: "10px 16px", background: COLORS.surface, borderRadius: 8, marginBottom: 20, fontSize: 12, color: COLORS.textMuted, alignItems: "center", border: `1px solid ${COLORS.border}` }}>
        <span>Plans: <strong style={{ color: COLORS.text }}>{plans.length}</strong></span>
        <span>Total Assets: <strong style={{ color: COLORS.success }}>{fmt$(totalAssets)}</strong></span>
        <span>Participants: <strong style={{ color: COLORS.text }}>{totalParticipants.toLocaleString()}</strong></span>
        <span style={{ marginLeft: "auto" }}>
          A: <strong style={{ color: COLORS.segA }}>{segCounts.A || 0}</strong> · B: <strong style={{ color: COLORS.segB }}>{segCounts.B || 0}</strong> · C: <strong style={{ color: COLORS.segC }}>{segCounts.C || 0}</strong> · SIM: <strong style={{ color: COLORS.segSIM }}>{segCounts.SIM || 0}</strong>
        </span>
      </div>

      {/* Main two-column layout */}
      <div style={{ display: "flex", gap: 20 }}>
        {/* LEFT: Tasks */}
        <div style={{ flex: 2 }}>
          <Card>
            <h4 style={{ margin: "0 0 12px", color: COLORS.danger, fontSize: 14, display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: COLORS.danger }} />
              My Overdue Tasks ({overdue.length})
            </h4>
            {overdueGroups.length === 0 && <div style={{ color: COLORS.textDim, fontSize: 13 }}>All caught up!</div>}
            {overdueGroups.map((g, i) => <TaskGroup key={i} group={g} color={COLORS.danger} />)}
          </Card>

          <Card style={{ marginTop: 12 }}>
            <h4 style={{ margin: "0 0 12px", color: COLORS.warning, fontSize: 14, display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: COLORS.warning }} />
              Due This Week ({dueThisWeek.length})
            </h4>
            {weekGroups.length === 0 && <div style={{ color: COLORS.textDim, fontSize: 13 }}>Nothing due this week</div>}
            {weekGroups.map((g, i) => <TaskGroup key={i} group={g} color={COLORS.warning} />)}
          </Card>
        </div>

        {/* RIGHT: Intelligence panel */}
        <div style={{ flex: 1, minWidth: 280 }}>
          {/* Completion progress */}
          <Card>
            <h4 style={{ margin: "0 0 10px", fontSize: 13, color: COLORS.textMuted }}>Quarterly Progress</h4>
            <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 8 }}>
              <span style={{ fontSize: 28, fontWeight: 700, color: completionPct >= 75 ? COLORS.success : completionPct >= 40 ? COLORS.warning : COLORS.text }}>{completionPct}%</span>
              <span style={{ fontSize: 12, color: COLORS.textDim }}>{quarterCompleted.length} of {quarterTasks.length} tasks</span>
            </div>
            <div style={{ height: 6, background: COLORS.bg, borderRadius: 3, overflow: "hidden" }}>
              <div style={{ height: "100%", width: completionPct + "%", background: completionPct >= 75 ? COLORS.success : completionPct >= 40 ? COLORS.warning : COLORS.primary, borderRadius: 3, transition: "width 0.5s" }} />
            </div>
          </Card>

          {/* Recently completed */}
          <Card style={{ marginTop: 12 }}>
            <h4 style={{ margin: "0 0 10px", fontSize: 13, color: COLORS.textMuted }}>Recently Completed</h4>
            {myCompleted.length === 0 && <div style={{ fontSize: 12, color: COLORS.textDim }}>No completed tasks yet</div>}
            {myCompleted.slice(0, 5).map(t => (
              <div key={t.id} style={{ padding: "5px 0", borderBottom: `1px solid ${COLORS.border}11`, fontSize: 12 }}>
                <div style={{ color: COLORS.text, fontWeight: 500 }}>{t.name}</div>
                <div style={{ color: COLORS.textDim, fontSize: 10 }}>{t.planName} · {fmtDate(t.completedAt)}</div>
              </div>
            ))}
          </Card>

          {/* Needs Attention */}
          <Card style={{ marginTop: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <h4 style={{ margin: 0, fontSize: 13, color: COLORS.textMuted }}>Needs Attention</h4>
              {flags.length > 3 && (
                <button onClick={() => setShowAllFlags(true)} style={{ background: "none", border: "none", color: COLORS.primary, fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>
                  View all ({flags.length})
                </button>
              )}
            </div>
            {flags.length === 0 && <div style={{ fontSize: 12, color: COLORS.textDim }}>Everything looks good!</div>}
            {visibleFlags.map((f, i) => (
              <div key={i} onClick={() => f.planId && onSelectPlan(f.planId)} style={{ padding: "6px 0", borderBottom: `1px solid ${COLORS.border}11`, cursor: f.planId ? "pointer" : "default" }}>
                <div style={{ fontSize: 12, fontWeight: 500, display: "flex", alignItems: "center", gap: 6 }}>
                  <span>{f.icon}</span> {f.plan}
                </div>
                <div style={{ fontSize: 11, color: COLORS.warning, marginLeft: 22 }}>{f.msg}</div>
              </div>
            ))}
          </Card>
        </div>
      </div>

      {/* All Flags Modal */}
      <Modal open={showAllFlags} onClose={() => setShowAllFlags(false)} title={`Needs Attention (${flags.length} items)`} wide>
        <div style={{ maxHeight: 500, overflow: "auto" }}>
          {flags.map((f, i) => (
            <div key={i} onClick={() => { f.planId && onSelectPlan(f.planId); setShowAllFlags(false); }} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: `1px solid ${COLORS.border}22`, cursor: f.planId ? "pointer" : "default" }}>
              <span style={{ fontSize: 18 }}>{f.icon}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{f.plan}</div>
                <div style={{ fontSize: 12, color: COLORS.warning }}>{f.msg}</div>
              </div>
              <Badge color={f.type.includes("stale") ? COLORS.danger : COLORS.warning} style={{ fontSize: 10 }}>
                {f.type === "stale_participants" ? "Stale Data" : f.type === "stale_assets" ? "Stale Data" : f.type === "missing_roles" ? "Roles" : f.type === "missing_rk" ? "Recordkeeper" : f.type === "missing_tpa" ? "TPA" : "Provisions"}
              </Badge>
            </div>
          ))}
        </div>
      </Modal>
    </div>
  );
}

// PLANS LIST PAGE
// ============================================================
function PlansListPage({ plans, searchQuery, setSearchQuery, segmentFilter, setSegmentFilter, onSelectPlan, onAddPlan, people, taskTemplates, showArchived, setShowArchived, isAdmin, onArchivePlan, onRestorePlan, onDeletePlan }) {
  const [showAdd, setShowAdd] = useState(false);
  const [newPlan, setNewPlan] = useState({ name: "", segment: "A", planNumber: "", planType: "401(k)", fiscalYearEnd: "", fiduciaryStatus: "" });

  const generateTasks = (segment) => {
    const templates = taskTemplates[segment] || [];
    const now = new Date();
    const year = now.getFullYear();
    const tasks = [];
    templates.forEach(tmpl => {
      if (tmpl.subtasks && tmpl.subtasks.length > 0) {
        tmpl.months.forEach(month => {
          const parentDueDate = new Date(year, month - 1, 28).toISOString().split("T")[0];
          const groupId = uid(); // shared ID to link subtasks in same group
          tmpl.subtasks.forEach((sub, si) => {
            // sub can be string (legacy) or object { name, role, bizDaysBefore }
            const subName = typeof sub === "string" ? sub : sub.name;
            const subRole = typeof sub === "string" ? tmpl.role : (sub.role || tmpl.role);
            const bizDaysBefore = typeof sub === "string" ? 0 : (sub.bizDaysBefore || 0);
            const subDueDate = bizDaysBefore > 0 ? subtractBusinessDays(parentDueDate, bizDaysBefore) : parentDueDate;
            tasks.push({ id: uid(), name: subName, parentTask: tmpl.name, parentDueDate, groupId, frequency: tmpl.frequency, assignedRole: subRole, dueDate: subDueDate, completedAt: null, completedBy: null, note: "", month, order: si });
          });
        });
      } else if (tmpl.frequency === "Ongoing") {
        tasks.push({ id: uid(), name: tmpl.name, frequency: "Ongoing", assignedRole: tmpl.role, dueDate: null, completedAt: null, completedBy: null, note: "" });
      } else if (tmpl.frequency === "Every 3 years") {
        const dueDate = new Date(year + 3, 0, 31).toISOString().split("T")[0];
        tasks.push({ id: uid(), name: tmpl.name, frequency: tmpl.frequency, assignedRole: tmpl.role, dueDate, completedAt: null, completedBy: null, note: "", nextRfpYear: year + 3 });
      } else {
        tmpl.months.forEach(month => {
          const dueDate = new Date(year, month - 1, 28).toISOString().split("T")[0];
          tasks.push({ id: uid(), name: tmpl.name, frequency: tmpl.frequency, assignedRole: tmpl.role, dueDate, completedAt: null, completedBy: null, note: "", month });
        });
      }
    });
    return tasks;
  };

  const handleAdd = () => {
    const plan = {
      id: uid(), ...newPlan,
      roles: { "Lead Advisor": "", "Relationship Manager": "", "Educator": "", "Investment Team": "" },
      provisions: {},
      contacts: { planAdmin1: {}, planAdmin2: {}, recordkeeper: {}, tpa: {} },
      assetHistory: [],
      participants: { total: 0, eligible: 0, contributing: 0, terminated: 0 },
      tasks: generateTasks(newPlan.segment),
      createdAt: new Date().toISOString(),
    };
    onAddPlan(plan);
    setShowAdd(false);
    setNewPlan({ name: "", segment: "A", planNumber: "", planType: "401(k)", fiscalYearEnd: "", fiduciaryStatus: "" });
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Plans</h2>
        <Button onClick={() => setShowAdd(true)}><IconPlus size={16} /> Add Plan</Button>
      </div>

      {/* Filters */}
      <div style={{ display: "flex", gap: 12, marginBottom: 20, alignItems: "center" }}>
        <div style={{ position: "relative", flex: 1, maxWidth: 300 }}>
          <IconSearch size={16} color={COLORS.textDim} style={{ position: "absolute", left: 12, top: 10 }} />
          <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Search plans..."
            style={{ width: "100%", padding: "8px 12px 8px 36px", borderRadius: 8, border: `1px solid ${COLORS.border}`, background: COLORS.surface, color: COLORS.text, fontSize: 13, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          {["All", ...SEGMENTS].map(s => (
            <button key={s} onClick={() => setSegmentFilter(s)}
              style={{ padding: "6px 14px", borderRadius: 8, border: `1px solid ${segmentFilter === s ? (s === "All" ? COLORS.primary : segColor(s)) : COLORS.border}`, background: segmentFilter === s ? (s === "All" ? COLORS.primary + "18" : segColor(s) + "18") : "transparent", color: segmentFilter === s ? (s === "All" ? COLORS.primary : segColor(s)) : COLORS.textMuted, fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>
              {s}
            </button>
          ))}
        </div>
        <button onClick={() => setShowArchived(!showArchived)}
          style={{ padding: "6px 14px", borderRadius: 8, border: "1px solid " + (showArchived ? COLORS.warning : COLORS.border), background: showArchived ? COLORS.warning + "12" : "#FFFFFF", color: showArchived ? COLORS.warning : COLORS.textMuted, fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>
          {showArchived ? "Showing Archived" : "Show Archived"}
        </button>
      </div>

      {/* Plan list */}
      <div style={{ display: "grid", gap: 8 }}>
        {plans.length === 0 && <Card><div style={{ textAlign: "center", color: COLORS.textDim, padding: 40 }}>No plans yet. Click "Add Plan" to get started.</div></Card>}
        {plans.map(plan => {
          const lastAsset = plan.assetHistory?.length ? plan.assetHistory[plan.assetHistory.length - 1].total : 0;
          const openTasks = (plan.tasks || []).filter(t => !t.completedAt).length;
          const overdueTasks = (plan.tasks || []).filter(t => !t.completedAt && t.dueDate && new Date(t.dueDate) < new Date()).length;
          return (
            <Card key={plan.id} onClick={() => onSelectPlan(plan.id)} style={{ display: "flex", alignItems: "center", gap: 16, padding: "14px 20px" }}>
              <Badge color={segColor(plan.segment)} style={{ minWidth: 36, textAlign: "center" }}>{plan.segment}</Badge>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 600 }}>{plan.name}</div>
                <div style={{ fontSize: 11, color: COLORS.textDim }}>{plan.planType} · {plan.planNumber || "No #"}</div>
              </div>
              <div style={{ textAlign: "right", minWidth: 120 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: COLORS.success }}>{fmt$(lastAsset)}</div>
                <div style={{ fontSize: 11, color: COLORS.textDim }}>{plan.participants?.total || 0} participants</div>
              </div>
              <div style={{ textAlign: "right", minWidth: 100 }}>
                {overdueTasks > 0 && <Badge color={COLORS.danger}>{overdueTasks} overdue</Badge>}
                {overdueTasks === 0 && <Badge color={COLORS.textDim}>{openTasks} tasks</Badge>}
              </div>
              {isAdmin && !showArchived && <button onClick={(e) => { e.stopPropagation(); if(confirm("Archive " + plan.name + "?")) onArchivePlan(plan.id); }} style={{ background: "none", border: "none", color: COLORS.textDim, cursor: "pointer", padding: 4 }} title="Archive plan"><IconTrash size={14} /></button>}
              {isAdmin && showArchived && <>
                <Button variant="outline" size="sm" onClick={(e) => { e.stopPropagation(); onRestorePlan(plan.id); }}>Restore</Button>
                <Button variant="danger" size="sm" onClick={(e) => { e.stopPropagation(); if(confirm("Permanently delete " + plan.name + "? This cannot be undone.")) onDeletePlan(plan.id); }}>Delete</Button>
              </>}
              {!showArchived && <IconChevron size={16} color={COLORS.textDim} />}
            </Card>
          );
        })}
      </div>

      {/* Add Plan Modal */}
      <Modal open={showAdd} onClose={() => setShowAdd(false)} title="Add New Plan">
        <Input label="Plan Name" value={newPlan.name} onChange={v => setNewPlan({ ...newPlan, name: v })} placeholder="e.g. Acme Corp 401(k)" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <Select label="Segment" value={newPlan.segment} onChange={v => setNewPlan({ ...newPlan, segment: v })} options={SEGMENTS} />
          <Select label="Plan Type" value={newPlan.planType} onChange={v => setNewPlan({ ...newPlan, planType: v })} options={PLAN_TYPES} />
          <Input label="Plan Number" value={newPlan.planNumber} onChange={v => setNewPlan({ ...newPlan, planNumber: v })} placeholder="EIN-PN" />
          <Input label="Fiscal Year End" value={newPlan.fiscalYearEnd} onChange={v => setNewPlan({ ...newPlan, fiscalYearEnd: v })} placeholder="e.g. 12/31" />
          <Select label="Fiduciary Status" value={newPlan.fiduciaryStatus} onChange={v => setNewPlan({ ...newPlan, fiduciaryStatus: v })} options={FIDUCIARY_STATUSES} placeholder="Select..." />
        </div>
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 16 }}>
          <Button variant="ghost" onClick={() => setShowAdd(false)}>Cancel</Button>
          <Button onClick={handleAdd} disabled={!newPlan.name}>Create Plan</Button>
        </div>
      </Modal>
    </div>
  );
}
