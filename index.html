// ============================================================
// HR LEAVE REQUEST — employee submits time-off requests
// Half / quarter day, remote work notes, multi-day spans
// ============================================================
function HRLeaveRequestView({ currentUser, leaveRequests, bankedPto, companyEvents, saveHR, isOwnerUser, hrSettings, people, onUpdatePeople }) {
  const [form, setForm] = useState({
    startDate: "",
    endDate: "",
    portion: "full",       // "full" | "half-am" | "half-pm" | "quarter-am" | "quarter-pm"
    remote: false,
    remoteNote: "",
    reason: "",
    leaveType: "PTO",      // PTO | Sick | Bereavement | Military | FMLA | Unpaid
  });
  const [bankForm, setBankForm] = useState({ date: "", reason: "" });
  const [submitting, setSubmitting] = useState(false);
  const [expanded, setExpanded] = useState(null);
  // Owner-only bulk-select state for pending leave requests
  const [selectedLeaveIds, setSelectedLeaveIds] = useState(() => new Set());
  const toggleLeaveSelected = (id) => setSelectedLeaveIds(prev => {
    const next = new Set(prev);
    if (next.has(id)) next.delete(id); else next.add(id);
    return next;
  });
  const clearLeaveSelection = () => setSelectedLeaveIds(new Set());
  // Owner-only bulk-select for banked PTO entries (submitted only)
  const [selectedBankedIds, setSelectedBankedIds] = useState(() => new Set());
  const toggleBankedSelected = (id) => setSelectedBankedIds(prev => {
    const next = new Set(prev);
    if (next.has(id)) next.delete(id); else next.add(id);
    return next;
  });
  const clearBankedSelection = () => setSelectedBankedIds(new Set());
  const bulkReviewBanked = (status) => {
    const ids = Array.from(selectedBankedIds);
    if (ids.length === 0) return;
    const all = bankedPto || [];
    const applicable = all.filter(b => ids.includes(b.id) && b.status === "submitted");
    if (applicable.length === 0) { if (window.pfgToast) window.pfgToast("Nothing to review — selection empty or already reviewed.", "warning"); return; }
    const actionLabel = status === "approved" ? "Approve" : "Deny";
    if (!confirm(`${actionLabel} ${applicable.length} banked PTO entr${applicable.length === 1 ? "y" : "ies"}?${status === "approved" ? "\n\nApproved entries credit +1 day to each employee's allotment for the relevant year." : ""}\n\nContinue?`)) return;
    const nowIso = new Date().toISOString();
    const idSet = new Set(applicable.map(b => b.id));
    const nextBanked = all.map(b => idSet.has(b.id)
      ? { ...b, status, reviewedAt: nowIso, reviewedBy: currentUser.name }
      : b);
    // For approvals, credit +1 day to each employee's ptoHistory[year].allot.
    let nextPeople = people ? [...people] : null;
    if (status === "approved" && nextPeople) {
      applicable.forEach(entry => {
        const yr = String(new Date(entry.date).getFullYear());
        nextPeople = nextPeople.map(p => {
          if (p.id !== entry.userId) return p;
          const hist = { ...(p.ptoHistory || {}) };
          if (!hist[yr]) hist[yr] = { allot: p.ptoAllot || 0, used: 0, carriedIn: 0 };
          hist[yr] = { ...hist[yr], allot: (hist[yr].allot || 0) + 1 };
          return { ...p, ptoHistory: hist };
        });
      });
    }
    saveHR({ bankedPto: nextBanked });
    if (nextPeople && onUpdatePeople) onUpdatePeople(nextPeople);
    clearBankedSelection();
    if (window.pfgToast) window.pfgToast(`${applicable.length} banked PTO entr${applicable.length === 1 ? "y" : "ies"} ${status}`, "success");
  };

  // Compute total days requested
  const calcDays = () => {
    if (!form.startDate) return 0;
    const start = new Date(form.startDate + "T00:00:00");
    const end = new Date((form.endDate || form.startDate) + "T00:00:00");
    if (isNaN(start) || isNaN(end) || end < start) return 0;
    const calendarDays = Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;
    // Only apply portion multiplier when it's a single day
    if (calendarDays === 1) {
      if (form.portion === "half-am" || form.portion === "half-pm") return 0.5;
      if (form.portion === "quarter-am" || form.portion === "quarter-pm") return 0.25;
    }
    return calendarDays;
  };
  const totalDays = calcDays();

  const submit = () => {
    if (!form.startDate) { alert("Start date is required"); return; }
    if (!form.reason.trim() && form.leaveType !== "PTO") { alert("Reason is required for non-PTO leave"); return; }
    setSubmitting(true);
    const request = {
      id: uid(),
      requestedBy: currentUser.id,
      requestedByName: currentUser.name,
      requestedByEmail: currentUser.email || "",
      leaveType: form.leaveType,
      startDate: form.startDate,
      endDate: form.endDate || form.startDate,
      portion: form.portion,
      days: totalDays,
      remote: form.remote,
      remoteNote: form.remoteNote,
      reason: form.reason,
      status: "pending",
      submitted: new Date().toISOString(),
    };
    const next = [...(leaveRequests || []), request];
    saveHR({ leaveRequests: next });
    // Notify default → Matt only (per policy: leave requests go to Matt; Alex is excluded).
    const recipients = hrSettings?.notifyEmails?.length ? hrSettings.notifyEmails : ["mbruce@pointerfg.com"];
    const portionLabel = {
      "full": "Full day(s)",
      "half-am": "Half day (AM)",
      "half-pm": "Half day (PM)",
      "quarter-am": "Quarter day (early AM)",
      "quarter-pm": "Quarter day (late PM)",
    }[form.portion];
    const body =
`A new time-off request has been submitted in PointerOS.

Employee: ${currentUser.name} ${currentUser.email ? "<" + currentUser.email + ">" : ""}
Type: ${form.leaveType}
Dates: ${form.startDate}${form.endDate && form.endDate !== form.startDate ? " through " + form.endDate : ""}
Portion: ${portionLabel}
Total days: ${totalDays}

Reason / details:
${form.reason || "(none provided)"}

Approve or deny in: PointerOS → HR Toolsuite → Leave Request (Master view).

— Automated message from PointerOS`;
    sendEmail({
      to: recipients,
      subject: `[PFG Leave] ${currentUser.name} — ${form.leaveType} ${form.startDate}${form.endDate && form.endDate !== form.startDate ? " to " + form.endDate : ""} (${totalDays}d)`,
      body,
    });
    setForm({ startDate: "", endDate: "", portion: "full", remote: false, remoteNote: "", reason: "", leaveType: "PTO" });
    setSubmitting(false);
  };

  const updateStatus = (id, status) => {
    const req = leaveRequests.find(r => r.id === id);
    if (!req) return;
    const next = leaveRequests.map(r => r.id === id ? { ...r, status, reviewedAt: new Date().toISOString(), reviewedBy: currentUser.name } : r);
    // If approved AND it's a PTO request, deduct from the user's ptoHistory
    if (status === "approved" && req.leaveType === "PTO" && req.days > 0 && people && onUpdatePeople) {
      const yr = String(new Date(req.startDate).getFullYear());
      const updatedPeople = people.map(p => {
        if (p.id !== req.requestedBy) return p;
        const hist = { ...(p.ptoHistory || {}) };
        if (!hist[yr]) hist[yr] = { allot: p.ptoAllot || 0, used: 0, carriedIn: 0 };
        hist[yr] = { ...hist[yr], used: (hist[yr].used || 0) + req.days };
        return { ...p, ptoHistory: hist, ptoUsed: (p.ptoUsed || 0) + req.days };
      });
      onUpdatePeople(updatedPeople);
    }
    // If approved AND it's Military/FMLA, append the date range to the appropriate leave list
    if (status === "approved" && (req.leaveType === "Military" || req.leaveType === "FMLA" || req.leaveType === "Unpaid") && people && onUpdatePeople) {
      const updatedPeople = people.map(p => {
        if (p.id !== req.requestedBy) return p;
        const period = { start: req.startDate, end: req.endDate };
        if (req.leaveType === "Military") {
          return { ...p, militaryLeaves: [...(p.militaryLeaves || []), period] };
        } else {
          return { ...p, unpaidLeaves: [...(p.unpaidLeaves || []), period] };
        }
      });
      onUpdatePeople(updatedPeople);
    }

    // Auto-add to company calendar on approval — one event per calendar day in the range.
    // Tagged with sourceId so we can remove them if the request status is later changed.
    let nextEvents = companyEvents.filter(e => e.sourceId !== id);   // remove any old entries for this request
    if (status === "approved") {
      const start = new Date(req.startDate + "T00:00:00");
      const end = new Date((req.endDate || req.startDate) + "T00:00:00");
      const days = [];
      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        days.push(d.toISOString().split("T")[0]);
      }
      const labelIcon = req.leaveType === "Sick" ? "🤒" : req.leaveType === "Military" ? "🎖" : req.leaveType === "Bereavement" ? "🕊" : "🏖";
      days.forEach((dateStr, i) => {
        nextEvents = [...nextEvents, {
          date: dateStr,
          title: `${labelIcon} ${req.requestedByName} — ${req.leaveType}${days.length > 1 ? ` (day ${i + 1}/${days.length})` : ""}`,
          desc: req.reason || "",
          autoGenerated: true,
          sourceId: id,
          sourceType: "leave",
        }];
      });
    }
    saveHR({ leaveRequests: next, companyEvents: nextEvents });
    if (req.requestedByEmail) {
      const ok = confirm(`${status === "approved" ? "Approve" : "Deny"} and email ${req.requestedByName}?`);
      if (ok) sendEmail({
        to: [req.requestedByEmail],
        subject: `Time-off request ${status.toUpperCase()}: ${req.startDate}`,
        body: `Your ${req.leaveType} request from ${req.startDate} to ${req.endDate} (${req.days} days) has been ${status} by ${currentUser.name}.${status === "approved" ? "\n\nThis leave has been added to the team calendar." : ""}\n\n— PointerOS`,
      });
    }
  };

  // Bulk review — approve or deny all selected pending requests in one shot.
  // Mirrors the single-item side effects: PTO deduction, leave-list append, calendar entries.
  // Batches all mutations into single saveHR + onUpdatePeople calls to keep storage writes lean.
  const bulkReviewLeaves = (status) => {
    const ids = Array.from(selectedLeaveIds);
    if (ids.length === 0) return;
    const applicable = leaveRequests.filter(r => ids.includes(r.id) && r.status === "pending");
    if (applicable.length === 0) { if (window.pfgToast) window.pfgToast("Nothing to review — selection empty or already reviewed.", "warning"); return; }
    const actionLabel = status === "approved" ? "Approve" : "Deny";
    if (!confirm(`${actionLabel} ${applicable.length} pending leave request${applicable.length === 1 ? "" : "s"}?\n\n${status === "approved" ? "PTO leaves will auto-deduct balances, Military/FMLA/Unpaid will append to leave history, and each day will be added to the team calendar." : "Denied leaves will remain in history with your name and time."}\n\nContinue?`)) return;

    const nowIso = new Date().toISOString();
    const idSet = new Set(applicable.map(r => r.id));
    // Start from current state and apply changes cumulatively
    const nextReqs = leaveRequests.map(r => idSet.has(r.id)
      ? { ...r, status, reviewedAt: nowIso, reviewedBy: currentUser.name }
      : r);

    let nextPeople = people ? [...people] : null;
    let nextEvents = companyEvents.filter(e => !idSet.has(e.sourceId));   // strip any stale entries for these requests

    if (status === "approved" && nextPeople) {
      // Apply PTO deductions and leave-list appends per approved request
      applicable.forEach(req => {
        if (req.leaveType === "PTO" && req.days > 0) {
          const yr = String(new Date(req.startDate).getFullYear());
          nextPeople = nextPeople.map(p => {
            if (p.id !== req.requestedBy) return p;
            const hist = { ...(p.ptoHistory || {}) };
            if (!hist[yr]) hist[yr] = { allot: p.ptoAllot || 0, used: 0, carriedIn: 0 };
            hist[yr] = { ...hist[yr], used: (hist[yr].used || 0) + req.days };
            return { ...p, ptoHistory: hist, ptoUsed: (p.ptoUsed || 0) + req.days };
          });
        } else if (req.leaveType === "Military" || req.leaveType === "FMLA" || req.leaveType === "Unpaid") {
          nextPeople = nextPeople.map(p => {
            if (p.id !== req.requestedBy) return p;
            const period = { start: req.startDate, end: req.endDate };
            if (req.leaveType === "Military") return { ...p, militaryLeaves: [...(p.militaryLeaves || []), period] };
            return { ...p, unpaidLeaves: [...(p.unpaidLeaves || []), period] };
          });
        }
        // Add calendar entries — one per day
        const start = new Date(req.startDate + "T00:00:00");
        const end = new Date((req.endDate || req.startDate) + "T00:00:00");
        const dayList = [];
        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
          dayList.push(d.toISOString().split("T")[0]);
        }
        const labelIcon = req.leaveType === "Sick" ? "🤒" : req.leaveType === "Military" ? "🎖" : req.leaveType === "Bereavement" ? "🕊" : "🏖";
        dayList.forEach((dateStr, i) => {
          nextEvents = [...nextEvents, {
            date: dateStr,
            title: `${labelIcon} ${req.requestedByName} — ${req.leaveType}${dayList.length > 1 ? ` (day ${i + 1}/${dayList.length})` : ""}`,
            desc: req.reason || "",
            autoGenerated: true,
            sourceId: req.id,
            sourceType: "leave",
          }];
        });
      });
    }

    saveHR({ leaveRequests: nextReqs, companyEvents: nextEvents });
    if (nextPeople && onUpdatePeople) onUpdatePeople(nextPeople);
    clearLeaveSelection();
    if (window.pfgToast) window.pfgToast(`${applicable.length} leave request${applicable.length === 1 ? "" : "s"} ${status}`, "success");
  };

  const removeRequest = (id) => {
    if (!confirm("Delete this request?")) return;
    saveHR({ leaveRequests: leaveRequests.filter(r => r.id !== id) });
  };

  // Filter for view
  const visible = isOwnerUser ? leaveRequests : leaveRequests.filter(r => r.requestedBy === currentUser.id);
  const pending = visible.filter(r => r.status === "pending");
  const past = visible.filter(r => r.status !== "pending");

  const portionLabel = (p) => ({
    "full": "Full day(s)",
    "half-am": "½ AM",
    "half-pm": "½ PM",
    "quarter-am": "¼ early",
    "quarter-pm": "¼ late",
  }[p] || p);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 18 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Leave Request</h2>
          <p style={{ color: COLORS.textMuted, fontSize: 13, margin: "4px 0 0" }}>
            Submit time-off requests. Matt and Alex are notified by email and will approve or deny here.
          </p>
        </div>
        <HandbookLink topic="Part 5 — Holidays, Personal and Other Leave" label="Handbook · Part 5 Leave Policies" />
      </div>

      {/* Submission form */}
      <Card style={{ padding: 20, marginBottom: 16 }}>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>New Request</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12 }}>
          <Select label="Type of Leave" value={form.leaveType} onChange={v => setForm({ ...form, leaveType: v })}
            options={[
              { value: "PTO", label: "Paid Time Off (PTO)" },
              { value: "Sick", label: "Sick" },
              { value: "Bereavement", label: "Bereavement" },
              { value: "Military", label: "Military Service" },
              { value: "FMLA", label: "FMLA" },
              { value: "Unpaid", label: "Other Unpaid" },
            ]} />
          <Input label="Start Date" type="date" value={form.startDate} onChange={v => setForm({ ...form, startDate: v })} />
          <Input label="End Date (same as start if single day)" type="date" value={form.endDate} onChange={v => setForm({ ...form, endDate: v })} />
          <Select label="Portion of Day" value={form.portion} onChange={v => setForm({ ...form, portion: v })}
            options={[
              { value: "full", label: "Full day(s)" },
              { value: "half-am", label: "½ day — morning" },
              { value: "half-pm", label: "½ day — afternoon" },
              { value: "quarter-am", label: "¼ day — early" },
              { value: "quarter-pm", label: "¼ day — late" },
            ]} />
        </div>

        {/* Total days indicator */}
        <div style={{ marginTop: 12, padding: 10, background: COLORS.bg, borderRadius: 6, fontSize: 13 }}>
          <b>Total days requested:</b> <span style={{ color: COLORS.primary, fontWeight: 700, fontSize: 16 }}>{totalDays}</span>
          {form.portion !== "full" && (
            <span style={{ color: COLORS.textMuted, fontSize: 11, marginLeft: 8 }}>(Portion only applies to single-day requests)</span>
          )}
        </div>

        <TextArea label="Reason / Notes" value={form.reason} onChange={v => setForm({ ...form, reason: v })}
          placeholder="Vacation, medical appointment, etc. Required for non-PTO types." rows={3} />

        <div style={{ marginTop: 14, display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
          <Button onClick={submit} disabled={submitting || !form.startDate}><IconPlus size={14} /> Submit & Notify</Button>
          <span style={{ fontSize: 11, color: COLORS.textDim }}>
            Opens your mail client with a pre-filled message to {(hrSettings?.notifyEmails || []).join(", ")}.
          </span>
        </div>
      </Card>

      {/* Banked PTO — for days the market is closed but the employee worked */}
      <Card style={{ padding: 20, marginBottom: 16, borderLeft: `3px solid ${COLORS.gold}` }}>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 6 }}>Bank PTO — Worked on a Market-Closed Day</div>
        <p style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 12, lineHeight: 1.5 }}>
          If you worked on a day the market was closed (a federal holiday or NYSE-closed day), log it here to bank it as comp PTO. Matt will review and credit your balance.
        </p>
        <div style={{ display: "grid", gridTemplateColumns: "minmax(180px, 240px) 1fr", gap: 10 }}>
          <Input label="Date worked" type="date" value={bankForm.date} onChange={v => setBankForm({ ...bankForm, date: v })} />
          <Input label="Reason / what you worked on" value={bankForm.reason} onChange={v => setBankForm({ ...bankForm, reason: v })} placeholder="e.g. Worked Memorial Day to close out the Acme plan transition" />
        </div>
        <div style={{ marginTop: 12 }}>
          <Button disabled={!bankForm.date || !bankForm.reason.trim()} onClick={() => {
            const entry = {
              id: uid(),
              userId: currentUser.id,
              userName: currentUser.name,
              date: bankForm.date,
              reason: bankForm.reason.trim(),
              days: 1,                            // banked entries are always 1 day; adjust later if needed
              status: "submitted",                // submitted | approved | denied
              submitted: new Date().toISOString(),
            };
            saveHR({ bankedPto: [...(bankedPto || []), entry] });
            setBankForm({ date: "", reason: "" });
          }}>
            <IconPlus size={14} /> Bank PTO Entry
          </Button>
        </div>

        {/* Banked entries list (current user only — or all for owners) */}
        {(() => {
          const all = bankedPto || [];
          const mine = isOwnerUser ? all : all.filter(b => b.userId === currentUser.id);
          const sorted = [...mine].sort((a, b) => (b.date || "").localeCompare(a.date || ""));
          if (sorted.length === 0) return null;
          const updateBankedStatus = (id, status) => {
            const entry = all.find(b => b.id === id);
            const wasApproved = entry?.status === "approved";
            const next = all.map(b => b.id === id ? { ...b, status, reviewedBy: currentUser.name, reviewedAt: new Date().toISOString() } : b);
            // Auto-credit: approving an entry adds 1 day to the user's ptoHistory for the year of the worked date.
            // We bank it as additional "allot" so the balance ledger picks it up.
            // Reverting from approved → denied/submitted should subtract the previously-granted day.
            if (people && onUpdatePeople) {
              const yr = String(new Date(entry.date).getFullYear());
              const delta = (status === "approved" && !wasApproved) ? 1
                          : (status !== "approved" && wasApproved) ? -1
                          : 0;
              if (delta !== 0) {
                const updatedPeople = people.map(p => {
                  if (p.id !== entry.userId) return p;
                  const hist = { ...(p.ptoHistory || {}) };
                  if (!hist[yr]) hist[yr] = { allot: p.ptoAllot || 0, used: 0, carriedIn: 0 };
                  hist[yr] = { ...hist[yr], allot: (hist[yr].allot || 0) + delta };
                  return { ...p, ptoHistory: hist };
                });
                onUpdatePeople(updatedPeople);
              }
            }
            saveHR({ bankedPto: next });
          };
          return (
            <div style={{ marginTop: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, flexWrap: "wrap", gap: 8 }}>
                <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700 }}>
                  {isOwnerUser ? "All Banked Entries" : "My Banked Entries"} <span style={{ fontWeight: 400, opacity: 0.7 }}>· {sorted.length}</span>
                </div>
              </div>

              {/* Bulk action bar — appears when owner has selected any submitted banked entries */}
              {isOwnerUser && selectedBankedIds.size > 0 && (
                <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", marginBottom: 10, background: COLORS.primary, color: "white", borderRadius: 6, flexWrap: "wrap" }}>
                  <div style={{ fontSize: 12, fontWeight: 700 }}>
                    {selectedBankedIds.size} selected · +{selectedBankedIds.size} day{selectedBankedIds.size === 1 ? "" : "s"} if approved
                  </div>
                  <div style={{ flex: 1 }} />
                  <button type="button" onClick={() => bulkReviewBanked("approved")}
                    style={{ padding: "5px 10px", background: COLORS.success, color: "white", border: "none", borderRadius: 4, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                    ✓ Approve
                  </button>
                  <button type="button" onClick={() => bulkReviewBanked("denied")}
                    style={{ padding: "5px 10px", background: COLORS.danger, color: "white", border: "none", borderRadius: 4, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                    ✕ Deny
                  </button>
                  <button type="button" onClick={clearBankedSelection}
                    style={{ padding: "5px 10px", background: "transparent", color: "white", border: `1px solid rgba(255,255,255,0.4)`, borderRadius: 4, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
                    Clear
                  </button>
                </div>
              )}

              <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse" }}>
                <thead><tr style={{ background: "#F8FAFC", textAlign: "left" }}>
                  {isOwnerUser && (
                    <th style={{ padding: "6px 8px", width: 24 }}>
                      {(() => {
                        const submittedItems = sorted.filter(b => b.status === "submitted");
                        const allSelected = submittedItems.length > 0 && submittedItems.every(b => selectedBankedIds.has(b.id));
                        return (
                          <input type="checkbox" checked={allSelected}
                            title={submittedItems.length === 0 ? "No submitted entries to select" : "Select all submitted"}
                            disabled={submittedItems.length === 0}
                            onChange={() => setSelectedBankedIds(prev => {
                              const next = new Set(prev);
                              if (allSelected) submittedItems.forEach(b => next.delete(b.id));
                              else submittedItems.forEach(b => next.add(b.id));
                              return next;
                            })} />
                        );
                      })()}
                    </th>
                  )}
                  <th style={{ padding: "6px 8px" }}>Date</th>
                  {isOwnerUser && <th style={{ padding: "6px 8px" }}>Employee</th>}
                  <th style={{ padding: "6px 8px" }}>Reason</th>
                  <th style={{ padding: "6px 8px" }}>Status</th>
                  {isOwnerUser && <th style={{ padding: "6px 8px" }}>Actions</th>}
                </tr></thead>
                <tbody>
                  {sorted.map(b => (
                    <tr key={b.id} style={{ borderTop: `1px solid ${COLORS.borderLight}`, background: selectedBankedIds.has(b.id) ? COLORS.primary + "0A" : "transparent" }}>
                      {isOwnerUser && (
                        <td style={{ padding: "6px 8px" }}>
                          <input type="checkbox" checked={selectedBankedIds.has(b.id)}
                            disabled={b.status !== "submitted"}
                            title={b.status === "submitted" ? "Select for bulk action" : "Only submitted entries are selectable"}
                            onChange={() => toggleBankedSelected(b.id)} />
                        </td>
                      )}
                      <td style={{ padding: "6px 8px", fontWeight: 600 }}>{b.date}</td>
                      {isOwnerUser && <td style={{ padding: "6px 8px", color: COLORS.textMuted }}>{b.userName}</td>}
                      <td style={{ padding: "6px 8px" }}>{b.reason}</td>
                      <td style={{ padding: "6px 8px" }}>
                        <Badge color={b.status === "approved" ? COLORS.success : b.status === "denied" ? COLORS.danger : COLORS.warning}>{b.status.toUpperCase()}</Badge>
                      </td>
                      {isOwnerUser && (
                        <td style={{ padding: "6px 8px" }}>
                          {b.status === "submitted" && (
                            <>
                              <Button size="sm" onClick={() => updateBankedStatus(b.id, "approved")}>Approve</Button>
                              <Button size="sm" variant="danger" onClick={() => updateBankedStatus(b.id, "denied")} style={{ marginLeft: 4 }}>Deny</Button>
                            </>
                          )}
                        </td>
                      )}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        })()}
      </Card>

      {/* Pending requests — master view shows all; employees see own */}
      {pending.length > 0 && (
        <Card style={{ padding: 20, marginBottom: 16, borderLeft: `4px solid ${COLORS.gold}` }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>
            {isOwnerUser ? `Pending Requests (${pending.length})` : "My Pending Requests"}
          </div>

          {/* Bulk action bar for owners */}
          {isOwnerUser && selectedLeaveIds.size > 0 && (
            <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", marginBottom: 12, background: COLORS.primary, color: "white", borderRadius: 8, flexWrap: "wrap" }}>
              <div style={{ fontSize: 13, fontWeight: 700 }}>
                {selectedLeaveIds.size} selected · {pending.filter(r => selectedLeaveIds.has(r.id)).reduce((s, r) => s + (r.days || 0), 0)} day{pending.filter(r => selectedLeaveIds.has(r.id)).reduce((s, r) => s + (r.days || 0), 0) === 1 ? "" : "s"}
              </div>
              <div style={{ flex: 1 }} />
              <button type="button" onClick={() => bulkReviewLeaves("approved")}
                style={{ padding: "6px 12px", background: COLORS.success, color: "white", border: "none", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                ✓ Approve
              </button>
              <button type="button" onClick={() => bulkReviewLeaves("denied")}
                style={{ padding: "6px 12px", background: COLORS.danger, color: "white", border: "none", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                ✕ Deny
              </button>
              <button type="button" onClick={clearLeaveSelection}
                style={{ padding: "6px 12px", background: "transparent", color: "white", border: `1px solid rgba(255,255,255,0.4)`, borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
                Clear
              </button>
            </div>
          )}

          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
            <thead><tr style={{ background: "#FFF8E7", textAlign: "left" }}>
              {isOwnerUser && (
                <th style={{ padding: "8px", width: 28 }}>
                  {(() => {
                    const allSelected = pending.length > 0 && pending.every(r => selectedLeaveIds.has(r.id));
                    return (
                      <input type="checkbox" checked={allSelected}
                        title="Select all pending"
                        onChange={() => setSelectedLeaveIds(prev => {
                          const next = new Set(prev);
                          if (allSelected) pending.forEach(r => next.delete(r.id));
                          else pending.forEach(r => next.add(r.id));
                          return next;
                        })} />
                    );
                  })()}
                </th>
              )}
              <th style={{ padding: "8px" }}></th>
              {isOwnerUser && <th style={{ padding: "8px" }}>Employee</th>}
              <th style={{ padding: "8px" }}>Type</th>
              <th style={{ padding: "8px" }}>Dates</th>
              <th style={{ padding: "8px", textAlign: "right" }}>Days</th>
              <th style={{ padding: "8px" }}>Remote?</th>
              <th style={{ padding: "8px" }}>Actions</th>
            </tr></thead>
            <tbody>
              {pending.slice().reverse().map(r => (
                <React.Fragment key={r.id}>
                  <tr style={{ borderTop: `1px solid ${COLORS.borderLight}`, cursor: "pointer", background: selectedLeaveIds.has(r.id) ? COLORS.primary + "0A" : "transparent" }} onClick={() => setExpanded(expanded === r.id ? null : r.id)}>
                    {isOwnerUser && (
                      <td style={{ padding: "8px" }} onClick={e => e.stopPropagation()}>
                        <input type="checkbox" checked={selectedLeaveIds.has(r.id)} onChange={() => toggleLeaveSelected(r.id)} />
                      </td>
                    )}
                    <td style={{ padding: "8px", color: COLORS.textMuted }}>{expanded === r.id ? "▾" : "▸"}</td>
                    {isOwnerUser && <td style={{ padding: "8px" }}>{r.requestedByName}</td>}
                    <td style={{ padding: "8px" }}><Badge color={COLORS.primary}>{r.leaveType}</Badge></td>
                    <td style={{ padding: "8px" }}>{r.startDate}{r.endDate && r.endDate !== r.startDate ? ` → ${r.endDate}` : ""} <span style={{ color: COLORS.textMuted, fontSize: 11 }}>{portionLabel(r.portion)}</span></td>
                    <td style={{ padding: "8px", textAlign: "right", fontWeight: 700 }}>{r.days}</td>
                    <td style={{ padding: "8px" }}>{r.remote ? <Badge color={COLORS.success}>Remote</Badge> : "—"}</td>
                    <td style={{ padding: "8px" }} onClick={e => e.stopPropagation()}>
                      {isOwnerUser ? (
                        <>
                          <Button size="sm" onClick={() => updateStatus(r.id, "approved")}>Approve</Button>{" "}
                          <Button size="sm" variant="danger" onClick={() => updateStatus(r.id, "denied")}>Deny</Button>
                        </>
                      ) : (
                        <Button size="sm" variant="ghost" onClick={() => removeRequest(r.id)}><IconTrash size={12} /> Cancel</Button>
                      )}
                    </td>
                  </tr>
                  {expanded === r.id && (
                    <tr style={{ background: "#F8FBFF" }}>
                      <td colSpan={isOwnerUser ? 8 : 6} style={{ padding: "12px 24px" }}>
                        <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 4 }}>Reason</div>
                        <div style={{ fontSize: 13, color: COLORS.text, marginBottom: 8, whiteSpace: "pre-wrap" }}>{r.reason || "(none)"}</div>
                        {r.remote && r.remoteNote && (<>
                          <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 4 }}>Remote work details</div>
                          <div style={{ fontSize: 13, color: COLORS.text }}>{r.remoteNote}</div>
                        </>)}
                        <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 8 }}>Submitted {new Date(r.submitted).toLocaleString()}</div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              ))}
            </tbody>
          </table>
        </Card>
      )}

      {/* Past requests */}
      {past.length > 0 && (
        <Card style={{ padding: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>
              {isOwnerUser ? "All Past Requests" : "My Past Requests"} <span style={{ color: COLORS.textMuted, fontWeight: 400 }}>({past.length})</span>
            </div>
            <Button size="sm" variant="ghost" onClick={() => {
              const all = [...pending, ...past];
              const headers = [
                ["Employee", "requestedByName"], ["Email", "requestedByEmail"], ["Type", "leaveType"],
                ["Start Date", "startDate"], ["End Date", "endDate"], ["Days", "days"], ["Portion", "portion"],
                ["Status", "status"], ["Reason", "reason"],
                ["Submitted", "submitted"], ["Reviewed By", "reviewedBy"], ["Reviewed At", "reviewedAt"],
              ];
              const ds = new Date().toISOString().split("T")[0];
              downloadCSV(`pfg_leave_requests_${ds}.csv`, headers, all);
              window.pfgToast && window.pfgToast(`Exported ${all.length} leave requests to CSV`, "success");
            }}>⬇ CSV</Button>
          </div>
          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
            <thead><tr style={{ background: COLORS.bg, textAlign: "left" }}>
              {isOwnerUser && <th style={{ padding: "8px" }}>Employee</th>}
              <th style={{ padding: "8px" }}>Type</th>
              <th style={{ padding: "8px" }}>Dates</th>
              <th style={{ padding: "8px", textAlign: "right" }}>Days</th>
              <th style={{ padding: "8px" }}>Status</th>
              <th style={{ padding: "8px" }}>Reviewed</th>
            </tr></thead>
            <tbody>
              {past.slice().reverse().map(r => (
                <tr key={r.id} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                  {isOwnerUser && <td style={{ padding: "8px" }}>{r.requestedByName}</td>}
                  <td style={{ padding: "8px" }}>{r.leaveType}</td>
                  <td style={{ padding: "8px" }}>{r.startDate}{r.endDate && r.endDate !== r.startDate ? ` → ${r.endDate}` : ""}</td>
                  <td style={{ padding: "8px", textAlign: "right" }}>{r.days}</td>
                  <td style={{ padding: "8px" }}><Badge color={r.status === "approved" ? COLORS.success : COLORS.danger}>{r.status.toUpperCase()}</Badge></td>
                  <td style={{ padding: "8px", color: COLORS.textMuted, fontSize: 11 }}>{r.reviewedAt ? new Date(r.reviewedAt).toLocaleDateString() : "—"}{r.reviewedBy ? ` · ${r.reviewedBy}` : ""}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}

      {pending.length === 0 && past.length === 0 && (
        <Card style={{ padding: 32, textAlign: "center", color: COLORS.textMuted }}>
          No leave requests yet. Submit one above to get started.
        </Card>
      )}
    </div>
  );
}

// ============================================================
// REMOTE WORK PAGE
// Employees log remote work days (date, location, reason). Admins can edit any entry.
// Pure documentation — does NOT require approval, does NOT count against PTO.
// ============================================================
function HRRemoteWorkView({ currentUser, remoteWorkLogs, saveHR, isAdmin, people }) {
  const [form, setForm] = useState({ date: "", location: "", reason: "" });
  const [editingId, setEditingId] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [filterPerson, setFilterPerson] = useState(""); // admin-only filter
  const submit = () => {
    if (!form.date) { alert("Date is required"); return; }
    const entry = {
      id: uid(),
      userId: currentUser.id,
      userName: currentUser.name,
      date: form.date,
      location: form.location.trim(),
      reason: form.reason.trim(),
      loggedAt: new Date().toISOString(),
    };
    saveHR({ remoteWorkLogs: [...(remoteWorkLogs || []), entry] });
    setForm({ date: "", location: "", reason: "" });
  };
  const startEdit = (entry) => {
    setEditingId(entry.id);
    setEditForm({ date: entry.date, location: entry.location || "", reason: entry.reason || "" });
  };
  const saveEdit = () => {
    if (!editForm.date) { alert("Date is required"); return; }
    const next = (remoteWorkLogs || []).map(e => e.id === editingId
      ? { ...e, date: editForm.date, location: editForm.location.trim(), reason: editForm.reason.trim(), editedAt: new Date().toISOString(), editedBy: currentUser.name }
      : e);
    saveHR({ remoteWorkLogs: next });
    setEditingId(null);
  };
  const removeEntry = (id) => {
    if (!confirm("Delete this remote work entry?")) return;
    saveHR({ remoteWorkLogs: (remoteWorkLogs || []).filter(e => e.id !== id) });
  };

  // Visibility: admins see everyone; employees see only their own.
  let visible = isAdmin ? remoteWorkLogs : (remoteWorkLogs || []).filter(e => e.userId === currentUser.id);
  if (isAdmin && filterPerson) visible = visible.filter(e => e.userId === filterPerson);
  visible = [...(visible || [])].sort((a, b) => (b.date || "").localeCompare(a.date || ""));

  return (
    <div>
      <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, marginBottom: 6 }}>Remote Work</h2>
      <p style={{ color: COLORS.textMuted, fontSize: 13, marginBottom: 20 }}>
        Log days worked remotely for documentation. {isAdmin ? "Admins can view and edit entries for all employees." : "Only you (and admins) can see your entries."}
      </p>

      {/* Add entry */}
      <Card style={{ padding: 20, marginBottom: 16 }}>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>Log Remote Work Day</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 10 }}>
          <Input label="Date" type="date" value={form.date} onChange={v => setForm({ ...form, date: v })} />
          <Input label="Location (optional)" value={form.location} onChange={v => setForm({ ...form, location: v })} placeholder="Home, coworking space, traveling…" />
        </div>
        <TextArea label="Reason / Notes (optional)" value={form.reason} onChange={v => setForm({ ...form, reason: v })} placeholder="Sick child at home, contractor at house, etc." rows={2} />
        <div style={{ marginTop: 10 }}>
          <Button onClick={submit} disabled={!form.date}><IconPlus size={14} /> Log Entry</Button>
        </div>
      </Card>

      {/* Admin filter */}
      {isAdmin && (
        <div style={{ marginBottom: 12, display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 12, color: COLORS.textMuted }}>Filter by person:</span>
          <select value={filterPerson} onChange={e => setFilterPerson(e.target.value)}
            style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit", background: COLORS.surface }}>
            <option value="">All ({(remoteWorkLogs || []).length})</option>
            {(people || []).filter(p => p.active).map(p => {
              const cnt = (remoteWorkLogs || []).filter(e => e.userId === p.id).length;
              return <option key={p.id} value={p.id}>{p.name} ({cnt})</option>;
            })}
          </select>
        </div>
      )}

      {/* List */}
      <Card style={{ padding: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
          <div style={{ fontSize: 14, fontWeight: 600 }}>
            Remote Work Log <span style={{ fontWeight: 400, color: COLORS.textMuted }}>· {visible.length} {visible.length === 1 ? "entry" : "entries"}</span>
          </div>
          <Button size="sm" variant="ghost" onClick={() => {
            const headers = [["Date", "date"], ["Employee", "userName"], ["Location", "location"], ["Reason", "reason"], ["Logged At", "loggedAt"], ["Edited By", "editedBy"], ["Edited At", "editedAt"]];
            const ds = new Date().toISOString().split("T")[0];
            downloadCSV(`pfg_remote_work_${ds}.csv`, headers, visible);
            window.pfgToast && window.pfgToast(`Exported ${visible.length} remote-work entries to CSV`, "success");
          }} disabled={visible.length === 0}>⬇ CSV</Button>
        </div>
        {visible.length === 0 ? (
          <div style={{ color: COLORS.textMuted, fontSize: 13, padding: 16, textAlign: "center" }}>No remote work logged yet.</div>
        ) : (
          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
            <thead><tr style={{ background: "#F8FAFC", textAlign: "left" }}>
              <th style={{ padding: "8px" }}>Date</th>
              {isAdmin && <th style={{ padding: "8px" }}>Employee</th>}
              <th style={{ padding: "8px" }}>Location</th>
              <th style={{ padding: "8px" }}>Reason</th>
              <th style={{ padding: "8px" }}>Logged</th>
              <th style={{ padding: "8px" }}>Actions</th>
            </tr></thead>
            <tbody>
              {visible.map(e => (
                <tr key={e.id} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                  {editingId === e.id ? (
                    <>
                      <td style={{ padding: "6px 8px" }}><input type="date" value={editForm.date} onChange={ev => setEditForm({ ...editForm, date: ev.target.value })} style={{ padding: "4px 6px", borderRadius: 4, border: `1px solid ${COLORS.border}`, fontSize: 12, fontFamily: "inherit" }} /></td>
                      {isAdmin && <td style={{ padding: "6px 8px", color: COLORS.textMuted }}>{e.userName}</td>}
                      <td style={{ padding: "6px 8px" }}><input type="text" value={editForm.location} onChange={ev => setEditForm({ ...editForm, location: ev.target.value })} placeholder="Location" style={{ padding: "4px 6px", borderRadius: 4, border: `1px solid ${COLORS.border}`, fontSize: 12, fontFamily: "inherit", width: "100%" }} /></td>
                      <td style={{ padding: "6px 8px" }}><input type="text" value={editForm.reason} onChange={ev => setEditForm({ ...editForm, reason: ev.target.value })} placeholder="Reason" style={{ padding: "4px 6px", borderRadius: 4, border: `1px solid ${COLORS.border}`, fontSize: 12, fontFamily: "inherit", width: "100%" }} /></td>
                      <td style={{ padding: "6px 8px", color: COLORS.textDim, fontSize: 11 }}>—</td>
                      <td style={{ padding: "6px 8px" }}>
                        <Button size="sm" onClick={saveEdit}>Save</Button>
                        <Button size="sm" variant="ghost" onClick={() => setEditingId(null)} style={{ marginLeft: 4 }}>Cancel</Button>
                      </td>
                    </>
                  ) : (
                    <>
                      <td style={{ padding: "8px", fontWeight: 600 }}>{e.date}</td>
                      {isAdmin && <td style={{ padding: "8px", color: COLORS.textMuted }}>{e.userName}</td>}
                      <td style={{ padding: "8px" }}>{e.location || <span style={{ color: COLORS.textDim }}>—</span>}</td>
                      <td style={{ padding: "8px", color: COLORS.text }}>{e.reason || <span style={{ color: COLORS.textDim }}>—</span>}</td>
                      <td style={{ padding: "8px", color: COLORS.textDim, fontSize: 11 }}>
                        {new Date(e.loggedAt).toLocaleDateString()}
                        {e.editedAt && <span title={`Edited by ${e.editedBy} on ${new Date(e.editedAt).toLocaleString()}`} style={{ marginLeft: 4 }}>·ed.</span>}
                      </td>
                      <td style={{ padding: "8px" }}>
                        {(isAdmin || e.userId === currentUser.id) && (
                          <>
                            <Button size="sm" variant="ghost" onClick={() => startEdit(e)}><IconEdit size={12} /></Button>
                            <Button size="sm" variant="ghost" onClick={() => removeEntry(e.id)} style={{ marginLeft: 4 }}><IconTrash size={12} /></Button>
                          </>
                        )}
                      </td>
                    </>
                  )}
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

// ============================================================
// PERFORMANCE REVIEW PAGE
// Each review record: employee, period, summary text, optional attached PDF.
// Visibility: employee sees their own; Matt sees ALL; Alex does NOT.
//   (Per policy: performance reviews are between Matt and the employee.)
// Matt is identified by isOwner=true && isAdmin=true && username==="mbruce".
// ============================================================
function HRPerformanceReviewView({ currentUser, performanceReviews, saveHR, isAdmin, people }) {
  // Who is Matt? Used to gate visibility. Lookup by username so we don't hardcode IDs.
  const isMatt = currentUser?.username === "mbruce";
  // Matt-or-self gate. Alex is NOT included even though he's an admin.
  const canSee = (rev) => isMatt || rev.userId === currentUser.id;
  const canEdit = isMatt;  // only Matt can add/edit/delete reviews

  const [form, setForm] = useState({ userId: "", period: "", reviewDate: "", summary: "" });
  const [attachedFile, setAttachedFile] = useState(null);
  const [fileWarning, setFileWarning] = useState("");
  const [expandedId, setExpandedId] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [editForm, setEditForm] = useState({});

  const MAX_FILE_BYTES = 4 * 1024 * 1024; // 4 MB cap per review document

  const handleFile = async (e) => {
    const f = e.target.files?.[0];
    setFileWarning("");
    if (!f) { setAttachedFile(null); return; }
    if (f.size > MAX_FILE_BYTES) {
      setFileWarning(`File is ${(f.size/1024/1024).toFixed(1)} MB — must be 4 MB or smaller.`);
      e.target.value = "";
      return;
    }
    try {
      const data = await readFileAsDataURL(f);
      setAttachedFile({ name: f.name, size: f.size, type: f.type, data });
    } catch (err) {
      setFileWarning("Failed to read file: " + err.message);
    }
  };

  const submit = () => {
    if (!form.userId || !form.reviewDate) { alert("Employee and review date are required"); return; }
    const target = (people || []).find(p => p.id === form.userId);
    const entry = {
      id: uid(),
      userId: form.userId,
      userName: target?.name || "(unknown)",
      period: form.period.trim(),
      reviewDate: form.reviewDate,
      summary: form.summary.trim(),
      file: attachedFile || null,
      createdBy: currentUser.name,
      createdAt: new Date().toISOString(),
    };
    saveHR({ performanceReviews: [...(performanceReviews || []), entry] });
    setForm({ userId: "", period: "", reviewDate: "", summary: "" });
    setAttachedFile(null);
  };

  const startEdit = (rev) => {
    setEditingId(rev.id);
    setEditForm({ period: rev.period || "", reviewDate: rev.reviewDate, summary: rev.summary || "" });
  };
  const saveEdit = () => {
    const next = (performanceReviews || []).map(r => r.id === editingId
      ? { ...r, period: editForm.period.trim(), reviewDate: editForm.reviewDate, summary: editForm.summary.trim(), editedAt: new Date().toISOString(), editedBy: currentUser.name }
      : r);
    saveHR({ performanceReviews: next });
    setEditingId(null);
  };
  const removeReview = (id) => {
    if (!confirm("Delete this performance review? Cannot be undone.")) return;
    saveHR({ performanceReviews: (performanceReviews || []).filter(r => r.id !== id) });
  };

  // Filter to records this user is allowed to see.
  const allVisible = (performanceReviews || []).filter(canSee);
  const sorted = [...allVisible].sort((a, b) => (b.reviewDate || "").localeCompare(a.reviewDate || ""));

  // Find "last review" for the current user (their own)
  const myReviews = sorted.filter(r => r.userId === currentUser.id);
  const lastMyReview = myReviews[0];

  return (
    <div>
      <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, marginBottom: 6 }}>Performance Review</h2>
      <p style={{ color: COLORS.textMuted, fontSize: 13, marginBottom: 20 }}>
        {isMatt
          ? "Add performance reviews and attach the signed PDF. Each employee can see their own; only you can add/edit."
          : "Your review history. Performance reviews are confidential and only visible to you and Matt."}
      </p>

      {/* "Last review" hero for the current user */}
      {lastMyReview && !isMatt && (
        <Card style={{ padding: 18, marginBottom: 16, borderLeft: `3px solid ${COLORS.primary}` }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700, marginBottom: 6 }}>Last Review</div>
          <div style={{ display: "flex", gap: 24, alignItems: "baseline", flexWrap: "wrap" }}>
            <div>
              <div style={{ fontSize: 20, fontWeight: 700 }}>{lastMyReview.reviewDate}</div>
              {lastMyReview.period && <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 2 }}>{lastMyReview.period}</div>}
            </div>
            {lastMyReview.summary && (
              <div style={{ flex: 1, minWidth: 200, fontSize: 13, color: COLORS.text, lineHeight: 1.5 }}>
                {lastMyReview.summary.length > 200 ? lastMyReview.summary.slice(0, 200) + "…" : lastMyReview.summary}
              </div>
            )}
            {lastMyReview.file && (
              <Button size="sm" variant="ghost" onClick={() => downloadFile(lastMyReview.file.data, lastMyReview.file.name)}>⬇ {lastMyReview.file.name}</Button>
            )}
          </div>
        </Card>
      )}

      {/* Matt-only: add review form */}
      {canEdit && (
        <Card style={{ padding: 20, marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>Add New Review</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 10 }}>
            <Select label="Employee" value={form.userId} onChange={v => setForm({ ...form, userId: v })}
              options={(people || []).filter(p => p.active && !p.isTestAccount).map(p => ({ value: p.id, label: p.name }))} placeholder="Select…" />
            <Input label="Review Date" type="date" value={form.reviewDate} onChange={v => setForm({ ...form, reviewDate: v })} />
            <Input label="Period" value={form.period} onChange={v => setForm({ ...form, period: v })} placeholder="e.g. Q1 2026, Annual 2025" />
          </div>
          <TextArea label="Summary / Notes" value={form.summary} onChange={v => setForm({ ...form, summary: v })} placeholder="Key takeaways, goals, areas to improve, raise decisions…" rows={4} />

          <div style={{ marginTop: 10, padding: 12, background: "#F8FAFC", borderRadius: 8, border: `1px dashed ${COLORS.border}` }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Review Document (PDF)</div>
            <input type="file" accept=".pdf,image/*" onChange={handleFile} style={{ fontSize: 13 }} />
            {attachedFile && (
              <div style={{ marginTop: 6, fontSize: 12, color: COLORS.success }}>
                ✓ {attachedFile.name} ({(attachedFile.size / 1024).toFixed(0)} KB) attached
              </div>
            )}
            {fileWarning && <div style={{ marginTop: 6, fontSize: 12, color: COLORS.danger }}>{fileWarning}</div>}
            <div style={{ marginTop: 4, fontSize: 11, color: COLORS.textDim }}>PDF or image, 4 MB max. Stored with the review and visible to the employee.</div>
          </div>

          <div style={{ marginTop: 14 }}>
            <Button onClick={submit} disabled={!form.userId || !form.reviewDate}><IconPlus size={14} /> Save Review</Button>
          </div>
        </Card>
      )}

      {/* Review list */}
      <Card style={{ padding: 20 }}>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>
          {isMatt ? "All Reviews" : "My Review History"} <span style={{ fontWeight: 400, color: COLORS.textMuted }}>· {sorted.length}</span>
        </div>
        {sorted.length === 0 ? (
          <div style={{ color: COLORS.textMuted, fontSize: 13, padding: 16, textAlign: "center" }}>No reviews yet.</div>
        ) : (
          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
            <thead><tr style={{ background: "#F8FAFC", textAlign: "left" }}>
              <th style={{ padding: "8px", width: 28 }}></th>
              <th style={{ padding: "8px" }}>Date</th>
              {isMatt && <th style={{ padding: "8px" }}>Employee</th>}
              <th style={{ padding: "8px" }}>Period</th>
              <th style={{ padding: "8px" }}>Document</th>
              <th style={{ padding: "8px" }}>Actions</th>
            </tr></thead>
            <tbody>
              {sorted.map(r => {
                const isOpen = expandedId === r.id;
                return (
                  <React.Fragment key={r.id}>
                    <tr style={{ borderTop: `1px solid ${COLORS.borderLight}`, cursor: "pointer", background: isOpen ? "#F0F7FC" : "transparent" }}
                        onClick={() => setExpandedId(isOpen ? null : r.id)}>
                      <td style={{ padding: "8px", color: COLORS.textMuted }}>
                        <span style={{ display: "inline-block", transform: isOpen ? "rotate(90deg)" : "none", transition: "transform 0.15s" }}>▶</span>
                      </td>
                      <td style={{ padding: "8px", fontWeight: 600 }}>{r.reviewDate}</td>
                      {isMatt && <td style={{ padding: "8px" }}>{r.userName}</td>}
                      <td style={{ padding: "8px", color: COLORS.textMuted }}>{r.period || "—"}</td>
                      <td style={{ padding: "8px" }}>
                        {r.file ? <span style={{ fontSize: 11, color: COLORS.primary }}>📄 {r.file.name}</span> : <span style={{ color: COLORS.textDim }}>—</span>}
                      </td>
                      <td style={{ padding: "8px" }} onClick={e => e.stopPropagation()}>
                        {r.file && <Button size="sm" variant="ghost" onClick={() => downloadFile(r.file.data, r.file.name)}>⬇</Button>}
                        {canEdit && (
                          <>
                            <Button size="sm" variant="ghost" onClick={() => startEdit(r)} style={{ marginLeft: 4 }}><IconEdit size={12} /></Button>
                            <Button size="sm" variant="ghost" onClick={() => removeReview(r.id)} style={{ marginLeft: 4 }}><IconTrash size={12} /></Button>
                          </>
                        )}
                      </td>
                    </tr>
                    {isOpen && (
                      <tr style={{ background: "#F8FBFF" }}>
                        <td colSpan={isMatt ? 6 : 5} style={{ padding: "12px 24px", borderTop: `1px solid ${COLORS.borderLight}` }}>
                          {editingId === r.id ? (
                            <div>
                              <Input label="Review Date" type="date" value={editForm.reviewDate} onChange={v => setEditForm({ ...editForm, reviewDate: v })} />
                              <Input label="Period" value={editForm.period} onChange={v => setEditForm({ ...editForm, period: v })} />
                              <TextArea label="Summary" value={editForm.summary} onChange={v => setEditForm({ ...editForm, summary: v })} rows={4} />
                              <Button size="sm" onClick={saveEdit}>Save</Button>
                              <Button size="sm" variant="ghost" onClick={() => setEditingId(null)} style={{ marginLeft: 6 }}>Cancel</Button>
                            </div>
                          ) : (
                            <div>
                              <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Summary</div>
                              <div style={{ fontSize: 13, color: COLORS.text, whiteSpace: "pre-wrap", marginBottom: 10 }}>{r.summary || "(no summary)"}</div>
                              <div style={{ fontSize: 11, color: COLORS.textDim }}>
                                Added by {r.createdBy} on {new Date(r.createdAt).toLocaleString()}
                                {r.editedAt && ` · edited by ${r.editedBy} on ${new Date(r.editedAt).toLocaleString()}`}
                              </div>
                            </div>
                          )}
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

function HRDocumentsView({ hrSettings, saveHR, isOwnerUser }) {
  const [addForm, setAddForm] = useState({ title: "", category: "Onboarding", desc: "", url: "" });
  const userDocs = hrSettings.documents || [];

  // Group built-ins + custom by category
  const allDocs = [...BUILT_IN_DOCUMENTS, ...userDocs];
  const categories = Array.from(new Set(allDocs.map(d => d.category)));

  const addDoc = () => {
    if (!addForm.title || !addForm.url) { alert("Title and URL required"); return; }
    const doc = { id: "doc-" + uid(), ...addForm, custom: true };
    saveHR({ hrSettings: { ...hrSettings, documents: [...userDocs, doc] } });
    setAddForm({ title: "", category: "Onboarding", desc: "", url: "" });
    if (window.pfgToast) window.pfgToast(`Added "${doc.title}" to the document library`, "success");
  };
  const removeDoc = (id) => {
    if (!confirm("Remove this document?")) return;
    saveHR({ hrSettings: { ...hrSettings, documents: userDocs.filter(d => d.id !== id) } });
    if (window.pfgToast) window.pfgToast("Document removed", "info");

  const DocCard = ({ doc }) => (

      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 2 }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: COLORS.text }}>{doc.title}</div>
          {doc.required && <Badge color={COLORS.danger}>REQUIRED</Badge>}
          {doc.custom && <Badge color={COLORS.textMuted}>CUSTOM</Badge>}
        </div>
        <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 8 }}>{doc.desc}</div>
        <div style={{ display: "flex", gap: 8 }}>
          <a href={doc.path || doc.url} target="_blank" rel="noopener"
             style={{ fontSize: 12, color: COLORS.primary, textDecoration: "none", padding: "5px 12px", borderRadius: 6, background: COLORS.primary + "11", fontWeight: 600 }}>

          </a>
          <a href={doc.path || doc.url} download={doc.title?.replace(/\s+/g, "_") + (doc.path?.endsWith(".pdf") ? ".pdf" : doc.path?.endsWith(".docx") ? ".docx" : "")}

            <button onClick={() => removeDoc(doc.id)} style={{ marginLeft: "auto", background: "none", border: "none", color: COLORS.textDim, cursor: "pointer", fontSize: 12 }}>
              <IconTrash size={12} /> Remove

  return (
    <div>
      <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, marginBottom: 6 }}>Documents</h2>
      <p style={{ color: COLORS.textMuted, fontSize: 13, marginBottom: 20 }}>

      <Card style={{ padding: 14, marginBottom: 16, background: "#EFF6FF", borderLeft: `4px solid ${COLORS.primary}` }}>
        <div style={{ fontSize: 12, color: COLORS.text, lineHeight: 1.6 }}>
          <b>📌 Note:</b> The built-in document links use relative paths (e.g. <code>docs/2025_Pointer_Employee_Handbook.pdf</code>).
          Keep the <code>docs/</code> folder next to <code>PointerOS.html</code> when hosting, or all documents in the same shared drive folder.

      {categories.map(cat => {
        const docsInCat = allDocs.filter(d => d.category === cat);
        return (
          <div key={cat} style={{ marginBottom: 20 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
