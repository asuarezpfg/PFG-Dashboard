                  <td style={{ padding: "8px" }}>{r.category}</td>
                  <td style={{ padding: "8px" }}>${r.amount.toFixed(2)}</td>
                  <td style={{ padding: "8px" }}>{r.desc || ""}</td>
                  <td style={{ padding: "8px" }}><Badge color={r.status === "approved" ? COLORS.success : r.status === "denied" ? COLORS.danger : COLORS.warning}>{r.status.toUpperCase()}</Badge></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

function HRReimbView({ currentUser, reimbursements, saveHR, isAdmin, hrSettings }) {
  const [form, setForm] = useState({ date: "", amount: "", category: "", desc: "" });
  const [attachedFile, setAttachedFile] = useState(null);   // { name, size, type, data } once read
  const [fileWarning, setFileWarning] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [expandedId, setExpandedId] = useState(null);

  // Filters
  const [filterDateFrom, setFilterDateFrom] = useState("");
  const [filterDateTo, setFilterDateTo] = useState("");
  const [filterAmountMin, setFilterAmountMin] = useState("");
  const [filterAmountMax, setFilterAmountMax] = useState("");
  const [filterCategory, setFilterCategory] = useState("");
  const [filterStatus, setFilterStatus] = useState("");

  const MAX_FILE_BYTES = 2 * 1024 * 1024; // 2 MB cap (browser localStorage budget)

  const handleFile = async (e) => {
    const f = e.target.files?.[0];
    setFileWarning("");
    if (!f) { setAttachedFile(null); return; }
    if (f.size > MAX_FILE_BYTES) {
      setFileWarning(`File is ${(f.size/1024/1024).toFixed(1)} MB — must be 2 MB or smaller.`);
      e.target.value = "";
      return;
    }
    try {
      const data = await readFileAsDataURL(f);
      setAttachedFile({ name: f.name, size: f.size, type: f.type, data });
    } catch (err) {
      setFileWarning("Failed to read file: " + err.message);
    }
  };

  const submit = async () => {
    if (!form.date || !form.amount || !form.category) { alert("Date, amount, and category are required"); return; }
    setSubmitting(true);
    const record = {
      id: uid(),
      userId: currentUser.id,
      userName: currentUser.name,
      userEmail: currentUser.email || "",
      date: form.date,
      amount: parseFloat(form.amount),
      category: form.category,
      desc: form.desc,
      status: "pending",
      submitted: new Date().toISOString(),
      file: attachedFile || null,
    };
    const next = [...reimbursements, record];
    saveHR({ reimbursements: next });
    // Build email body
    const recipients = hrSettings?.notifyEmails?.length ? hrSettings.notifyEmails : ["matt@pointerfg.com", "alex@pointerfg.com"];
    const fileNote = attachedFile ? `\nReceipt attached: ${attachedFile.name} (${(attachedFile.size/1024).toFixed(0)} KB) — view in PointerOS to download.` : "\nNo receipt attached.";
    const body =
`A new reimbursement request has been submitted in PointerOS.

Submitted by: ${currentUser.name} ${currentUser.email ? "<" + currentUser.email + ">" : ""}
Date of expense: ${form.date}
Amount: $${parseFloat(form.amount).toFixed(2)}
Category: ${form.category}

Description:
${form.desc || "(none provided)"}
${fileNote}

Approve or deny at: PointerOS → HR Toolsuite → Reimbursements

— Automated message from PointerOS`;
    sendEmail({
      to: recipients,
      subject: `[PFG Reimb] ${currentUser.name} — $${parseFloat(form.amount).toFixed(2)} — ${form.category}`,
      body,
    });
    setForm({ date: "", amount: "", category: "", desc: "" });
    setAttachedFile(null);
    setFileWarning("");
    setSubmitting(false);
  };

  const updateStatus = (id, status) => {
    const r = reimbursements.find(x => x.id === id);
    if (!r) return;
    const next = reimbursements.map(x => x.id === id ? { ...x, status, reviewedAt: new Date().toISOString(), reviewedBy: currentUser.name } : x);
    saveHR({ reimbursements: next });
    // Optionally notify the submitter
    if (r.userEmail) {
      const ok = confirm(`Mark as ${status.toUpperCase()} and email ${r.userName} about the decision?`);
      if (ok) {
        sendEmail({
          to: [r.userEmail],
          subject: `Reimbursement ${status.toUpperCase()}: $${r.amount.toFixed(2)} — ${r.category}`,
          body: `Your reimbursement request submitted on ${r.date} for $${r.amount.toFixed(2)} (${r.category}) has been ${status} by ${currentUser.name}.\n\n— PointerOS`,
        });
      }
    }
  };

  const removeReimb = (id) => {
    if (!confirm("Delete this request? This cannot be undone.")) return;
    saveHR({ reimbursements: reimbursements.filter(r => r.id !== id) });
  };

  const visible = isAdmin ? reimbursements : reimbursements.filter(r => r.userId === currentUser.id);

  // Apply filters
  const filtered = visible.filter(r => {
    if (filterDateFrom && r.date < filterDateFrom) return false;
    if (filterDateTo && r.date > filterDateTo) return false;
    if (filterAmountMin !== "" && r.amount < parseFloat(filterAmountMin)) return false;
    if (filterAmountMax !== "" && r.amount > parseFloat(filterAmountMax)) return false;
    if (filterCategory && !r.category.toLowerCase().includes(filterCategory.toLowerCase())) return false;
    if (filterStatus && r.status !== filterStatus) return false;
    return true;
  });

  const clearFilters = () => {
    setFilterDateFrom(""); setFilterDateTo("");
    setFilterAmountMin(""); setFilterAmountMax("");
    setFilterCategory(""); setFilterStatus("");
  };
  const hasFilters = filterDateFrom || filterDateTo || filterAmountMin || filterAmountMax || filterCategory || filterStatus;

  // Summary stats for filtered set
  const totalAmount = filtered.reduce((s, r) => s + (r.amount || 0), 0);
  const approvedAmount = filtered.filter(r => r.status === "approved").reduce((s, r) => s + (r.amount || 0), 0);

  return (
    <div>
      <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, marginBottom: 6 }}>Reimbursements</h2>
      <p style={{ color: COLORS.textMuted, fontSize: 13, marginBottom: 20 }}>
        Submit a reimbursement request with receipt. {isAdmin ? "Admins review and approve or deny." : "Master users will be notified by email automatically."}
      </p>

      {/* Submit form */}
      <Card style={{ padding: 20, marginBottom: 16 }}>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>Submit New Request</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 10 }}>
          <Input label="Date" type="date" value={form.date} onChange={v => setForm({ ...form, date: v })} />
          <Input label="Amount ($)" type="number" value={form.amount} onChange={v => setForm({ ...form, amount: v })} placeholder="0.00" />
          <Input label="Category" value={form.category} onChange={v => setForm({ ...form, category: v })} placeholder="Meals, Travel, Office…" />
        </div>
        <TextArea label="Description / Purpose" value={form.desc} onChange={v => setForm({ ...form, desc: v })} />

        {/* Receipt file upload */}
        <div style={{ marginTop: 10, padding: 12, background: "#F8FAFC", borderRadius: 8, border: `1px dashed ${COLORS.border}` }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Receipt / Documentation</div>
          <input type="file" accept="image/*,.pdf" onChange={handleFile} style={{ fontSize: 13 }} />
          {attachedFile && (
            <div style={{ marginTop: 6, fontSize: 12, color: COLORS.success }}>
              ✓ {attachedFile.name} ({(attachedFile.size / 1024).toFixed(0)} KB) ready to attach
            </div>
          )}
          {fileWarning && <div style={{ marginTop: 6, fontSize: 12, color: COLORS.danger }}>{fileWarning}</div>}
          <div style={{ marginTop: 4, fontSize: 11, color: COLORS.textDim }}>PDF or image, 2 MB max. Stored with the request.</div>
        </div>

        <div style={{ marginTop: 14, display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
          <Button onClick={submit} disabled={submitting}><IconPlus size={14} /> Submit & Notify Master Users</Button>
          <span style={{ fontSize: 11, color: COLORS.textDim }}>
            Will open your mail client with a pre-filled message to {(hrSettings?.notifyEmails || []).join(", ")}.
          </span>
        </div>
      </Card>

      {/* Filters */}
      <Card style={{ padding: 16, marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Search & Filter</div>
          {hasFilters && <Button size="sm" variant="ghost" onClick={clearFilters}>Clear filters</Button>}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 8 }}>
          <div>
            <label style={{ display: "block", fontSize: 11, color: COLORS.textMuted, marginBottom: 4 }}>Date from</label>
            <input type="date" value={filterDateFrom} onChange={e => setFilterDateFrom(e.target.value)} style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit" }} />
          </div>
          <div>
            <label style={{ display: "block", fontSize: 11, color: COLORS.textMuted, marginBottom: 4 }}>Date to</label>
            <input type="date" value={filterDateTo} onChange={e => setFilterDateTo(e.target.value)} style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit" }} />
          </div>
          <div>
            <label style={{ display: "block", fontSize: 11, color: COLORS.textMuted, marginBottom: 4 }}>Amount min ($)</label>
            <input type="number" value={filterAmountMin} onChange={e => setFilterAmountMin(e.target.value)} placeholder="0" style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit" }} />
          </div>
          <div>
            <label style={{ display: "block", fontSize: 11, color: COLORS.textMuted, marginBottom: 4 }}>Amount max ($)</label>
            <input type="number" value={filterAmountMax} onChange={e => setFilterAmountMax(e.target.value)} placeholder="∞" style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit" }} />
          </div>
          <div>
            <label style={{ display: "block", fontSize: 11, color: COLORS.textMuted, marginBottom: 4 }}>Category contains</label>
            <input type="text" value={filterCategory} onChange={e => setFilterCategory(e.target.value)} placeholder="travel" style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit" }} />
          </div>
          <div>
            <label style={{ display: "block", fontSize: 11, color: COLORS.textMuted, marginBottom: 4 }}>Status</label>
            <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit" }}>
              <option value="">All</option>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="denied">Denied</option>
            </select>
          </div>
        </div>
      </Card>

      {/* Results */}
      <Card style={{ padding: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
          <div style={{ fontSize: 14, fontWeight: 600 }}>
            {isAdmin ? "All Requests" : "My Requests"} <span style={{ fontWeight: 400, color: COLORS.textMuted }}>· {filtered.length} of {visible.length}</span>
          </div>
          <div style={{ display: "flex", gap: 16, fontSize: 12, color: COLORS.textMuted }}>
            <span>Total: <b style={{ color: COLORS.text }}>${totalAmount.toFixed(2)}</b></span>
            <span>Approved: <b style={{ color: COLORS.success }}>${approvedAmount.toFixed(2)}</b></span>
          </div>
        </div>
        {filtered.length === 0 ? (
          <div style={{ color: COLORS.textMuted, fontSize: 13, padding: 16, textAlign: "center" }}>
            {visible.length === 0 ? "No requests yet." : "No requests match your filters."}
          </div>
        ) : (
          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
            <thead><tr style={{ background: "#F8FAFC", textAlign: "left" }}>
              <th style={{ padding: "8px", width: 28 }}></th>
              <th style={{ padding: "8px" }}>Date</th>
              {isAdmin && <th style={{ padding: "8px" }}>Employee</th>}
              <th style={{ padding: "8px" }}>Category</th>
              <th style={{ padding: "8px", textAlign: "right" }}>Amount</th>
              <th style={{ padding: "8px" }}>Status</th>
              <th style={{ padding: "8px" }}>Actions</th>
            </tr></thead>
            <tbody>
              {filtered.slice().reverse().map(r => {
                const isOpen = expandedId === r.id;
                return (
                  <React.Fragment key={r.id}>
                    <tr style={{ borderTop: `1px solid ${COLORS.borderLight}`, cursor: "pointer", background: isOpen ? "#F0F7FC" : "transparent" }}
                        onClick={() => setExpandedId(isOpen ? null : r.id)}>
                      <td style={{ padding: "8px", color: COLORS.textMuted }}>
                        <span style={{ display: "inline-block", transform: isOpen ? "rotate(90deg)" : "none", transition: "transform 0.15s" }}>▶</span>
                      </td>
                      <td style={{ padding: "8px" }}>{r.date}</td>
                      {isAdmin && <td style={{ padding: "8px" }}>{r.userName}</td>}
                      <td style={{ padding: "8px" }}>{r.category}</td>
                      <td style={{ padding: "8px", textAlign: "right", fontWeight: 600 }}>${r.amount.toFixed(2)}</td>
                      <td style={{ padding: "8px" }}>
                        <Badge color={r.status === "approved" ? COLORS.success : r.status === "denied" ? COLORS.danger : COLORS.warning}>{r.status.toUpperCase()}</Badge>
                        {r.file && <span style={{ marginLeft: 6, fontSize: 11, color: COLORS.textMuted }} title="Has attachment">📎</span>}
                      </td>
                      <td style={{ padding: "8px" }} onClick={e => e.stopPropagation()}>
                        {isAdmin && r.status === "pending" && (
                          <span style={{ display: "inline-flex", gap: 6 }}>
                            <Button size="sm" onClick={() => updateStatus(r.id, "approved")}>Approve</Button>
                            <Button size="sm" variant="danger" onClick={() => updateStatus(r.id, "denied")}>Deny</Button>
                          </span>
                        )}
                        {(isAdmin || r.userId === currentUser.id) && (
                          <Button size="sm" variant="ghost" onClick={() => removeReimb(r.id)} style={{ marginLeft: 6 }}><IconTrash size={12} /></Button>
                        )}
                      </td>
                    </tr>
                    {isOpen && (
                      <tr style={{ background: "#F8FBFF" }}>
                        <td colSpan={isAdmin ? 7 : 6} style={{ padding: "12px 24px", borderTop: `1px solid ${COLORS.borderLight}` }}>
                          <div style={{ display: "grid", gridTemplateColumns: r.file ? "1fr 200px" : "1fr", gap: 16 }}>
                            <div>
                              <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Description</div>
                              <div style={{ fontSize: 13, color: COLORS.text, whiteSpace: "pre-wrap", marginBottom: 12 }}>{r.desc || "(no description provided)"}</div>
                              <div style={{ fontSize: 11, color: COLORS.textDim }}>
                                Submitted {new Date(r.submitted).toLocaleString()} {r.reviewedAt && `· ${r.status} by ${r.reviewedBy} on ${new Date(r.reviewedAt).toLocaleString()}`}
                              </div>
                            </div>
                            {r.file && (
                              <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 12 }}>
                                <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Attachment</div>
                                {r.file.type?.startsWith("image/") ? (
                                  <a href={r.file.data} target="_blank" rel="noopener" style={{ display: "block" }}>
                                    <img src={r.file.data} alt={r.file.name} style={{ width: "100%", maxHeight: 120, objectFit: "cover", borderRadius: 4 }} />
                                  </a>
                                ) : (
                                  <div style={{ fontSize: 24, textAlign: "center", color: COLORS.danger, padding: "8px 0" }}>📄</div>
                                )}
                                <div style={{ fontSize: 11, color: COLORS.text, marginTop: 6, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={r.file.name}>{r.file.name}</div>
                                <Button size="sm" variant="ghost" onClick={() => downloadFile(r.file.data, r.file.name)} style={{ marginTop: 6, width: "100%", justifyContent: "center" }}>Download</Button>
                              </div>
                            )}
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

function HRCalendarView({ calDate, setCalDate, calFilters, setCalFilters, people, companyEvents, eventRequests, saveHR, isOwnerUser, currentUser, hrSettings }) {
  const [evtForm, setEvtForm] = useState({ date: "", title: "", desc: "" });
  const [reqForm, setReqForm] = useState({ date: "", title: "", desc: "" });

  // ---- Build unified event list (next 12 months window) ----
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const horizonEnd = new Date(today); horizonEnd.setMonth(horizonEnd.getMonth() + 12);

  const items = [];
  // Trading holidays
  if (calFilters.holidays) {
    Object.entries(TRADING_HOLIDAYS).forEach(([dateStr, name]) => {
      const d = new Date(dateStr + "T00:00:00");
      if (d >= today && d <= horizonEnd) items.push({ key: "hol-" + dateStr, date: d, dateStr, type: "holiday", title: name, sub: "Markets closed" });
    });
  }
  // Birthdays — project this year + next year
  if (calFilters.birthdays) {
    people.forEach(p => {
      if (!p.birthday) return;
      const parts = p.birthday.split("-");
      if (parts.length !== 3) return;
      const mm = parseInt(parts[1]), dd = parseInt(parts[2]);
      [today.getFullYear(), today.getFullYear() + 1].forEach(yr => {
        const d = new Date(yr, mm - 1, dd);
        if (d >= today && d <= horizonEnd) {
          const dateStr = `${yr}-${String(mm).padStart(2, "0")}-${String(dd).padStart(2, "0")}`;
          // Age turning
          const birthYear = parseInt(parts[0]);
          const turning = birthYear ? yr - birthYear : null;
          items.push({ key: "bday-" + p.id + "-" + yr, date: d, dateStr, type: "birthday", title: p.name + "'s Birthday", sub: turning ? `Turning ${turning}` : "Birthday", personId: p.id });
        }
      });
    });
  }
  // Company events
  if (calFilters.events) {
    companyEvents.forEach((e, i) => {
      const d = new Date(e.date + "T00:00:00");
      if (d >= today && d <= horizonEnd) items.push({ key: "evt-" + i + "-" + e.date, date: d, dateStr: e.date, type: "event", title: e.title, sub: e.desc || "", eventIdx: i });
    });
  }
  items.sort((a, b) => a.date - b.date);

  // ---- Bucket by horizon (matches PointerOS dashboard grouping language) ----
  const oneWeek = new Date(today); oneWeek.setDate(oneWeek.getDate() + 7);
  const oneMonth = new Date(today); oneMonth.setMonth(oneMonth.getMonth() + 1);
  const buckets = { thisWeek: [], thisMonth: [], later: [] };
  items.forEach(it => {
    if (it.date <= oneWeek) buckets.thisWeek.push(it);
    else if (it.date <= oneMonth) buckets.thisMonth.push(it);
    else buckets.later.push(it);
  });

  // ---- Type styling: matches PointerOS task urgency bar pattern ----
  const TYPE_STYLE = {
    holiday:  { bar: COLORS.warning,  bg: "#FFF8E7", icon: "🏦", label: "Trading Holiday" },
    birthday: { bar: "#DB2777",       bg: "#FCE7F3", icon: "🎂", label: "Birthday" },
    event:    { bar: COLORS.success,  bg: "#E8F5EE", icon: "📌", label: "Company Event" },
  };

  // ---- ICS export ----
  const downloadICS = () => {
    const lines = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//PointerOS//HR//EN", "CALSCALE:GREGORIAN"];
    const stamp = new Date();
    const pad2 = n => String(n).padStart(2, "0");
    const stampStr = `${stamp.getUTCFullYear()}${pad2(stamp.getUTCMonth() + 1)}${pad2(stamp.getUTCDate())}T${pad2(stamp.getUTCHours())}${pad2(stamp.getUTCMinutes())}${pad2(stamp.getUTCSeconds())}Z`;
    const evt = (uid, dateStr, title, desc) => {
      const dt = dateStr.replace(/-/g, "");
      lines.push("BEGIN:VEVENT", "UID:" + uid + "@pointeros.local", "DTSTAMP:" + stampStr, "DTSTART;VALUE=DATE:" + dt, "SUMMARY:" + title.replace(/[,;]/g, " "));
      if (desc) lines.push("DESCRIPTION:" + desc.replace(/[,;]/g, " "));
      lines.push("END:VEVENT");
    };
    if (calFilters.holidays) Object.entries(TRADING_HOLIDAYS).forEach(([d, n], i) => evt("hol-" + i, d, "🏦 " + n, "Markets closed"));
    if (calFilters.birthdays) people.forEach((p, i) => {
      if (!p.birthday) return;
      const [, mm, dd] = p.birthday.split("-");
      [new Date().getFullYear(), new Date().getFullYear() + 1].forEach(yr => evt("bday-" + i + "-" + yr, `${yr}-${mm}-${dd}`, "🎂 " + p.name + "'s Birthday"));
    });
    if (calFilters.events) companyEvents.forEach((e, i) => evt("evt-" + i, e.date, "📌 " + e.title, e.desc || ""));
    lines.push("END:VCALENDAR");
    const blob = new Blob([lines.join("\r\n")], { type: "text/calendar" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "pointeros_calendar.ics"; a.click();
    URL.revokeObjectURL(url);
  };

  const addEvent = () => {
    if (!evtForm.date || !evtForm.title) { alert("Date and title required"); return; }
    saveHR({ companyEvents: [...companyEvents, evtForm] });
    setEvtForm({ date: "", title: "", desc: "" });
  };
  const deleteEvent = (i) => {
    if (!confirm("Remove event?")) return;
    saveHR({ companyEvents: companyEvents.filter((_, idx) => idx !== i) });
  };

  const submitEventRequest = () => {
    if (!reqForm.date || !reqForm.title) { alert("Date and title are required"); return; }
    const request = {
      id: uid(),
      requestedBy: currentUser.id,
      requestedByName: currentUser.name,
      requestedByEmail: currentUser.email || "",
      date: reqForm.date,
      title: reqForm.title,
      desc: reqForm.desc,
      status: "pending",
      submitted: new Date().toISOString(),
    };
    saveHR({ eventRequests: [...(eventRequests || []), request] });
    const recipients = hrSettings?.notifyEmails?.length ? hrSettings.notifyEmails : ["matt@pointerfg.com", "alex@pointerfg.com"];
    const body =
`An employee has requested a new company event in PointerOS.

Requested by: ${currentUser.name} ${currentUser.email ? "<" + currentUser.email + ">" : ""}
Event date: ${reqForm.date}
Title: ${reqForm.title}

Description:
${reqForm.desc || "(none provided)"}

Approve or deny at: PointerOS → HR Toolsuite → Calendar (Master view)

— Automated message from PointerOS`;
    sendEmail({
      to: recipients,
      subject: `[PFG Event Request] ${reqForm.title} — ${reqForm.date}`,
      body,
    });
    setReqForm({ date: "", title: "", desc: "" });
  };

  const approveEventRequest = (req) => {
    // Promote to companyEvents, mark request as approved
    const newEvent = { date: req.date, title: req.title, desc: req.desc };
    const nextEvents = [...companyEvents, newEvent];
    const nextRequests = (eventRequests || []).map(r => r.id === req.id ? { ...r, status: "approved", reviewedAt: new Date().toISOString(), reviewedBy: currentUser.name } : r);
    saveHR({ companyEvents: nextEvents, eventRequests: nextRequests });
    if (req.requestedByEmail) {
      const ok = confirm(`Approve and email ${req.requestedByName} about the decision?`);
      if (ok) sendEmail({ to: [req.requestedByEmail], subject: `Event approved: ${req.title}`, body: `Your event request for "${req.title}" on ${req.date} has been approved by ${currentUser.name} and added to the company calendar.\n\n— PointerOS` });
    }
  };
  const denyEventRequest = (req) => {
    const nextRequests = (eventRequests || []).map(r => r.id === req.id ? { ...r, status: "denied", reviewedAt: new Date().toISOString(), reviewedBy: currentUser.name } : r);
    saveHR({ eventRequests: nextRequests });
    if (req.requestedByEmail) {
      const ok = confirm(`Deny and email ${req.requestedByName} about the decision?`);
      if (ok) sendEmail({ to: [req.requestedByEmail], subject: `Event request denied: ${req.title}`, body: `Your event request for "${req.title}" on ${req.date} was denied by ${currentUser.name}.\n\n— PointerOS` });
    }
  };
  const removeEventRequest = (id) => {
    if (!confirm("Delete this request?")) return;
    saveHR({ eventRequests: (eventRequests || []).filter(r => r.id !== id) });
  };

  // ---- Single event card (PointerOS style) ----
  const EventCard = ({ item }) => {
    const style = TYPE_STYLE[item.type];
    const dateObj = item.date;
    const monthAbbr = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][dateObj.getMonth()];
    const weekdayAbbr = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][dateObj.getDay()];
    const daysOut = Math.round((dateObj - today) / (1000 * 60 * 60 * 24));
    const daysLabel = daysOut === 0 ? "Today" : daysOut === 1 ? "Tomorrow" : `in ${daysOut} days`;
    return (
      <div style={{ display: "flex", background: COLORS.surface, borderRadius: 10, border: `1px solid ${COLORS.border}`, overflow: "hidden", marginBottom: 8, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
        <div style={{ width: 5, background: style.bar }} />
        <div style={{ width: 64, padding: "12px 8px", textAlign: "center", background: style.bg, borderRight: `1px solid ${COLORS.borderLight}` }}>
          <div style={{ fontSize: 10, fontWeight: 600, color: style.bar, textTransform: "uppercase", letterSpacing: 1 }}>{monthAbbr}</div>
          <div style={{ fontSize: 22, fontWeight: 700, color: COLORS.text, lineHeight: 1 }}>{dateObj.getDate()}</div>
          <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 2 }}>{weekdayAbbr}</div>
        </div>
        <div style={{ flex: 1, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2 }}>
              <span style={{ fontSize: 16 }}>{style.icon}</span>
              <span style={{ fontSize: 14, fontWeight: 600, color: COLORS.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.title}</span>
            </div>
            {item.sub && <div style={{ fontSize: 12, color: COLORS.textMuted, marginLeft: 24 }}>{item.sub}</div>}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <Badge color={style.bar}>{daysLabel}</Badge>
            {item.type === "event" && isOwnerUser && (
              <Button size="sm" variant="ghost" onClick={() => deleteEvent(item.eventIdx)}><IconX size={12} /></Button>
            )}
          </div>
        </div>
      </div>
    );
  };

  const Section = ({ title, items, accent }) => (
    <div style={{ marginBottom: 24 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
        <div style={{ width: 4, height: 16, background: accent, borderRadius: 2 }} />
        <h3 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: COLORS.text }}>{title}</h3>
        <Badge color={COLORS.textMuted}>{items.length}</Badge>
      </div>
      {items.length === 0 ? (
        <div style={{ padding: "12px 16px", color: COLORS.textDim, fontSize: 12, background: COLORS.surface, borderRadius: 10, border: `1px dashed ${COLORS.borderLight}` }}>Nothing scheduled.</div>
      ) : (
        items.map(it => <EventCard key={it.key} item={it} />)
      )}
    </div>
  );

  // ---- Summary stat cards ----
  const counts = {
    week: buckets.thisWeek.length,
    month: buckets.thisMonth.length + buckets.thisWeek.length,
    holidays: items.filter(i => i.type === "holiday").length,
    birthdays: items.filter(i => i.type === "birthday").length,
    events: items.filter(i => i.type === "event").length,
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 20 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Calendar</h2>
          <p style={{ color: COLORS.textMuted, fontSize: 13, margin: "4px 0 0" }}>Trading holidays, team birthdays, and company events — next 12 months.</p>
        </div>
        <Button size="sm" onClick={downloadICS}>📥 Download .ics</Button>
      </div>

      {/* Stat cards */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginBottom: 20 }}>
        <StatCard label="This Week" value={counts.week} color={COLORS.primary} />
        <StatCard label="Next 30 Days" value={counts.month} color={COLORS.primary} />
        <StatCard label="Trading Holidays" value={counts.holidays} color={COLORS.warning} />
        <StatCard label="Birthdays" value={counts.birthdays} color="#DB2777" />
        <StatCard label="Company Events" value={counts.events} color={COLORS.success} />
      </div>

      {/* Filters */}
      <Card style={{ padding: 16, marginBottom: 20 }}>
        <div style={{ display: "flex", gap: 18, flexWrap: "wrap", fontSize: 13, alignItems: "center" }}>
          <span style={{ fontWeight: 600, fontSize: 12, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Show</span>
          <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer" }}>
            <input type="checkbox" checked={calFilters.holidays} onChange={e => setCalFilters({ ...calFilters, holidays: e.target.checked })} />
            <span style={{ width: 10, height: 10, borderRadius: 2, background: COLORS.warning }} /> Trading Holidays
          </label>
          <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer" }}>
            <input type="checkbox" checked={calFilters.birthdays} onChange={e => setCalFilters({ ...calFilters, birthdays: e.target.checked })} />
            <span style={{ width: 10, height: 10, borderRadius: 2, background: "#DB2777" }} /> Birthdays
          </label>
          <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer" }}>
            <input type="checkbox" checked={calFilters.events} onChange={e => setCalFilters({ ...calFilters, events: e.target.checked })} />
            <span style={{ width: 10, height: 10, borderRadius: 2, background: COLORS.success }} /> Company Events
          </label>
        </div>
      </Card>

      {/* Grouped timeline */}
      <Section title="This Week" items={buckets.thisWeek} accent={COLORS.success} />
      <Section title="Later This Month" items={buckets.thisMonth} accent={COLORS.warning} />
      <Section title="Coming Up" items={buckets.later} accent={COLORS.textMuted} />

      {/* Add Event — master only / Request Event — everyone else */}
      {isOwnerUser ? (
        <Card style={{ padding: 20, marginTop: 24 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>Add Company Event <span style={{ color: COLORS.textMuted, fontWeight: 400, fontSize: 12 }}>(Master only)</span></div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 10 }}>
            <Input label="Date" type="date" value={evtForm.date} onChange={v => setEvtForm({ ...evtForm, date: v })} />
            <Input label="Title" value={evtForm.title} onChange={v => setEvtForm({ ...evtForm, title: v })} />
            <Input label="Description (optional)" value={evtForm.desc} onChange={v => setEvtForm({ ...evtForm, desc: v })} />
          </div>
          <Button onClick={addEvent} style={{ marginTop: 8 }}><IconPlus size={14} /> Add Event</Button>

          {companyEvents.length > 0 && (
            <div style={{ marginTop: 18 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>All Events ({companyEvents.length})</div>
              <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
                <thead><tr style={{ background: "#F8FAFC", textAlign: "left" }}>
                  <th style={{ padding: "8px" }}>Date</th><th style={{ padding: "8px" }}>Title</th>
                  <th style={{ padding: "8px" }}>Description</th><th></th>
                </tr></thead>
                <tbody>
                  {companyEvents.slice().sort((a, b) => a.date.localeCompare(b.date)).map((e, i) => (
                    <tr key={i} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                      <td style={{ padding: "8px" }}>{e.date}</td>
                      <td style={{ padding: "8px" }}>{e.title}</td>
                      <td style={{ padding: "8px" }}>{e.desc}</td>
                      <td><Button size="sm" variant="danger" onClick={() => deleteEvent(i)}><IconX size={12} /></Button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </Card>
      ) : (
        <Card style={{ padding: 20, marginTop: 24 }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>Request a Company Event</div>
          <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 12 }}>Only Matt and Alex can add events directly. Submit a request and they'll be notified by email.</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 10 }}>
            <Input label="Date" type="date" value={reqForm.date} onChange={v => setReqForm({ ...reqForm, date: v })} />
            <Input label="Title" value={reqForm.title} onChange={v => setReqForm({ ...reqForm, title: v })} placeholder="Team offsite" />
            <Input label="Description (optional)" value={reqForm.desc} onChange={v => setReqForm({ ...reqForm, desc: v })} placeholder="Half-day team-building" />
          </div>
          <Button onClick={submitEventRequest} style={{ marginTop: 8 }}><IconPlus size={14} /> Submit Request & Notify</Button>

          {/* Show this employee's own requests */}
          {eventRequests && eventRequests.filter(r => r.requestedBy === currentUser.id).length > 0 && (
            <div style={{ marginTop: 18 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>My Requests</div>
              <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
                <thead><tr style={{ background: "#F8FAFC", textAlign: "left" }}>
                  <th style={{ padding: "8px" }}>Date</th><th style={{ padding: "8px" }}>Title</th>
                  <th style={{ padding: "8px" }}>Status</th>
                </tr></thead>
                <tbody>
                  {eventRequests.filter(r => r.requestedBy === currentUser.id).slice().reverse().map(r => (
                    <tr key={r.id} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                      <td style={{ padding: "8px" }}>{r.date}</td>
                      <td style={{ padding: "8px" }}>{r.title}</td>
                      <td style={{ padding: "8px" }}><Badge color={r.status === "approved" ? COLORS.success : r.status === "denied" ? COLORS.danger : COLORS.warning}>{r.status.toUpperCase()}</Badge></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </Card>
      )}

      {/* Pending event requests — only visible to master users */}
      {isOwnerUser && eventRequests && eventRequests.filter(r => r.status === "pending").length > 0 && (
        <Card style={{ padding: 20, marginTop: 16, borderLeft: `4px solid ${COLORS.warning}` }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>
            ⏳ Pending Event Requests <span style={{ fontWeight: 400, color: COLORS.textMuted }}>({eventRequests.filter(r => r.status === "pending").length})</span>
          </div>
          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
            <thead><tr style={{ background: "#FFF8E7", textAlign: "left" }}>
              <th style={{ padding: "8px" }}>Date</th><th style={{ padding: "8px" }}>Title</th>
              <th style={{ padding: "8px" }}>Description</th><th style={{ padding: "8px" }}>Requested by</th>
              <th style={{ padding: "8px" }}>Actions</th>
            </tr></thead>
            <tbody>
              {eventRequests.filter(r => r.status === "pending").map(r => (
                <tr key={r.id} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                  <td style={{ padding: "8px" }}>{r.date}</td>
                  <td style={{ padding: "8px", fontWeight: 600 }}>{r.title}</td>
                  <td style={{ padding: "8px", color: COLORS.textMuted }}>{r.desc}</td>
                  <td style={{ padding: "8px" }}>{r.requestedByName}</td>
                  <td style={{ padding: "8px" }}>
                    <Button size="sm" onClick={() => approveEventRequest(r)}>Approve</Button>{" "}
                    <Button size="sm" variant="danger" onClick={() => denyEventRequest(r)}>Deny</Button>{" "}
                    <Button size="sm" variant="ghost" onClick={() => removeEventRequest(r.id)}><IconTrash size={12} /></Button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}
    </div>
  );
}

// ============================================================
// HR LEAVE REQUEST — employee submits time-off requests
// Half / quarter day, remote work notes, multi-day spans
// ============================================================
function HRLeaveRequestView({ currentUser, leaveRequests, saveHR, isOwnerUser, hrSettings, people, onUpdatePeople }) {
  const [form, setForm] = useState({
    startDate: "",
    endDate: "",
    portion: "full",       // "full" | "half-am" | "half-pm" | "quarter-am" | "quarter-pm"
    remote: false,
    remoteNote: "",
    reason: "",
    leaveType: "PTO",      // PTO | Sick | Bereavement | Military | FMLA | Unpaid
  });
  const [submitting, setSubmitting] = useState(false);
  const [expanded, setExpanded] = useState(null);

  // Compute total days requested
  const calcDays = () => {
    if (!form.startDate) return 0;
    const start = new Date(form.startDate + "T00:00:00");
    const end = new Date((form.endDate || form.startDate) + "T00:00:00");
    if (isNaN(start) || isNaN(end) || end < start) return 0;
    const calendarDays = Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1;
    // Only apply portion multiplier when it's a single day
    if (calendarDays === 1) {
      if (form.portion === "half-am" || form.portion === "half-pm") return 0.5;
      if (form.portion === "quarter-am" || form.portion === "quarter-pm") return 0.25;
    }
    return calendarDays;
  };
  const totalDays = calcDays();

  const submit = () => {
    if (!form.startDate) { alert("Start date is required"); return; }
    if (!form.reason.trim() && form.leaveType !== "PTO") { alert("Reason is required for non-PTO leave"); return; }
    setSubmitting(true);
    const request = {
      id: uid(),
      requestedBy: currentUser.id,
      requestedByName: currentUser.name,
      requestedByEmail: currentUser.email || "",
      leaveType: form.leaveType,
      startDate: form.startDate,
      endDate: form.endDate || form.startDate,
      portion: form.portion,
      days: totalDays,
      remote: form.remote,
      remoteNote: form.remoteNote,
      reason: form.reason,
      status: "pending",
      submitted: new Date().toISOString(),
    };
    const next = [...(leaveRequests || []), request];
    saveHR({ leaveRequests: next });
    const recipients = hrSettings?.notifyEmails?.length ? hrSettings.notifyEmails : ["matt@pointerfg.com", "alex@pointerfg.com"];
    const portionLabel = {
      "full": "Full day(s)",
      "half-am": "Half day (AM)",
      "half-pm": "Half day (PM)",
      "quarter-am": "Quarter day (early AM)",
      "quarter-pm": "Quarter day (late PM)",
    }[form.portion];
    const body =
`A new time-off request has been submitted in PointerOS.

Employee: ${currentUser.name} ${currentUser.email ? "<" + currentUser.email + ">" : ""}
Type: ${form.leaveType}
Dates: ${form.startDate}${form.endDate && form.endDate !== form.startDate ? " through " + form.endDate : ""}
Portion: ${portionLabel}
Total days: ${totalDays}
Working remotely: ${form.remote ? "Yes" : "No"}${form.remote && form.remoteNote ? " — " + form.remoteNote : ""}

Reason / details:
${form.reason || "(none provided)"}

Approve or deny in: PointerOS → HR Toolsuite → Leave Request (Master view).

— Automated message from PointerOS`;
    sendEmail({
      to: recipients,
      subject: `[PFG Leave] ${currentUser.name} — ${form.leaveType} ${form.startDate}${form.endDate && form.endDate !== form.startDate ? " to " + form.endDate : ""} (${totalDays}d)`,
      body,
    });
    setForm({ startDate: "", endDate: "", portion: "full", remote: false, remoteNote: "", reason: "", leaveType: "PTO" });
    setSubmitting(false);
  };

  const updateStatus = (id, status) => {
    const req = leaveRequests.find(r => r.id === id);
    if (!req) return;
    const next = leaveRequests.map(r => r.id === id ? { ...r, status, reviewedAt: new Date().toISOString(), reviewedBy: currentUser.name } : r);
    // If approved AND it's a PTO request, deduct from the user's ptoHistory
    if (status === "approved" && req.leaveType === "PTO" && req.days > 0 && people && onUpdatePeople) {
      const yr = String(new Date(req.startDate).getFullYear());
      const updatedPeople = people.map(p => {
        if (p.id !== req.requestedBy) return p;
        const hist = { ...(p.ptoHistory || {}) };
        if (!hist[yr]) hist[yr] = { allot: p.ptoAllot || 0, used: 0, carriedIn: 0 };
        hist[yr] = { ...hist[yr], used: (hist[yr].used || 0) + req.days };
        return { ...p, ptoHistory: hist, ptoUsed: (p.ptoUsed || 0) + req.days };
      });
      onUpdatePeople(updatedPeople);
    }
    // If approved AND it's Military/FMLA, append the date range to the appropriate leave list
    if (status === "approved" && (req.leaveType === "Military" || req.leaveType === "FMLA" || req.leaveType === "Unpaid") && people && onUpdatePeople) {
      const updatedPeople = people.map(p => {
        if (p.id !== req.requestedBy) return p;
        const period = { start: req.startDate, end: req.endDate };
        if (req.leaveType === "Military") {
          return { ...p, militaryLeaves: [...(p.militaryLeaves || []), period] };
        } else {
          return { ...p, unpaidLeaves: [...(p.unpaidLeaves || []), period] };
        }
      });
      onUpdatePeople(updatedPeople);
    }
    saveHR({ leaveRequests: next });
    if (req.requestedByEmail) {
      const ok = confirm(`${status === "approved" ? "Approve" : "Deny"} and email ${req.requestedByName}?`);
      if (ok) sendEmail({
        to: [req.requestedByEmail],
        subject: `Time-off request ${status.toUpperCase()}: ${req.startDate}`,
        body: `Your ${req.leaveType} request from ${req.startDate} to ${req.endDate} (${req.days} days) has been ${status} by ${currentUser.name}.\n\n— PointerOS`,
      });
    }
  };

  const removeRequest = (id) => {
    if (!confirm("Delete this request?")) return;
    saveHR({ leaveRequests: leaveRequests.filter(r => r.id !== id) });
  };

  // Filter for view
  const visible = isOwnerUser ? leaveRequests : leaveRequests.filter(r => r.requestedBy === currentUser.id);
  const pending = visible.filter(r => r.status === "pending");
  const past = visible.filter(r => r.status !== "pending");

  const portionLabel = (p) => ({
    "full": "Full day(s)",
    "half-am": "½ AM",
    "half-pm": "½ PM",
    "quarter-am": "¼ early",
    "quarter-pm": "¼ late",
  }[p] || p);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 18 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Leave Request</h2>
          <p style={{ color: COLORS.textMuted, fontSize: 13, margin: "4px 0 0" }}>
            Submit time-off requests. Matt and Alex are notified by email and will approve or deny here.
          </p>
        </div>
        <HandbookLink topic="Part 5 — Holidays, Personal and Other Leave" label="Handbook · Part 5 Leave Policies" />
      </div>

      {/* Submission form */}
      <Card style={{ padding: 20, marginBottom: 16 }}>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>New Request</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12 }}>
          <Select label="Type of Leave" value={form.leaveType} onChange={v => setForm({ ...form, leaveType: v })}
            options={[
              { value: "PTO", label: "PTO / Personal" },
              { value: "Sick", label: "Sick" },
              { value: "Bereavement", label: "Bereavement" },
              { value: "Military", label: "Military Service" },
              { value: "FMLA", label: "FMLA" },
              { value: "Unpaid", label: "Other Unpaid" },
            ]} />
          <Input label="Start Date" type="date" value={form.startDate} onChange={v => setForm({ ...form, startDate: v })} />
          <Input label="End Date (same as start if single day)" type="date" value={form.endDate} onChange={v => setForm({ ...form, endDate: v })} />
          <Select label="Portion of Day" value={form.portion} onChange={v => setForm({ ...form, portion: v })}
            options={[
              { value: "full", label: "Full day(s)" },
              { value: "half-am", label: "½ day — morning" },
              { value: "half-pm", label: "½ day — afternoon" },
              { value: "quarter-am", label: "¼ day — early" },
              { value: "quarter-pm", label: "¼ day — late" },
            ]} />
        </div>

        {/* Total days indicator */}
        <div style={{ marginTop: 12, padding: 10, background: COLORS.bg, borderRadius: 6, fontSize: 13 }}>
          <b>Total days requested:</b> <span style={{ color: COLORS.primary, fontWeight: 700, fontSize: 16 }}>{totalDays}</span>
          {form.portion !== "full" && (
            <span style={{ color: COLORS.textMuted, fontSize: 11, marginLeft: 8 }}>(Portion only applies to single-day requests)</span>
          )}
        </div>

        {/* Remote work toggle */}
        <div style={{ marginTop: 14, padding: 12, background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 8 }}>
          <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
            <input type="checkbox" checked={form.remote} onChange={e => setForm({ ...form, remote: e.target.checked })} style={{ width: 18, height: 18, cursor: "pointer" }} />
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.text }}>Working remotely during this leave</div>
              <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2 }}>Per Handbook Part 1 — remote work needs supervisor approval and should not exceed 4 days per quarter.</div>
            </div>
          </label>
          {form.remote && (
            <div style={{ marginTop: 10 }}>
              <Input label="Remote work details" value={form.remoteNote} onChange={v => setForm({ ...form, remoteNote: v })}
                placeholder="e.g. Available 9am-noon CST, no afternoon meetings" />
            </div>
          )}
        </div>

        <TextArea label="Reason / Notes" value={form.reason} onChange={v => setForm({ ...form, reason: v })}
          placeholder="Vacation, medical appointment, etc. Required for non-PTO types." rows={3} />

        <div style={{ marginTop: 14, display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
          <Button onClick={submit} disabled={submitting || !form.startDate}><IconPlus size={14} /> Submit & Notify</Button>
          <span style={{ fontSize: 11, color: COLORS.textDim }}>
            Opens your mail client with a pre-filled message to {(hrSettings?.notifyEmails || []).join(", ")}.
          </span>
        </div>
      </Card>

              <th style={{ padding: "8px" }}>Dates</th>
              <th style={{ padding: "8px", textAlign: "right" }}>Days</th>

      {pending.length === 0 && past.length === 0 && (
        <Card style={{ padding: 32, textAlign: "center", color: COLORS.textMuted }}>
          No leave requests yet. Submit one above to get started.
        </Card>
      )}
    </div>
  );
}

function HRSettingsView({ hrSettings, saveHR }) {
  const [emails, setEmails] = useState((hrSettings.notifyEmails || []).join(", "));
  const [saved, setSaved] = useState(false);
  const [workerUrlInput, setWorkerUrlInput] = useState(getWorkerUrl() || "");
  const [workerSaved, setWorkerSaved] = useState(false);
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);

  const save = () => {
    const list = emails.split(/[,;\s]+/).map(s => s.trim()).filter(Boolean);
    saveHR({ hrSettings: { ...hrSettings, notifyEmails: list } });
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  const saveWorker = () => {
    setWorkerUrl(workerUrlInput.trim());
    setWorkerSaved(true);
    setTimeout(() => setWorkerSaved(false), 2000);
  };

  const testWorker = async () => {
    const url = workerUrlInput.trim();
    if (!url) { setTestResult({ ok: false, msg: "Enter a URL first" }); return; }
    setTesting(true);
    setTestResult(null);
    try {
      const testTarget = "https://query1.finance.yahoo.com/v8/finance/chart/AAPL?range=1d&interval=5m";
      const res = await fetch(`${url.replace(/\/$/, "")}/?url=${encodeURIComponent(testTarget)}`);
      if (!res.ok) {
        setTestResult({ ok: false, msg: `HTTP ${res.status} from Worker` });
        return;
      }
      const text = await res.text();
      try {
        const json = JSON.parse(text);
        if (json?.chart?.result?.[0]?.meta?.symbol === "AAPL") {
          setTestResult({ ok: true, msg: "Worker is reachable and Yahoo is responding. Last AAPL price: $" + (json.chart.result[0].meta.regularMarketPrice || "—") });
        } else if (json?.error) {
          setTestResult({ ok: false, msg: "Worker responded with error: " + json.error });
        } else {
          setTestResult({ ok: false, msg: "Got JSON but not in expected Yahoo format" });
        }
      } catch (e) {
        setTestResult({ ok: false, msg: "Worker responded but body wasn't JSON: " + text.substring(0, 100) });
      }
    } catch (e) {
      setTestResult({ ok: false, msg: "Couldn't reach Worker: " + e.message });
    } finally {
      setTesting(false);
    }
  };

  return (
    <div>
      <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, marginBottom: 6 }}>HR Settings</h2>
      <p style={{ color: COLORS.textMuted, fontSize: 13, marginBottom: 20 }}>Owner-only · controls notifications and data-feed routing.</p>

      {/* --- Cloudflare Worker --- */}
      <Card style={{ padding: 20, marginBottom: 16, borderLeft: `4px solid ${COLORS.primary}` }}>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 6 }}>Market Data Proxy (Cloudflare Worker)</div>
        <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 12, lineHeight: 1.6 }}>
          The Investment Dashboard fetches Yahoo Finance + CNN Fear &amp; Greed data, which both block browsers from calling them directly (no CORS). Without a Worker, PointerOS falls back to free public proxies that are unreliable. Paste your Worker URL here for rock-solid data.
        </div>
        <input
          type="url"
          value={workerUrlInput}
          onChange={e => setWorkerUrlInput(e.target.value)}
          placeholder="https://pfg-finance-proxy.YOUR-SUBDOMAIN.workers.dev"
          style={{ width: "100%", padding: 10, borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "ui-monospace, monospace", boxSizing: "border-box" }}
        />
        <div style={{ marginTop: 10, display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          <Button onClick={saveWorker}>Save Worker URL</Button>
          <Button variant="outline" onClick={testWorker} disabled={testing || !workerUrlInput.trim()}>
            {testing ? "Testing…" : "Test Connection"}
          </Button>
          {workerSaved && <span style={{ color: COLORS.success, fontSize: 13, fontWeight: 600 }}>✓ Saved</span>}
        </div>
        {testResult && (
          <div style={{ marginTop: 10, padding: 10, borderRadius: 6, background: testResult.ok ? COLORS.success + "15" : COLORS.danger + "15", border: `1px solid ${testResult.ok ? COLORS.success : COLORS.danger}33`, fontSize: 12, color: testResult.ok ? COLORS.success : COLORS.danger, fontWeight: 600 }}>
            {testResult.ok ? "✓ " : "✗ "} {testResult.msg}
          </div>
        )}
        <details style={{ marginTop: 12, fontSize: 11, color: COLORS.textMuted }}>
          <summary style={{ cursor: "pointer", fontWeight: 600 }}>How to set this up (one-time, ~5 min)</summary>
          <ol style={{ paddingLeft: 20, marginTop: 8, lineHeight: 1.7 }}>
            <li>Sign up free at <a href="https://dash.cloudflare.com/sign-up" target="_blank" rel="noopener" style={{ color: COLORS.primary }}>dash.cloudflare.com/sign-up</a></li>
            <li>Workers &amp; Pages → Create application → Create Worker → name it <code>pfg-finance-proxy</code> → Deploy</li>
            <li>Click <b>Edit code</b>, paste the Worker code (shared separately), Save and Deploy</li>
            <li>Copy the Worker URL (looks like <code>https://pfg-finance-proxy.xxxx.workers.dev</code>) and paste it here</li>
            <li>Click <b>Test Connection</b> — if you see a green ✓, you're done</li>
          </ol>
          <div style={{ marginTop: 8 }}>Free tier covers 100,000 requests/day — plenty for a small team. Leave this field empty to keep using the unreliable public proxies.</div>
        </details>
      </Card>

      <Card style={{ padding: 20 }}>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 6 }}>Notification Recipients</div>
        <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 12 }}>
          Email addresses that receive notifications when employees submit reimbursements, leave requests, profile changes, or event requests. Comma- or space-separated.
        </div>
        <textarea value={emails} onChange={e => setEmails(e.target.value)} rows={3}
          style={{ width: "100%", padding: 10, borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit", boxSizing: "border-box" }}
          placeholder="matt@pointerfg.com, alex@pointerfg.com" />
        <div style={{ marginTop: 10, display: "flex", gap: 8, alignItems: "center" }}>
          <Button onClick={save}>Save</Button>
          {saved && <span style={{ color: COLORS.success, fontSize: 13, fontWeight: 600 }}>✓ Saved</span>}
        </div>
      </Card>

      <Card style={{ padding: 20, marginTop: 16, background: "#FFFBEB", borderLeft: `4px solid ${COLORS.warning}` }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#92400E", marginBottom: 6 }}>How email notifications work</div>
        <div style={{ fontSize: 12, color: "#92400E", lineHeight: 1.6 }}>
          PointerOS is a single-page app with no backend. When an employee submits a request, their browser opens a pre-filled email in their default mail client (Outlook, Gmail, etc.), addressed to the recipients above. The employee must click <b>Send</b> for the email to actually go out. To enable truly automatic delivery, you'd need a backend with SMTP or a service like Resend / SendGrid / Postmark.
        </div>
      </Card>
    </div>
  );
}

function HREmployeesView({ people, onUpdatePeople, currentUser, profileRequests, saveHR }) {
  const [editingId, setEditingId] = useState(null);
  const [editForm, setEditForm] = useState({});
  const [pendingDeleteId, setPendingDeleteId] = useState(null);
  const [deleteTyped, setDeleteTyped] = useState("");
  const [deleteError, setDeleteError] = useState("");

  const beginEdit = (p) => {
    setEditingId(p.id);
    setEditForm({ ...p });
  };
  const cancelEdit = () => { setEditingId(null); setEditForm({}); };
  const commitEdit = () => {
    if (!editForm.name || !editForm.username) { alert("Name and username required"); return; }
    const dup = people.find(p => p.id !== editingId && (p.username || "").toLowerCase() === editForm.username.toLowerCase());
    if (dup) { alert("Username already used by " + dup.name); return; }
    onUpdatePeople(people.map(p => p.id === editingId ? { ...editForm } : p));
    cancelEdit();
  };

  const confirmDelete = (p) => {
    setPendingDeleteId(p.id);
    setDeleteTyped("");
    setDeleteError("");
  };
  const executeDelete = () => {
    const p = people.find(x => x.id === pendingDeleteId);
    if (!p) return;
    if (deleteTyped !== p.username) { setDeleteError(`Type the username "${p.username}" exactly to confirm.`); return; }
    if (p.id === currentUser.id) { setDeleteError("You can't delete your own account while signed in."); return; }
    onUpdatePeople(people.filter(x => x.id !== p.id));
    setPendingDeleteId(null);
  };

  // Profile-request review
  const pendingReqs = (profileRequests || []).filter(r => r.status === "pending");
  const approveReq = (req) => {
    // Apply the proposed change to the person
    const target = people.find(p => p.id === req.requestedBy);
    if (!target) return;
    let updated = { ...target };
    if (req.field === "birthday" || req.field === "dateOfHire") {
      updated[req.field] = req.proposedValue;
    } else if (req.field === "enrolled401k") {
      updated.enrolled401k = req.proposedValue === "Enroll me";
    } else if (req.field === "militaryLeaves" || req.field === "unpaidLeaves") {
      // For leave-period requests, we can't auto-apply (it's free text). Mark approved and let admin edit manually.
      alert("This leave-period change has been marked approved. Please edit the employee row manually to apply the specific date range.");
    }
    if (req.field !== "militaryLeaves" && req.field !== "unpaidLeaves") {
      onUpdatePeople(people.map(p => p.id === target.id ? updated : p));
    }
    const nextReqs = (profileRequests || []).map(r => r.id === req.id ? { ...r, status: "approved", reviewedAt: new Date().toISOString(), reviewedBy: currentUser.name } : r);
    saveHR({ profileRequests: nextReqs });
    if (req.requestedByEmail) {
      const ok = confirm(`Email ${req.requestedByName} that this was approved?`);
      if (ok) sendEmail({ to: [req.requestedByEmail], subject: `Profile change approved: ${req.fieldLabel}`, body: `Your request to change ${req.fieldLabel} to "${req.proposedValue}" has been approved by ${currentUser.name}.\n\n— PointerOS` });
    }
  };
  const denyReq = (req) => {
    const nextReqs = (profileRequests || []).map(r => r.id === req.id ? { ...r, status: "denied", reviewedAt: new Date().toISOString(), reviewedBy: currentUser.name } : r);
    saveHR({ profileRequests: nextReqs });
    if (req.requestedByEmail) {
      const ok = confirm(`Email ${req.requestedByName} that this was denied?`);
      if (ok) sendEmail({ to: [req.requestedByEmail], subject: `Profile change denied: ${req.fieldLabel}`, body: `Your request to change ${req.fieldLabel} was denied by ${currentUser.name}.\n\n— PointerOS` });
    }
  };

  return (
    <div>
      <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, marginBottom: 20 }}>Employees (Admin)</h2>

      {/* Pending profile change requests */}
      {pendingReqs.length > 0 && (
        <Card style={{ padding: 20, marginBottom: 16, borderLeft: `4px solid ${COLORS.gold}` }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>
            ⏳ Pending Profile Change Requests ({pendingReqs.length})
          </div>
          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
            <thead><tr style={{ background: "#FFF8E7", textAlign: "left" }}>
              <th style={{ padding: "8px" }}>Employee</th>
              <th style={{ padding: "8px" }}>Field</th>
              <th style={{ padding: "8px" }}>Current</th>
              <th style={{ padding: "8px" }}>Proposed</th>
              <th style={{ padding: "8px" }}>Reason</th>
              <th style={{ padding: "8px" }}>Actions</th>
            </tr></thead>
            <tbody>
              {pendingReqs.map(r => (
                <tr key={r.id} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                  <td style={{ padding: "8px" }}>{r.requestedByName}</td>
                  <td style={{ padding: "8px", fontWeight: 600 }}>{r.fieldLabel}</td>
                  <td style={{ padding: "8px", color: COLORS.textMuted, fontFamily: "ui-monospace, monospace", fontSize: 11 }}>{r.currentValue || "(empty)"}</td>
                  <td style={{ padding: "8px", color: COLORS.primary, fontFamily: "ui-monospace, monospace", fontSize: 11 }}>{r.proposedValue}</td>
                  <td style={{ padding: "8px", color: COLORS.textMuted, fontSize: 11, maxWidth: 200 }}>{r.reason}</td>
                  <td style={{ padding: "8px" }}>
                    <Button size="sm" onClick={() => approveReq(r)}>Approve</Button>{" "}
                    <Button size="sm" variant="danger" onClick={() => denyReq(r)}>Deny</Button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}

      <Card style={{ padding: 20 }}>
        <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
          <thead><tr style={{ background: COLORS.bg, textAlign: "left" }}>
            <th style={{ padding: "8px" }}>Name</th><th style={{ padding: "8px" }}>Username</th>
            <th style={{ padding: "8px" }}>Role</th><th style={{ padding: "8px" }}>Admin</th>
            <th style={{ padding: "8px" }}>Hire</th><th style={{ padding: "8px" }}>Seniority</th>
            <th style={{ padding: "8px" }}>PTO Avail</th><th style={{ padding: "8px" }}>401(k)</th>
            <th style={{ padding: "8px" }}>Actions</th>
          </tr></thead>
          <tbody>
            {people.map(p => {
              if (editingId === p.id) {
                return (
                  <tr key={p.id} style={{ background: COLORS.gold + "22", borderTop: `1px solid ${COLORS.borderLight}` }}>
                    <td style={{ padding: 6 }}><input value={editForm.name || ""} onChange={e => setEditForm({ ...editForm, name: e.target.value })} style={{ width: 140 }} /></td>
                    <td style={{ padding: 6 }}><input value={editForm.username || ""} onChange={e => setEditForm({ ...editForm, username: e.target.value })} style={{ width: 100 }} /></td>
                    <td style={{ padding: 6 }}><input value={editForm.role || ""} onChange={e => setEditForm({ ...editForm, role: e.target.value })} style={{ width: 140 }} /></td>
                    <td style={{ padding: 6 }}><input type="checkbox" checked={!!editForm.isAdmin} onChange={e => setEditForm({ ...editForm, isAdmin: e.target.checked })} /></td>
                    <td style={{ padding: 6 }}><input type="date" value={editForm.dateOfHire || ""} onChange={e => setEditForm({ ...editForm, dateOfHire: e.target.value })} /></td>
                    <td style={{ padding: 6, fontSize: 11, color: COLORS.textMuted }}>{calcSeniority(editForm)?.formatted || "—"}</td>
                    <td style={{ padding: 6 }}><input type="number" value={editForm.ptoAllot || 0} step="0.5" onChange={e => setEditForm({ ...editForm, ptoAllot: parseFloat(e.target.value) || 0 })} style={{ width: 60 }} /></td>
                    <td style={{ padding: 6 }}>
                      <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 12 }}>
                        <input type="checkbox" checked={!!editForm.enrolled401k} onChange={e => setEditForm({ ...editForm, enrolled401k: e.target.checked })} />
                        Enrolled
                      </label>
                    </td>
                    <td style={{ padding: 6 }}>
                      <Button size="sm" onClick={commitEdit}>Save</Button>{" "}
                      <Button size="sm" variant="ghost" onClick={cancelEdit}>Cancel</Button>
                    </td>
                  </tr>
                );
              }
              const sen = calcSeniority(p);
              const status = get401kStatus(p);
              const pSummary = summarizePTO(p);
              return (
                <tr key={p.id} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                  <td style={{ padding: "8px" }}>{p.name}</td>
                  <td style={{ padding: "8px" }}>{p.username || p.id}</td>
                  <td style={{ padding: "8px" }}>{p.role}</td>
                  <td style={{ padding: "8px" }}>{p.isAdmin ? <Badge color={COLORS.danger}>ADMIN</Badge> : ""}</td>
                  <td style={{ padding: "8px", color: COLORS.textMuted }}>{p.dateOfHire || "—"}</td>
                  <td style={{ padding: "8px", fontWeight: 600 }}>{sen ? sen.formatted : "—"}</td>
                  <td style={{ padding: "8px" }}>{pSummary.totalAvailable}d</td>
                  <td style={{ padding: "8px" }}>
                    <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                      <span style={{ width: 10, height: 10, borderRadius: "50%", background: status.color, flexShrink: 0 }} />
                      <span style={{ fontSize: 11, color: status.color, fontWeight: 600 }}>
                        {status.code === "enrolled" ? "Enrolled" :
                         status.code === "eligible-not-enrolled" ? "Eligible" :
                         status.code === "ineligible" ? "Not eligible" : "—"}
                      </span>
                    </span>
                  </td>
                  <td style={{ padding: "8px" }}>
                    <Button size="sm" variant="ghost" onClick={() => beginEdit(p)}><IconEdit size={12} /> Edit</Button>{" "}
                    <Button size="sm" variant="danger" onClick={() => confirmDelete(p)}><IconTrash size={12} /> Delete</Button>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>

      <Modal open={pendingDeleteId !== null} onClose={() => setPendingDeleteId(null)} title="⚠️ Delete Employee Profile">
        {pendingDeleteId !== null && (() => {
          const p = people.find(x => x.id === pendingDeleteId);
          if (!p) return null;
          return (
            <div>
              <p style={{ fontSize: 14, marginBottom: 12 }}>You are about to permanently remove <b>{p.name}</b> (@{p.username}).</p>
              <div style={{ background: "#F8D7DA", color: "#721C24", padding: 12, borderRadius: 6, fontSize: 13, marginBottom: 12 }}>
                This deletes their login, profile, and PTO data. Cannot be undone.
              </div>
              <p style={{ fontSize: 13, marginBottom: 6 }}>To confirm, type <b>{p.username}</b> below:</p>
              <input type="text" value={deleteTyped} onChange={e => setDeleteTyped(e.target.value)} autoFocus
                placeholder="Type username to confirm"
                onKeyDown={e => { if (e.key === "Enter") executeDelete(); if (e.key === "Escape") setPendingDeleteId(null); }}
                style={{ width: "100%", padding: 10, border: `2px solid ${COLORS.danger}`, borderRadius: 4, fontSize: 14 }} />
              {deleteError && <p style={{ color: COLORS.danger, fontSize: 13, margin: "8px 0 0" }}>{deleteError}</p>}
              <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 16 }}>
                <Button variant="ghost" onClick={() => setPendingDeleteId(null)}>Cancel</Button>
                <Button variant="danger" onClick={executeDelete}>Delete Permanently</Button>
              </div>
            </div>
          );
        })()}
      </Modal>
    </div>
  );
}



ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
