  const [assetReturns, setAssetReturns] = useState({});
  const [sectorReturns, setSectorReturns] = useState({});
  const [yieldCurve, setYieldCurve] = useState([]);
  const [keyRates, setKeyRates] = useState({});
  const [loading, setLoading] = useState(true);
  const yieldCanvasRef = useRef(null);
  const yieldChartRef = useRef(null);

  // Pull all data needed for the outlook
  const loadAll = useCallback(async () => {
    setLoading(true);
    // Asset class returns — YTD, 1Y for each
    const assetSyms = ASSET_CLASSES.map(a => a.sym);
    const returns = {};
    for (const sym of assetSyms) {
      try {
        const [ytd, oneYear] = await Promise.all([
          fetchYahoo(sym, "ytd", "1d"),
          fetchYahoo(sym, "1y", "1d").catch(() => null),
        ]);
        const cleanYtd = ytd.closes.filter(c => c !== null);
        let ytdPct = null, oneYearPct = null;
        if (cleanYtd.length >= 2) ytdPct = ((cleanYtd[cleanYtd.length - 1] - cleanYtd[0]) / cleanYtd[0]) * 100;
        if (oneYear) {
          const yc = oneYear.closes.filter(c => c !== null);
          if (yc.length >= 2) oneYearPct = ((yc[yc.length - 1] - yc[0]) / yc[0]) * 100;
        }
        returns[sym] = { ytd: ytdPct, oneYear: oneYearPct };
      } catch (e) { returns[sym] = { ytd: null, oneYear: null }; }
    }
    setAssetReturns(returns);

    // Sector heatmap data (reuse SECTOR_ETFS list)
    const sectors = {};
    for (const s of SECTOR_ETFS) {
      try {
        const ytd = await fetchYahoo(s.sym, "ytd", "1d");
        const clean = ytd.closes.filter(c => c !== null);
        if (clean.length >= 2) sectors[s.sym] = ((clean[clean.length - 1] - clean[0]) / clean[0]) * 100;
      } catch (e) { sectors[s.sym] = null; }
    }
    setSectorReturns(sectors);

    // Yield curve from FRED
    try {
      const curve = await fetchYieldCurve();
      setYieldCurve(curve);
    } catch (e) {}

    // Key macro rates from FRED
    try {
      const [fed, mortgage, cpi, unemp] = await Promise.all([
        fetchFRED("DFF", 30),
        fetchFRED("MORTGAGE30US", 30),
        fetchFRED("CPIAUCSL", 90),   // CPI all urban consumers, NSA
        fetchFRED("UNRATE", 90),     // Unemployment rate
      ]);
      const latest = (arr) => arr.length > 0 ? arr[arr.length - 1].value : null;
      // For CPI: compute YoY change
      let cpiYoY = null;
      try {
        const cpiHistory = await fetchFRED("CPIAUCSL", 400);
        if (cpiHistory.length >= 12) {
          const newest = cpiHistory[cpiHistory.length - 1].value;
          const yearAgo = cpiHistory[cpiHistory.length - 13]?.value;
          if (yearAgo) cpiYoY = ((newest - yearAgo) / yearAgo) * 100;
        }
      } catch (e) {}
      setKeyRates({
        fedFunds: latest(fed),
        mortgage: latest(mortgage),
        cpiYoY,
        unemployment: latest(unemp),
      });
    } catch (e) {}

    setLoading(false);
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);
  useEffect(() => { setDraft(outlookData); }, [outlookData, editing]);

  // Yield curve chart
  useEffect(() => {
    if (!yieldCanvasRef.current || yieldCurve.length === 0) return;
    if (yieldChartRef.current) { yieldChartRef.current.destroy(); yieldChartRef.current = null; }
    const valid = yieldCurve.filter(p => p.value != null);
    if (!valid.length) return;
    yieldChartRef.current = new Chart(yieldCanvasRef.current, {
      type: "line",
      data: {
        labels: valid.map(p => p.label),
        datasets: [{
          label: "Treasury Yield (%)",
          data: valid.map(p => p.value),
          borderColor: COLORS.primary,
          backgroundColor: COLORS.primary + "22",
          fill: true, pointRadius: 5, pointBackgroundColor: COLORS.primary, borderWidth: 2.5, tension: 0.3,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { title: { display: true, text: "Yield (%)" }, ticks: { callback: (v) => v.toFixed(2) + "%" } } },
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => ctx.raw.toFixed(2) + "%" } } },
      },
    });
    return () => { if (yieldChartRef.current) yieldChartRef.current.destroy(); };
  }, [yieldCurve]);

  const handleSave = () => {
    saveOutlook(draft);
    setEditing(false);
  };

  const handleCancel = () => {
    setDraft(outlookData);
    setEditing(false);
  };

  // Inversion detection
  const tenYrVal = yieldCurve.find(p => p.label === "10Y")?.value;
  const twoYrVal = yieldCurve.find(p => p.label === "2Y")?.value;
  const inverted = (tenYrVal != null && twoYrVal != null && tenYrVal < twoYrVal);

  // Group assets by category for the returns table
  const grouped = {};
  ASSET_CLASSES.forEach(a => {
    if (!grouped[a.category]) grouped[a.category] = [];
    grouped[a.category].push(a);
  });

  return (
    <div>
      {/* Top action bar — hidden on print */}
      <div className="no-print" style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 18 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Quarterly Market Outlook</h2>
          <p style={{ color: COLORS.textMuted, fontSize: 13, margin: "4px 0 0" }}>
            Client-facing presentation. {canEdit ? "You can edit commentary as the owner." : "View-only — only Matt and Alex can edit commentary."}
          </p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {canEdit && !editing && <Button onClick={() => setEditing(true)}><IconEdit size={14} /> Edit Commentary</Button>}
          {editing && (
            <>
              <Button variant="ghost" onClick={handleCancel}>Cancel</Button>
              <Button onClick={handleSave}>Save</Button>
            </>
          )}
          {!editing && <Button variant="outline" onClick={() => window.print()}>🖨 Print</Button>}
        </div>
      </div>

      {/* === COVER PAGE === */}
      <div style={{ padding: "48px 36px", background: `linear-gradient(135deg, ${COLORS.primary} 0%, ${COLORS.primaryDark} 100%)`, color: "white", borderRadius: 16, marginBottom: 24, position: "relative", overflow: "hidden" }}>
        <div style={{ position: "absolute", top: 0, right: 0, width: 200, height: 200, background: COLORS.gold + "22", borderRadius: "50%", transform: "translate(60px, -60px)" }} />
        <div style={{ position: "relative" }}>
          <div style={{ fontSize: 13, opacity: 0.85, textTransform: "uppercase", letterSpacing: 2, fontWeight: 600 }}>Pointer Financial Group</div>
          {editing ? (
            <div style={{ display: "flex", gap: 8, marginTop: 8, marginBottom: 16 }}>
              <select value={draft.quarter} onChange={e => setDraft({ ...draft, quarter: e.target.value })}
                style={{ padding: "6px 10px", borderRadius: 6, border: "none", fontSize: 14, fontFamily: "inherit", fontWeight: 700 }}>
                <option value="Q1">Q1</option><option value="Q2">Q2</option><option value="Q3">Q3</option><option value="Q4">Q4</option>
              </select>
              <input type="number" value={draft.year} onChange={e => setDraft({ ...draft, year: e.target.value })}
                style={{ padding: "6px 10px", borderRadius: 6, border: "none", fontSize: 14, fontFamily: "inherit", fontWeight: 700, width: 100 }} />
            </div>
          ) : (
            <h1 style={{ margin: "8px 0 16px", fontSize: 42, fontWeight: 800, lineHeight: 1.1 }}>{outlookData.quarter} {outlookData.year} Market Outlook</h1>
          )}
          <div style={{ fontSize: 14, opacity: 0.9, maxWidth: 720, lineHeight: 1.7 }}>
            {editing ? (
              <textarea value={draft.thesis} onChange={e => setDraft({ ...draft, thesis: e.target.value })} rows={6}
                style={{ width: "100%", padding: 12, borderRadius: 8, border: "none", fontSize: 14, fontFamily: "inherit", lineHeight: 1.7, color: COLORS.text, background: "rgba(255,255,255,0.95)" }} />
            ) : outlookData.thesis}
          </div>
        </div>
      </div>

      {/* === SECTION 1: Cross-Asset Returns === */}
      <div style={{ marginBottom: 32 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
          <div style={{ width: 4, height: 24, background: COLORS.gold, borderRadius: 2 }} />
          <h3 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: COLORS.text }}>Cross-Asset Returns</h3>
        </div>
        <p style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 16, lineHeight: 1.5 }}>
          Year-to-date and trailing 12-month total returns across major asset classes. Data pulled live from Yahoo Finance at the time of viewing.
        </p>
        <Card style={{ padding: 0, overflow: "hidden" }}>
          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ background: COLORS.bg, textAlign: "left" }}>
                <th style={{ padding: "10px 14px", fontWeight: 600 }}>Asset Class</th>
                <th style={{ padding: "10px 14px", fontWeight: 600 }}>Symbol</th>
                <th style={{ padding: "10px 14px", fontWeight: 600, textAlign: "right" }}>YTD</th>
                <th style={{ padding: "10px 14px", fontWeight: 600, textAlign: "right" }}>1 Year</th>
              </tr>
            </thead>
            <tbody>
              {Object.entries(grouped).map(([cat, items]) => (
                <React.Fragment key={cat}>
                  <tr style={{ background: COLORS.primary + "08" }}>
                    <td colSpan={4} style={{ padding: "8px 14px", fontSize: 11, fontWeight: 700, color: COLORS.primary, textTransform: "uppercase", letterSpacing: 1 }}>{cat}</td>
                  </tr>
                  {items.map(a => {
                    const r = assetReturns[a.sym] || {};
                    return (
                      <tr key={a.sym} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                        <td style={{ padding: "10px 14px" }}>{a.name}</td>
                        <td style={{ padding: "10px 14px", color: COLORS.textMuted, fontFamily: "ui-monospace, monospace", fontSize: 12 }}>{a.sym}</td>
                        <td style={{ padding: "10px 14px", textAlign: "right", fontWeight: 700, color: r.ytd == null ? COLORS.textMuted : (r.ytd >= 0 ? COLORS.success : COLORS.danger) }}>
                          {r.ytd == null ? (loading ? "…" : "—") : (r.ytd >= 0 ? "+" : "") + r.ytd.toFixed(2) + "%"}
                        </td>
                        <td style={{ padding: "10px 14px", textAlign: "right", fontWeight: 700, color: r.oneYear == null ? COLORS.textMuted : (r.oneYear >= 0 ? COLORS.success : COLORS.danger) }}>
                          {r.oneYear == null ? (loading ? "…" : "—") : (r.oneYear >= 0 ? "+" : "") + r.oneYear.toFixed(2) + "%"}
                        </td>
                      </tr>
                    );
                  })}
                </React.Fragment>
              ))}
            </tbody>
          </table>
        </Card>
      </div>

      {/* === SECTION 2: Macro Snapshot === */}
      <div style={{ marginBottom: 32 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
          <div style={{ width: 4, height: 24, background: COLORS.gold, borderRadius: 2 }} />
          <h3 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: COLORS.text }}>Macro Snapshot</h3>
        </div>
        <p style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 16, lineHeight: 1.5 }}>
          Key macroeconomic indicators from the Federal Reserve. Latest available reading at the time of viewing.
        </p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12 }}>
          <Card style={{ padding: 18, borderLeft: `4px solid ${COLORS.primary}` }}>
            <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>Fed Funds Rate</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: COLORS.primaryDark, marginTop: 4 }}>{keyRates.fedFunds != null ? keyRates.fedFunds.toFixed(2) + "%" : (loading ? "…" : "—")}</div>
            <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 4 }}>Effective rate · daily</div>
          </Card>
          <Card style={{ padding: 18, borderLeft: `4px solid ${COLORS.gold}` }}>
            <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>CPI Inflation (YoY)</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: COLORS.text, marginTop: 4 }}>{keyRates.cpiYoY != null ? keyRates.cpiYoY.toFixed(1) + "%" : (loading ? "…" : "—")}</div>
            <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 4 }}>All Urban Consumers</div>
          </Card>
          <Card style={{ padding: 18, borderLeft: `4px solid ${COLORS.primary}` }}>
            <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>Unemployment Rate</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: COLORS.text, marginTop: 4 }}>{keyRates.unemployment != null ? keyRates.unemployment.toFixed(1) + "%" : (loading ? "…" : "—")}</div>
            <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 4 }}>U-3 · monthly</div>
          </Card>
          <Card style={{ padding: 18, borderLeft: `4px solid ${COLORS.gold}` }}>
            <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>30Y Mortgage</div>
            <div style={{ fontSize: 28, fontWeight: 800, color: COLORS.text, marginTop: 4 }}>{keyRates.mortgage != null ? keyRates.mortgage.toFixed(2) + "%" : (loading ? "…" : "—")}</div>
            <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 4 }}>US Average · weekly</div>
          </Card>
        </div>
      </div>

      {/* === SECTION 3: Treasury Yield Curve === */}
      <div style={{ marginBottom: 32 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
          <div style={{ width: 4, height: 24, background: COLORS.gold, borderRadius: 2 }} />
          <h3 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: COLORS.text }}>US Treasury Yield Curve</h3>
        </div>
        <p style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 16, lineHeight: 1.5 }}>
          Shape of the yield curve reflects market expectations for growth and inflation. {inverted ? "The curve is currently inverted between 2Y and 10Y — historically a recession leading indicator." : "The curve is currently normally shaped between 2Y and 10Y."}
        </p>
        <Card style={{ padding: 20 }}>
          <div style={{ height: 280 }}><canvas ref={yieldCanvasRef} /></div>
        </Card>
      </div>

      {/* === SECTION 4: Sector Performance === */}
      <div style={{ marginBottom: 32 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
          <div style={{ width: 4, height: 24, background: COLORS.gold, borderRadius: 2 }} />
          <h3 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: COLORS.text }}>S&P Sector Performance — YTD</h3>
        </div>
        <p style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 16, lineHeight: 1.5 }}>
          Year-to-date returns across S&P 500 sectors via SPDR sector ETFs. Helps frame which areas of the market are leading and lagging.
        </p>
        <Card style={{ padding: 18 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 6 }}>
            {SECTOR_ETFS.map(s => {
              const pct = sectorReturns[s.sym];
              return (
                <div key={s.sym} style={{ padding: "14px 10px", borderRadius: 8, background: heatColor(pct), color: "white", textAlign: "center" }}>
                  <div style={{ fontSize: 10, opacity: 0.85, fontWeight: 600, marginBottom: 4 }}>{s.name}</div>
                  <div style={{ fontSize: 16, fontWeight: 700 }}>{pct != null ? (pct >= 0 ? "+" : "") + pct.toFixed(1) + "%" : "—"}</div>
                  <div style={{ fontSize: 10, opacity: 0.8, marginTop: 2 }}>{s.sym}</div>
                </div>
              );
            })}
          </div>
        </Card>
      </div>

      {/* === SECTION 5: PointerOS Outlook (editable) === */}
      <div style={{ marginBottom: 32 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
          <div style={{ width: 4, height: 24, background: COLORS.gold, borderRadius: 2 }} />
          <h3 style={{ margin: 0, fontSize: 18, fontWeight: 700, color: COLORS.text }}>Our Outlook</h3>
        </div>

        {[
          { key: "equities", label: "US & Global Equities", icon: "📈" },
          { key: "fixedIncome", label: "Fixed Income", icon: "📊" },
          { key: "alternatives", label: "Alternatives & Real Assets", icon: "💎" },
          { key: "risks", label: "Key Risks We're Watching", icon: "⚠️" },
        ].map(section => (
          <Card key={section.key} style={{ padding: 20, marginBottom: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
              <span style={{ fontSize: 22 }}>{section.icon}</span>
              <h4 style={{ margin: 0, fontSize: 15, fontWeight: 700, color: COLORS.text }}>{section.label}</h4>
            </div>
            {editing ? (
              <textarea value={draft[section.key] || ""} onChange={e => setDraft({ ...draft, [section.key]: e.target.value })} rows={5}
                style={{ width: "100%", padding: 12, borderRadius: 8, border: `1px solid ${COLORS.border}`, fontSize: 14, fontFamily: "inherit", lineHeight: 1.7, color: COLORS.text, boxSizing: "border-box" }} />
            ) : (
              <div style={{ fontSize: 14, color: COLORS.text, lineHeight: 1.7, whiteSpace: "pre-wrap" }}>
                {outlookData[section.key] || <span style={{ color: COLORS.textMuted, fontStyle: "italic" }}>(No commentary yet)</span>}
              </div>
            )}
          </Card>
        ))}
      </div>

      {/* === SECTION 6: Closing & Disclaimer === */}
      <div style={{ marginBottom: 16 }}>
        <Card style={{ padding: 24, background: COLORS.bg, borderLeft: `4px solid ${COLORS.primary}` }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.text, marginBottom: 8 }}>Closing Thought</div>
          {editing ? (
            <textarea value={draft.closingNote || ""} onChange={e => setDraft({ ...draft, closingNote: e.target.value })} rows={3}
              style={{ width: "100%", padding: 12, borderRadius: 8, border: `1px solid ${COLORS.border}`, fontSize: 14, fontFamily: "inherit", lineHeight: 1.7, color: COLORS.text, boxSizing: "border-box" }} />
          ) : (
            <div style={{ fontSize: 14, color: COLORS.text, lineHeight: 1.7, fontStyle: "italic", marginBottom: 16 }}>
              {outlookData.closingNote}
            </div>
          )}
        </Card>
      </div>

      <Card style={{ padding: 18, background: COLORS.surface, marginBottom: 16 }}>
        <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600, marginBottom: 8 }}>Important Disclosures</div>
        <div style={{ fontSize: 11, color: COLORS.textMuted, lineHeight: 1.6 }}>
          This presentation has been prepared by Pointer Financial Group for informational purposes only. Information contained herein is believed to be accurate but is not warranted. The views expressed represent the opinions of Pointer Financial Group and are subject to change without notice. This is not a solicitation or recommendation to buy or sell any security. Past performance is not indicative of future results. All investments carry risk of loss, including possible loss of principal. Asset class data sourced from Yahoo Finance; macroeconomic indicators sourced from the Federal Reserve Bank of St. Louis (FRED). Clients should review their individual circumstances with their advisor before making investment decisions.
        </div>
      </Card>

      <div style={{ textAlign: "center", padding: 16, color: COLORS.textMuted, fontSize: 11 }}>
        Pointer Financial Group · {outlookData.quarter} {outlookData.year} Market Outlook · Generated {new Date().toLocaleDateString()}
      </div>
    </div>
  );
}

function HRToolsuiteApp({ currentUser, actualUser, viewAs, setViewAs, people, onUpdatePeople, onExit }) {
  const [page, setPage] = useState("profile");
  const [reimbursements, setReimbursements] = useState([]);
  const [companyEvents, setCompanyEvents] = useState([]);
  const [eventRequests, setEventRequests] = useState([]);   // employee-requested events awaiting master approval
  const [profileRequests, setProfileRequests] = useState([]); // requests to change locked profile fields
  const [leaveRequests, setLeaveRequests] = useState([]);   // employee time-off requests
  const [hrSettings, setHrSettings] = useState({
    notifyEmails: ["matt@pointerfg.com", "alex@pointerfg.com"],
    documents: [], // user-added documents beyond the built-ins
  });
  const [calDate, setCalDate] = useState(new Date());
  const [calFilters, setCalFilters] = useState({ holidays: true, birthdays: true, events: true });
  const isAdmin = currentUser?.isAdmin;
  const isOwnerUser = isOwner(currentUser);

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("pfg-hr-v1");
        if (r?.value) {
          const d = JSON.parse(r.value);
          setReimbursements(d.reimbursements || []);
          setCompanyEvents(d.companyEvents || []);
          setEventRequests(d.eventRequests || []);
          setProfileRequests(d.profileRequests || []);
          setLeaveRequests(d.leaveRequests || []);
          if (d.hrSettings) setHrSettings({ ...hrSettings, ...d.hrSettings });
        }
      } catch (e) {}
    })();
    // eslint-disable-next-line
  }, []);

  const saveHR = useCallback((next) => {
    const data = { reimbursements, companyEvents, eventRequests, profileRequests, leaveRequests, hrSettings, ...next };
    if (next.reimbursements) setReimbursements(next.reimbursements);
    if (next.companyEvents) setCompanyEvents(next.companyEvents);
    if (next.eventRequests) setEventRequests(next.eventRequests);
    if (next.profileRequests) setProfileRequests(next.profileRequests);
    if (next.leaveRequests) setLeaveRequests(next.leaveRequests);
    if (next.hrSettings) setHrSettings(next.hrSettings);
    try { window.storage.set("pfg-hr-v1", JSON.stringify(data)); } catch (e) { console.error(e); }
  }, [reimbursements, companyEvents, eventRequests, profileRequests, leaveRequests, hrSettings]);

  const navItems = [
    { key: "profile", icon: IconUsers, label: "My Profile" },
    { key: "reimb", icon: IconDollar, label: "Reimbursements" },
    { key: "leave", icon: IconCalendar, label: "Leave Request" },
    { key: "calendar", icon: IconCalendar, label: "Calendar" },
    { key: "documents", icon: IconClipboard, label: "Documents" },
    ...(isAdmin ? [{ key: "employees", icon: IconList, label: "Employees" }] : []),
    ...(isOwnerUser ? [{ key: "settings", icon: IconSettings, label: "Settings" }] : []),
  ];

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "#EDF2F8", fontFamily: "'DM Sans', 'Segoe UI', sans-serif", color: COLORS.text }}>
      {/* Sidebar */}
      <div style={{ width: 220, background: COLORS.surface, boxShadow: "2px 0 12px rgba(0,0,0,0.06)", zIndex: 2, display: "flex", flexDirection: "column", flexShrink: 0, position: "relative" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 4, background: COLORS.primary }} />
        <div style={{ padding: "20px 20px 12px", borderBottom: `1px solid ${COLORS.borderLight}` }}>
          <button onClick={onExit} style={{ background: "none", border: "none", cursor: "pointer", padding: 0, fontFamily: "inherit", display: "block", textAlign: "left" }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: COLORS.primary }}>PointerOS</div>
            <div style={{ fontSize: 10, color: COLORS.textDim, letterSpacing: 1.5 }}>HR Toolsuite</div>
          </button>
        </div>
        <nav style={{ flex: 1, padding: "12px 8px" }}>
          {navItems.map(n => (
            <button key={n.key} onClick={() => setPage(n.key)}
              style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 10, border: "none",
                background: page === n.key ? COLORS.primary + "0D" : "transparent",

        {page === "profile" && <HRProfileView currentUser={currentUser} reimbursements={reimbursements} people={people} onUpdatePeople={onUpdatePeople} isAdmin={isAdmin} isOwnerUser={isOwnerUser} setPage={setPage} hrSettings={hrSettings} profileRequests={profileRequests} saveHR={saveHR} />}
        {page === "reimb" && <HRReimbView currentUser={currentUser} reimbursements={reimbursements} saveHR={saveHR} isAdmin={isAdmin} hrSettings={hrSettings} />}
        {page === "leave" && <HRLeaveRequestView currentUser={currentUser} leaveRequests={leaveRequests} saveHR={saveHR} isOwnerUser={isOwnerUser} hrSettings={hrSettings} people={people} onUpdatePeople={onUpdatePeople} />}
        {page === "calendar" && <HRCalendarView calDate={calDate} setCalDate={setCalDate} calFilters={calFilters} setCalFilters={setCalFilters} people={people} companyEvents={companyEvents} eventRequests={eventRequests} saveHR={saveHR} isOwnerUser={isOwnerUser} currentUser={currentUser} hrSettings={hrSettings} />}
        {page === "documents" && <HRDocumentsView hrSettings={hrSettings} saveHR={saveHR} isOwnerUser={isOwnerUser} />}
        {page === "employees" && isAdmin && <HREmployeesView people={people} onUpdatePeople={onUpdatePeople} currentUser={currentUser} profileRequests={profileRequests} saveHR={saveHR} />}
        {page === "settings" && isOwnerUser && <HRSettingsView hrSettings={hrSettings} saveHR={saveHR} />}
      </div>
    </div>
  );
}

// ============================================================
// PTO Accrual Modal — shows year-by-year breakdown with carry-forward
// ============================================================
function PTOAccrualModal({ open, onClose, person }) {
  if (!person) return null;
  const summary = summarizePTO(person);
  const currentYear = new Date().getFullYear();
  return (
    <Modal open={open} onClose={onClose} title={`Time Off Accrual — ${person.name}`}>
      <div style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 16, lineHeight: 1.5 }}>
        Year-by-year breakdown of PTO. Unused days carry forward to the next calendar year (capped per the Employee Handbook, Part 5).
      </div>

      {/* Big balance number */}
      <div style={{ padding: "20px 24px", background: `linear-gradient(135deg, ${COLORS.primary} 0%, ${COLORS.primaryDark} 100%)`, color: "white", borderRadius: 10, marginBottom: 16 }}>
        <div style={{ fontSize: 11, opacity: 0.85, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 600 }}>Available Now</div>
        <div style={{ fontSize: 36, fontWeight: 800, lineHeight: 1, marginTop: 4 }}>
          {summary.totalAvailable}<span style={{ fontSize: 16, opacity: 0.9, marginLeft: 6, fontWeight: 400 }}>days</span>
        </div>
        <div style={{ fontSize: 12, opacity: 0.85, marginTop: 6 }}>
          {summary.totalUsedThisYear} used in {currentYear} · {summary.totalUsedAllTime} used since records began
        </div>
      </div>

      {/* Year-by-year ledger */}
      <div style={{ marginBottom: 8, fontSize: 12, fontWeight: 700, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Year Ledger</div>
      <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
        <thead>
          <tr style={{ background: COLORS.bg, textAlign: "left" }}>
            <th style={{ padding: "8px 10px", fontWeight: 600 }}>Year</th>
            <th style={{ padding: "8px 10px", fontWeight: 600, textAlign: "right" }}>Carried In</th>
            <th style={{ padding: "8px 10px", fontWeight: 600, textAlign: "right" }}>+ Allotted</th>
            <th style={{ padding: "8px 10px", fontWeight: 600, textAlign: "right" }}>− Used</th>
            <th style={{ padding: "8px 10px", fontWeight: 600, textAlign: "right" }}>= Ending</th>
          </tr>
        </thead>
        <tbody>
          {summary.years.map(y => {
            const isCurrent = y.year === currentYear;
            return (
              <tr key={y.year} style={{ borderTop: `1px solid ${COLORS.borderLight}`, background: isCurrent ? COLORS.primary + "11" : "transparent", fontWeight: isCurrent ? 600 : 400 }}>
                <td style={{ padding: "10px" }}>
                  {y.year} {isCurrent && <Badge color={COLORS.primary} style={{ marginLeft: 4 }}>NOW</Badge>}
                </td>
                <td style={{ padding: "10px", textAlign: "right" }}>{y.carriedIn}d</td>
                <td style={{ padding: "10px", textAlign: "right", color: COLORS.success }}>+{y.allot}d</td>
                <td style={{ padding: "10px", textAlign: "right", color: y.used > 0 ? COLORS.danger : COLORS.textMuted }}>{y.used > 0 ? "−" : ""}{y.used}d</td>
                <td style={{ padding: "10px", textAlign: "right", fontWeight: 700, color: COLORS.text }}>{y.endingBalance}d</td>
              </tr>
            );
          })}
        </tbody>
      </table>

      <div style={{ marginTop: 16, fontSize: 11, color: COLORS.textDim, lineHeight: 1.5 }}>
        <b>How it works:</b> Each year begins with a carry-in balance from the previous year. The annual allotment is added on Jan 1. Used days are subtracted as taken. The ending balance carries into the next year.
      </div>

      <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 16 }}>
        <Button onClick={onClose}>Close</Button>
      </div>
    </Modal>
  );
}

function HRProfileView({ currentUser, reimbursements, people, onUpdatePeople, isAdmin, isOwnerUser, setPage, hrSettings, profileRequests, saveHR }) {
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({});
  const [tab, setTab] = useState("overview");
  const [ptoModalOpen, setPtoModalOpen] = useState(false);

  // Change-request modal — for fields employees cannot edit themselves
  const [requestField, setRequestField] = useState(null); // { key, label, currentVal }
  const [requestProposed, setRequestProposed] = useState("");
  const [requestReason, setRequestReason] = useState("");

  // Whether the current user can directly edit admin-controlled fields
  const canEditAdminFields = isAdmin;
  const canEditOwnerFields = isOwnerUser;

  const openRequestModal = (key, label, currentVal) => {
    setRequestField({ key, label, currentVal });
    setRequestProposed(typeof currentVal === "boolean" ? (currentVal ? "Unenroll me" : "Enroll me") : (currentVal || ""));
    setRequestReason("");
  };
  const closeRequestModal = () => { setRequestField(null); setRequestProposed(""); setRequestReason(""); };
  const submitRequest = () => {
    if (!requestField) return;
    const req = {
      id: uid(),
      type: "profile-field",
      field: requestField.key,
      fieldLabel: requestField.label,
      currentValue: String(requestField.currentVal ?? ""),
      proposedValue: requestProposed,
      reason: requestReason,
      requestedBy: currentUser.id,
      requestedByName: currentUser.name,
      requestedByEmail: currentUser.email || "",
      status: "pending",
      submitted: new Date().toISOString(),
    };
    const next = [...(profileRequests || []), req];
    saveHR({ profileRequests: next });
    const recipients = hrSettings?.notifyEmails?.length ? hrSettings.notifyEmails : ["matt@pointerfg.com", "alex@pointerfg.com"];
    const body =
`A profile-field change request has been submitted in PointerOS.

Employee: ${currentUser.name} ${currentUser.email ? "<" + currentUser.email + ">" : ""}
Field: ${requestField.label}
Current value: ${requestField.currentVal ?? "(empty)"}
Proposed value: ${requestProposed}

Reason / notes:
${requestReason || "(none provided)"}

Approve or deny in: PointerOS → HR Toolsuite → Employees (admin view).

— Automated message from PointerOS`;
    sendEmail({
      to: recipients,
      subject: `[PFG Profile Request] ${currentUser.name} — change "${requestField.label}"`,

                    <span style={{ fontSize: 10, color: COLORS.textDim, marginLeft: 4 }}>Owner only</span>
                  </div>
                  <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 2 }}>

          {/* Unpaid Leaves — admin-only edit, employee can request */}

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, flexWrap: "wrap", gap: 8 }}>
