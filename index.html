                  <span style={{ fontSize: 9, color: kindColor[r.kind] || COLORS.textMuted, fontWeight: 700, letterSpacing: 1, padding: "2px 6px", background: (kindColor[r.kind] || COLORS.textMuted) + "18", borderRadius: 4, flexShrink: 0 }}>{kindLabel[r.kind] || "OPEN"}</span>
                </button>
              </React.Fragment>
            );
          })}
        </div>
        <div style={{ padding: "8px 14px", borderTop: `1px solid ${COLORS.borderLight}`, fontSize: 10, color: COLORS.textDim, display: "flex", justifyContent: "space-between", background: COLORS.bg }}>
          <span>↑ ↓ navigate · Enter select</span>
          <span>Cmd/Ctrl + K toggles</span>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// KEYBOARD SHORTCUTS HELP MODAL
// Opened by pressing "?" (Shift + /). Lists the small set of global shortcuts
// so users can discover the Command Palette and other keyboard flows.
// ============================================================
function ShortcutsHelpModal({ open, onClose }) {
  if (!open) return null;
  const isMac = typeof navigator !== "undefined" && /Mac|iPhone|iPad|iPod/.test(navigator.platform || "");
  const modKey = isMac ? "⌘" : "Ctrl";
  const shortcuts = [
    { keys: [modKey, "K"], label: "Open command palette · search employees, stocks, and pages" },
    { keys: ["?"],          label: "Show this shortcut help" },
    { keys: ["Esc"],        label: "Close open palette or modal" },
    { keys: ["↑", "↓"],     label: "Navigate palette results" },
    { keys: ["Enter"],       label: "Select highlighted result" },
  ];
  return (
    <div onClick={onClose} className="no-print" style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(11, 40, 83, 0.4)", zIndex: 10000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: COLORS.surface, width: "min(480px, 92vw)", borderRadius: 12, boxShadow: "0 20px 60px rgba(0,0,0,0.3)", overflow: "hidden", border: `1px solid ${COLORS.borderLight}` }}>
        <div style={{ padding: "14px 18px", borderBottom: `1px solid ${COLORS.borderLight}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.text }}>⌨️ Keyboard Shortcuts</div>
            <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2 }}>Press <b>?</b> anywhere (except inside inputs) to bring this back</div>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: COLORS.textMuted, fontSize: 20, cursor: "pointer", padding: 4, fontFamily: "inherit", lineHeight: 1 }} aria-label="Close">×</button>
        </div>
        <div style={{ padding: "12px 18px 18px" }}>
          {shortcuts.map((s, i) => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "8px 0", borderTop: i === 0 ? "none" : `1px solid ${COLORS.borderLight}` }}>
              <div style={{ display: "flex", gap: 4, minWidth: 120 }}>
                {s.keys.map((k, j) => (
                  <React.Fragment key={j}>
                    {j > 0 && <span style={{ fontSize: 11, color: COLORS.textDim, alignSelf: "center" }}>+</span>}
                    <kbd style={{ padding: "3px 8px", background: COLORS.bg, border: `1px solid ${COLORS.borderLight}`, borderRadius: 4, fontFamily: "ui-monospace, monospace", fontSize: 11, fontWeight: 700, color: COLORS.text, minWidth: 24, textAlign: "center" }}>{k}</kbd>
                  </React.Fragment>
                ))}
              </div>
              <div style={{ fontSize: 12, color: COLORS.textMuted, flex: 1 }}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  // --- State ---
  const [currentUser, setCurrentUser] = useState(null);
  const [loginUser, setLoginUser] = useState("");
  const [loginPass, setLoginPass] = useState("");
  const [loginPassConfirm, setLoginPassConfirm] = useState("");

  const [people, setPeople] = useState(INITIAL_PEOPLE);
  const [plans, setPlans] = useState([]);
  const [taskTemplates, setTaskTemplates] = useState(TASK_TEMPLATES);
  const [batchTemplates, setBatchTemplates] = useState(BATCH_TEMPLATES);
  const [batchTasks, setBatchTasks] = useState([]);

  const [page, setPage] = useState("dashboard");
  const [selectedPlanId, setSelectedPlanId] = useState(null);
  const [searchQuery, setSearchQuery] = useState("");
  const [segmentFilter, setSegmentFilter] = useState("All");
  const [showArchived, setShowArchived] = useState(false);

  // Load/save to storage
  useEffect(() => {
    const load = async () => {
      try {
        const res = await window.storage.get("crm-data-v5");
        if (res?.value) {
          const d = JSON.parse(res.value);
          if (d.people) setPeople(d.people.map(p => {
            // Migration: legacy plaintext "password" field is dropped. Anyone with
            // legacy data must set a new password on next login (passwordHash=null).
            // If they already have a passwordHash, preserve it.
            const { password, ...rest } = p;
            return { ...rest, passwordHash: p.passwordHash ?? null, isAdmin: p.isAdmin ?? false, profileSetupComplete: p.profileSetupComplete ?? true };
          }));
          if (d.plans && d.plans.length > 0) setPlans(d.plans);
          else setPlans([SAMPLE_PLAN]);
          if (d.taskTemplates) setTaskTemplates(d.taskTemplates);
          if (d.batchTemplates) setBatchTemplates(d.batchTemplates);
          if (d.batchTasks) setBatchTasks(d.batchTasks);
        } else {
          // First load: seed with the sample plan so users see what fields exist
          setPlans([SAMPLE_PLAN]);
        }
      } catch (e) { setPlans([SAMPLE_PLAN]); }
    };
    load().then(() => {
      // Auto-generate batch tasks 2 years out
      setBatchTasks(prev => {
        const now = new Date();
        const years = [now.getFullYear(), now.getFullYear() + 1];
        const existing = prev || [];
        const existingKeys = new Set(existing.map(t => t.name + "|" + t.dueDate));
        const newTasks = [];
        years.forEach(year => {
          BATCH_TEMPLATES.forEach(tmpl => {
            tmpl.months.forEach(month => {
              const parentDueDate = new Date(year, month - 1, 28).toISOString().split("T")[0];
              if (tmpl.subtasks && tmpl.subtasks.length > 0) {
                const firstKey = (typeof tmpl.subtasks[0] === "string" ? tmpl.subtasks[0] : tmpl.subtasks[0].name) + "|" + parentDueDate;
                if (existingKeys.has(firstKey)) return;
                const groupId = uid();
                tmpl.subtasks.forEach((sub, si) => {
                  const subName = typeof sub === "string" ? sub : sub.name;
                  const subRole = typeof sub === "string" ? tmpl.role : (sub.role || tmpl.role);
                  const bizDays = typeof sub === "string" ? 0 : (sub.bizDaysBefore || 0);
                  const subDue = bizDays > 0 ? subtractBusinessDays(parentDueDate, bizDays) : parentDueDate;
                  newTasks.push({ id: uid(), name: subName, parentTask: tmpl.name, parentDueDate, groupId, frequency: tmpl.frequency, assignedRole: subRole, dueDate: subDue, completedAt: null, completedBy: null, note: "", month, order: si, isBatch: true });
                });
              } else {
                const key = tmpl.name + "|" + parentDueDate;
                if (existingKeys.has(key)) return;
                newTasks.push({ id: uid(), name: tmpl.name, frequency: tmpl.frequency, assignedRole: tmpl.role, dueDate: parentDueDate, completedAt: null, completedBy: null, note: "", month, isBatch: true });
              }
            });
          });
        });
        if (newTasks.length > 0) return [...existing, ...newTasks];
        return existing;
      });
    });
  }, []);

  const saveData = useCallback(async (newPlans, newPeople, newTemplates, newBatchTemplates, newBatchTasks) => {
    const data = { people: newPeople || people, plans: newPlans || plans, taskTemplates: newTemplates || taskTemplates, batchTemplates: newBatchTemplates || batchTemplates, batchTasks: newBatchTasks || batchTasks };
    try { await window.storage.set("crm-data-v5", JSON.stringify(data)); } catch(e) { console.error(e); }
  }, [people, plans, taskTemplates, batchTemplates, batchTasks]);

  const updatePlans = (p) => { setPlans(p); saveData(p, null, null, null, null); };
  const updatePeople = (p) => { setPeople(p); saveData(null, p, null, null, null); };
  const updateTemplates = (t) => { setTaskTemplates(t); saveData(null, null, t, null, null); };
  const updateBatchTasks = (bt) => { setBatchTasks(bt); saveData(null, null, null, null, bt); };

  const [loginError, setLoginError] = useState("");
  const [selectedApp, setSelectedApp] = useState(null);
  // Optional deep-link target into HR. When set, the HR Toolsuite mounts on that page.
  // Cleared as soon as it's been consumed so subsequent navigation behaves normally.
  const [hrInitialPage, setHrInitialPage] = useState(null);
  const openHR = (page) => { setHrInitialPage(page || null); setSelectedApp("hr"); };
  const [viewAs, setViewAs] = useState("self"); // "self" | "employee" — owners can preview employee experience

  // Command palette (Cmd/Ctrl + K) — global keyboard shortcut opens a fuzzy search
  // over employees, stocks, and app sections. Only bound once currentUser is present
  // so it doesn't fire on the login screen.
  const [cmdOpen, setCmdOpen] = useState(false);
  // Keyboard shortcuts help modal — opens on `?` (Shift+/) so users can discover the palette.
  const [shortcutsOpen, setShortcutsOpen] = useState(false);
  useEffect(() => {
    if (!currentUser) return;
    const onKey = (e) => {
      // Don't fire shortcuts while typing in inputs/textareas
      const t = e.target;
      const inField = t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.tagName === "SELECT" || t.isContentEditable);
      const isCmdK = (e.metaKey || e.ctrlKey) && (e.key === "k" || e.key === "K");
      if (isCmdK) { e.preventDefault(); setCmdOpen(o => !o); return; }
      if (e.key === "Escape") {
        if (cmdOpen) setCmdOpen(false);
        if (shortcutsOpen) setShortcutsOpen(false);
        return;
      }
      // Show shortcut help on plain '?' (Shift+/) when not typing in a field
      if (!inField && e.key === "?" && !e.metaKey && !e.ctrlKey && !e.altKey) {
        e.preventDefault(); setShortcutsOpen(true);
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [currentUser, cmdOpen, shortcutsOpen]);

  // Home dashboard tile badges — pending counts computed from storage so users
  // see actionable numbers on the landing screen tiles at-a-glance.
  //   hrPending: owner-visible sum of pending leaves + reimbursements + banked PTO + profile requests
  //   retirementOverdue: overdue tasks assigned to the current user across all plans
  const [homeBadges, setHomeBadges] = useState({ hrPending: 0, retirementOverdue: 0 });
  useEffect(() => {
    if (!currentUser || selectedApp !== null) return;   // only when on home
    let cancelled = false;
    (async () => {
      const badges = { hrPending: 0, retirementOverdue: 0 };
      // HR — owner-only pending counts
      if (currentUser.isOwner) {
        try {
          const r = await window.storage.get("pfg-hr-v1");
          const d = r?.value ? JSON.parse(r.value) : {};
          const leaves = (d.leaveRequests || []).filter(x => x.status === "submitted").length;
          const reimb  = (d.reimbursements || []).filter(x => {
            const s = x.status || "submitted";
            return s === "submitted" || s === "pending" || s === "inProgress";
          }).length;
          const banked = (d.bankedPto || []).filter(x => x.status === "submitted").length;
          const profile = (d.profileRequests || []).filter(x => x.status === "pending").length;
          badges.hrPending = leaves + reimb + banked + profile;
        } catch (e) {}
      }
      // Retirement — overdue tasks assigned to current user
      if (currentUser.isOwner) {
        try {
          const r = await window.storage.get("crm-data-v5");
          const d = r?.value ? JSON.parse(r.value) : {};
          const plans = d.plans || [];
          const today = new Date(); today.setHours(0, 0, 0, 0);
          let overdue = 0;
          plans.forEach(plan => {
            if (plan.archived) return;
            (plan.tasks || []).forEach(t => {
              const assigned = plan.roles?.[t.assignedRole];
              if (assigned !== currentUser.id) return;
              if (t.completedAt) return;
              if (t.dueDate && new Date(t.dueDate) < today) overdue++;
            });
          });
          badges.retirementOverdue = overdue;
        } catch (e) {}
      }
      if (!cancelled) setHomeBadges(badges);
    })();
    return () => { cancelled = true; };
  }, [currentUser, selectedApp]);

  // Effective user: if the actual user is an owner and they've chosen to preview as employee,
  // we synthesize a downgraded user object that downstream code uses for permission checks.
  const effectiveUser = useMemo(() => {
    if (!currentUser) return null;
    if (viewAs === "employee" && currentUser.isOwner) {
      return { ...currentUser, isOwner: false, isAdmin: false, _previewingAsEmployee: true };
    }
    return currentUser;
  }, [currentUser, viewAs]);

  // --- Login Screen ---
  if (!currentUser) {
    // Mode: "login" (existing user with password), "setPassword" (first login or unset)
    const selectedUser = loginUser ? people.find(p => p.id === loginUser) : null;
    const needsPasswordSet = selectedUser && !selectedUser.passwordHash;
    const mode = needsPasswordSet ? "setPassword" : "login";

    const handleLogin = async () => {
      if (!loginUser) return;
      const user = people.find(p => p.id === loginUser);
      if (!user) { setLoginError("User not found"); return; }
      if (!user.passwordHash) {
        // Shouldn't get here if mode logic is right, but defensive
        setLoginError("This account has no password set yet. Use 'Set password' below.");
        return;
      }
      const inputHash = await hashPassword(loginPass);
      if (user.passwordHash !== inputHash) { setLoginError("Incorrect password"); return; }
      setCurrentUser(user); setLoginPass(""); setLoginError("");
    };

    const handleSetPassword = async () => {
      if (!loginUser) return;
      if (loginPass.length < 6) { setLoginError("Password must be at least 6 characters"); return; }
      if (loginPass !== loginPassConfirm) { setLoginError("Passwords don't match"); return; }
      const newHash = await hashPassword(loginPass);
      const updatedPeople = people.map(p => p.id === loginUser ? { ...p, passwordHash: newHash } : p);
      setPeople(updatedPeople);
      // Persist immediately so the password survives reload
      try { await window.storage.set("crm-data-v5", JSON.stringify({ people: updatedPeople, plans, taskTemplates, batchTemplates, batchTasks })); } catch (e) {}
      const updatedUser = updatedPeople.find(p => p.id === loginUser);
      setCurrentUser(updatedUser);
      setLoginPass(""); setLoginPassConfirm(""); setLoginError("");
    };

    return (
      <div style={{ minHeight: "100vh", background: "#EDF2F8", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'DM Sans', 'Segoe UI', sans-serif" }}>
        <div style={{ width: 420, padding: 40, background: COLORS.surface, borderRadius: 20, border: `1px solid ${COLORS.border}`, boxShadow: "0 24px 64px rgba(0,0,0,0.08)" }}>
          <div style={{ textAlign: "center", marginBottom: 32 }}>
            <div style={{ fontSize: 36, fontWeight: 800, color: COLORS.primary, marginBottom: 4 }}>PointerOS</div>
            <div style={{ color: COLORS.textMuted, fontSize: 13, letterSpacing: 2 }}>Loyalty · Altruism · Expertise</div>
          </div>
          <Select label="User" value={loginUser} onChange={v => { setLoginUser(v); setLoginError(""); setLoginPass(""); setLoginPassConfirm(""); }} options={people.filter(p => p.active).map(p => ({ value: p.id, label: p.name }))} placeholder="Select your name" />

          {mode === "login" && (
            <>
              <Input label="Password" type="password" value={loginPass} onChange={v => { setLoginPass(v); setLoginError(""); }} placeholder="Enter your password"
                onKeyDown={e => { if (e.key === "Enter") handleLogin(); }} />
              {loginError && <div style={{ color: COLORS.danger, fontSize: 12, marginBottom: 8, textAlign: "center" }}>{loginError}</div>}
              <Button style={{ width: "100%", justifyContent: "center", marginTop: 8, padding: "12px 0" }} onClick={handleLogin}>
                Sign In
              </Button>
            </>
          )}

          {mode === "setPassword" && (
            <>
              <div style={{ padding: 14, background: COLORS.gold + "22", borderRadius: 8, marginBottom: 14, fontSize: 12, color: COLORS.text, lineHeight: 1.5, borderLeft: `3px solid ${COLORS.gold}` }}>
                <b>Welcome, {selectedUser.name}.</b> This is your first sign-in. Set a password — at least 6 characters. Only you will know it.
              </div>
              <Input label="New Password" type="password" value={loginPass} onChange={v => { setLoginPass(v); setLoginError(""); }} placeholder="Create your password" />
              <Input label="Confirm Password" type="password" value={loginPassConfirm} onChange={v => { setLoginPassConfirm(v); setLoginError(""); }} placeholder="Re-enter password"
                onKeyDown={e => { if (e.key === "Enter") handleSetPassword(); }} />
              {loginError && <div style={{ color: COLORS.danger, fontSize: 12, marginBottom: 8, textAlign: "center" }}>{loginError}</div>}
              <Button style={{ width: "100%", justifyContent: "center", marginTop: 8, padding: "12px 0" }} onClick={handleSetPassword}>
                Set Password & Sign In
              </Button>
              <div style={{ textAlign: "center", marginTop: 14, fontSize: 11, color: COLORS.textDim, lineHeight: 1.5 }}>
                Passwords are stored hashed (SHA-256) in this browser only. They don't sync across devices. Masters can't see or reset it — only you can.
              </div>
            </>
          )}
        </div>
      </div>
    );
  }

  // --- Profile Setup Wizard (first login after password set) ---
  // Triggered when the user's profileSetupComplete flag is false.
  // Old localStorage records default to true on migration so this doesn't ambush existing users.
  if (currentUser && currentUser.profileSetupComplete === false) {
    const applyAndContinue = (updates) => {
      const updatedPeople = people.map(p => p.id === currentUser.id ? { ...p, ...updates } : p);
      updatePeople(updatedPeople);
      setCurrentUser({ ...currentUser, ...updates });
    };
    const skipForNow = () => {
      // Mark complete so the wizard doesn't re-appear; they can still edit later in HR → My Profile.
      applyAndContinue({ profileSetupComplete: true });
    };
    return (
      <ProfileSetupWizard
        user={currentUser}
        onComplete={applyAndContinue}
        onSkip={skipForNow}
      />
    );
  }

  // --- Landing Page (App Selector) ---
  // Central helper: navigation targets from the CommandPalette. Defined here so it's
  // available for all branches including the home landing.
  const cmdNavigate = (target, sub) => {
    if (target === "home") { setSelectedApp(null); return; }
    if (target === "hr") { openHR(sub || null); return; }
    if (target === "investments") { setSelectedApp("investments"); return; }
    if (target === "retirement") { setSelectedApp("retirement"); return; }
    if (target === "risk") { setSelectedApp("risk"); return; }
  };
  const paletteEl = <>
    <CommandPalette open={cmdOpen} onClose={() => setCmdOpen(false)} people={people} isOwnerUser={currentUser?.isOwner} onNavigate={cmdNavigate} />
    <ShortcutsHelpModal open={shortcutsOpen} onClose={() => setShortcutsOpen(false)} />
  </>;

  if (!selectedApp) {
    return (
      <div style={{ minHeight: "100vh", background: "#EDF2F8", fontFamily: "'DM Sans', 'Segoe UI', sans-serif", color: COLORS.text }}>
        <div style={{ maxWidth: 900, margin: "0 auto", padding: "60px 32px" }}>
          {/* View-as switcher banner for owners — also surfaces here so Matt/Alex can preview the home dashboard
              the way regular employees see it. Investment + Retirement modules ignore the toggle (they always
              show full content for Matt/Alex), but the landing tiles disappear when previewing as employee. */}
          {currentUser.isOwner && (
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, padding: "10px 16px", background: COLORS.surface, borderRadius: 10, border: `1px solid ${COLORS.border}` }}>
              <div style={{ fontSize: 12, color: COLORS.textMuted }}>
                {viewAs === "employee" ? (
                  <span><b style={{ color: COLORS.warning }}>Previewing the employee experience</b> — Investment & Retirement tiles hidden. Switch back to Master view to access them.</span>
                ) : (
                  <span>You're signed in as a <b>Master</b>. Switch to preview what a regular employee sees on this dashboard.</span>
                )}
              </div>
              <ViewSwitcher actualUser={currentUser} viewAs={viewAs} setViewAs={setViewAs} />
            </div>
          )}
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={{ fontSize: 42, fontWeight: 800, color: COLORS.primary, marginBottom: 6 }}>PointerOS</div>
            <div style={{ color: COLORS.textMuted, fontSize: 14, letterSpacing: 2 }}>Loyalty · Altruism · Expertise</div>
            <div style={{ color: COLORS.textDim, fontSize: 13, marginTop: 12 }}>Welcome back, {currentUser.name}</div>
          </div>
          <AnnouncementsCard currentUser={currentUser} onOpenHR={(p) => openHR(p)} />
          <OwnerActionItems onOpenHR={(p) => openHR(p)} isOwnerUser={currentUser?.isOwner} />
          <RecentActivityCard currentUser={currentUser} isOwnerUser={currentUser?.isOwner} onOpenHR={(p) => openHR(p)} />
          <HomeDashboardPeek people={people} onOpenHR={(p) => openHR(p)} isOwnerUser={currentUser?.isOwner} />

          {/* Quick Actions — fast-access buttons that deep-link into HR pages.
              Only show actions relevant to the current user's profile (e.g., Bank PTO and
              Submit Leave are hidden for ptoApplicable === false users like Matt/Shelly/Alex
              when they're in master view; visible if they switch to employee preview). */}
          {(() => {
            const acts = [];
            acts.push({ key: "reimb", icon: "💳", label: "Submit Reimbursement", page: "reimb" });
            acts.push({ key: "remote", icon: "🏠", label: "Log Remote Day", page: "remote" });
            if (effectiveUser.ptoApplicable !== false) {
              acts.push({ key: "leave", icon: "🏖", label: "Submit Leave Request", page: "leave" });
              acts.push({ key: "bank", icon: "🏦", label: "Bank PTO", page: "leave" });
            }
            return (
              <div style={{ marginBottom: 18 }}>
                <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 700, marginBottom: 8 }}>⚡ Quick Actions</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 10 }}>
                  {acts.map(a => (
                    <button key={a.key} onClick={() => openHR(a.page)}
                      style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", background: COLORS.surface, border: `1px solid ${COLORS.borderLight}`, borderRadius: 10, cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 600, color: COLORS.text, textAlign: "left", transition: "all 0.15s" }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor = COLORS.primary; e.currentTarget.style.background = COLORS.primary + "08"; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor = COLORS.borderLight; e.currentTarget.style.background = COLORS.surface; }}>
                      <span style={{ fontSize: 18 }}>{a.icon}</span>
                      <span style={{ flex: 1 }}>{a.label}</span>
                      <span style={{ color: COLORS.textDim, fontSize: 14 }}>→</span>
                    </button>
                  ))}
                </div>
              </div>
            );
          })()}

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            {/* Active App — Retirement Plan Management (MASTERS ONLY — respects view-switcher) */}
            {effectiveUser.isOwner && (
              <div onClick={() => setSelectedApp("retirement")} style={{ background: COLORS.surface, borderRadius: 16, border: `1px solid ${COLORS.primary}44`, padding: 32, cursor: "pointer", transition: "all 0.2s", position: "relative", overflow: "hidden" }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = COLORS.primary; e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 24px rgba(59,130,246,0.15)"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = COLORS.primary + "44"; e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}>
                {homeBadges.retirementOverdue > 0 && (
                  <div style={{ position: "absolute", top: 14, right: 14, padding: "4px 9px", background: COLORS.danger, color: "white", borderRadius: 12, fontSize: 10, fontWeight: 800, boxShadow: "0 2px 6px rgba(217,83,79,0.35)", letterSpacing: 0.3 }} title={`${homeBadges.retirementOverdue} overdue retirement task${homeBadges.retirementOverdue === 1 ? "" : "s"}`}>
                    {homeBadges.retirementOverdue} OVERDUE
                  </div>
                )}
                <div style={{ fontSize: 28, marginBottom: 12 }}>📊</div>
                <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 6 }}>Retirement Plan Management</div>
                <div style={{ fontSize: 13, color: COLORS.textMuted, lineHeight: 1.5 }}>Manage 401(k) plans, workflows, tasks, assets, and participants across your entire book.</div>
                <Badge color={COLORS.success} style={{ marginTop: 12 }}>Active</Badge>
              </div>
            )}
            {/* Active: Investment Dashboard (MASTERS ONLY — respects view-switcher) */}
            {effectiveUser.isOwner && (
              <div onClick={() => setSelectedApp("investments")} style={{ background: COLORS.surface, borderRadius: 16, border: `1px solid ${COLORS.primary}44`, padding: 32, cursor: "pointer", transition: "all 0.2s", position: "relative", overflow: "hidden" }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = COLORS.primary; e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 24px rgba(59,130,246,0.15)"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = COLORS.primary + "44"; e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}>
                <div style={{ fontSize: 28, marginBottom: 12 }}>📈</div>
                <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 6 }}>Investment Dashboard</div>
                <div style={{ fontSize: 13, color: COLORS.textMuted, lineHeight: 1.5 }}>Market snapshot, model performance, options positions, benchmark comparisons.</div>
                <Badge color={COLORS.success} style={{ marginTop: 12 }}>Active</Badge>
              </div>
            )}
            {/* Coming Soon: Marketing Hub */}
            <div style={{ background: COLORS.surface, borderRadius: 16, border: `1px solid ${COLORS.border}`, padding: 32, opacity: 0.5 }}>
              <div style={{ fontSize: 28, marginBottom: 12 }}>📣</div>
              <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 6 }}>Marketing Hub</div>
              <div style={{ fontSize: 13, color: COLORS.textMuted, lineHeight: 1.5 }}>Manage campaigns, track outreach, and coordinate webinars and events.</div>
              <Badge color={COLORS.textDim} style={{ marginTop: 12 }}>Coming Soon</Badge>
            </div>
            {/* Active: HR Toolsuite */}
            <div onClick={() => setSelectedApp("hr")} style={{ background: COLORS.surface, borderRadius: 16, border: `1px solid ${COLORS.primary}44`, padding: 32, cursor: "pointer", transition: "all 0.2s", position: "relative", overflow: "hidden" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = COLORS.primary; e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 24px rgba(59,130,246,0.15)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = COLORS.primary + "44"; e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}>
              {homeBadges.hrPending > 0 && (
                <div style={{ position: "absolute", top: 14, right: 14, padding: "4px 9px", background: COLORS.gold, color: COLORS.primaryDark, borderRadius: 12, fontSize: 10, fontWeight: 800, boxShadow: "0 2px 6px rgba(234,200,46,0.35)", letterSpacing: 0.3 }} title={`${homeBadges.hrPending} HR item${homeBadges.hrPending === 1 ? "" : "s"} awaiting review`}>
                  {homeBadges.hrPending} PENDING
                </div>
              )}
              <div style={{ fontSize: 28, marginBottom: 12 }}>👥</div>
              <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 6 }}>HR Toolsuite</div>
              <div style={{ fontSize: 13, color: COLORS.textMuted, lineHeight: 1.5 }}>Profiles, Paid Time Off (PTO) tracking, reimbursements, master calendar with birthdays and events.</div>
              <Badge color={COLORS.success} style={{ marginTop: 12 }}>Active</Badge>
            </div>
            {/* Active: Risk Profile */}
            <div onClick={() => setSelectedApp("risk")} style={{ background: COLORS.surface, borderRadius: 16, border: `1px solid ${COLORS.gold}66`, padding: 32, cursor: "pointer", transition: "all 0.2s", position: "relative", overflow: "hidden" }}
              onMouseEnter={e => { e.currentTarget.style.borderColor = COLORS.gold; e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.boxShadow = "0 8px 24px rgba(234,200,46,0.18)"; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = COLORS.gold + "66"; e.currentTarget.style.transform = "none"; e.currentTarget.style.boxShadow = "none"; }}>
              <div style={{ fontSize: 28, marginBottom: 12 }}>🎯</div>
              <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 6 }}>Risk Profile</div>
              <div style={{ fontSize: 13, color: COLORS.textMuted, lineHeight: 1.5 }}>Emotional, narrative-driven risk tolerance questionnaire. Use in client meetings, generate summary email.</div>
              <Badge color={COLORS.gold} style={{ marginTop: 12, color: "#0B2853" }}>Active</Badge>
            </div>
          </div>

          <div style={{ textAlign: "center", marginTop: 32 }}>
            <button onClick={() => { setCurrentUser(null); setSelectedApp(null); }} style={{ background: "none", border: "none", color: COLORS.textDim, fontSize: 12, cursor: "pointer", fontFamily: "inherit", display: "inline-flex", alignItems: "center", gap: 6 }}>
              <IconLogout size={14} /> Sign out
            </button>
            <div style={{ marginTop: 10, fontSize: 10, color: COLORS.textDim }}>
              Tip: Press <kbd style={{ padding: "1px 5px", background: COLORS.surface, border: `1px solid ${COLORS.borderLight}`, borderRadius: 3, fontFamily: "ui-monospace, monospace", fontSize: 10 }}>Cmd</kbd> + <kbd style={{ padding: "1px 5px", background: COLORS.surface, border: `1px solid ${COLORS.borderLight}`, borderRadius: 3, fontFamily: "ui-monospace, monospace", fontSize: 10 }}>K</kbd> to search anything · <kbd style={{ padding: "1px 5px", background: COLORS.surface, border: `1px solid ${COLORS.borderLight}`, borderRadius: 3, fontFamily: "ui-monospace, monospace", fontSize: 10 }}>?</kbd> for keyboard shortcuts
            </div>
          </div>
        </div>
        {paletteEl}
      </div>
    );
  }

  // --- Defensive access control: non-masters can't reach restricted modules ---
  if ((selectedApp === "investments" || selectedApp === "retirement") && !currentUser.isOwner) {
    // Silently bounce back to landing
    setTimeout(() => setSelectedApp(null), 0);
    return null;
  }

  // --- Investment Dashboard Module ---
  if (selectedApp === "investments") {
    return <>
      <InvestmentDashboardApp currentUser={effectiveUser} actualUser={currentUser} viewAs={viewAs} setViewAs={setViewAs} people={people} onExit={() => setSelectedApp(null)} />
      {paletteEl}
    </>;
  }

  // --- HR Toolsuite Module ---
  if (selectedApp === "hr") {
    return <>
      <HRToolsuiteApp currentUser={effectiveUser} actualUser={currentUser} viewAs={viewAs} setViewAs={setViewAs} people={people} onUpdatePeople={updatePeople} initialPage={hrInitialPage} onInitialPageConsumed={() => setHrInitialPage(null)} onExit={() => { setHrInitialPage(null); setSelectedApp(null); }} />
      {paletteEl}
    </>;
  }

  // --- Risk Profile Toolsuite ---
  if (selectedApp === "risk") {
    return <>
      <RiskProfileToolsuite currentUser={effectiveUser} onExit={() => setSelectedApp(null)} />
      {paletteEl}
    </>;
  }

  const selectedPlan = plans.find(p => p.id === selectedPlanId);
  const activePlans = plans.filter(p => !p.archived);
  const archivedPlans = plans.filter(p => p.archived);
  const filteredPlans = (showArchived ? archivedPlans : activePlans).filter(p => {
    if (segmentFilter !== "All" && p.segment !== segmentFilter) return false;
    if (searchQuery && !p.name.toLowerCase().includes(searchQuery.toLowerCase()) && !p.planNumber?.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    return true;
  });

  const totalAssets = activePlans.reduce((s, p) => s + (p.assetHistory?.length ? p.assetHistory[p.assetHistory.length - 1].total : 0), 0);
  const totalParticipants = activePlans.reduce((s, p) => s + (p.participants?.total || 0), 0);

  // --- Navigation ---
  const navItems = [
    { key: "dashboard", icon: IconHome, label: "Dashboard" },
    { key: "plans", icon: IconList, label: "Plans" },
    { key: "workflows", icon: IconClipboard, label: "Workflows" },
    { key: "templates", icon: IconSettings, label: "Templates" },
    { key: "trends", icon: IconTrend, label: "Trends" },
  ];

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "#EDF2F8", fontFamily: "'DM Sans', 'Segoe UI', sans-serif", color: COLORS.text }}>
      {/* Sidebar */}
      <div className="no-print" style={{ width: 220, background: COLORS.surface, boxShadow: "2px 0 12px rgba(0,0,0,0.06)", zIndex: 2, display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 4, background: COLORS.primary, borderRadius: "0 2px 2px 0" }} />
        <div style={{ padding: "20px 20px 12px", borderBottom: `1px solid ${COLORS.borderLight}` }}>
          <button onClick={() => setSelectedApp(null)} style={{ background: "none", border: "none", cursor: "pointer", padding: 0, fontFamily: "inherit", display: "block" }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: COLORS.primary }}>PointerOS</div>
            <div style={{ fontSize: 10, color: COLORS.textDim, letterSpacing: 1.5 }}>Retirement Plan Management</div>
          </button>
          <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 6 }}>{activePlans.length} plans managed</div>
        </div>
        <nav style={{ flex: 1, padding: "12px 8px" }}>
          {navItems.map(n => (
            <button key={n.key} onClick={() => { setPage(n.key); setSelectedPlanId(null); }}
              style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 10, border: "none",
                background: page === n.key ? COLORS.primary + "0D" : "transparent",
                color: page === n.key ? COLORS.primary : COLORS.textMuted,
                fontSize: 13, fontWeight: page === n.key ? 600 : 500, borderLeft: page === n.key ? `3px solid ${COLORS.primary}` : "3px solid transparent", cursor: "pointer", marginBottom: 2, fontFamily: "inherit", transition: "all 0.15s" }}>
              <n.icon size={18} /> {n.label}
            </button>
          ))}
        </nav>
        <div style={{ padding: 16, borderTop: `1px solid ${COLORS.borderLight}` }}>
          <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 8 }}>{currentUser.name}</div>
          <button onClick={() => setSelectedApp(null)} style={{ background: "none", border: "none", color: COLORS.primary, fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: "inherit", marginBottom: 4 }}>
            <IconChevron size={14} style={{ transform: "rotate(180deg)" }} /> Back to PointerOS
          </button>
          <button onClick={() => { setCurrentUser(null); setSelectedApp(null); }} style={{ background: "none", border: "none", color: COLORS.textDim, fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: "inherit" }}>
            <IconLogout size={14} /> Sign out
          </button>
        </div>
      </div>

      {/* Main Content */}
      <div style={{ flex: 1, overflow: "auto", padding: 28 }}>
        {page === "dashboard" && <DashboardPage plans={activePlans} totalAssets={totalAssets} totalParticipants={totalParticipants} segmentFilter={segmentFilter} setSegmentFilter={setSegmentFilter} onSelectPlan={(id) => { setSelectedPlanId(id); setPage("plans"); }} currentUser={currentUser} people={people} onCompleteTask={(planId, taskId) => {
          // Quick-complete a task from the dashboard without opening the plan.
          // Finds the plan, stamps completedAt on the task, and persists.
          const now = new Date().toISOString();
          const nextPlans = plans.map(plan => {
            if (plan.id !== planId) return plan;
            return { ...plan, tasks: (plan.tasks || []).map(t => t.id === taskId ? { ...t, completedAt: now, completedBy: currentUser.name } : t) };
          });
          updatePlans(nextPlans);
        }} />}
        {page === "plans" && !selectedPlanId && <PlansListPage plans={filteredPlans} searchQuery={searchQuery} setSearchQuery={setSearchQuery} segmentFilter={segmentFilter} setSegmentFilter={setSegmentFilter} onSelectPlan={(id) => setSelectedPlanId(id)} onAddPlan={(plan) => updatePlans([...plans, plan])} people={people} taskTemplates={taskTemplates} showArchived={showArchived} setShowArchived={setShowArchived} isAdmin={currentUser?.isAdmin} onArchivePlan={(id) => updatePlans(plans.map(p => p.id === id ? { ...p, archived: true } : p))} onRestorePlan={(id) => updatePlans(plans.map(p => p.id === id ? { ...p, archived: false } : p))} onDeletePlan={(id) => updatePlans(plans.filter(p => p.id !== id))} />}
        {page === "plans" && selectedPlanId && selectedPlan && <PlanDetailPage plan={selectedPlan} people={people} currentUser={currentUser} onUpdate={(p) => updatePlans(plans.map(x => x.id === p.id ? p : x))} onBack={() => setSelectedPlanId(null)} />}
        {page === "workflows" && <WorkflowsPage plans={activePlans} people={people} currentUser={currentUser} onUpdatePlan={(p) => updatePlans(plans.map(x => x.id === p.id ? p : x))} onSelectPlan={(id) => { setSelectedPlanId(id); setPage("plans"); }} batchTasks={batchTasks} batchTemplates={batchTemplates} onUpdateBatchTasks={updateBatchTasks} />}
        {page === "trends" && <TrendsPage plans={activePlans} />}
        {page === "templates" && <TemplatesPage templates={taskTemplates} onUpdate={updateTemplates} isAdmin={currentUser?.isAdmin} />}
      </div>
      {paletteEl}
    </div>
  );
}

// ============================================================
// DASHBOARD PAGE
// ============================================================
function DashboardPage({ plans, totalAssets, totalParticipants, onSelectPlan, currentUser, people, onCompleteTask }) {
  const now = new Date();
  const [showAllFlags, setShowAllFlags] = useState(false);
  // Task view filter: null = "my tasks" (current user), or a specific personId to view someone else's tasks.
  // Set by clicking a Team Workload row. Reset via the chip at the top of the tasks column.
  const [filterByPerson, setFilterByPerson] = useState(null);
  const filterPersonId = filterByPerson || currentUser.id;
  const filterPerson = filterByPerson ? (people || []).find(p => p.id === filterByPerson) : null;

  // Gather tasks for the effective person (self by default, or the person clicked in Team Workload)
  const myTasks = [];
  const myCompleted = [];
  plans.forEach(plan => {
    (plan.tasks || []).forEach(task => {
      const assignedPersonId = plan.roles?.[task.assignedRole] || null;
      if (assignedPersonId === filterPersonId) {
        if (!task.completedAt) {
          myTasks.push({ ...task, planName: plan.name, planId: plan.id, planSegment: plan.segment });
        } else {
          myCompleted.push({ ...task, planName: plan.name, planId: plan.id });
        }
      }
    });
  });
  myTasks.sort((a, b) => (a.dueDate || "9999") < (b.dueDate || "9999") ? -1 : 1);
  myCompleted.sort((a, b) => b.completedAt > a.completedAt ? 1 : -1);

  const overdue = myTasks.filter(t => t.dueDate && new Date(t.dueDate) < now);
  const weekEnd = new Date(now.getTime() + 7 * 86400000);
  const dueThisWeek = myTasks.filter(t => t.dueDate && !overdue.includes(t) && new Date(t.dueDate) <= weekEnd);

  // Group tasks by workflow name
  const groupTasks = (tasks) => {
    const groups = {};
    tasks.forEach(t => {
      const key = t.parentTask || t.name;
      if (!groups[key]) groups[key] = { name: key, tasks: [], subtask: t.parentTask ? t.name : null };
      groups[key].tasks.push(t);
    });
    return Object.values(groups);
  };

  const overdueGroups = groupTasks(overdue);
  const weekGroups = groupTasks(dueThisWeek);

  // Completion stats (current quarter)
  const qMonth = Math.floor(now.getMonth() / 3) * 3;
  const qStart = new Date(now.getFullYear(), qMonth, 1);
  const allMyTasks = [...myTasks, ...myCompleted];
  const quarterTasks = allMyTasks.filter(t => t.dueDate && new Date(t.dueDate) >= qStart);
  const quarterCompleted = quarterTasks.filter(t => t.completedAt);
  const completionPct = quarterTasks.length > 0 ? Math.round((quarterCompleted.length / quarterTasks.length) * 100) : 0;

  // Needs Attention flags
  const flags = [];
  const dayMs = 86400000;
  const staleThreshold = 180 * dayMs;

  plans.forEach(plan => {
    // Participant data staleness
    if (!plan.participantsUpdatedAt || (now - new Date(plan.participantsUpdatedAt)) > staleThreshold) {
      const days = plan.participantsUpdatedAt ? Math.floor((now - new Date(plan.participantsUpdatedAt)) / dayMs) : null;
      flags.push({ type: "stale_participants", plan: plan.name, planId: plan.id, msg: days ? `Participant data is ${days} days old` : "Participant data never entered", icon: "⚠" });
    }
    // Asset data staleness
    const lastAsset = plan.assetHistory?.length ? plan.assetHistory[plan.assetHistory.length - 1] : null;
    if (!lastAsset || (now - new Date(lastAsset.date)) > staleThreshold) {
      const days = lastAsset ? Math.floor((now - new Date(lastAsset.date)) / dayMs) : null;
      flags.push({ type: "stale_assets", plan: plan.name, planId: plan.id, msg: days ? `Asset data is ${days} days old` : "No asset snapshots entered", icon: "📊" });
    }
    // Missing roles
    const missingRoles = PLAN_ROLES.filter(r => !plan.roles?.[r]);
    if (missingRoles.length > 0) {
      flags.push({ type: "missing_roles", plan: plan.name, planId: plan.id, msg: `Missing: ${missingRoles.join(", ")}`, icon: "👤" });
    }
    // Missing recordkeeper
    if (!plan.provisions?.recordkeeper && !plan.contacts?.recordkeeper?.name) {
      flags.push({ type: "missing_rk", plan: plan.name, planId: plan.id, msg: "No recordkeeper on file", icon: "🏦" });
    }
    // Missing TPA
    if (!plan.provisions?.tpa && !plan.contacts?.tpa?.name) {
      flags.push({ type: "missing_tpa", plan: plan.name, planId: plan.id, msg: "No TPA on file", icon: "📋" });
    }
    // Missing provisions (check if mostly empty)
    const provKeys = Object.keys(plan.provisions || {});
    const filledProvs = provKeys.filter(k => plan.provisions[k]);
    if (filledProvs.length < 3) {
      flags.push({ type: "missing_provisions", plan: plan.name, planId: plan.id, msg: "Plan provisions mostly empty", icon: "📝" });
    }
  });

  // Show 3 rotating flags (rotate based on current minute to give variety)
  const flagRotation = Math.floor(now.getMinutes() / 2) % Math.max(1, flags.length);
  const visibleFlags = flags.length <= 3 ? flags : flags.slice(flagRotation, flagRotation + 3).concat(flags.slice(0, Math.max(0, 3 - (flags.length - flagRotation)))).slice(0, 3);

  const segCounts = SEGMENTS.reduce((a, s) => ({ ...a, [s]: plans.filter(p => p.segment === s).length }), {});

  // Team workload — for each person who has tasks assigned, count their open and overdue tasks
  // across all active plans. Useful for a firm-wide glance at who's underwater vs. who has bandwidth.
  const teamWorkload = useMemo(() => {
    const perPerson = new Map();   // personId -> { open, overdue, dueThisWeek }
    plans.forEach(plan => {
      if (plan.archived) return;
      (plan.tasks || []).forEach(t => {
        if (t.completedAt) return;
        const personId = plan.roles?.[t.assignedRole];
        if (!personId) return;
        if (!perPerson.has(personId)) perPerson.set(personId, { open: 0, overdue: 0, dueSoon: 0 });
        const bucket = perPerson.get(personId);
        bucket.open++;
        if (t.dueDate) {
          const d = new Date(t.dueDate);
          if (d < now) bucket.overdue++;
          else if (d <= weekEnd) bucket.dueSoon++;
        }
      });
    });
    // Convert to array with person meta, then sort by overdue desc, then open desc
    const rows = [];
    perPerson.forEach((v, personId) => {
      const person = (people || []).find(p => p.id === personId);
      if (!person) return;
      rows.push({ id: personId, name: person.name, role: person.role, photoUrl: person.photoUrl, ...v });
    });
    rows.sort((a, b) => {
      if (b.overdue !== a.overdue) return b.overdue - a.overdue;
      return b.open - a.open;
    });
    return rows;
  }, [plans, people, now, weekEnd]);

  // Track which task groups are expanded to show per-plan check buttons.
  // Group identity = "kind:name" so overdue and due-this-week groups stay independent.
  const [expandedGroups, setExpandedGroups] = useState(() => new Set());
  const toggleGroupExpanded = (key) => setExpandedGroups(prev => {
    const next = new Set(prev);
    if (next.has(key)) next.delete(key); else next.add(key);
    return next;
  });

  const TaskGroup = ({ group, color, kind }) => {
    const groupKey = `${kind}:${group.name}`;
    const isExpanded = expandedGroups.has(groupKey);
    return (
      <div style={{ padding: "8px 0", borderBottom: `1px solid ${COLORS.border}22` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }}
             onClick={() => toggleGroupExpanded(groupKey)}
             title={isExpanded ? "Collapse" : "Expand to complete individual tasks"}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, fontWeight: 600 }}>
            <span style={{ fontSize: 10, color: COLORS.textDim, width: 8, textAlign: "center" }}>{isExpanded ? "▾" : "▸"}</span>
            {group.name}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 11, color: COLORS.textDim }}>{group.tasks.length} plan{group.tasks.length !== 1 ? "s" : ""}</span>
            {group.tasks[0]?.dueDate && <Badge color={color}>{fmtDate(group.tasks[0].dueDate)}</Badge>}
          </div>
        </div>
        {!isExpanded ? (
          <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 2, paddingLeft: 14 }}>
            {group.tasks.slice(0, 5).map(t => t.planName).join(", ")}
            {group.tasks.length > 5 && ` +${group.tasks.length - 5} more`}
          </div>
        ) : (
          <div style={{ marginTop: 6, paddingLeft: 14, display: "flex", flexDirection: "column", gap: 4 }}>
            {group.tasks.map(t => (
              <div key={`${t.planId}-${t.id}`} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 6px", background: COLORS.bg, borderRadius: 4 }}>
                <button type="button"
                  onClick={(e) => {
                    e.stopPropagation();
                    if (!onCompleteTask) return;
                    if (!confirm(`Mark "${group.name}" complete on ${t.planName}?`)) return;
                    onCompleteTask(t.planId, t.id);
                    if (window.pfgToast) window.pfgToast(`Completed "${group.name}" on ${t.planName}`, "success");
                  }}
                  title={`Mark complete on ${t.planName}`}
                  style={{ width: 20, height: 20, minWidth: 20, borderRadius: "50%", border: `1.5px solid ${COLORS.success}`, background: "transparent", color: COLORS.success, cursor: "pointer", fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", padding: 0, fontFamily: "inherit" }}
                  onMouseEnter={e => { e.currentTarget.style.background = COLORS.success; e.currentTarget.style.color = "white"; }}
                  onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.color = COLORS.success; }}>
                  ✓
                </button>
                <button type="button"
                  onClick={(e) => { e.stopPropagation(); onSelectPlan(t.planId); }}
                  style={{ background: "transparent", border: "none", fontSize: 12, color: COLORS.primary, cursor: "pointer", padding: 0, textAlign: "left", fontFamily: "inherit", flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}
                  title={`Open ${t.planName}`}>
                  {t.planName}
                </button>
                {t.planSegment && <Badge color={COLORS.textDim} style={{ fontSize: 9, padding: "1px 5px" }}>{t.planSegment}</Badge>}
              </div>
            ))}
          </div>
        )}
      </div>
    );
  };

  return (
    <div>
      {/* Greeting */}
      <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 4 }}>
        Good {now.getHours() < 12 ? "morning" : now.getHours() < 17 ? "afternoon" : "evening"}, {currentUser.name.split(" ")[0]}
      </div>
      <div style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 16 }}>
        {filterPerson ? <span>Viewing <strong>{filterPerson.name}</strong>'s tasks · </span> : null}
        {overdue.length > 0 ? <span><strong style={{ color: COLORS.danger }}>{overdue.length} overdue</strong> and </span> : ""}
        <strong style={{ color: COLORS.warning }}>{dueThisWeek.length} due this week</strong>
      </div>

      {/* Compact stat bar */}
      <div style={{ display: "flex", gap: 24, padding: "10px 16px", background: COLORS.surface, borderRadius: 8, marginBottom: 20, fontSize: 12, color: COLORS.textMuted, alignItems: "center", border: `1px solid ${COLORS.border}` }}>
        <span>Plans: <strong style={{ color: COLORS.text }}>{plans.length}</strong></span>
        <span>Total Assets: <strong style={{ color: COLORS.success }}>{fmt$(totalAssets)}</strong></span>
        <span>Participants: <strong style={{ color: COLORS.text }}>{totalParticipants.toLocaleString()}</strong></span>
        <span style={{ marginLeft: "auto" }}>
          A: <strong style={{ color: COLORS.segA }}>{segCounts.A || 0}</strong> · B: <strong style={{ color: COLORS.segB }}>{segCounts.B || 0}</strong> · C: <strong style={{ color: COLORS.segC }}>{segCounts.C || 0}</strong> · SIM: <strong style={{ color: COLORS.segSIM }}>{segCounts.SIM || 0}</strong>
        </span>
      </div>

      {/* Main two-column layout */}
      <div style={{ display: "flex", gap: 20 }}>
        {/* LEFT: Tasks */}
        <div style={{ flex: 2 }}>
          {/* Filter chip — appears when viewing another person's tasks */}
          {filterPerson && (
            <div style={{ marginBottom: 10, display: "flex", alignItems: "center", gap: 8, padding: "6px 12px", background: COLORS.primary + "12", border: `1px solid ${COLORS.primary}44`, borderRadius: 8, fontSize: 12 }}>
              <span style={{ color: COLORS.text }}>Viewing tasks assigned to <strong>{filterPerson.name}</strong></span>
              <div style={{ flex: 1 }} />
              <button onClick={() => setFilterByPerson(null)} type="button"
                style={{ background: "transparent", border: "none", color: COLORS.primary, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", padding: "2px 6px", borderRadius: 4 }}>
                ✕ Show my tasks
              </button>
            </div>
          )}

          <Card>
            <h4 style={{ margin: "0 0 12px", color: COLORS.danger, fontSize: 14, display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: COLORS.danger }} />
              {filterPerson ? `${filterPerson.name.split(" ")[0]}'s Overdue Tasks` : "My Overdue Tasks"} ({overdue.length})
            </h4>
            {overdueGroups.length === 0 && <div style={{ color: COLORS.textDim, fontSize: 13 }}>{filterPerson ? `${filterPerson.name.split(" ")[0]} is all caught up!` : "All caught up!"}</div>}
            {overdueGroups.map((g, i) => <TaskGroup key={i} group={g} color={COLORS.danger} kind="overdue" />)}
          </Card>

          <Card style={{ marginTop: 12 }}>
            <h4 style={{ margin: "0 0 12px", color: COLORS.warning, fontSize: 14, display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: COLORS.warning }} />
              {filterPerson ? `${filterPerson.name.split(" ")[0]}'s Due This Week` : "Due This Week"} ({dueThisWeek.length})
            </h4>
            {weekGroups.length === 0 && <div style={{ color: COLORS.textDim, fontSize: 13 }}>Nothing due this week</div>}
            {weekGroups.map((g, i) => <TaskGroup key={i} group={g} color={COLORS.warning} kind="week" />)}
          </Card>
        </div>

        {/* RIGHT: Intelligence panel */}
        <div style={{ flex: 1, minWidth: 280 }}>
          {/* Completion progress */}
          <Card>
            <h4 style={{ margin: "0 0 10px", fontSize: 13, color: COLORS.textMuted }}>Quarterly Progress</h4>
            <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 8 }}>
              <span style={{ fontSize: 28, fontWeight: 700, color: completionPct >= 75 ? COLORS.success : completionPct >= 40 ? COLORS.warning : COLORS.text }}>{completionPct}%</span>
              <span style={{ fontSize: 12, color: COLORS.textDim }}>{quarterCompleted.length} of {quarterTasks.length} tasks</span>
            </div>
            <div style={{ height: 6, background: COLORS.bg, borderRadius: 3, overflow: "hidden" }}>
              <div style={{ height: "100%", width: completionPct + "%", background: completionPct >= 75 ? COLORS.success : completionPct >= 40 ? COLORS.warning : COLORS.primary, borderRadius: 3, transition: "width 0.5s" }} />
            </div>
          </Card>

          {/* Recently completed */}
          <Card style={{ marginTop: 12 }}>
            <h4 style={{ margin: "0 0 10px", fontSize: 13, color: COLORS.textMuted }}>{filterPerson ? `${filterPerson.name.split(" ")[0]}'s Recently Completed` : "Recently Completed"}</h4>
            {myCompleted.length === 0 && <div style={{ fontSize: 12, color: COLORS.textDim }}>{filterPerson ? `${filterPerson.name.split(" ")[0]} hasn't completed any tasks yet` : "No completed tasks yet"}</div>}
            {myCompleted.slice(0, 5).map(t => (
              <div key={t.id} style={{ padding: "5px 0", borderBottom: `1px solid ${COLORS.border}11`, fontSize: 12 }}>
                <div style={{ color: COLORS.text, fontWeight: 500 }}>{t.name}</div>
                <div style={{ color: COLORS.textDim, fontSize: 10 }}>{t.planName} · {fmtDate(t.completedAt)}</div>
              </div>
            ))}
          </Card>

          {/* Team Workload — per-person open/overdue task counts across all plans */}
          {teamWorkload.length > 0 && (
            <Card style={{ marginTop: 12 }}>
              <h4 style={{ margin: "0 0 10px", fontSize: 13, color: COLORS.textMuted }}>Team Workload</h4>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {teamWorkload.map(row => (
                  <button key={row.id} type="button" onClick={() => setFilterByPerson(row.id === currentUser.id ? null : row.id)}
                    style={{
                      width: "100%",
                      display: "flex",
                      alignItems: "center",
                      gap: 10,
                      padding: "6px 8px",
                      borderBottom: `1px solid ${COLORS.border}11`,
                      background: filterByPerson === row.id ? COLORS.primary + "12" : "transparent",
                      border: "none",
                      cursor: "pointer",
                      fontFamily: "inherit",
                      textAlign: "left",
                      borderRadius: 4,
                      transition: "background 0.15s",
                    }}
                    title={row.id === currentUser.id ? "Click to reset filter" : `Click to view ${row.name}'s tasks`}
                    onMouseEnter={e => { if (filterByPerson !== row.id) e.currentTarget.style.background = COLORS.bg; }}
                    onMouseLeave={e => { if (filterByPerson !== row.id) e.currentTarget.style.background = "transparent"; }}>
                    {row.photoUrl ? (
                      <img src={row.photoUrl} alt="" style={{ width: 28, height: 28, borderRadius: "50%", objectFit: "cover", flexShrink: 0 }} />
                    ) : (
                      <div style={{ width: 28, height: 28, borderRadius: "50%", background: COLORS.bg, color: COLORS.textMuted, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, flexShrink: 0 }}>{row.name.split(" ").map(p => p[0]).join("").slice(0, 2)}</div>
                    )}
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {row.id === currentUser.id ? `${row.name} (you)` : row.name}
                      </div>
                      <div style={{ fontSize: 10, color: COLORS.textDim }}>{row.role || ""}</div>
                    </div>
                    <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                      {row.overdue > 0 && (
                        <span style={{ padding: "2px 6px", background: COLORS.danger, color: "white", borderRadius: 4, fontSize: 10, fontWeight: 700 }} title={`${row.overdue} overdue`}>
                          {row.overdue} OVD
                        </span>
                      )}
                      {row.dueSoon > 0 && (
                        <span style={{ padding: "2px 6px", background: COLORS.warning, color: "white", borderRadius: 4, fontSize: 10, fontWeight: 700 }} title={`${row.dueSoon} due this week`}>
                          {row.dueSoon} WK
                        </span>
                      )}
                      <span style={{ padding: "2px 6px", background: COLORS.bg, color: COLORS.text, borderRadius: 4, fontSize: 10, fontWeight: 700 }} title={`${row.open} open in total`}>
                        {row.open} OPEN
                      </span>
                    </div>
                  </button>
                ))}
              </div>
            </Card>
          )}

          {/* Needs Attention */}
          <Card style={{ marginTop: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <h4 style={{ margin: 0, fontSize: 13, color: COLORS.textMuted }}>Needs Attention</h4>
              {flags.length > 3 && (
                <button onClick={() => setShowAllFlags(true)} style={{ background: "none", border: "none", color: COLORS.primary, fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>
                  View all ({flags.length})
                </button>
              )}
            </div>
            {flags.length === 0 && <div style={{ fontSize: 12, color: COLORS.textDim }}>Everything looks good!</div>}
            {visibleFlags.map((f, i) => (
              <div key={i} onClick={() => f.planId && onSelectPlan(f.planId)} style={{ padding: "6px 0", borderBottom: `1px solid ${COLORS.border}11`, cursor: f.planId ? "pointer" : "default" }}>
                <div style={{ fontSize: 12, fontWeight: 500, display: "flex", alignItems: "center", gap: 6 }}>
                  <span>{f.icon}</span> {f.plan}
                </div>
                <div style={{ fontSize: 11, color: COLORS.warning, marginLeft: 22 }}>{f.msg}</div>
              </div>
            ))}
          </Card>
        </div>
      </div>

      {/* All Flags Modal */}
      <Modal open={showAllFlags} onClose={() => setShowAllFlags(false)} title={`Needs Attention (${flags.length} items)`} wide>
        <div style={{ maxHeight: 500, overflow: "auto" }}>
          {flags.map((f, i) => (
            <div key={i} onClick={() => { f.planId && onSelectPlan(f.planId); setShowAllFlags(false); }} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: `1px solid ${COLORS.border}22`, cursor: f.planId ? "pointer" : "default" }}>
              <span style={{ fontSize: 18 }}>{f.icon}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{f.plan}</div>
                <div style={{ fontSize: 12, color: COLORS.warning }}>{f.msg}</div>
              </div>
              <Badge color={f.type.includes("stale") ? COLORS.danger : COLORS.warning} style={{ fontSize: 10 }}>
                {f.type === "stale_participants" ? "Stale Data" : f.type === "stale_assets" ? "Stale Data" : f.type === "missing_roles" ? "Roles" : f.type === "missing_rk" ? "Recordkeeper" : f.type === "missing_tpa" ? "TPA" : "Provisions"}
              </Badge>
            </div>
          ))}
        </div>
      </Modal>
    </div>
  );
}

// ============================================================
// PLANS LIST PAGE
// ============================================================
function PlansListPage({ plans, searchQuery, setSearchQuery, segmentFilter, setSegmentFilter, onSelectPlan, onAddPlan, people, taskTemplates, showArchived, setShowArchived, isAdmin, onArchivePlan, onRestorePlan, onDeletePlan }) {
  const [showAdd, setShowAdd] = useState(false);
  const [newPlan, setNewPlan] = useState({ name: "", segment: "A", planNumber: "", planType: "401(k)", fiscalYearEnd: "", fiduciaryStatus: "" });
  // Sort mode — a small dropdown at the top lets Matt pick how to order the plan list.
  // "default" preserves incoming order (usually creation order); other options compute per-plan values.
  const [sortMode, setSortMode] = useState("default");
  const SORT_OPTIONS = [
    { value: "default",       label: "Default order" },
    { value: "name-asc",      label: "Name (A → Z)" },
    { value: "name-desc",     label: "Name (Z → A)" },
    { value: "segment",       label: "Segment (A first)" },
    { value: "assets-desc",   label: "Assets (largest first)" },
    { value: "assets-asc",    label: "Assets (smallest first)" },
    { value: "participants-desc", label: "Participants (most first)" },
    { value: "overdue-desc",  label: "Overdue tasks (most first)" },
  ];
  const applyPlansSort = (rows) => {
    if (sortMode === "default") return rows;
    const now = new Date();
    const latestAsset = (p) => p.assetHistory?.length ? (p.assetHistory[p.assetHistory.length - 1].total || 0) : 0;
    const openCount = (p) => (p.tasks || []).filter(t => !t.completedAt).length;
    const overdueCount = (p) => (p.tasks || []).filter(t => !t.completedAt && t.dueDate && new Date(t.dueDate) < now).length;
    return rows.slice().sort((a, b) => {
      switch (sortMode) {
        case "name-asc":          return (a.name || "").localeCompare(b.name || "");
        case "name-desc":         return (b.name || "").localeCompare(a.name || "");
        case "segment":           return (a.segment || "").localeCompare(b.segment || "") || (a.name || "").localeCompare(b.name || "");
        case "assets-desc":       return latestAsset(b) - latestAsset(a);
        case "assets-asc":        return latestAsset(a) - latestAsset(b);
        case "participants-desc": return (b.participants?.total || 0) - (a.participants?.total || 0);
        case "overdue-desc":      { const oa = overdueCount(a), ob = overdueCount(b); return ob - oa || openCount(b) - openCount(a); }
        default: return 0;
      }
    });
  };

  const generateTasks = (segment) => {
    const templates = taskTemplates[segment] || [];
    const now = new Date();
    const year = now.getFullYear();
    const tasks = [];
    templates.forEach(tmpl => {
      if (tmpl.subtasks && tmpl.subtasks.length > 0) {
        tmpl.months.forEach(month => {
          const parentDueDate = new Date(year, month - 1, 28).toISOString().split("T")[0];
          const groupId = uid(); // shared ID to link subtasks in same group
          tmpl.subtasks.forEach((sub, si) => {
            // sub can be string (legacy) or object { name, role, bizDaysBefore }
            const subName = typeof sub === "string" ? sub : sub.name;
            const subRole = typeof sub === "string" ? tmpl.role : (sub.role || tmpl.role);
            const bizDaysBefore = typeof sub === "string" ? 0 : (sub.bizDaysBefore || 0);
            const subDueDate = bizDaysBefore > 0 ? subtractBusinessDays(parentDueDate, bizDaysBefore) : parentDueDate;
            tasks.push({ id: uid(), name: subName, parentTask: tmpl.name, parentDueDate, groupId, frequency: tmpl.frequency, assignedRole: subRole, dueDate: subDueDate, completedAt: null, completedBy: null, note: "", month, order: si });
          });
        });
      } else if (tmpl.frequency === "Ongoing") {
        tasks.push({ id: uid(), name: tmpl.name, frequency: "Ongoing", assignedRole: tmpl.role, dueDate: null, completedAt: null, completedBy: null, note: "" });
      } else if (tmpl.frequency === "Every 3 years") {
        const dueDate = new Date(year + 3, 0, 31).toISOString().split("T")[0];
        tasks.push({ id: uid(), name: tmpl.name, frequency: tmpl.frequency, assignedRole: tmpl.role, dueDate, completedAt: null, completedBy: null, note: "", nextRfpYear: year + 3 });
      } else {
        tmpl.months.forEach(month => {
          const dueDate = new Date(year, month - 1, 28).toISOString().split("T")[0];
          tasks.push({ id: uid(), name: tmpl.name, frequency: tmpl.frequency, assignedRole: tmpl.role, dueDate, completedAt: null, completedBy: null, note: "", month });
        });
      }
    });
    return tasks;
  };

  const handleAdd = () => {
    const plan = {
      id: uid(), ...newPlan,
      roles: { "Lead Advisor": "", "Relationship Manager": "", "Educator": "", "Investment Team": "" },
      provisions: {},
      contacts: { planAdmin1: {}, planAdmin2: {}, recordkeeper: {}, tpa: {} },
      assetHistory: [],
      participants: { total: 0, eligible: 0, contributing: 0, terminated: 0 },
      tasks: generateTasks(newPlan.segment),
      createdAt: new Date().toISOString(),
    };
    onAddPlan(plan);
    setShowAdd(false);
    setNewPlan({ name: "", segment: "A", planNumber: "", planType: "401(k)", fiscalYearEnd: "", fiduciaryStatus: "" });
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Plans</h2>
        <Button onClick={() => setShowAdd(true)}><IconPlus size={16} /> Add Plan</Button>
      </div>

      {/* Filters */}
      <div style={{ display: "flex", gap: 12, marginBottom: 20, alignItems: "center" }}>
        <div style={{ position: "relative", flex: 1, maxWidth: 300 }}>
          <IconSearch size={16} color={COLORS.textDim} style={{ position: "absolute", left: 12, top: 10 }} />
          <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Search plans..."
            style={{ width: "100%", padding: "8px 12px 8px 36px", borderRadius: 8, border: `1px solid ${COLORS.border}`, background: COLORS.surface, color: COLORS.text, fontSize: 13, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
        </div>
        <div style={{ display: "flex", gap: 4 }}>
          {["All", ...SEGMENTS].map(s => (
            <button key={s} onClick={() => setSegmentFilter(s)}
              style={{ padding: "6px 14px", borderRadius: 8, border: `1px solid ${segmentFilter === s ? (s === "All" ? COLORS.primary : segColor(s)) : COLORS.border}`, background: segmentFilter === s ? (s === "All" ? COLORS.primary + "18" : segColor(s) + "18") : "transparent", color: segmentFilter === s ? (s === "All" ? COLORS.primary : segColor(s)) : COLORS.textMuted, fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>
              {s}
            </button>
          ))}
        </div>
        <button onClick={() => setShowArchived(!showArchived)}
          style={{ padding: "6px 14px", borderRadius: 8, border: "1px solid " + (showArchived ? COLORS.warning : COLORS.border), background: showArchived ? COLORS.warning + "12" : "#FFFFFF", color: showArchived ? COLORS.warning : COLORS.textMuted, fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>
          {showArchived ? "Showing Archived" : "Show Archived"}
        </button>
        {/* Sort dropdown — small polish for large plan lists */}
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 11, color: COLORS.textDim, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700 }}>Sort:</span>
          <select value={sortMode} onChange={e => setSortMode(e.target.value)}
            style={{ padding: "6px 10px", borderRadius: 8, border: `1px solid ${sortMode === "default" ? COLORS.border : COLORS.primary}`, background: sortMode === "default" ? "#FFF" : COLORS.primary + "0D", color: COLORS.text, fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>
            {SORT_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
        </div>
      </div>

      {/* Plan list */}
      <div style={{ display: "grid", gap: 8 }}>
        {plans.length === 0 && <Card><div style={{ textAlign: "center", color: COLORS.textDim, padding: 40 }}>No plans yet. Click "Add Plan" to get started.</div></Card>}
        {applyPlansSort(plans).map(plan => {
          const lastAsset = plan.assetHistory?.length ? plan.assetHistory[plan.assetHistory.length - 1].total : 0;
          const openTasks = (plan.tasks || []).filter(t => !t.completedAt).length;
          const overdueTasks = (plan.tasks || []).filter(t => !t.completedAt && t.dueDate && new Date(t.dueDate) < new Date()).length;
          return (
            <Card key={plan.id} onClick={() => onSelectPlan(plan.id)} style={{ display: "flex", alignItems: "center", gap: 16, padding: "14px 20px" }}>
              <Badge color={segColor(plan.segment)} style={{ minWidth: 36, textAlign: "center" }}>{plan.segment}</Badge>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 600 }}>{plan.name}</div>
                <div style={{ fontSize: 11, color: COLORS.textDim }}>{plan.planType} · {plan.planNumber || "No #"}</div>
              </div>
              <div style={{ textAlign: "right", minWidth: 120 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: COLORS.success }}>{fmt$(lastAsset)}</div>
                <div style={{ fontSize: 11, color: COLORS.textDim }}>{plan.participants?.total || 0} participants</div>
              </div>
              <div style={{ textAlign: "right", minWidth: 100 }}>
                {overdueTasks > 0 && <Badge color={COLORS.danger}>{overdueTasks} overdue</Badge>}
                {overdueTasks === 0 && <Badge color={COLORS.textDim}>{openTasks} tasks</Badge>}
              </div>
              {isAdmin && !showArchived && <button onClick={(e) => { e.stopPropagation(); if(confirm("Archive " + plan.name + "?")) onArchivePlan(plan.id); }} style={{ background: "none", border: "none", color: COLORS.textDim, cursor: "pointer", padding: 4 }} title="Archive plan"><IconTrash size={14} /></button>}
              {isAdmin && showArchived && <>
                <Button variant="outline" size="sm" onClick={(e) => { e.stopPropagation(); onRestorePlan(plan.id); }}>Restore</Button>
                <Button variant="danger" size="sm" onClick={(e) => { e.stopPropagation(); if(confirm("Permanently delete " + plan.name + "? This cannot be undone.")) onDeletePlan(plan.id); }}>Delete</Button>
              </>}
              {!showArchived && <IconChevron size={16} color={COLORS.textDim} />}
            </Card>
          );
        })}
      </div>

      {/* Add Plan Modal */}
      <Modal open={showAdd} onClose={() => setShowAdd(false)} title="Add New Plan">
        <Input label="Plan Name" value={newPlan.name} onChange={v => setNewPlan({ ...newPlan, name: v })} placeholder="e.g. Acme Corp 401(k)" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <Select label="Segment" value={newPlan.segment} onChange={v => setNewPlan({ ...newPlan, segment: v })} options={SEGMENTS} />
          <Select label="Plan Type" value={newPlan.planType} onChange={v => setNewPlan({ ...newPlan, planType: v })} options={PLAN_TYPES} />
          <Input label="Plan Number" value={newPlan.planNumber} onChange={v => setNewPlan({ ...newPlan, planNumber: v })} placeholder="EIN-PN" />
          <Input label="Fiscal Year End" value={newPlan.fiscalYearEnd} onChange={v => setNewPlan({ ...newPlan, fiscalYearEnd: v })} placeholder="e.g. 12/31" />
          <Select label="Fiduciary Status" value={newPlan.fiduciaryStatus} onChange={v => setNewPlan({ ...newPlan, fiduciaryStatus: v })} options={FIDUCIARY_STATUSES} placeholder="Select..." />
        </div>
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 16 }}>
          <Button variant="ghost" onClick={() => setShowAdd(false)}>Cancel</Button>
          <Button onClick={handleAdd} disabled={!newPlan.name}>Create Plan</Button>
        </div>
      </Modal>
    </div>
  );
}

// ============================================================
// PLAN DETAIL PAGE
// ============================================================
function PlanDetailPage({ plan, people, currentUser, onUpdate, onBack }) {
  const [tab, setTab] = useState("overview");
  const [editProvisions, setEditProvisions] = useState(false);
  const [provisions, setProvisions] = useState(plan.provisions || {});
  const [editContacts, setEditContacts] = useState(false);
  const [contacts, setContacts] = useState(plan.contacts || {});
  const [editRoles, setEditRoles] = useState(false);
  const [roles, setRoles] = useState(plan.roles || {});
  const [editParticipants, setEditParticipants] = useState(false);
  const [participants, setParticipants] = useState(plan.participants || {});
  const [showAssetEntry, setShowAssetEntry] = useState(false);
  const [showCsvImport, setShowCsvImport] = useState(false);
  const [assetDate, setAssetDate] = useState(new Date().toISOString().split("T")[0]);
  const [assetRows, setAssetRows] = useState([{ name: "", value: "" }]);
  const [showAddTask, setShowAddTask] = useState(false);
  const [completeTaskId, setCompleteTaskId] = useState(null);
  const [completeNote, setCompleteNote] = useState("");
  const [confettiTaskId, setConfettiTaskId] = useState(null);
  const [editBasicInfo, setEditBasicInfo] = useState(false);
  const [basicInfo, setBasicInfo] = useState({ name: plan.name, segment: plan.segment, planNumber: plan.planNumber, planType: plan.planType, fiscalYearEnd: plan.fiscalYearEnd, fiduciaryStatus: plan.fiduciaryStatus, outsideFiduciary: plan.outsideFiduciary });

  const isSIM = plan.segment === "SIM";

  const tabs = [
    { key: "overview", label: "Overview" },
    { key: "provisions", label: "Provisions" },
    { key: "contacts", label: "Contacts" },
    { key: "assets", label: "Assets" },
    { key: "participants", label: "Participants" },
    { key: "tasks", label: "Tasks" },
  ];

  const completeTask = (taskId) => {
    setConfettiTaskId(taskId);
    const updatedTasks = plan.tasks.map(t => t.id === taskId ? { ...t, completedAt: new Date().toISOString(), completedBy: currentUser.name, note: completeNote } : t);
    onUpdate({ ...plan, tasks: updatedTasks });
    setCompleteTaskId(null);
    setCompleteNote("");
  };

  const addAssetSnapshot = () => {
    const items = assetRows.filter(r => r.name && r.value).map(r => ({ name: r.name, value: parseFloat(r.value) || 0 }));
    const total = items.reduce((s, i) => s + i.value, 0);
    const snapshot = { id: uid(), date: assetDate, items, total };
    const history = [...(plan.assetHistory || []), snapshot].sort((a, b) => a.date < b.date ? -1 : 1);
    onUpdate({ ...plan, assetHistory: history });
    setShowAssetEntry(false);
    setAssetRows([{ name: "", value: "" }]);
  };

  const handleCsvImport = (text) => {
    const lines = text.trim().split("\n");
    const rows = lines.map(l => { const parts = l.split(","); return { name: parts[0]?.trim() || "", value: parts[1]?.trim() || "" }; }).filter(r => r.name);
    setAssetRows(rows.length ? rows : [{ name: "", value: "" }]);
    setShowCsvImport(false);
    setShowAssetEntry(true);
  };

  // Compute QoQ and YoY
  const assetHistory = plan.assetHistory || [];
  const latestAsset = assetHistory.length ? assetHistory[assetHistory.length - 1] : null;
  const prevQuarter = assetHistory.length >= 2 ? assetHistory[assetHistory.length - 2] : null;
  const qoqChange = latestAsset && prevQuarter ? ((latestAsset.total - prevQuarter.total) / prevQuarter.total * 100) : null;
  const oneYearAgo = assetHistory.find(a => {
    const d = new Date(a.date);
    const latest = new Date(latestAsset?.date);
    return Math.abs((latest - d) / (86400000 * 365) - 1) < 0.25;
  });
  const yoyChange = latestAsset && oneYearAgo ? ((latestAsset.total - oneYearAgo.total) / oneYearAgo.total * 100) : null;

  const part = plan.participants || {};
  const contributionRate = part.eligible > 0 ? ((part.contributing || 0) / part.eligible * 100).toFixed(1) + "%" : "—";
