// ============================================================
// REIMBURSEMENT CONFIG
// Categories: top 6 most common at PFG + Other. Used in the submit dropdown.
// Statuses form a 5-stage pipeline with traffic-light colors so an advisor can
// glance and see where each request is. The pipeline:
//   submitted   → just submitted, awaiting Matt's review
//   inProgress  → Matt reviewing / asking questions
//   denied      → returned for corrections (employee can resubmit)
//   approved    → approved, waiting on payroll to cut the check
//   paid        → fully reimbursed, closed
// ============================================================
const REIMB_CATEGORIES = [
  "Meal",
  "Travel",
  "Office",
  "Education",
  "Professional Dues",
  "Client Entertainment",
  "Other",
];

const REIMB_STATUSES = [
  { key: "submitted",  label: "Submitted",                 short: "SUBMITTED",  color: "#E67E22", desc: "Awaiting review" },
  { key: "inProgress", label: "In Progress",               short: "IN PROGRESS", color: "#F1C40F", desc: "Under review" },
  { key: "denied",     label: "Denied — Corrections",      short: "DENIED",     color: "#C0392B", desc: "Returned to employee" },
  { key: "approved",   label: "Approved — Pending Payroll", short: "APPROVED",   color: "#7DCE82", desc: "Awaiting payroll" },
  { key: "paid",       label: "Paid",                       short: "PAID",       color: "#1FB67D", desc: "Reimbursed and closed" },
];

const REIMB_STATUS_MAP = REIMB_STATUSES.reduce((acc, s) => { acc[s.key] = s; return acc; }, {});
// Legacy status names mapped to the new pipeline so old records don't render as blank
const LEGACY_REIMB_STATUS_MAP = {
  pending:  "submitted",
  approved: "approved",
  denied:   "denied",
};
function normalizeReimbStatus(s) {
  if (!s) return "submitted";
  if (REIMB_STATUS_MAP[s]) return s;
  return LEGACY_REIMB_STATUS_MAP[s] || "submitted";
}

function HRReimbView({ currentUser, reimbursements, saveHR, isAdmin, hrSettings }) {
  const [form, setForm] = useState({ date: "", amount: "", category: "", desc: "" });
  const [attachedFiles, setAttachedFiles] = useState([]);   // [{ name, size, type, data }, ...]
  const [fileWarning, setFileWarning] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [expandedId, setExpandedId] = useState(null);
  // Review notes — admin writes notes when changing status; employee can also write a note
  // when re-submitting after a denial-for-corrections. Each note is a separate entry in r.reviewNotes.
  const [reviewNoteDraft, setReviewNoteDraft] = useState({});  // { [reimbursementId]: "draft text" }
  // Owner-only bulk-select state — used to batch approve/deny/mark-paid pending reimbursements.
  const [selectedIds, setSelectedIds] = useState(() => new Set());
  const isSelectable = (statusKey) => statusKey === "submitted" || statusKey === "inProgress";
  const toggleSelected = (id) => setSelectedIds(prev => {
    const next = new Set(prev);
    if (next.has(id)) next.delete(id); else next.add(id);
    return next;
  });
  const clearSelection = () => setSelectedIds(new Set());
  // Sortable columns — Reimbursement table can be sorted by date, employee, category, amount, or status.
  // Default is date desc (newest first), which matches the natural review flow.
  const [reimbSortCol, setReimbSortCol] = useState("date");
  const [reimbSortDir, setReimbSortDir] = useState("desc");
  const toggleReimbSort = (col) => {
    if (reimbSortCol === col) setReimbSortDir(reimbSortDir === "asc" ? "desc" : "asc");
    else { setReimbSortCol(col); setReimbSortDir(col === "amount" || col === "date" || col === "submitted" ? "desc" : "asc"); }
  };
  // Status weight for sorting: pending statuses first, then done
  const statusWeight = (s) => ({ submitted: 0, inProgress: 1, approved: 2, paid: 3, denied: 4 }[s] ?? 99);
  const applyReimbSort = (rows) => {
    const dir = reimbSortDir === "asc" ? 1 : -1;
    return rows.slice().sort((a, b) => {
      let va, vb;
      if (reimbSortCol === "amount") {
        va = Number(a.amount || 0); vb = Number(b.amount || 0);
        return (va - vb) * dir;
      }
      if (reimbSortCol === "status") {
        va = statusWeight(normalizeReimbStatus(a.status));
        vb = statusWeight(normalizeReimbStatus(b.status));
        return (va - vb) * dir;
      }
      // String cols: date, userName, category, submitted
      va = (a[reimbSortCol] || "").toString().toLowerCase();
      vb = (b[reimbSortCol] || "").toString().toLowerCase();
      if (va < vb) return -1 * dir;
      if (va > vb) return 1 * dir;
      return 0;
    });
  };

  const MAX_FILE_BYTES = 2 * 1024 * 1024; // 2 MB per file
  const MAX_TOTAL_BYTES = 8 * 1024 * 1024; // 8 MB total across attachments

  const handleFiles = async (e) => {
    const files = Array.from(e.target.files || []);
    setFileWarning("");
    if (files.length === 0) return;
    const next = [...attachedFiles];
    let totalSize = next.reduce((s, f) => s + (f.size || 0), 0);
    for (const f of files) {
      if (f.size > MAX_FILE_BYTES) {
        setFileWarning(`"${f.name}" is ${(f.size/1024/1024).toFixed(1)} MB — must be 2 MB or smaller.`);
        continue;
      }
      if (totalSize + f.size > MAX_TOTAL_BYTES) {
        setFileWarning(`Total attachment size would exceed 8 MB cap. "${f.name}" skipped.`);
        continue;
      }
      try {
        const data = await readFileAsDataURL(f);
        next.push({ id: uid(), name: f.name, size: f.size, type: f.type, data });
        totalSize += f.size;
      } catch (err) {
        setFileWarning(`Failed to read "${f.name}": ${err.message}`);
      }
    }
    setAttachedFiles(next);
    e.target.value = "";   // reset so the same file can be re-selected
  };

  const removeAttachedFile = (idx) => {
    setAttachedFiles(attachedFiles.filter((_, i) => i !== idx));
  };

  const submit = async () => {
    if (!form.date || !form.amount || !form.category) { alert("Date, amount, and category are required"); return; }
    setSubmitting(true);
    const record = {
      id: uid(),
      userId: currentUser.id,
      userName: currentUser.name,
      userEmail: currentUser.email || "",
      date: form.date,
      amount: parseFloat(form.amount),
      category: form.category,
      desc: form.desc,
      status: "submitted",
      submitted: new Date().toISOString(),
      // Migration-friendly: keep `file` for legacy reads (first attachment), but `files` is the source of truth
      files: attachedFiles.length ? attachedFiles : [],
      file: attachedFiles[0] || null,
      statusHistory: [{ status: "submitted", at: new Date().toISOString(), by: currentUser.name }],
      reviewNotes: [],
    };
    const next = [...reimbursements, record];
    saveHR({ reimbursements: next });
    // Build email body
    // Notify default → Matt only. Reimbursement approvals go to Matt; Alex is excluded by policy.
    const recipients = hrSettings?.notifyEmails?.length ? hrSettings.notifyEmails : ["mbruce@pointerfg.com"];
    const fileNote = attachedFiles.length === 0
      ? "\nNo receipts attached."
      : `\n${attachedFiles.length} receipt${attachedFiles.length > 1 ? "s" : ""} attached:\n` + attachedFiles.map(f => `  • ${f.name} (${(f.size/1024).toFixed(0)} KB)`).join("\n") + "\n(View in PointerOS to download.)";
    const body =
`A new reimbursement request has been submitted in PointerOS.

Submitted by: ${currentUser.name} ${currentUser.email ? "<" + currentUser.email + ">" : ""}
Date of expense: ${form.date}
Amount: $${parseFloat(form.amount).toFixed(2)}
Category: ${form.category}

Description:
${form.desc || "(none provided)"}
${fileNote}

Approve or deny at: PointerOS → HR Toolsuite → Reimbursements

— Automated message from PointerOS`;
    sendEmail({
      to: recipients,
      subject: `[PFG Reimb] ${currentUser.name} — $${parseFloat(form.amount).toFixed(2)} — ${form.category}`,
      body,
    });
    setForm({ date: "", amount: "", category: "", desc: "" });
    setAttachedFiles([]);
    setFileWarning("");
    setSubmitting(false);
  };

  // Add a review note to a request. Can be called when changing status (auto-prompts
  // for a note) or directly from the request detail row.
  const addReviewNote = (id, note) => {
    if (!note || !note.trim()) return;
    const entry = { text: note.trim(), at: new Date().toISOString(), by: currentUser.name };
    const next = reimbursements.map(x => x.id === id
      ? { ...x, reviewNotes: [...(x.reviewNotes || []), entry] }
      : x);
    saveHR({ reimbursements: next });
    setReviewNoteDraft({ ...reviewNoteDraft, [id]: "" });
    // Notify the employee whose request was annotated
    const r = reimbursements.find(x => x.id === id);
    if (r && r.userEmail && r.userEmail !== currentUser.email) {
      const ok = confirm(`Email ${r.userName} the review note?`);
      if (ok) {
        sendEmail({
          to: [r.userEmail],
          subject: `Reimbursement note: $${r.amount.toFixed(2)} — ${r.category}`,
          body: `${currentUser.name} added a note to your reimbursement request from ${r.date}:\n\n"${note.trim()}"\n\nView and respond in PointerOS → HR Toolsuite → Reimbursements.\n\n— PointerOS`,
        });
      }
    }
  };

  const updateStatus = (id, status) => {
    const r = reimbursements.find(x => x.id === id);
    if (!r) return;
    const stamp = { status, at: new Date().toISOString(), by: currentUser.name };
    const history = Array.isArray(r.statusHistory) ? [...r.statusHistory, stamp] : [stamp];
    const next = reimbursements.map(x => x.id === id ? { ...x, status, statusHistory: history, reviewedAt: new Date().toISOString(), reviewedBy: currentUser.name } : x);
    saveHR({ reimbursements: next });
    // Optionally notify the submitter
    if (r.userEmail) {
      const statusObj = REIMB_STATUS_MAP[status] || { label: status };
      const ok = confirm(`Mark as "${statusObj.label}" and email ${r.userName} about the update?`);
      if (ok) {
        sendEmail({
          to: [r.userEmail],
          subject: `Reimbursement update: $${r.amount.toFixed(2)} — ${r.category}`,
          body: `Your reimbursement request submitted on ${r.date} for $${r.amount.toFixed(2)} (${r.category}) has been updated to "${statusObj.label}" by ${currentUser.name}.\n\n— PointerOS`,
        });
      }
    }
  };

  // Bulk update selected reimbursements to a new status. Skips items whose current status
  // isn't compatible (e.g., trying to mark "denied" as paid). No per-item email prompts —
  // Matt can send a batch update email manually if needed.
  const bulkUpdateStatus = (targetStatus) => {
    const ids = Array.from(selectedIds);
    if (ids.length === 0) return;
    const targetLabel = (REIMB_STATUS_MAP[targetStatus] || {}).label || targetStatus;
    const applicable = reimbursements.filter(r => ids.includes(r.id));
    if (!confirm(`Mark ${applicable.length} selected reimbursement${applicable.length === 1 ? "" : "s"} as "${targetLabel}"? Each will be stamped with your name and time.`)) return;
    const stamp = { status: targetStatus, at: new Date().toISOString(), by: currentUser.name };
    const idSet = new Set(ids);
    const next = reimbursements.map(r => {
      if (!idSet.has(r.id)) return r;
      const history = Array.isArray(r.statusHistory) ? [...r.statusHistory, stamp] : [stamp];
      return { ...r, status: targetStatus, statusHistory: history, reviewedAt: stamp.at, reviewedBy: currentUser.name };
    });
    saveHR({ reimbursements: next });
    clearSelection();
    if (window.pfgToast) window.pfgToast(`${applicable.length} reimbursement${applicable.length === 1 ? "" : "s"} marked ${targetLabel}`, "success");
  };

  const removeReimb = (id) => {
    if (!confirm("Delete this request? This cannot be undone.")) return;
    saveHR({ reimbursements: reimbursements.filter(r => r.id !== id) });
  };

  // Show every request the user is entitled to see — masters see all, regular employees see only their own.
  // No filtering or searching: this page is short by design.
  const visible = isAdmin ? reimbursements : reimbursements.filter(r => r.userId === currentUser.id);
  const filtered = applyReimbSort(visible);

  // Summary stats
  const totalAmount = filtered.reduce((s, r) => s + (r.amount || 0), 0);
  const paidAmount = filtered.filter(r => normalizeReimbStatus(r.status) === "paid").reduce((s, r) => s + (r.amount || 0), 0);
  const approvedAmount = filtered.filter(r => normalizeReimbStatus(r.status) === "approved").reduce((s, r) => s + (r.amount || 0), 0);

  return (
    <div>
      <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, marginBottom: 6 }}>Reimbursements</h2>
      <p style={{ color: COLORS.textMuted, fontSize: 13, marginBottom: 20 }}>
        Submit a reimbursement request with receipt. Receipt and request are emailed to <b>Matt Bruce (mbruce@pointerfg.com)</b> for review and approval.
      </p>

      {/* Submit form */}
      <Card style={{ padding: 20, marginBottom: 16 }}>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>Submit New Request</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 10 }}>
          <Input label="Date" type="date" value={form.date} onChange={v => setForm({ ...form, date: v })} />
          <Input label="Amount ($)" type="number" value={form.amount} onChange={v => setForm({ ...form, amount: v })} placeholder="0.00" />
          <Select label="Category" value={form.category} onChange={v => setForm({ ...form, category: v })} options={REIMB_CATEGORIES} placeholder="Select category…" />
        </div>
        <TextArea label="Description / Purpose" value={form.desc} onChange={v => setForm({ ...form, desc: v })} />

        {/* Receipt file upload — multiple */}
        <div style={{ marginTop: 10, padding: 12, background: "#F8FAFC", borderRadius: 8, border: `1px dashed ${COLORS.border}` }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Receipts / Documentation</div>
          <input type="file" accept="image/*,.pdf" multiple onChange={handleFiles} style={{ fontSize: 13 }} />
          {attachedFiles.length > 0 && (
            <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 6 }}>
              <div style={{ fontSize: 11, color: COLORS.textMuted, fontWeight: 600 }}>
                {attachedFiles.length} file{attachedFiles.length > 1 ? "s" : ""} attached ({(attachedFiles.reduce((s, f) => s + (f.size || 0), 0) / 1024).toFixed(0)} KB total)
              </div>
              {attachedFiles.map((f, i) => (
                <div key={f.id || i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 8px", background: COLORS.surface, borderRadius: 4, border: `1px solid ${COLORS.borderLight}` }}>
                  <span style={{ fontSize: 11, color: COLORS.success }}>✓</span>
                  <span style={{ fontSize: 12, color: COLORS.text, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.name}</span>
                  <span style={{ fontSize: 11, color: COLORS.textMuted }}>{(f.size/1024).toFixed(0)} KB</span>
                  <button type="button" onClick={() => removeAttachedFile(i)}
                    style={{ background: "none", border: "none", color: COLORS.danger, cursor: "pointer", fontSize: 14, padding: "0 4px", fontFamily: "inherit" }}
                    title="Remove">×</button>
                </div>
              ))}
            </div>
          )}
          {fileWarning && <div style={{ marginTop: 6, fontSize: 12, color: COLORS.danger }}>{fileWarning}</div>}
          <div style={{ marginTop: 8, fontSize: 11, color: COLORS.textDim }}>PDF or image. 2 MB per file, 8 MB total. Add as many receipts as needed. Receipts will be sent to mbruce@pointerfg.com when you submit.</div>
        </div>

        <div style={{ marginTop: 14, display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
          <Button onClick={submit} disabled={submitting}><IconPlus size={14} /> Submit</Button>
          <span style={{ fontSize: 11, color: COLORS.textDim }}>
            Opens your mail client with a pre-filled message to mbruce@pointerfg.com (and any other recipients configured in HR Settings).
          </span>
        </div>
      </Card>

      {/* Results — every request, no filters */}
      <Card style={{ padding: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
          <div style={{ fontSize: 14, fontWeight: 600 }}>
            {isAdmin ? "All Requests" : "My Requests"} <span style={{ fontWeight: 400, color: COLORS.textMuted }}>· {filtered.length}</span>
          </div>
          <div style={{ display: "flex", gap: 12, alignItems: "center", fontSize: 12, color: COLORS.textMuted, flexWrap: "wrap" }}>
            <span>Total: <b style={{ color: COLORS.text }}>${totalAmount.toFixed(2)}</b></span>
            <span>Approved: <b style={{ color: REIMB_STATUS_MAP.approved.color }}>${approvedAmount.toFixed(2)}</b></span>
            <span>Paid: <b style={{ color: REIMB_STATUS_MAP.paid.color }}>${paidAmount.toFixed(2)}</b></span>
            <Button size="sm" variant="ghost" onClick={() => {
              const headers = [
                ["Date", "date"], ["Employee", "userName"], ["Email", "userEmail"],
                ["Category", "category"], ["Amount", "amount"], ["Status", "status"],
                ["Description", "desc"], ["Submitted", "submitted"], ["Reviewed By", "reviewedBy"], ["Reviewed At", "reviewedAt"],
              ];
              const rows = filtered.map(r => ({ ...r, status: normalizeReimbStatus(r.status) }));
              const ds = new Date().toISOString().split("T")[0];
              downloadCSV(`pfg_reimbursements_${ds}.csv`, headers, rows);
              window.pfgToast && window.pfgToast(`Exported ${rows.length} reimbursements to CSV`, "success");
            }} disabled={filtered.length === 0}>⬇ CSV</Button>
          </div>
        </div>

        {/* Status pipeline legend so the color codes are explained on every visit */}
        <div style={{ display: "flex", gap: 8, marginBottom: 14, flexWrap: "wrap", padding: 10, background: "#F8FBFF", borderRadius: 8 }}>
          <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700, alignSelf: "center", marginRight: 4 }}>Status pipeline:</div>
          {REIMB_STATUSES.map(s => (
            <div key={s.key} style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 11, color: COLORS.textMuted }}>
              <span style={{ width: 10, height: 10, borderRadius: "50%", background: s.color, display: "inline-block" }} />
              <span>{s.label}</span>
            </div>
          ))}
        </div>

        {/* Bulk action bar — appears when owner selects one or more pending reimbursements */}
        {isAdmin && selectedIds.size > 0 && (
          <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", marginBottom: 12, background: COLORS.primary, color: "white", borderRadius: 8, flexWrap: "wrap" }}>
            <div style={{ fontSize: 13, fontWeight: 700 }}>
              {selectedIds.size} pending selected · ${filtered.filter(r => selectedIds.has(r.id)).reduce((s, r) => s + (r.amount || 0), 0).toFixed(2)}
            </div>
            <div style={{ flex: 1 }} />
            <button type="button" onClick={() => bulkUpdateStatus("approved")}
              style={{ padding: "6px 12px", background: COLORS.success, color: "white", border: "none", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
              ✓ Approve
            </button>
            <button type="button" onClick={() => bulkUpdateStatus("paid")}
              style={{ padding: "6px 12px", background: "white", color: COLORS.primary, border: "none", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
              💵 Mark Paid
            </button>
            <button type="button" onClick={() => bulkUpdateStatus("denied")}
              style={{ padding: "6px 12px", background: COLORS.danger, color: "white", border: "none", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
              ✕ Deny
            </button>
            <button type="button" onClick={clearSelection}
              style={{ padding: "6px 12px", background: "transparent", color: "white", border: `1px solid rgba(255,255,255,0.4)`, borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
              Clear
            </button>
          </div>
        )}

        {filtered.length === 0 ? (
          <div style={{ color: COLORS.textMuted, fontSize: 13, padding: 16, textAlign: "center" }}>No requests yet.</div>
        ) : (
          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
            <thead><tr style={{ background: "#F8FAFC", textAlign: "left" }}>
              {isAdmin && (
                <th style={{ padding: "8px", width: 28 }}>
                  {(() => {
                    // Header checkbox: select/deselect all currently-visible selectable rows
                    const selectable = filtered.filter(r => isSelectable(normalizeReimbStatus(r.status)));
                    const allSelected = selectable.length > 0 && selectable.every(r => selectedIds.has(r.id));
                    return (
                      <input type="checkbox" checked={allSelected}
                        title={selectable.length === 0 ? "No pending items to select" : "Select all pending"}
                        disabled={selectable.length === 0}
                        onChange={() => setSelectedIds(prev => {
                          const next = new Set(prev);
                          if (allSelected) selectable.forEach(r => next.delete(r.id));
                          else selectable.forEach(r => next.add(r.id));
                          return next;
                        })} />
                    );
                  })()}
                </th>
              )}
              <th style={{ padding: "8px", width: 28 }}></th>
              <th style={{ padding: 0 }}><SortHead col="date" label="Date" align="left" sortCol={reimbSortCol} sortDir={reimbSortDir} onClick={toggleReimbSort} /></th>
              {isAdmin && <th style={{ padding: 0 }}><SortHead col="userName" label="Employee" align="left" sortCol={reimbSortCol} sortDir={reimbSortDir} onClick={toggleReimbSort} /></th>}
              <th style={{ padding: 0 }}><SortHead col="category" label="Category" align="left" sortCol={reimbSortCol} sortDir={reimbSortDir} onClick={toggleReimbSort} /></th>
              <th style={{ padding: 0 }}><SortHead col="amount" label="Amount" align="right" sortCol={reimbSortCol} sortDir={reimbSortDir} onClick={toggleReimbSort} /></th>
              <th style={{ padding: 0 }}><SortHead col="status" label="Status" align="left" sortCol={reimbSortCol} sortDir={reimbSortDir} onClick={toggleReimbSort} /></th>
              <th style={{ padding: "8px" }}>Actions</th>
            </tr></thead>
            <tbody>
              {filtered.map(r => {
                const isOpen = expandedId === r.id;
                const statusKey = normalizeReimbStatus(r.status);
                const statusObj = REIMB_STATUS_MAP[statusKey];
                return (
                  <React.Fragment key={r.id}>
                    <tr style={{ borderTop: `1px solid ${COLORS.borderLight}`, cursor: "pointer", background: selectedIds.has(r.id) ? COLORS.primary + "0A" : (isOpen ? "#F0F7FC" : "transparent") }}
                        onClick={() => setExpandedId(isOpen ? null : r.id)}>
                      {isAdmin && (
                        <td style={{ padding: "8px" }} onClick={e => e.stopPropagation()}>
                          <input type="checkbox" checked={selectedIds.has(r.id)}
                            disabled={!isSelectable(statusKey)}
                            title={isSelectable(statusKey) ? "Select for bulk action" : "Only pending items can be bulk-actioned"}
                            onChange={() => toggleSelected(r.id)} />
                        </td>
                      )}
                      <td style={{ padding: "8px", color: COLORS.textMuted }}>
                        <span style={{ display: "inline-block", transform: isOpen ? "rotate(90deg)" : "none", transition: "transform 0.15s" }}>▶</span>
                      </td>
                      <td style={{ padding: "8px" }}>{r.date}</td>
                      {isAdmin && <td style={{ padding: "8px" }}>{r.userName}</td>}
                      <td style={{ padding: "8px" }}>{r.category}</td>
                      <td style={{ padding: "8px", textAlign: "right", fontWeight: 600 }}>${r.amount.toFixed(2)}</td>
                      <td style={{ padding: "8px" }}>
                        <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                          <span style={{ width: 10, height: 10, borderRadius: "50%", background: statusObj.color }} />
                          <Badge color={statusObj.color}>{statusObj.short}</Badge>
                        </span>
                        {(() => {
                          const cnt = (Array.isArray(r.files) ? r.files.length : 0) || (r.file ? 1 : 0);
                          return cnt > 0 ? <span style={{ marginLeft: 6, fontSize: 11, color: COLORS.textMuted }} title={`${cnt} attachment${cnt > 1 ? "s" : ""}`}>📎 {cnt > 1 ? cnt : ""}</span> : null;
                        })()}
                      </td>
                      <td style={{ padding: "8px" }} onClick={e => e.stopPropagation()}>
                        {isAdmin ? (
                          <select value={statusKey} onChange={e => updateStatus(r.id, e.target.value)}
                            style={{ padding: "4px 8px", borderRadius: 5, border: `1px solid ${COLORS.border}`, fontSize: 11, fontFamily: "inherit", background: COLORS.surface }}>
                            {REIMB_STATUSES.map(s => <option key={s.key} value={s.key}>{s.label}</option>)}
                          </select>
                        ) : null}
                        {(isAdmin || r.userId === currentUser.id) && (
                          <Button size="sm" variant="ghost" onClick={() => removeReimb(r.id)} style={{ marginLeft: 6 }}><IconTrash size={12} /></Button>
                        )}
                      </td>
                    </tr>
                    {isOpen && (
                      <tr style={{ background: "#F8FBFF" }}>
                        <td colSpan={isAdmin ? 8 : 6} style={{ padding: "12px 24px", borderTop: `1px solid ${COLORS.borderLight}` }}>
                          {(() => {
                            // Read attachments from the new `files` array; fall back to legacy `file`.
                            const allFiles = Array.isArray(r.files) && r.files.length ? r.files : (r.file ? [r.file] : []);
                            const hasFiles = allFiles.length > 0;
                            const canAnnotate = isAdmin || r.userId === currentUser.id;
                            return (
                              <div style={{ display: "grid", gridTemplateColumns: hasFiles ? "1fr 240px" : "1fr", gap: 16 }}>
                                <div>
                                  <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Description</div>
                                  <div style={{ fontSize: 13, color: COLORS.text, whiteSpace: "pre-wrap", marginBottom: 12 }}>{r.desc || "(no description provided)"}</div>
                                  <div style={{ fontSize: 11, color: COLORS.textDim, marginBottom: 8 }}>
                                    Submitted {new Date(r.submitted).toLocaleString()}
                                    {r.reviewedAt && ` · last updated by ${r.reviewedBy} on ${new Date(r.reviewedAt).toLocaleString()}`}
                                  </div>
                                  {Array.isArray(r.statusHistory) && r.statusHistory.length > 1 && (
                                    <div>
                                      <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700, marginTop: 8, marginBottom: 4 }}>Status history</div>
                                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                                        {r.statusHistory.map((h, i) => {
                                          const o = REIMB_STATUS_MAP[h.status] || { label: h.status, color: COLORS.textMuted };
                                          return (
                                            <div key={i} style={{ fontSize: 11, color: COLORS.textMuted, display: "flex", alignItems: "center", gap: 6 }}>
                                              <span style={{ width: 8, height: 8, borderRadius: "50%", background: o.color }} />
                                              <span>{o.label} · {new Date(h.at).toLocaleString()} · {h.by}</span>
                                            </div>
                                          );
                                        })}
                                      </div>
                                    </div>
                                  )}

                                  {/* Review notes — used for corrections, clarifications, reasoning */}
                                  <div style={{ marginTop: 14, padding: 12, background: COLORS.surface, borderRadius: 8, border: `1px solid ${COLORS.borderLight}` }}>
                                    <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700, marginBottom: 8 }}>
                                      Review notes for corrections or reasoning
                                    </div>
                                    {Array.isArray(r.reviewNotes) && r.reviewNotes.length > 0 ? (
                                      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 10 }}>
                                        {r.reviewNotes.map((n, i) => (
                                          <div key={i} style={{ fontSize: 12, color: COLORS.text, padding: "8px 10px", background: COLORS.bg, borderRadius: 6, borderLeft: `3px solid ${COLORS.gold}` }}>
                                            <div style={{ marginBottom: 4 }}>{n.text}</div>
                                            <div style={{ fontSize: 10, color: COLORS.textDim }}>{n.by} · {new Date(n.at).toLocaleString()}</div>
                                          </div>
                                        ))}
                                      </div>
                                    ) : (
                                      <div style={{ fontSize: 12, color: COLORS.textDim, fontStyle: "italic", marginBottom: 10 }}>No notes yet.</div>
                                    )}
                                    {canAnnotate && (
                                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                                        <textarea value={reviewNoteDraft[r.id] || ""}
                                          onChange={e => setReviewNoteDraft({ ...reviewNoteDraft, [r.id]: e.target.value })}
                                          placeholder={isAdmin ? "Add a note (e.g., 'Need itemized receipt for the $186 charge')" : "Reply to admin notes…"}
                                          style={{ flex: 1, minWidth: 200, minHeight: 60, padding: "8px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 12, fontFamily: "inherit", resize: "vertical" }} />
                                        <Button size="sm" onClick={() => addReviewNote(r.id, reviewNoteDraft[r.id] || "")} disabled={!(reviewNoteDraft[r.id] || "").trim()}>Add Note</Button>
                                      </div>
                                    )}
                                  </div>
                                </div>

                                {hasFiles && (
                                  <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: 12 }}>
                                    <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8, fontWeight: 700 }}>
                                      Attachments · {allFiles.length}
                                    </div>
                                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                      {allFiles.map((f, i) => (
                                        <div key={f.id || i} style={{ borderBottom: i < allFiles.length - 1 ? `1px solid ${COLORS.borderLight}` : "none", paddingBottom: i < allFiles.length - 1 ? 10 : 0 }}>
                                          {f.type?.startsWith("image/") ? (
                                            <a href={f.data} target="_blank" rel="noopener" style={{ display: "block" }}>
                                              <img src={f.data} alt={f.name} style={{ width: "100%", maxHeight: 100, objectFit: "cover", borderRadius: 4 }} />
                                            </a>
                                          ) : (
                                            <div style={{ fontSize: 24, textAlign: "center", color: COLORS.danger, padding: "6px 0" }}>📄</div>
                                          )}
                                          <div style={{ fontSize: 11, color: COLORS.text, marginTop: 4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={f.name}>{f.name}</div>
                                          <Button size="sm" variant="ghost" onClick={() => downloadFile(f.data, f.name)} style={{ marginTop: 4, width: "100%", justifyContent: "center" }}>Download</Button>
                                        </div>
                                      ))}
                                    </div>
                                  </div>
                                )}
                              </div>
                            );
                          })()}
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

function HRCalendarView({ calDate, setCalDate, calFilters, setCalFilters, people, companyEvents, eventRequests, saveHR, isOwnerUser, currentUser, hrSettings }) {
  const [evtForm, setEvtForm] = useState({ date: "", title: "", desc: "" });
  const [reqForm, setReqForm] = useState({ date: "", title: "", desc: "" });

  // ---- Build unified event list (next 12 months window) ----
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const horizonEnd = new Date(today); horizonEnd.setMonth(horizonEnd.getMonth() + 12);

  const items = [];
  // Trading holidays
  if (calFilters.holidays) {
    Object.entries(TRADING_HOLIDAYS).forEach(([dateStr, name]) => {
      const d = new Date(dateStr + "T00:00:00");
      if (d >= today && d <= horizonEnd) items.push({ key: "hol-" + dateStr, date: d, dateStr, type: "holiday", title: name, sub: "Markets closed" });
    });
  }
  // Birthdays — project this year + next year
  if (calFilters.birthdays) {
    people.forEach(p => {
      if (!p.birthday) return;
      const parts = p.birthday.split("-");
      if (parts.length !== 3) return;
      const mm = parseInt(parts[1]), dd = parseInt(parts[2]);
      [today.getFullYear(), today.getFullYear() + 1].forEach(yr => {
        const d = new Date(yr, mm - 1, dd);
        if (d >= today && d <= horizonEnd) {
          const dateStr = `${yr}-${String(mm).padStart(2, "0")}-${String(dd).padStart(2, "0")}`;
          // Age turning
          const birthYear = parseInt(parts[0]);
          const turning = birthYear ? yr - birthYear : null;
          items.push({ key: "bday-" + p.id + "-" + yr, date: d, dateStr, type: "birthday", title: p.name + "'s Birthday", sub: turning ? `Turning ${turning}` : "Birthday", personId: p.id });
        }
      });
    });
  }
  // Company events
  if (calFilters.events) {
    companyEvents.forEach((e, i) => {
      const d = new Date(e.date + "T00:00:00");
      if (d >= today && d <= horizonEnd) items.push({ key: "evt-" + i + "-" + e.date, date: d, dateStr: e.date, type: "event", title: e.title, sub: e.desc || "", eventIdx: i });
    });
    // Recurring events (e.g., Monday morning team meeting)
    projectRecurringEvents(today, horizonEnd).forEach(occ => {
      items.push({
        key: occ.key,
        date: occ.date,
        dateStr: occ.dateStr,
        type: "recurring",
        title: `${occ.icon} ${occ.title}`,
        sub: occ.desc + (occ.time ? ` · ${occ.time} ${occ.timezoneLabel || ""}` : ""),
        recurringId: occ.id,
      });
    });
  }
  items.sort((a, b) => a.date - b.date);

  // ---- Bucket by horizon (matches PointerOS dashboard grouping language) ----
  const oneWeek = new Date(today); oneWeek.setDate(oneWeek.getDate() + 7);
  const oneMonth = new Date(today); oneMonth.setMonth(oneMonth.getMonth() + 1);
  const buckets = { thisWeek: [], thisMonth: [], later: [] };
  items.forEach(it => {
    if (it.date <= oneWeek) buckets.thisWeek.push(it);
    else if (it.date <= oneMonth) buckets.thisMonth.push(it);
    else buckets.later.push(it);
  });

  // ---- Type styling: matches PointerOS task urgency bar pattern ----
  const TYPE_STYLE = {
    holiday:   { bar: COLORS.warning,  bg: "#FFF8E7", icon: "🏦", label: "Trading Holiday" },
    birthday:  { bar: "#DB2777",       bg: "#FCE7F3", icon: "🎂", label: "Birthday" },
    event:     { bar: COLORS.success,  bg: "#E8F5EE", icon: "📌", label: "Company Event" },
    recurring: { bar: COLORS.primary,  bg: "#EAF6FE", icon: "👥", label: "Recurring Meeting" },
  };

  // ---- ICS export ----
  const downloadICS = () => {
    const lines = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//PointerOS//HR//EN", "CALSCALE:GREGORIAN"];
    const stamp = new Date();
    const pad2 = n => String(n).padStart(2, "0");
    const stampStr = `${stamp.getUTCFullYear()}${pad2(stamp.getUTCMonth() + 1)}${pad2(stamp.getUTCDate())}T${pad2(stamp.getUTCHours())}${pad2(stamp.getUTCMinutes())}${pad2(stamp.getUTCSeconds())}Z`;
    const evt = (uid, dateStr, title, desc) => {
      const dt = dateStr.replace(/-/g, "");
      lines.push("BEGIN:VEVENT", "UID:" + uid + "@pointeros.local", "DTSTAMP:" + stampStr, "DTSTART;VALUE=DATE:" + dt, "SUMMARY:" + title.replace(/[,;]/g, " "));
      if (desc) lines.push("DESCRIPTION:" + desc.replace(/[,;]/g, " "));
      lines.push("END:VEVENT");
    };
    if (calFilters.holidays) Object.entries(TRADING_HOLIDAYS).forEach(([d, n], i) => evt("hol-" + i, d, "🏦 " + n, "Markets closed"));
    if (calFilters.birthdays) people.forEach((p, i) => {
      if (!p.birthday) return;
      const [, mm, dd] = p.birthday.split("-");
      [new Date().getFullYear(), new Date().getFullYear() + 1].forEach(yr => evt("bday-" + i + "-" + yr, `${yr}-${mm}-${dd}`, "🎂 " + p.name + "'s Birthday"));
    });
    if (calFilters.events) {
      companyEvents.forEach((e, i) => evt("evt-" + i, e.date, "📌 " + e.title, e.desc || ""));
      // Recurring meetings — emit one occurrence per Monday/etc. across the 12-month horizon
      projectRecurringEvents(today, horizonEnd).forEach(occ => {
        const summary = `${occ.icon} ${occ.title}${occ.time ? " · " + occ.time + " " + (occ.timezoneLabel || "") : ""}`;
        evt(occ.key, occ.dateStr, summary, occ.desc || "");
      });
    }
    lines.push("END:VCALENDAR");
    const blob = new Blob([lines.join("\r\n")], { type: "text/calendar" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "pointeros_calendar.ics"; a.click();
    URL.revokeObjectURL(url);
  };

  const addEvent = () => {
    if (!evtForm.date || !evtForm.title) { alert("Date and title required"); return; }
    saveHR({ companyEvents: [...companyEvents, evtForm] });
    setEvtForm({ date: "", title: "", desc: "" });
  };
  const deleteEvent = (i) => {
    if (!confirm("Remove event?")) return;
    saveHR({ companyEvents: companyEvents.filter((_, idx) => idx !== i) });
  };

  const submitEventRequest = () => {
    if (!reqForm.date || !reqForm.title) { alert("Date and title are required"); return; }
    const request = {
      id: uid(),
      requestedBy: currentUser.id,
      requestedByName: currentUser.name,
      requestedByEmail: currentUser.email || "",
      date: reqForm.date,
      title: reqForm.title,
      desc: reqForm.desc,
      status: "pending",
      submitted: new Date().toISOString(),
    };
    saveHR({ eventRequests: [...(eventRequests || []), request] });
    const recipients = hrSettings?.notifyEmails?.length ? hrSettings.notifyEmails : ["mbruce@pointerfg.com", "asuarez@pointerfg.com"];
    const body =
`An employee has requested a new company event in PointerOS.

Requested by: ${currentUser.name} ${currentUser.email ? "<" + currentUser.email + ">" : ""}
Event date: ${reqForm.date}
Title: ${reqForm.title}

Description:
${reqForm.desc || "(none provided)"}

Approve or deny at: PointerOS → HR Toolsuite → Calendar (Master view)

— Automated message from PointerOS`;
    sendEmail({
      to: recipients,
      subject: `[PFG Event Request] ${reqForm.title} — ${reqForm.date}`,
      body,
    });
    setReqForm({ date: "", title: "", desc: "" });
  };

  const approveEventRequest = (req) => {
    // Promote to companyEvents, mark request as approved
    const newEvent = { date: req.date, title: req.title, desc: req.desc };
    const nextEvents = [...companyEvents, newEvent];
    const nextRequests = (eventRequests || []).map(r => r.id === req.id ? { ...r, status: "approved", reviewedAt: new Date().toISOString(), reviewedBy: currentUser.name } : r);
    saveHR({ companyEvents: nextEvents, eventRequests: nextRequests });
    if (req.requestedByEmail) {
      const ok = confirm(`Approve and email ${req.requestedByName} about the decision?`);
      if (ok) sendEmail({ to: [req.requestedByEmail], subject: `Event approved: ${req.title}`, body: `Your event request for "${req.title}" on ${req.date} has been approved by ${currentUser.name} and added to the company calendar.\n\n— PointerOS` });
    }
  };
  const denyEventRequest = (req) => {
    const nextRequests = (eventRequests || []).map(r => r.id === req.id ? { ...r, status: "denied", reviewedAt: new Date().toISOString(), reviewedBy: currentUser.name } : r);
    saveHR({ eventRequests: nextRequests });
    if (req.requestedByEmail) {
      const ok = confirm(`Deny and email ${req.requestedByName} about the decision?`);
      if (ok) sendEmail({ to: [req.requestedByEmail], subject: `Event request denied: ${req.title}`, body: `Your event request for "${req.title}" on ${req.date} was denied by ${currentUser.name}.\n\n— PointerOS` });
    }
  };
  const removeEventRequest = (id) => {
    if (!confirm("Delete this request?")) return;
    saveHR({ eventRequests: (eventRequests || []).filter(r => r.id !== id) });
  };

  // ---- Single event card (PointerOS style) ----
  const EventCard = ({ item }) => {
    const style = TYPE_STYLE[item.type];
    const dateObj = item.date;
    const monthAbbr = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][dateObj.getMonth()];
    const weekdayAbbr = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][dateObj.getDay()];
    const daysOut = Math.round((dateObj - today) / (1000 * 60 * 60 * 24));
    const daysLabel = daysOut === 0 ? "Today" : daysOut === 1 ? "Tomorrow" : `in ${daysOut} days`;
    return (
      <div style={{ display: "flex", background: COLORS.surface, borderRadius: 10, border: `1px solid ${COLORS.border}`, overflow: "hidden", marginBottom: 8, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
        <div style={{ width: 5, background: style.bar }} />
        <div style={{ width: 64, padding: "12px 8px", textAlign: "center", background: style.bg, borderRight: `1px solid ${COLORS.borderLight}` }}>
          <div style={{ fontSize: 10, fontWeight: 600, color: style.bar, textTransform: "uppercase", letterSpacing: 1 }}>{monthAbbr}</div>
          <div style={{ fontSize: 22, fontWeight: 700, color: COLORS.text, lineHeight: 1 }}>{dateObj.getDate()}</div>
          <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 2 }}>{weekdayAbbr}</div>
        </div>
        <div style={{ flex: 1, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2 }}>
              <span style={{ fontSize: 16 }}>{style.icon}</span>
              <span style={{ fontSize: 14, fontWeight: 600, color: COLORS.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.title}</span>
            </div>
            {item.sub && <div style={{ fontSize: 12, color: COLORS.textMuted, marginLeft: 24 }}>{item.sub}</div>}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <Badge color={style.bar}>{daysLabel}</Badge>
            {item.type === "event" && isOwnerUser && (
              <Button size="sm" variant="ghost" onClick={() => deleteEvent(item.eventIdx)}><IconX size={12} /></Button>
            )}
          </div>
        </div>
      </div>
    );
  };

  const Section = ({ title, items, accent }) => (
    <div style={{ marginBottom: 24 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
        <div style={{ width: 4, height: 16, background: accent, borderRadius: 2 }} />
        <h3 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: COLORS.text }}>{title}</h3>
        <Badge color={COLORS.textMuted}>{items.length}</Badge>
      </div>
      {items.length === 0 ? (
        <div style={{ padding: "12px 16px", color: COLORS.textDim, fontSize: 12, background: COLORS.surface, borderRadius: 10, border: `1px dashed ${COLORS.borderLight}` }}>Nothing scheduled.</div>
      ) : (
        items.map(it => <EventCard key={it.key} item={it} />)
      )}
    </div>
  );

  // ---- Summary stat cards ----
  const counts = {
    week: buckets.thisWeek.length,
    month: buckets.thisMonth.length + buckets.thisWeek.length,
    holidays: items.filter(i => i.type === "holiday").length,
    birthdays: items.filter(i => i.type === "birthday").length,
    events: items.filter(i => i.type === "event").length,
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 20 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Calendar</h2>
          <p style={{ color: COLORS.textMuted, fontSize: 13, margin: "4px 0 0" }}>Trading holidays, team birthdays, and company events — next 12 months.</p>
        </div>
        <Button size="sm" onClick={downloadICS}>📥 Download .ics</Button>
      </div>

      {/* Stat cards */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginBottom: 20 }}>
        <StatCard label="This Week" value={counts.week} color={COLORS.primary} />
        <StatCard label="Next 30 Days" value={counts.month} color={COLORS.primary} />
        <StatCard label="Trading Holidays" value={counts.holidays} color={COLORS.warning} />
        <StatCard label="Birthdays" value={counts.birthdays} color="#DB2777" />
        <StatCard label="Company Events" value={counts.events} color={COLORS.success} />
      </div>

      {/* Filters */}
      <Card style={{ padding: 16, marginBottom: 20 }}>
        <div style={{ display: "flex", gap: 18, flexWrap: "wrap", fontSize: 13, alignItems: "center" }}>
          <span style={{ fontWeight: 600, fontSize: 12, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Show</span>
          <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer" }}>
            <input type="checkbox" checked={calFilters.holidays} onChange={e => setCalFilters({ ...calFilters, holidays: e.target.checked })} />
            <span style={{ width: 10, height: 10, borderRadius: 2, background: COLORS.warning }} /> Trading Holidays
          </label>
          <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer" }}>
            <input type="checkbox" checked={calFilters.birthdays} onChange={e => setCalFilters({ ...calFilters, birthdays: e.target.checked })} />
            <span style={{ width: 10, height: 10, borderRadius: 2, background: "#DB2777" }} /> Birthdays
          </label>
          <label style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer" }}>
            <input type="checkbox" checked={calFilters.events} onChange={e => setCalFilters({ ...calFilters, events: e.target.checked })} />
            <span style={{ width: 10, height: 10, borderRadius: 2, background: COLORS.success }} /> Company Events
          </label>
        </div>
      </Card>

      {/* Grouped timeline */}
      <Section title="This Week" items={buckets.thisWeek} accent={COLORS.success} />
      <Section title="Later This Month" items={buckets.thisMonth} accent={COLORS.warning} />
      <Section title="Coming Up" items={buckets.later} accent={COLORS.textMuted} />

      {/* Add Event — master only / Request Event — everyone else */}
      {isOwnerUser ? (
        <Card style={{ padding: 20, marginTop: 24 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>Add Company Event <span style={{ color: COLORS.textMuted, fontWeight: 400, fontSize: 12 }}>(Master only)</span></div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 10 }}>
            <Input label="Date" type="date" value={evtForm.date} onChange={v => setEvtForm({ ...evtForm, date: v })} />
            <Input label="Title" value={evtForm.title} onChange={v => setEvtForm({ ...evtForm, title: v })} />
            <Input label="Description (optional)" value={evtForm.desc} onChange={v => setEvtForm({ ...evtForm, desc: v })} />
          </div>
          <Button onClick={addEvent} style={{ marginTop: 8 }}><IconPlus size={14} /> Add Event</Button>

          {companyEvents.length > 0 && (
            <div style={{ marginTop: 18 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>All Events ({companyEvents.length})</div>
              <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
                <thead><tr style={{ background: "#F8FAFC", textAlign: "left" }}>
                  <th style={{ padding: "8px" }}>Date</th><th style={{ padding: "8px" }}>Title</th>
                  <th style={{ padding: "8px" }}>Description</th><th></th>
                </tr></thead>
                <tbody>
                  {companyEvents.slice().sort((a, b) => a.date.localeCompare(b.date)).map((e, i) => (
                    <tr key={i} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                      <td style={{ padding: "8px" }}>{e.date}</td>
                      <td style={{ padding: "8px" }}>{e.title}</td>
                      <td style={{ padding: "8px" }}>{e.desc}</td>
                      <td><Button size="sm" variant="danger" onClick={() => deleteEvent(i)}><IconX size={12} /></Button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </Card>
      ) : (
        <Card style={{ padding: 20, marginTop: 24 }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4 }}>Request a Company Event</div>
          <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 12 }}>Only Matt and Alex can add events directly. Submit a request and they'll be notified by email.</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 10 }}>
            <Input label="Date" type="date" value={reqForm.date} onChange={v => setReqForm({ ...reqForm, date: v })} />
            <Input label="Title" value={reqForm.title} onChange={v => setReqForm({ ...reqForm, title: v })} placeholder="Team offsite" />
            <Input label="Description (optional)" value={reqForm.desc} onChange={v => setReqForm({ ...reqForm, desc: v })} placeholder="Half-day team-building" />
          </div>
          <Button onClick={submitEventRequest} style={{ marginTop: 8 }}><IconPlus size={14} /> Submit Request & Notify</Button>

          {/* Show this employee's own requests */}
          {eventRequests && eventRequests.filter(r => r.requestedBy === currentUser.id).length > 0 && (
            <div style={{ marginTop: 18 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>My Requests</div>
              <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
                <thead><tr style={{ background: "#F8FAFC", textAlign: "left" }}>
                  <th style={{ padding: "8px" }}>Date</th><th style={{ padding: "8px" }}>Title</th>
                  <th style={{ padding: "8px" }}>Status</th>
                </tr></thead>
                <tbody>
                  {eventRequests.filter(r => r.requestedBy === currentUser.id).slice().reverse().map(r => (
                    <tr key={r.id} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                      <td style={{ padding: "8px" }}>{r.date}</td>
                      <td style={{ padding: "8px" }}>{r.title}</td>
                      <td style={{ padding: "8px" }}><Badge color={r.status === "approved" ? COLORS.success : r.status === "denied" ? COLORS.danger : COLORS.warning}>{r.status.toUpperCase()}</Badge></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </Card>
      )}

      {/* Pending event requests — only visible to master users */}
      {isOwnerUser && eventRequests && eventRequests.filter(r => r.status === "pending").length > 0 && (
        <Card style={{ padding: 20, marginTop: 16, borderLeft: `4px solid ${COLORS.warning}` }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>
            ⏳ Pending Event Requests <span style={{ fontWeight: 400, color: COLORS.textMuted }}>({eventRequests.filter(r => r.status === "pending").length})</span>
          </div>
          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
            <thead><tr style={{ background: "#FFF8E7", textAlign: "left" }}>
              <th style={{ padding: "8px" }}>Date</th><th style={{ padding: "8px" }}>Title</th>
              <th style={{ padding: "8px" }}>Description</th><th style={{ padding: "8px" }}>Requested by</th>
              <th style={{ padding: "8px" }}>Actions</th>
            </tr></thead>
            <tbody>
              {eventRequests.filter(r => r.status === "pending").map(r => (
                <tr key={r.id} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                  <td style={{ padding: "8px" }}>{r.date}</td>
                  <td style={{ padding: "8px", fontWeight: 600 }}>{r.title}</td>
                  <td style={{ padding: "8px", color: COLORS.textMuted }}>{r.desc}</td>
                  <td style={{ padding: "8px" }}>{r.requestedByName}</td>
                  <td style={{ padding: "8px" }}>
                    <Button size="sm" onClick={() => approveEventRequest(r)}>Approve</Button>{" "}
                    <Button size="sm" variant="danger" onClick={() => denyEventRequest(r)}>Deny</Button>{" "}
                    <Button size="sm" variant="ghost" onClick={() => removeEventRequest(r.id)}><IconTrash size={12} /></Button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}
    </div>
  );
}
