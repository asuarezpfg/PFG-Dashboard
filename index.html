        </div>
      </div>

      <Card style={{ padding: 20, marginBottom: 16 }}>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>Add Event</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 2fr 1fr auto", gap: 10, alignItems: "end" }}>
          <Input label="Date" type="date" value={form.date} onChange={v => setForm({ ...form, date: v })} />
          <Input label="Time" value={form.time} onChange={v => setForm({ ...form, time: v })} placeholder="8:30 AM ET" />
          <Input label="Event Title" value={form.title} onChange={v => setForm({ ...form, title: v })} placeholder="CPI (May)" />
          <Select label="Impact" value={form.impact} onChange={v => setForm({ ...form, impact: v })} options={[{ value: "high", label: "High" }, { value: "medium", label: "Medium" }, { value: "low", label: "Low" }]} />
          <Button onClick={addEvent} style={{ marginBottom: 12 }}><IconPlus size={14} /> Add</Button>
        </div>
      </Card>

      <Card style={{ padding: 0, overflow: "hidden" }}>
        <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ background: "#F8FAFC", textAlign: "left" }}>
              <th style={{ padding: "10px 12px" }}>Date</th>
              <th style={{ padding: "10px 12px" }}>Time</th>
              <th style={{ padding: "10px 12px" }}>Event</th>
              <th style={{ padding: "10px 12px" }}>Impact</th>
              <th style={{ padding: "10px 12px" }}></th>
            </tr>
          </thead>
          <tbody>
            {sorted.map((e, i) => (
              <tr key={i} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                <td style={{ padding: "8px 12px", fontWeight: 600 }}>{e.date}</td>
                <td style={{ padding: "8px 12px", color: COLORS.textMuted }}>{e.time}</td>
                <td style={{ padding: "8px 12px" }}>{e.title}</td>
                <td style={{ padding: "8px 12px" }}><Badge color={impactColor(e.impact)}>{e.impact.toUpperCase()}</Badge></td>
                <td style={{ padding: "8px" }}><Button size="sm" variant="ghost" onClick={() => removeEvent(calendar.indexOf(e))}><IconTrash size={12} /></Button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

// ============================================================
// STOCK DASHBOARD (replaces the old options-positions tracker)
// — view-only for non-owners; owners can add/remove the universe
// ============================================================
// ============================================================
// STOCK DETAIL MODAL — full fundamentals, earnings, revenue per ticker.
// Opens when clicking any ticker symbol anywhere in the dashboard.
// ============================================================
// ============================================================
// POINTEROS SIGNAL — rule-based dislocation scanner
// Scans all sub-industry ETFs across two windows (30-day and YTD)
// and flags the top 3 most-dislocated (laggards) and top 3 strongest (leaders).
// Uses z-scores vs the universe mean for "dislocation."
// This is a quantitative signal, not investment advice.
// ============================================================
// ============================================================
// DRAWDOWN SCANNER — peak-to-trough drawdowns + current % off high
// Scans all sub-industry ETFs across selectable lookback windows.
// Surfaces deep-value / oversold candidates ranked by drawdown.
// ============================================================
function DrawdownScanner({ onOpenSector, onOpenStock }) {
  const [windowKey, setWindowKey] = useState("18mo"); // selectable
  const [parentFilter, setParentFilter] = useState("ALL");
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [progress, setProgress] = useState({ done: 0, total: ALL_SUB_INDUSTRIES.length });
  const [error, setError] = useState(null);
  const [sortBy, setSortBy] = useState("currentDD");
  const [sortDir, setSortDir] = useState("asc");     // asc = most negative first
  const [searchQuery, setSearchQuery] = useState("");
  const [columnFilters, setColumnFilters] = useState({
    // Each numeric column has { min, max } where empty string = unbounded
    last:      { min: "", max: "" },
    windowRet: { min: "", max: "" },
    currentDD: { min: "", max: "" },
    maxDD:     { min: "", max: "" },
    dd52w:     { min: "", max: "" },
  });
  const [holdingsFor, setHoldingsFor] = useState(null);
  const [holdingsData, setHoldingsData] = useState(null);
  const [holdingsLoading, setHoldingsLoading] = useState(false);

  // Window definitions: Yahoo range + how many trading days that represents
  const WINDOWS = {
    "1mo":  { yahoo: "1mo",  label: "1 Month",   tradingDays: 21 },
    "3mo":  { yahoo: "3mo",  label: "3 Months",  tradingDays: 63 },
    "6mo":  { yahoo: "6mo",  label: "6 Months",  tradingDays: 126 },
    "1y":   { yahoo: "1y",   label: "1 Year",    tradingDays: 252 },
    "18mo": { yahoo: "2y",   label: "18 Months", tradingDays: 378 },  // use 2y range, slice
    "2y":   { yahoo: "2y",   label: "2 Years",   tradingDays: 504 },
  };

  const runScan = useCallback(async () => {
    setLoading(true); setError(null);
    setProgress({ done: 0, total: ALL_SUB_INDUSTRIES.length });
    const win = WINDOWS[windowKey];
    try {
      const out = [];
      let done = 0;
      // Always fetch 1y too for the 52W high/low column
      for (const item of ALL_SUB_INDUSTRIES) {
        try {
          const [windowData, oneYr] = await Promise.all([
            fetchYahoo(item.sym, win.yahoo, "1d").catch(() => null),
            (win.yahoo === "1y") ? Promise.resolve(null) : fetchYahoo(item.sym, "1y", "1d").catch(() => null),
          ]);
          if (windowData) {
            const closes = windowData.closes.filter(c => c !== null);
            const ts = (windowData.ts || []).filter((_, i) => windowData.closes[i] !== null);
            if (closes.length >= 2) {
              // Trim to exact trading-day window if longer (e.g., 18mo from 2y data)
              const slicedCloses = closes.length > win.tradingDays
                ? closes.slice(closes.length - win.tradingDays)
                : closes;
              const slicedTs = ts.length > win.tradingDays
                ? ts.slice(ts.length - win.tradingDays)
                : ts;

              const last = slicedCloses[slicedCloses.length - 1];
              const start = slicedCloses[0];
              const peak = Math.max(...slicedCloses);
              const trough = Math.min(...slicedCloses);
              const peakIdx = slicedCloses.indexOf(peak);
              const troughIdx = slicedCloses.indexOf(trough);

              const windowRet = ((last - start) / start) * 100;
              // Peak-to-trough drawdown = worst drawdown in the window
              // We compute the max drawdown by walking the series
              let runningMax = slicedCloses[0];
              let maxDD = 0;
              let maxDDStart = null, maxDDEnd = null;
              let curMaxStart = 0;
              for (let i = 0; i < slicedCloses.length; i++) {
                if (slicedCloses[i] > runningMax) {
                  runningMax = slicedCloses[i];
                  curMaxStart = i;
                }
                const dd = (slicedCloses[i] - runningMax) / runningMax * 100;
                if (dd < maxDD) {
                  maxDD = dd;
                  maxDDStart = curMaxStart;
                  maxDDEnd = i;
                }
              }
              // Current DD from window peak
              const currentDD = ((last - peak) / peak) * 100;

              // 52-week stats from oneYr if available, else fall back to window data
              const yrData = oneYr || windowData;
              const yrCloses = yrData.closes.filter(c => c !== null);
              const fiftyTwoHigh = yrCloses.length ? Math.max(...yrCloses) : peak;
              const fiftyTwoLow = yrCloses.length ? Math.min(...yrCloses) : trough;
              const dd52w = ((last - fiftyTwoHigh) / fiftyTwoHigh) * 100;

              out.push({
                ...item,
                last,
                peak,
                trough,
                peakDate: slicedTs[peakIdx] ? new Date(slicedTs[peakIdx] * 1000) : null,
                troughDate: slicedTs[troughIdx] ? new Date(slicedTs[troughIdx] * 1000) : null,
                windowRet,
                currentDD,
                maxDD,
                maxDDStart: maxDDStart != null && slicedTs[maxDDStart] ? new Date(slicedTs[maxDDStart] * 1000) : null,
                maxDDEnd: maxDDEnd != null && slicedTs[maxDDEnd] ? new Date(slicedTs[maxDDEnd] * 1000) : null,
                fiftyTwoHigh, fiftyTwoLow, dd52w,
              });
            }
          }
        } catch (e) { /* skip */ }
        done++;
        setProgress({ done, total: ALL_SUB_INDUSTRIES.length });
      }
      setResults(out);
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  }, [windowKey]);

  useEffect(() => { runScan(); }, [runScan]);

  // Multi-stage filter pipeline:
  //  1. sector dropdown
  //  2. text search across ticker, industry name, parent sector name
  //  3. per-column numeric ranges
  const passesColumnFilter = (val, range) => {
    if (val == null) return range.min === "" && range.max === "";
    if (range.min !== "" && val < parseFloat(range.min)) return false;
    if (range.max !== "" && val > parseFloat(range.max)) return false;
    return true;
  };
  const filtered = results.filter(r => {
    // sector filter
    if (parentFilter !== "ALL" && r.parent !== parentFilter) return false;
    // text search
    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      const parentName = SECTOR_ETFS.find(s => s.sym === r.parent)?.name?.toLowerCase() || "";
      const haystack = `${r.sym} ${r.name} ${parentName}`.toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    // column filters
    if (!passesColumnFilter(r.last,      columnFilters.last))      return false;
    if (!passesColumnFilter(r.windowRet, columnFilters.windowRet)) return false;
    if (!passesColumnFilter(r.currentDD, columnFilters.currentDD)) return false;
    if (!passesColumnFilter(r.maxDD,     columnFilters.maxDD))     return false;
    if (!passesColumnFilter(r.dd52w,     columnFilters.dd52w))     return false;
    return true;
  });

  // Sort with direction
  const sortFns = {
    sym:       (a, b) => a.sym.localeCompare(b.sym),
    name:      (a, b) => a.name.localeCompare(b.name),
    parent:    (a, b) => (SECTOR_ETFS.find(s => s.sym === a.parent)?.name || "").localeCompare(SECTOR_ETFS.find(s => s.sym === b.parent)?.name || ""),
    last:      (a, b) => (a.last ?? 0) - (b.last ?? 0),
    windowRet: (a, b) => (a.windowRet ?? 0) - (b.windowRet ?? 0),
    currentDD: (a, b) => (a.currentDD ?? 0) - (b.currentDD ?? 0),
    peakDD:    (a, b) => (a.maxDD ?? 0) - (b.maxDD ?? 0),
    dd52w:     (a, b) => (a.dd52w ?? 0) - (b.dd52w ?? 0),
  };
  const sorted = [...filtered].sort((a, b) => {
    const fn = sortFns[sortBy] || sortFns.currentDD;
    const cmp = fn(a, b);
    return sortDir === "desc" ? -cmp : cmp;
  });

  // Toggle sort: clicking same column flips direction; clicking new column starts asc
  const toggleSort = (col) => {
    if (sortBy === col) {
      setSortDir(d => d === "asc" ? "desc" : "asc");
    } else {
      setSortBy(col);
      // For DD columns default to ascending (most-negative first); for others descending
      setSortDir(["currentDD", "peakDD", "dd52w", "windowRet"].includes(col) ? "asc" : "desc");
    }
  };
  const SortIcon = ({ col }) => {
    if (sortBy !== col) return <span style={{ opacity: 0.3, marginLeft: 4 }}>↕</span>;
    return <span style={{ marginLeft: 4, color: COLORS.primary }}>{sortDir === "asc" ? "▲" : "▼"}</span>;
  };

  const clearAllFilters = () => {
    setSearchQuery("");
    setParentFilter("ALL");
    setColumnFilters({
      last:      { min: "", max: "" },
      windowRet: { min: "", max: "" },
      currentDD: { min: "", max: "" },
      maxDD:     { min: "", max: "" },
      dd52w:     { min: "", max: "" },
    });
  };
  const hasActiveFilters = searchQuery.trim() !== "" || parentFilter !== "ALL" ||
    Object.values(columnFilters).some(f => f.min !== "" || f.max !== "");

  const parentName = (p) => SECTOR_ETFS.find(s => s.sym === p)?.name || p;
  const fmtPct = (n) => n == null ? "—" : (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
  const heatColor = (pct) => {
    if (pct == null) return "#9CA3AF";
    if (pct >= 0) return "#1FB67D";
    if (pct >= -5) return "#86EFAC";
    if (pct >= -10) return "#FCD34D";
    if (pct >= -20) return "#FB923C";
    if (pct >= -35) return "#DC2626";
    return "#7F1D1D";
  };

  // Holdings drill-in
  const showHoldings = async (symbol) => {
    setHoldingsFor(symbol);
    setHoldingsLoading(true);
    setHoldingsData(null);
    const h = await fetchETFHoldings(symbol);
    setHoldingsData(h);
    setHoldingsLoading(false);
  };

  return (
    <Card style={{ padding: 18, marginBottom: 16, background: COLORS.surface, borderTop: `3px solid ${COLORS.danger}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 14 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: COLORS.danger }} />
            <div style={{ fontSize: 11, color: COLORS.danger, textTransform: "uppercase", letterSpacing: 2, fontWeight: 700 }}>PointerOS Drawdown Scanner</div>
          </div>
          <div style={{ fontSize: 18, fontWeight: 700, color: COLORS.text, marginTop: 4 }}>Peak-to-Trough · Current Drawdown · 52W Off-High</div>
          <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 4, lineHeight: 1.5, maxWidth: 720 }}>
            Scans all {ALL_SUB_INDUSTRIES.length} sub-industry ETFs across a selectable lookback. <b>"Current DD"</b> = % off the window peak. <b>"Peak DD"</b> = worst drawdown anywhere in the window. <b>"52W Off-High"</b> = current price vs trailing 52-week high. Deep negatives may indicate value opportunities — verify fundamentals.
          </div>
        </div>
      </div>

      {/* Controls */}
      <div style={{ display: "flex", gap: 10, marginBottom: 14, flexWrap: "wrap", alignItems: "flex-end" }}>
        <div>
          <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600, marginBottom: 4 }}>Window</div>
          <select value={windowKey} onChange={e => setWindowKey(e.target.value)}
            style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit", background: COLORS.surface, fontWeight: 600 }}>
            {Object.entries(WINDOWS).map(([key, w]) => (
              <option key={key} value={key}>{w.label}</option>
            ))}
          </select>
        </div>
        <div>
          <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600, marginBottom: 4 }}>Sector</div>
          <select value={parentFilter} onChange={e => setParentFilter(e.target.value)}
            style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit", background: COLORS.surface }}>
            <option value="ALL">All sectors ({results.length})</option>
            {SECTOR_ETFS.map(s => {
              const count = results.filter(r => r.parent === s.sym).length;
              return <option key={s.sym} value={s.sym}>{s.name} ({count})</option>;
            })}
          </select>
        </div>
        <div style={{ flex: 1, minWidth: 180 }}>
          <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600, marginBottom: 4 }}>Search</div>
          <input
            type="text"
            value={searchQuery}
            onChange={e => setSearchQuery(e.target.value)}
            placeholder="Ticker, industry, sector…"
            style={{ width: "100%", padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit", boxSizing: "border-box" }}
          />
        </div>
        {hasActiveFilters && (
          <Button size="sm" variant="ghost" onClick={clearAllFilters}>Clear filters</Button>
        )}
        <Button size="sm" variant="ghost" onClick={runScan} disabled={loading}>
          {loading ? `Scanning ${progress.done}/${progress.total}…` : "↻ Rescan"}
        </Button>
      </div>

      {error && (
        <div style={{ padding: 10, background: COLORS.danger + "11", borderRadius: 6, fontSize: 12, color: COLORS.danger, marginBottom: 12 }}>
          Scan error: {error}
        </div>
      )}

      {/* Progress bar */}
      {loading && (
        <div style={{ marginBottom: 12 }}>
          <div style={{ height: 4, background: COLORS.bg, borderRadius: 2, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${(progress.done / progress.total) * 100}%`, background: COLORS.primary, transition: "width 0.2s" }} />
          </div>
          <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 4 }}>
            Scanned {progress.done} of {progress.total} ETFs · ~{Math.max(0, Math.ceil((progress.total - progress.done) * 0.6))}s remaining
          </div>
        </div>
      )}

      {/* Results table */}
      {!loading && sorted.length === 0 ? (
        <div style={{ padding: 30, textAlign: "center", color: COLORS.textMuted, fontSize: 13 }}>
          No results. Try a different filter or rescan.
        </div>
      ) : sorted.length > 0 && (
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse", minWidth: 900 }}>
            <thead>
              <tr style={{ background: COLORS.bg, textAlign: "left" }}>
                <th onClick={() => toggleSort("sym")} style={{ padding: "10px", position: "sticky", left: 0, background: COLORS.bg, cursor: "pointer", userSelect: "none" }}>ETF<SortIcon col="sym" /></th>
                <th onClick={() => toggleSort("name")} style={{ padding: "10px", cursor: "pointer", userSelect: "none" }}>Industry<SortIcon col="name" /></th>
                <th onClick={() => toggleSort("parent")} style={{ padding: "10px", cursor: "pointer", userSelect: "none" }}>Sector<SortIcon col="parent" /></th>
                <th onClick={() => toggleSort("last")} style={{ padding: "10px", textAlign: "right", cursor: "pointer", userSelect: "none" }}>Last<SortIcon col="last" /></th>
                <th onClick={() => toggleSort("windowRet")} style={{ padding: "10px", textAlign: "right", cursor: "pointer", userSelect: "none" }}>{WINDOWS[windowKey].label} Return<SortIcon col="windowRet" /></th>
                <th onClick={() => toggleSort("currentDD")} style={{ padding: "10px", textAlign: "right", cursor: "pointer", userSelect: "none" }}>Current DD<SortIcon col="currentDD" /></th>
                <th onClick={() => toggleSort("peakDD")} style={{ padding: "10px", textAlign: "right", cursor: "pointer", userSelect: "none" }}>Peak-to-Trough DD<SortIcon col="peakDD" /></th>
                <th onClick={() => toggleSort("dd52w")} style={{ padding: "10px", textAlign: "right", cursor: "pointer", userSelect: "none" }}>52W Off-High<SortIcon col="dd52w" /></th>
                <th style={{ padding: "10px" }}>Holdings</th>
              </tr>
              {/* Per-column filter row */}
              <tr style={{ background: COLORS.surface }}>
                <th style={{ padding: "4px 10px", position: "sticky", left: 0, background: COLORS.surface, borderBottom: `1px solid ${COLORS.border}` }}></th>
                <th style={{ padding: "4px 10px", borderBottom: `1px solid ${COLORS.border}` }}></th>
                <th style={{ padding: "4px 10px", borderBottom: `1px solid ${COLORS.border}` }}></th>
                {["last", "windowRet", "currentDD", "maxDD", "dd52w"].map(col => (
                  <th key={col} style={{ padding: "4px 6px", borderBottom: `1px solid ${COLORS.border}` }}>
                    <div style={{ display: "flex", gap: 3, justifyContent: "flex-end" }}>
                      <input type="number" placeholder="min" value={columnFilters[col].min}
                        onChange={e => setColumnFilters(prev => ({ ...prev, [col]: { ...prev[col], min: e.target.value } }))}
                        style={{ width: 50, padding: "2px 4px", fontSize: 11, border: `1px solid ${COLORS.borderLight}`, borderRadius: 3, fontFamily: "inherit", textAlign: "right" }} />
                      <input type="number" placeholder="max" value={columnFilters[col].max}
                        onChange={e => setColumnFilters(prev => ({ ...prev, [col]: { ...prev[col], max: e.target.value } }))}
                        style={{ width: 50, padding: "2px 4px", fontSize: 11, border: `1px solid ${COLORS.borderLight}`, borderRadius: 3, fontFamily: "inherit", textAlign: "right" }} />
                    </div>
                  </th>
                ))}
                <th style={{ padding: "4px 10px", borderBottom: `1px solid ${COLORS.border}` }}></th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(r => (
                <tr key={r.sym} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                  <td style={{ padding: "8px 10px", position: "sticky", left: 0, background: COLORS.surface }}>
                    <TickerAction symbol={r.sym} onOpenDetail={onOpenStock} style={{ fontSize: 12 }} />
                  </td>
                  <td style={{ padding: "8px 10px" }}>{r.name}</td>
                  <td style={{ padding: "8px 10px" }}>
                    <button onClick={() => { const sObj = SECTOR_ETFS.find(s => s.sym === r.parent); if (sObj) onOpenSector(sObj); }}
                      style={{ background: "none", border: "none", padding: 0, fontFamily: "inherit", fontSize: 11, color: COLORS.primary, cursor: "pointer", textDecoration: "underline" }}>
                      {parentName(r.parent)}
                    </button>
                  </td>
                  <td style={{ padding: "8px 10px", textAlign: "right", color: COLORS.textMuted }}>${r.last.toFixed(2)}</td>
                  <td style={{ padding: "8px 10px", textAlign: "right" }}>
                    <span style={{ display: "inline-block", padding: "2px 8px", borderRadius: 4, background: heatColor(r.windowRet), color: "white", fontWeight: 700, minWidth: 64, textAlign: "center" }}>{fmtPct(r.windowRet)}</span>
                  </td>
                  <td style={{ padding: "8px 10px", textAlign: "right" }}>
                    <span style={{ display: "inline-block", padding: "2px 8px", borderRadius: 4, background: heatColor(r.currentDD), color: "white", fontWeight: 700, minWidth: 64, textAlign: "center" }}>{fmtPct(r.currentDD)}</span>
                  </td>
                  <td style={{ padding: "8px 10px", textAlign: "right" }}>
                    <div>
                      <span style={{ display: "inline-block", padding: "2px 8px", borderRadius: 4, background: heatColor(r.maxDD), color: "white", fontWeight: 700, minWidth: 64, textAlign: "center" }}>{fmtPct(r.maxDD)}</span>
                    </div>
                    {r.maxDDStart && r.maxDDEnd && (
                      <div style={{ fontSize: 9, color: COLORS.textDim, marginTop: 2 }}>
                        {r.maxDDStart.toLocaleDateString([], { month: "short", year: "2-digit" })} → {r.maxDDEnd.toLocaleDateString([], { month: "short", year: "2-digit" })}
                      </div>
                    )}
                  </td>
                  <td style={{ padding: "8px 10px", textAlign: "right" }}>
                    <span style={{ display: "inline-block", padding: "2px 8px", borderRadius: 4, background: heatColor(r.dd52w), color: "white", fontWeight: 700, minWidth: 64, textAlign: "center" }}>{fmtPct(r.dd52w)}</span>
                  </td>
                  <td style={{ padding: "8px 10px" }}>
                    <button onClick={() => showHoldings(r.sym)}
                      style={{ background: "none", border: `1px solid ${COLORS.border}`, padding: "3px 8px", borderRadius: 4, fontFamily: "inherit", fontSize: 11, color: COLORS.text, cursor: "pointer" }}>
                      Top 10 →
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      <div style={{ marginTop: 12, padding: 10, background: COLORS.bg, borderRadius: 6, fontSize: 11, color: COLORS.textDim, lineHeight: 1.5 }}>
        Window: <b style={{ color: COLORS.text }}>{WINDOWS[windowKey].label}</b> · Universe: <b style={{ color: COLORS.text }}>{ALL_SUB_INDUSTRIES.length}</b> ETFs · Showing: <b style={{ color: COLORS.text }}>{sorted.length}</b> of <b>{results.length}</b>{hasActiveFilters && <> · <span style={{ color: COLORS.primary, fontWeight: 600 }}>filters active</span></>}. Click any column header to sort, type in the filter row to narrow.
      </div>

      {/* Holdings modal */}
      <Modal open={!!holdingsFor} onClose={() => { setHoldingsFor(null); setHoldingsData(null); }} title={holdingsFor ? `${holdingsFor} — Top Holdings` : ""}>
        {holdingsLoading && (
          <div style={{ padding: 24, background: COLORS.bg, borderRadius: 8 }}>
            <LoadingBar label={`Loading top holdings for ${holdingsFor}…`} height={5} />
          </div>
        )}
        {!holdingsLoading && !holdingsData && (
          <div style={{ padding: 20, background: COLORS.gold + "15", borderRadius: 8, fontSize: 13, color: COLORS.text }}>
            Holdings data not available for this ETF. <a href={morningstarUrl(holdingsFor)} target="_blank" rel="noopener" style={{ color: COLORS.primary, fontWeight: 600 }}>View on Morningstar →</a>
          </div>
        )}
        {!holdingsLoading && holdingsData && (
          <div>
            {holdingsData.holdings && holdingsData.holdings.length > 0 ? (
              <Card style={{ padding: 14, marginBottom: 12 }}>
                <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10, fontWeight: 600 }}>Top 10 Holdings</div>
                <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse" }}>
                  <thead><tr style={{ background: COLORS.bg, textAlign: "left" }}>
                    <th style={{ padding: "6px 10px" }}>Ticker</th>
                    <th style={{ padding: "6px 10px" }}>Name</th>
                    <th style={{ padding: "6px 10px", textAlign: "right" }}>Weight</th>
                  </tr></thead>
                  <tbody>
                    {holdingsData.holdings.map((h, i) => (
                      <tr key={i} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                        <td style={{ padding: "6px 10px" }}>
                          <TickerAction symbol={h.symbol} onOpenDetail={(s) => { setHoldingsFor(null); onOpenStock && onOpenStock(s); }} style={{ fontSize: 12 }} />
                        </td>
                        <td style={{ padding: "6px 10px" }}>{h.name}</td>
                        <td style={{ padding: "6px 10px", textAlign: "right", fontWeight: 700 }}>{h.weight != null ? (h.weight * 100).toFixed(2) + "%" : "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </Card>
            ) : (
              <div style={{ padding: 14, fontSize: 12, color: COLORS.textMuted }}>No holdings returned by Yahoo for this ETF.</div>
            )}
            {holdingsData.sectorWeights && holdingsData.sectorWeights.length > 0 && (
              <Card style={{ padding: 14 }}>
                <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10, fontWeight: 600 }}>Sector Breakdown</div>
                <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse" }}>
                  <tbody>
                    {holdingsData.sectorWeights.map((s, i) => (
                      <tr key={i} style={{ borderTop: i === 0 ? "none" : `1px solid ${COLORS.borderLight}` }}>
                        <td style={{ padding: "6px 10px", textTransform: "capitalize" }}>{s.name?.replace(/_/g, " ")}</td>
                        <td style={{ padding: "6px 10px", textAlign: "right", fontWeight: 700 }}>{s.weight != null ? (s.weight * 100).toFixed(2) + "%" : "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </Card>
            )}
            <div style={{ marginTop: 12, fontSize: 11, color: COLORS.textDim, textAlign: "center" }}>
              Data from Yahoo's topHoldings endpoint · last updated quarterly by fund issuer
            </div>
          </div>
        )}
      </Modal>
    </Card>
  );
}

function PointerOSSignal({ onOpenSector, onOpenStock }) {
  const [scanResults, setScanResults] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const runScan = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      // For each sub-industry ETF, compute 60-day and YTD returns.
      // 60-day = ~3-month range from Yahoo (close enough to 60 trading days).
      const results = [];
      for (const item of ALL_SUB_INDUSTRIES) {
        try {
          const [sixtyDay, ytd] = await Promise.all([
            fetchYahoo(item.sym, "3mo", "1d").catch(() => null),
            fetchYahoo(item.sym, "ytd", "1d").catch(() => null),
          ]);
          // Pull last 60 trading days from the 3mo window
          const sixtyDayReturn = (() => {
            if (!sixtyDay) return null;
            const c = sixtyDay.closes.filter(x => x !== null);
            if (c.length < 2) return null;
            // Use trailing 60 trading days if we have them, else whatever we have
            const start = c.length > 60 ? c[c.length - 60] : c[0];
            return ((c[c.length - 1] - start) / start) * 100;
          })();
          const ret = (data) => {
            if (!data) return null;
            const c = data.closes.filter(x => x !== null);
            if (c.length < 2) return null;
            return ((c[c.length - 1] - c[0]) / c[0]) * 100;
          };
          const yr = ret(ytd);
          if (sixtyDayReturn != null || yr != null) {
            results.push({ ...item, sixtyDay: sixtyDayReturn, ytd: yr });
          }
        } catch (e) { /* skip */ }
      }

      // Compute z-scores for 60-day window (the dislocation signal)
      const valid60 = results.filter(r => r.sixtyDay != null).map(r => r.sixtyDay);
      const mean60 = valid60.reduce((s, v) => s + v, 0) / (valid60.length || 1);
      const sd60 = Math.sqrt(valid60.reduce((s, v) => s + (v - mean60) ** 2, 0) / (valid60.length || 1));
      const enriched = results.map(r => ({
        ...r,
        z60: (r.sixtyDay != null && sd60 > 0) ? (r.sixtyDay - mean60) / sd60 : null,
      }));

      // Top 5 dislocations (most negative z) and top 5 leaders (most positive z)
      const dislocations = enriched
        .filter(r => r.z60 != null)
        .sort((a, b) => a.z60 - b.z60)
        .slice(0, 5);
      const leaders = enriched
        .filter(r => r.z60 != null)
        .sort((a, b) => b.z60 - a.z60)
        .slice(0, 5);

      // Sector-level aggregates: mean 60-day return per parent sector
      const bySector = {};
      enriched.forEach(r => {
        if (r.sixtyDay == null) return;
        if (!bySector[r.parent]) bySector[r.parent] = [];
        bySector[r.parent].push(r.sixtyDay);
      });
      const sectorRanking = Object.entries(bySector).map(([parent, returns]) => {
        const sectorMeta = SECTOR_ETFS.find(s => s.sym === parent);
        const avg = returns.reduce((s, v) => s + v, 0) / returns.length;
        return {
          sym: parent,
          name: sectorMeta?.name || parent,
          avg,
          count: returns.length,
          z: sd60 > 0 ? (avg - mean60) / sd60 : 0,
        };
      }).sort((a, b) => a.avg - b.avg);

      setScanResults({
        dislocations,
        leaders,
        sectorRanking,
        universeMean: mean60,
        universeStdev: sd60,
        scannedAt: new Date(),
      });
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  }, []);

  useEffect(() => { runScan(); }, [runScan]);

  const parentSectorName = (parentSym) => SECTOR_ETFS.find(s => s.sym === parentSym)?.name || parentSym;

  // Format a row
  const SignalRow = ({ item, type }) => {
    const sector = SECTOR_ETFS.find(s => s.sym === item.parent);
    const sign = item.sixtyDay >= 0 ? "+" : "";
    return (
      <div style={{ padding: 12, background: COLORS.surface, borderRadius: 8, border: `1px solid ${COLORS.border}`, borderLeft: `4px solid ${type === "dislocation" ? COLORS.danger : COLORS.success}`, marginBottom: 8 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
              <TickerAction symbol={item.sym} onOpenDetail={onOpenStock} style={{ fontSize: 14 }} />
              <span style={{ fontSize: 13, color: COLORS.text, fontWeight: 600 }}>{item.name}</span>
            </div>
            <div style={{ fontSize: 11, color: COLORS.textMuted }}>
              Sector: <button onClick={() => sector && onOpenSector && onOpenSector(sector)}
                style={{ background: "none", border: "none", padding: 0, fontFamily: "inherit", fontSize: 11, color: COLORS.primary, cursor: "pointer", textDecoration: "underline" }}>
                {parentSectorName(item.parent)}
              </button>
            </div>
          </div>
          <div style={{ textAlign: "right", flexShrink: 0 }}>
            <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 0.5, fontWeight: 600 }}>60-Day</div>
            <div style={{ fontSize: 18, fontWeight: 800, color: item.sixtyDay >= 0 ? COLORS.success : COLORS.danger }}>
              {sign}{item.sixtyDay?.toFixed(2)}%
            </div>
            <div style={{ fontSize: 10, color: COLORS.textDim, marginTop: 2 }}>
              z-score: <b style={{ color: COLORS.text }}>{item.z60?.toFixed(2)}σ</b>
            </div>
          </div>
        </div>
      </div>
    );
  };

  return (
    <Card style={{ padding: 18, marginBottom: 16, background: `linear-gradient(135deg, ${COLORS.bg} 0%, ${COLORS.surface} 100%)`, borderTop: `3px solid ${COLORS.gold}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: COLORS.gold }} />
            <div style={{ fontSize: 11, color: COLORS.primary, textTransform: "uppercase", letterSpacing: 2, fontWeight: 700 }}>PointerOS Signal</div>
          </div>
          <div style={{ fontSize: 18, fontWeight: 700, color: COLORS.text, marginTop: 4 }}>60-Day Dislocations & Momentum</div>
          <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 4, lineHeight: 1.5, maxWidth: 720 }}>
            Quantitative scan across {ALL_SUB_INDUSTRIES.length} sub-industry ETFs. Z-scores measure how far each ETF's trailing 60-day return is from the universe mean. <b>Negative z = laggard / potential opportunity. Positive z = leader / momentum.</b>
          </div>
        </div>
        <Button size="sm" variant="ghost" onClick={runScan}>{loading ? "Scanning…" : "↻ Rescan"}</Button>
      </div>

      {error && (
        <div style={{ padding: 10, background: COLORS.danger + "11", borderRadius: 6, fontSize: 12, color: COLORS.danger, marginBottom: 12 }}>
          Scan failed: {error}
        </div>
      )}

      {loading && !scanResults && (
        <div style={{ padding: 30, textAlign: "center", color: COLORS.textMuted, fontSize: 13 }}>
          Scanning {ALL_SUB_INDUSTRIES.length} sub-industries… This takes ~60 seconds on first load.
        </div>
      )}

      {scanResults && (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 16 }}>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.danger, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>▼ Top 5 Dislocations</div>
              <div style={{ fontSize: 10, color: COLORS.textMuted, marginBottom: 8 }}>Most negative 60-day z-scores</div>
              {scanResults.dislocations.length === 0 ? (
                <div style={{ fontSize: 12, color: COLORS.textMuted, fontStyle: "italic" }}>No dislocations detected.</div>
              ) : scanResults.dislocations.map(item => (
                <SignalRow key={item.sym} item={item} type="dislocation" />
              ))}
            </div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.success, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>▲ Top 5 Momentum Leaders</div>
              <div style={{ fontSize: 10, color: COLORS.textMuted, marginBottom: 8 }}>Most positive 60-day z-scores</div>
              {scanResults.leaders.length === 0 ? (
                <div style={{ fontSize: 12, color: COLORS.textMuted, fontStyle: "italic" }}>No clear leaders detected.</div>
              ) : scanResults.leaders.map(item => (
                <SignalRow key={item.sym} item={item} type="leader" />
              ))}
            </div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.primary, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>● Sector Breakdown</div>
              <div style={{ fontSize: 10, color: COLORS.textMuted, marginBottom: 8 }}>Average 60-day return across sub-industries</div>
              {(scanResults.sectorRanking || []).map(sec => {
                const sectorObj = SECTOR_ETFS.find(s => s.sym === sec.sym);
                return (
                  <div key={sec.sym} style={{ padding: 10, background: COLORS.surface, borderRadius: 8, border: `1px solid ${COLORS.border}`, borderLeft: `4px solid ${sec.avg >= 0 ? COLORS.success : COLORS.danger}`, marginBottom: 6 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <button onClick={() => sectorObj && onOpenSector && onOpenSector(sectorObj)}
                          style={{ background: "none", border: "none", padding: 0, fontFamily: "inherit", fontWeight: 700, fontSize: 13, color: COLORS.text, cursor: "pointer", textDecoration: "underline", textAlign: "left" }}>
                          {sec.name}
                        </button>
                        <div style={{ fontSize: 10, color: COLORS.textMuted }}>{sec.sym} · {sec.count} sub-industries</div>
                      </div>
                      <div style={{ textAlign: "right", flexShrink: 0 }}>
                        <div style={{ fontSize: 15, fontWeight: 800, color: sec.avg >= 0 ? COLORS.success : COLORS.danger }}>
                          {sec.avg >= 0 ? "+" : ""}{sec.avg.toFixed(2)}%
                        </div>
                        <div style={{ fontSize: 10, color: COLORS.textDim }}>z: {sec.z.toFixed(2)}σ</div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{ marginTop: 14, padding: 10, background: COLORS.surface, borderRadius: 6, fontSize: 11, color: COLORS.textDim, lineHeight: 1.5 }}>
            Universe mean 60-day return: <b style={{ color: COLORS.text }}>{scanResults.universeMean.toFixed(2)}%</b> · σ: <b style={{ color: COLORS.text }}>{scanResults.universeStdev.toFixed(2)}%</b> · Scanned {scanResults.scannedAt.toLocaleTimeString()}. Click 📊 for in-app fundamentals or ↗ for Morningstar.
          </div>
        </>
      )}
    </Card>
  );
}

// ============================================================
// SECTOR DETAIL MODAL — drill into a sector to see sub-industries
// and top holdings. Triggered by clicking a sector tile.
// ============================================================
function SectorDetailModal({ sector, open, onClose, onOpenStock }) {
  const [sectorReturns, setSectorReturns] = useState({});
  const [subIndustryData, setSubIndustryData] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const chartRef = useRef(null);
  const chartObj = useRef(null);

  // Helper: compute return between two indices in a closes array.
  // tradingDaysBack=null means "all of it" (from index 0).
  const computeReturnFromCloses = (closes, tradingDaysBack) => {
    if (!closes || closes.length < 2) return null;
    const start = tradingDaysBack && closes.length > tradingDaysBack ? closes[closes.length - tradingDaysBack] : closes[0];
    return ((closes[closes.length - 1] - start) / start) * 100;
  };

  useEffect(() => {
    if (!open || !sector) return;
    let cancelled = false;
    (async () => {
      setLoading(true); setError(null);
      try {
        // Pull broader windows so we can derive everything we need:
        //  - 3mo for 1mo / 60d / 90d
        //  - ytd for the YTD highlight band
        //  - 1y for the main chart + 1Y return + 52W high/low
        //  - 5y for the rolling 3Y return
        const [threeMo, ytd, oneYr, fiveYr] = await Promise.all([
          fetchYahoo(sector.sym, "3mo", "1d").catch(() => null),
          fetchYahoo(sector.sym, "ytd", "1d").catch(() => null),
          fetchYahoo(sector.sym, "1y", "1d").catch(() => null),
          fetchYahoo(sector.sym, "5y", "1wk").catch(() => null),
        ]);
        const clean = (data) => data ? data.closes.filter(c => c !== null) : [];
        const threeMoClean = clean(threeMo);
        const ytdClean = clean(ytd);
        const oneYrClean = clean(oneYr);
        const fiveYrClean = clean(fiveYr);

        // 60d ≈ 60 trading days; 90d ≈ 90 trading days
        const oneMonth = computeReturnFromCloses(threeMoClean, 21);    // ~1 month of trading days
        const sixtyDay = computeReturnFromCloses(threeMoClean, 60);
        const ninetyDay = computeReturnFromCloses(threeMoClean, null); // full 3mo window ~ 90 days
        const ytdRet = computeReturnFromCloses(ytdClean, null);
        const oneYearRet = computeReturnFromCloses(oneYrClean, null);
        // Rolling 3Y: take 5Y weekly data, use last ~156 weeks
        const threeYearRet = (() => {
          if (fiveYrClean.length < 2) return null;
          const start = fiveYrClean.length > 156 ? fiveYrClean[fiveYrClean.length - 156] : fiveYrClean[0];
          return ((fiveYrClean[fiveYrClean.length - 1] - start) / start) * 100;
        })();
        const oneYearHigh = oneYrClean.length ? Math.max(...oneYrClean) : null;
        const oneYearLow = oneYrClean.length ? Math.min(...oneYrClean) : null;
        const last = oneYrClean.length ? oneYrClean[oneYrClean.length - 1] : null;

        if (!cancelled) setSectorReturns({
          oneMonth, sixtyDay, ninetyDay, ytd: ytdRet, oneYear: oneYearRet, threeYear: threeYearRet,
          oneYearHigh, oneYearLow, last,
          oneYearData: oneYr,
          ytdData: ytd,
        });

        // Sub-industry ETFs in this sector
        const subs = SUB_INDUSTRY_ETFS[sector.sym] || [];
        const subResults = await Promise.all(subs.map(async (sub) => {
          try {
            const [s3mo, sYtd, s1y] = await Promise.all([
              fetchYahoo(sub.sym, "3mo", "1d").catch(() => null),
              fetchYahoo(sub.sym, "ytd", "1d").catch(() => null),
              fetchYahoo(sub.sym, "1y", "1d").catch(() => null),
            ]);
            const c3 = clean(s3mo);
            const cY = clean(sYtd);
            const c1y = clean(s1y);
            return {
              ...sub,
              oneMonth: computeReturnFromCloses(c3, 21),
              sixtyDay: computeReturnFromCloses(c3, 60),
              ninetyDay: computeReturnFromCloses(c3, null),
              ytd: computeReturnFromCloses(cY, null),
              oneYear: computeReturnFromCloses(c1y, null),
              oneYearHigh: c1y.length ? Math.max(...c1y) : null,
              last: c1y.length ? c1y[c1y.length - 1] : (cY.length ? cY[cY.length - 1] : null),
            };
          } catch (e) {
            return { ...sub, oneMonth: null, sixtyDay: null, ninetyDay: null, ytd: null, oneYear: null, oneYearHigh: null, last: null };
          }
        }));
        if (!cancelled) setSubIndustryData(subResults.sort((a, b) => (b.ytd ?? -Infinity) - (a.ytd ?? -Infinity)));
      } catch (e) {
        if (!cancelled) setError(e.message);
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [open, sector]);

  // Rolling 1Y chart with 52W high/low markers and YTD shaded band
  useEffect(() => {
    if (!open || !chartRef.current || !sectorReturns.oneYearData) return;
    if (chartObj.current) { chartObj.current.destroy(); chartObj.current = null; }
    const data = sectorReturns.oneYearData;
    const cleanCloses = data.closes.filter(c => c !== null);
    const cleanTs = (data.ts || []).filter((_, i) => data.closes[i] !== null);
    const labels = cleanTs.map(t => new Date(t * 1000));

    // Find indices of 52W high and low
    const hiIdx = cleanCloses.indexOf(Math.max(...cleanCloses));
    const loIdx = cleanCloses.indexOf(Math.min(...cleanCloses));

    // Find Jan 1 index for YTD band start
    const yearStart = new Date(new Date().getFullYear(), 0, 1);
    let ytdStartIdx = labels.findIndex(d => d >= yearStart);
    if (ytdStartIdx < 0) ytdStartIdx = 0;

    const up = cleanCloses[cleanCloses.length - 1] >= cleanCloses[0];
    chartObj.current = new Chart(chartRef.current, {
      type: "line",
      data: {
        labels: labels.map(d => d.toLocaleDateString()),
        datasets: [{
          label: sector.sym,
          data: cleanCloses,
          borderColor: up ? COLORS.success : COLORS.danger,
          backgroundColor: (up ? COLORS.success : COLORS.danger) + "15",
          fill: true, pointRadius: 0, borderWidth: 2, tension: 0.2,
          // Highlight 52W high/low and Jan 1 with bigger points
          pointRadius: cleanCloses.map((_, i) => (i === hiIdx || i === loIdx || i === ytdStartIdx) ? 5 : 0),
          pointBackgroundColor: cleanCloses.map((_, i) => i === hiIdx ? COLORS.success : i === loIdx ? COLORS.danger : i === ytdStartIdx ? COLORS.gold : "transparent"),
          pointBorderColor: cleanCloses.map((_, i) => i === hiIdx ? COLORS.success : i === loIdx ? COLORS.danger : i === ytdStartIdx ? COLORS.gold : "transparent"),
        }],
      },
      options: {
        ...interactiveLineOptions({ priceFormat: true }),
        plugins: {
          ...interactiveLineOptions({ priceFormat: true }).plugins,
          tooltip: {
            ...interactiveLineOptions({ priceFormat: true }).plugins.tooltip,
            callbacks: {
              title: (ctxs) => labels[ctxs[0].dataIndex]?.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" }) || "",
              label: (ctx) => {
                const lines = ["Price: $" + ctx.raw.toFixed(2)];
                if (ctx.dataIndex === hiIdx) lines.push("🟢 52-Week High");
                if (ctx.dataIndex === loIdx) lines.push("🔴 52-Week Low");
                if (ctx.dataIndex === ytdStartIdx) lines.push("📅 Jan 1 (YTD start)");
                return lines;
              },
            },
          },
        },
      },
      plugins: [crosshairPlugin],
    });
    return () => { if (chartObj.current) chartObj.current.destroy(); };
  }, [open, sectorReturns]);

  if (!open || !sector) return null;
  const heatColor = (pct) => {
    if (pct == null) return "#9CA3AF";
    if (pct >= 3) return "#0F766E";
    if (pct >= 1) return "#1FB67D";
    if (pct >= 0) return "#86EFAC";
    if (pct >= -1) return "#FCA5A5";
    if (pct >= -3) return "#DC2626";
    return "#7F1D1D";
  };
  const fmtPct = (n) => n == null ? "—" : (n >= 0 ? "+" : "") + n.toFixed(2) + "%";

  return (
    <Modal open={open} onClose={onClose} title={`${sector.name} (${sector.sym}) — Sector Detail`} wide={true}>
      {/* Header with overview returns — 7 windows */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(110px, 1fr))", gap: 8, marginBottom: 16 }}>
        {[
          ["1 Month", sectorReturns.oneMonth],
          ["60 Day", sectorReturns.sixtyDay],
          ["90 Day", sectorReturns.ninetyDay],
          ["YTD", sectorReturns.ytd],
          ["1 Year", sectorReturns.oneYear],
          ["3 Year", sectorReturns.threeYear],
        ].map(([label, val]) => (
          <div key={label} style={{ padding: 10, background: COLORS.bg, borderRadius: 8, borderLeft: `3px solid ${val == null ? COLORS.textMuted : (val >= 0 ? COLORS.success : COLORS.danger)}` }}>
            <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>{label}</div>
            <div style={{ fontSize: 17, fontWeight: 800, color: val == null ? COLORS.textMuted : (val >= 0 ? COLORS.success : COLORS.danger), marginTop: 2 }}>
              {fmtPct(val)}
            </div>
          </div>
        ))}
        <div style={{ padding: 10, background: COLORS.bg, borderRadius: 8, borderLeft: `3px solid ${COLORS.gold}` }}>
          <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>52W High</div>
          <div style={{ fontSize: 17, fontWeight: 800, color: COLORS.text, marginTop: 2 }}>
            {sectorReturns.oneYearHigh != null ? "$" + sectorReturns.oneYearHigh.toFixed(2) : "—"}
          </div>
        </div>
      </div>

      {/* Rolling 1Y chart with 52W markers */}
      <Card style={{ padding: 14, marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, flexWrap: "wrap", gap: 8 }}>
          <div>
            <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>Rolling 1-Year Price</div>
            <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 2 }}>
              <span style={{ color: COLORS.success }}>● 52W High</span> · <span style={{ color: COLORS.danger }}>● 52W Low</span> · <span style={{ color: COLORS.gold }}>● YTD Start</span>
              <span style={{ marginLeft: 8, color: COLORS.textDim }}>· drag to zoom · shift+drag to pan</span>
            </div>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={() => { if (chartObj.current) try { chartObj.current.resetZoom(); } catch (e) {} }}
              title="Reset zoom"
              style={{ padding: "4px 10px", borderRadius: 4, border: `1px solid ${COLORS.border}`, background: COLORS.surface, color: COLORS.textMuted, fontFamily: "inherit", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
              ⟲ Reset zoom
            </button>
            <a href={`https://finance.yahoo.com/quote/${sector.sym}/holdings`} target="_blank" rel="noopener" style={{ fontSize: 11, padding: "4px 10px", borderRadius: 4, background: COLORS.bg, color: COLORS.text, textDecoration: "none", border: `1px solid ${COLORS.border}` }}>Yahoo Holdings ↗</a>
            <a href={morningstarUrl(sector.sym)} target="_blank" rel="noopener" style={{ fontSize: 11, padding: "4px 10px", borderRadius: 4, background: COLORS.bg, color: COLORS.text, textDecoration: "none", border: `1px solid ${COLORS.border}` }}>Morningstar ↗</a>
          </div>
        </div>
        <div style={{ height: 240 }}><canvas ref={chartRef} /></div>
      </Card>

      {/* Sub-industries with extended return windows */}
      <Card style={{ padding: 14, marginBottom: 16 }}>
        <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4, fontWeight: 600 }}>Sub-Industries in {sector.name}</div>
        <div style={{ fontSize: 11, color: COLORS.textDim, marginBottom: 12 }}>
          Click 📊 for in-app fundamentals or ↗ for Morningstar. Sorted by YTD return.
        </div>
        {loading && subIndustryData.length === 0 ? (
          <div style={{ padding: 20, color: COLORS.textMuted, fontSize: 13, textAlign: "center" }}>Loading sub-industries…</div>
        ) : subIndustryData.length === 0 ? (
          <div style={{ padding: 20, color: COLORS.textMuted, fontSize: 13, textAlign: "center" }}>No sub-industries mapped for this sector.</div>
        ) : (
          <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse", minWidth: 700 }}>
            <thead><tr style={{ background: COLORS.bg, textAlign: "left" }}>
              <th style={{ padding: "8px 10px" }}>ETF</th>
              <th style={{ padding: "8px 10px" }}>Industry</th>
              <th style={{ padding: "8px 10px", textAlign: "right" }}>Last</th>
              <th style={{ padding: "8px 10px", textAlign: "right" }}>52W High</th>
              <th style={{ padding: "8px 10px", textAlign: "right" }}>1 Mo</th>
              <th style={{ padding: "8px 10px", textAlign: "right" }}>60 Day</th>
              <th style={{ padding: "8px 10px", textAlign: "right" }}>90 Day</th>
              <th style={{ padding: "8px 10px", textAlign: "right" }}>YTD</th>
              <th style={{ padding: "8px 10px", textAlign: "right" }}>1 Year</th>
            </tr></thead>
            <tbody>
              {subIndustryData.map(sub => (
                <tr key={sub.sym} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                  <td style={{ padding: "8px 10px" }}>
                    <TickerAction symbol={sub.sym} onOpenDetail={(s) => { onClose(); onOpenStock && onOpenStock(s); }} style={{ fontSize: 12 }} />
                  </td>
                  <td style={{ padding: "8px 10px" }}>{sub.name}</td>
                  <td style={{ padding: "8px 10px", textAlign: "right", color: COLORS.textMuted }}>{sub.last != null ? "$" + sub.last.toFixed(2) : "—"}</td>
                  <td style={{ padding: "8px 10px", textAlign: "right", color: COLORS.textMuted }}>{sub.oneYearHigh != null ? "$" + sub.oneYearHigh.toFixed(2) : "—"}</td>
                  <td style={{ padding: "8px 10px", textAlign: "right" }}>
                    <span style={{ display: "inline-block", padding: "2px 6px", borderRadius: 4, background: heatColor(sub.oneMonth), color: "white", fontWeight: 700, minWidth: 56, textAlign: "center", fontSize: 11 }}>{fmtPct(sub.oneMonth)}</span>
                  </td>
                  <td style={{ padding: "8px 10px", textAlign: "right" }}>
                    <span style={{ display: "inline-block", padding: "2px 6px", borderRadius: 4, background: heatColor(sub.sixtyDay), color: "white", fontWeight: 700, minWidth: 56, textAlign: "center", fontSize: 11 }}>{fmtPct(sub.sixtyDay)}</span>
                  </td>
                  <td style={{ padding: "8px 10px", textAlign: "right" }}>
                    <span style={{ display: "inline-block", padding: "2px 6px", borderRadius: 4, background: heatColor(sub.ninetyDay), color: "white", fontWeight: 700, minWidth: 56, textAlign: "center", fontSize: 11 }}>{fmtPct(sub.ninetyDay)}</span>
                  </td>
                  <td style={{ padding: "8px 10px", textAlign: "right" }}>
                    <span style={{ display: "inline-block", padding: "2px 6px", borderRadius: 4, background: heatColor(sub.ytd), color: "white", fontWeight: 700, minWidth: 56, textAlign: "center", fontSize: 11 }}>{fmtPct(sub.ytd)}</span>
                  </td>
                  <td style={{ padding: "8px 10px", textAlign: "right" }}>
                    <span style={{ display: "inline-block", padding: "2px 6px", borderRadius: 4, background: heatColor(sub.oneYear), color: "white", fontWeight: 700, minWidth: 56, textAlign: "center", fontSize: 11 }}>{fmtPct(sub.oneYear)}</span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          </div>
        )}
      </Card>

      {/* External links */}
      <Card style={{ padding: 14, background: COLORS.bg }}>
        <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8, fontWeight: 600 }}>External Research</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <a href={`https://finance.yahoo.com/quote/${sector.sym}`} target="_blank" rel="noopener" style={{ fontSize: 12, padding: "6px 12px", borderRadius: 6, background: COLORS.surface, color: COLORS.text, textDecoration: "none", border: `1px solid ${COLORS.border}` }}>Yahoo Finance · {sector.sym} ↗</a>
          <a href={morningstarUrl(sector.sym)} target="_blank" rel="noopener" style={{ fontSize: 12, padding: "6px 12px", borderRadius: 6, background: COLORS.surface, color: COLORS.text, textDecoration: "none", border: `1px solid ${COLORS.border}` }}>Morningstar · {sector.sym} ↗</a>
          <a href={`https://www.sectorspdrs.com/sectorspdr/sector/${sector.sym.toLowerCase()}`} target="_blank" rel="noopener" style={{ fontSize: 12, padding: "6px 12px", borderRadius: 6, background: COLORS.surface, color: COLORS.text, textDecoration: "none", border: `1px solid ${COLORS.border}` }}>SPDR Sector Site ↗</a>
        </div>
      </Card>
    </Modal>
  );
}

function StockDetailModal({ symbol, open, onClose }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [fundamentalsError, setFundamentalsError] = useState(null);
  const [priceData, setPriceData] = useState(null);     // currently-shown price data (changes with chartRange)
  const [oneYearData, setOneYearData] = useState(null); // 1Y data kept for return calcs + 52W markers
  const [chartRange, setChartRange] = useState("1Y");   // "1M" | "3M" | "6M" | "YTD" | "1Y" | "5Y" | "MAX"
  const [chartRangeLoading, setChartRangeLoading] = useState(false);
  const [returns, setReturns] = useState({});           // computed multi-window returns
  const [expanded, setExpanded] = useState({           // collapsible sections
    metrics: true,
    earnings: true,
    dividend: false,
    sentiment: false,
  });
  const priceCanvasRef = useRef(null);
  const priceChartRef = useRef(null);
  const revenueCanvasRef = useRef(null);
  const revenueChartRef = useRef(null);
  const earningsCanvasRef = useRef(null);
  const earningsChartRef = useRef(null);

  useEffect(() => {
    if (!open || !symbol) return;
    let cancelled = false;
    (async () => {
      setLoading(true); setError(null); setFundamentalsError(null);
      setData(null); setPriceData(null); setReturns({});

      // === Step 1: Always fetch price data first. This must succeed for any view. ===
      try {
        const [oneYr, threeMo, ytd, fiveYr] = await Promise.all([
          fetchYahoo(symbol, "1y", "1d").catch(e => { console.warn("1y fail", e.message); return null; }),
          fetchYahoo(symbol, "3mo", "1d").catch(() => null),
          fetchYahoo(symbol, "ytd", "1d").catch(() => null),
          fetchYahoo(symbol, "5y", "1wk").catch(() => null),
        ]);
        if (cancelled) return;
        if (!oneYr && !threeMo && !ytd) {
          setError("Failed to fetch any price data. Check your Cloudflare Worker URL in HR → Settings.");
          setLoading(false);
          return;
        }

        const clean = (d) => d ? d.closes.filter(c => c !== null) : [];
        const c3 = clean(threeMo);
        const cY = clean(ytd);
        const c1y = clean(oneYr);
        const c5y = clean(fiveYr);
        const ret = (arr, daysBack) => {
          if (!arr || arr.length < 2) return null;
          const start = daysBack && arr.length > daysBack ? arr[arr.length - daysBack] : arr[0];
          return ((arr[arr.length - 1] - start) / start) * 100;
        };
        setPriceData(oneYr || threeMo || ytd);
        setOneYearData(oneYr);   // keep for 52W markers / returns
        setReturns({
          oneMonth: ret(c3, 21),
          sixtyDay: ret(c3, 60),
          ninetyDay: ret(c3, null),
          ytd: ret(cY, null),
          oneYear: ret(c1y, null),
          threeYear: (() => {
            if (c5y.length < 2) return null;
            const start = c5y.length > 156 ? c5y[c5y.length - 156] : c5y[0];
            return ((c5y[c5y.length - 1] - start) / start) * 100;
          })(),
        });
      } catch (e) {
        if (!cancelled) setError("Price fetch failed: " + e.message);
        setLoading(false);
        return;
      }

      // === Step 2: Best-effort fetch of rich fundamentals. ===
      // Failure here is non-fatal — we still show price + Morningstar link.
      try {
        const summary = await fetchYahooQuoteSummary(symbol);
        if (!cancelled) setData(summary);
      } catch (e) {
        if (!cancelled) setFundamentalsError(e.message);
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [open, symbol]);

  // Re-fetch price data when chartRange changes (only after initial load is done)
  useEffect(() => {
    if (!open || !symbol || !oneYearData) return; // wait for first load
    let cancelled = false;
    // Map our friendly range names to Yahoo's range+interval
    const yahooArgs = {
      "1M":  { range: "1mo", interval: "1d" },
      "3M":  { range: "3mo", interval: "1d" },
      "6M":  { range: "6mo", interval: "1d" },
      "YTD": { range: "ytd", interval: "1d" },
      "1Y":  { range: "1y",  interval: "1d" },
      "5Y":  { range: "5y",  interval: "1wk" },
      "MAX": { range: "max", interval: "1mo" },
    };
    const args = yahooArgs[chartRange] || yahooArgs["1Y"];
    (async () => {
      setChartRangeLoading(true);
      try {
        const d = await fetchYahoo(symbol, args.range, args.interval);
        if (!cancelled && d) setPriceData(d);
      } catch (e) {
        // Keep previous priceData on failure
      } finally {
        if (!cancelled) setChartRangeLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [chartRange, open, symbol, oneYearData]);

  // Rolling price chart with markers — uses interactive options (crosshair + drag-to-zoom)
  useEffect(() => {
    if (!open || !priceData || !priceCanvasRef.current) return;
    if (priceChartRef.current) { priceChartRef.current.destroy(); priceChartRef.current = null; }
    const cleanCloses = priceData.closes.filter(c => c !== null);
    const cleanTs = (priceData.ts || []).filter((_, i) => priceData.closes[i] !== null);
    const labels = cleanTs.map(t => new Date(t * 1000));
    if (cleanCloses.length < 2) return;

    // Marker indices — only meaningful on the 1Y view; we still compute but the
    // markers may not appear if the range is shorter or much longer
    const hiIdx = cleanCloses.indexOf(Math.max(...cleanCloses));
    const loIdx = cleanCloses.indexOf(Math.min(...cleanCloses));
    const yearStart = new Date(new Date().getFullYear(), 0, 1);
    let ytdStartIdx = labels.findIndex(d => d >= yearStart);
    if (ytdStartIdx < 0) ytdStartIdx = 0;

    // Earnings date indices (from data.earningsHistory) — find nearest labels
    const earningsIdxs = [];
    if (data?.earningsHistory) {
      for (const e of data.earningsHistory) {
        if (!e.quarter) continue;
        const ed = new Date(e.quarter + "T00:00:00");
        // Find the closest label date that's on or after the earnings date
        const idx = labels.findIndex(d => d >= ed);
        if (idx >= 0 && idx < cleanCloses.length) earningsIdxs.push(idx);
      }
    }

    const up = cleanCloses[cleanCloses.length - 1] >= cleanCloses[0];
    priceChartRef.current = new Chart(priceCanvasRef.current, {
      type: "line",
      data: {
        labels: labels.map(d => d.toLocaleDateString()),
        datasets: [{
          label: symbol,
          data: cleanCloses,
          borderColor: up ? COLORS.success : COLORS.danger,
          backgroundColor: (up ? COLORS.success : COLORS.danger) + "15",
          fill: true, borderWidth: 2, tension: 0.2,
          pointRadius: cleanCloses.map((_, i) => {
            if (i === hiIdx || i === loIdx || i === ytdStartIdx) return 6;
            if (earningsIdxs.includes(i)) return 4;
            return 0;
          }),
          pointBackgroundColor: cleanCloses.map((_, i) => {
            if (i === hiIdx) return COLORS.success;
            if (i === loIdx) return COLORS.danger;
            if (i === ytdStartIdx) return COLORS.gold;
            if (earningsIdxs.includes(i)) return COLORS.primaryDark;
            return "transparent";
          }),
          pointBorderColor: cleanCloses.map((_, i) => {
            if (i === hiIdx) return COLORS.success;
            if (i === loIdx) return COLORS.danger;
            if (i === ytdStartIdx) return COLORS.gold;
            if (earningsIdxs.includes(i)) return COLORS.primaryDark;
            return "transparent";
          }),
        }],
      },
      options: {
        ...interactiveLineOptions({ priceFormat: true }),
        plugins: {
          ...interactiveLineOptions({ priceFormat: true }).plugins,
          tooltip: {
            ...interactiveLineOptions({ priceFormat: true }).plugins.tooltip,
            callbacks: {
              title: (ctxs) => labels[ctxs[0].dataIndex]?.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" }) || "",
              label: (ctx) => {
                const lines = ["Price: $" + ctx.raw.toFixed(2)];
                if (ctx.dataIndex === hiIdx) lines.push("🟢 52-Week High");
                if (ctx.dataIndex === loIdx) lines.push("🔴 52-Week Low");
                if (ctx.dataIndex === ytdStartIdx) lines.push("📅 Jan 1 (YTD start)");
                if (earningsIdxs.includes(ctx.dataIndex)) lines.push("📊 Earnings Release");
                return lines;
              },
            },
          },
        },
      },
      plugins: [crosshairPlugin],
    });
    return () => { if (priceChartRef.current) priceChartRef.current.destroy(); };
  }, [open, priceData, data, symbol]);

  // Revenue chart
  useEffect(() => {
    if (!open || !data?.incomeQuarterly?.length || !revenueCanvasRef.current) return;
    if (revenueChartRef.current) { revenueChartRef.current.destroy(); revenueChartRef.current = null; }
    const reversed = [...data.incomeQuarterly].reverse();
    revenueChartRef.current = new Chart(revenueCanvasRef.current, {
      type: "bar",
      data: {
        labels: reversed.map(q => q.endDate || "—"),
        datasets: [{
          label: "Revenue", data: reversed.map(q => q.revenue),
          backgroundColor: COLORS.primary, borderRadius: 4,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => "$" + (ctx.raw / 1e9).toFixed(2) + "B" } } },
        scales: { y: { ticks: { callback: (v) => "$" + (v / 1e9).toFixed(1) + "B" } } },
      },
    });
    return () => { if (revenueChartRef.current) revenueChartRef.current.destroy(); };
  }, [open, data]);

  // EPS chart
  useEffect(() => {
    if (!open || !data?.earningsHistory?.length || !earningsCanvasRef.current) return;
    if (earningsChartRef.current) { earningsChartRef.current.destroy(); earningsChartRef.current = null; }
    const reversed = [...data.earningsHistory].reverse();
    earningsChartRef.current = new Chart(earningsCanvasRef.current, {
      type: "bar",
      data: {
        labels: reversed.map(e => e.period || e.quarter || "—"),
        datasets: [
          { label: "EPS Actual", data: reversed.map(e => e.epsActual), backgroundColor: COLORS.primary, borderRadius: 4 },
          { label: "EPS Estimate", data: reversed.map(e => e.epsEstimate), backgroundColor: COLORS.gold, borderRadius: 4 },
        ],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: "bottom" } } },
    });
    return () => { if (earningsChartRef.current) earningsChartRef.current.destroy(); };
  }, [open, data]);

  if (!open) return null;

  const fmtBig = (n) => n == null ? "—" : n >= 1e12 ? "$" + (n / 1e12).toFixed(2) + "T" : n >= 1e9 ? "$" + (n / 1e9).toFixed(2) + "B" : n >= 1e6 ? "$" + (n / 1e6).toFixed(2) + "M" : "$" + n.toFixed(0);
  const fmtPct = (n) => n == null ? "—" : (n * 100).toFixed(2) + "%";
  const fmtPctReturn = (n) => n == null ? "—" : (n >= 0 ? "+" : "") + n.toFixed(2) + "%";
  const fmtNum = (n, digits = 2) => n == null ? "—" : Number(n).toFixed(digits);
  const fmtDate = (d) => !d ? "—" : (d instanceof Date ? d.toLocaleDateString() : d);
  const toggle = (key) => setExpanded(prev => ({ ...prev, [key]: !prev[key] }));

  // Pull last price from priceData (always available if any fetch succeeded) or from fundamentals
  const cleanCloses = priceData ? priceData.closes.filter(c => c !== null) : [];
  const lastPrice = cleanCloses.length ? cleanCloses[cleanCloses.length - 1] : data?.last;

  // Section header (collapsible)
  const SectionHeader = ({ keyName, title, sub }) => (
    <div onClick={() => toggle(keyName)}
      style={{ cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: COLORS.bg, borderRadius: 8, marginBottom: expanded[keyName] ? 8 : 0 }}>
      <div>
        <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.text }}>{title}</div>
        {sub && <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 2 }}>{sub}</div>}
      </div>
      <div style={{ fontSize: 14, color: COLORS.textMuted }}>{expanded[keyName] ? "▾" : "▸"}</div>
    </div>
  );

  return (
    <Modal open={open} onClose={onClose} title={`${symbol} — Stock Detail`} wide={true}>
      {/* Header — Morningstar link always shown, even before any data loads */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, gap: 16, flexWrap: "wrap" }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 800, color: COLORS.text }}>{symbol}</div>
          {data?.name && <div style={{ fontSize: 13, color: COLORS.textMuted }}>{data.name}</div>}
          {lastPrice != null && <div style={{ fontSize: 28, fontWeight: 700, color: COLORS.primary, marginTop: 6 }}>${fmtNum(lastPrice)}</div>}
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <a href={morningstarUrl(symbol)} target="_blank" rel="noopener"
             style={{ fontSize: 13, padding: "10px 16px", borderRadius: 8, background: COLORS.primary, color: "white", textDecoration: "none", fontWeight: 700, boxShadow: "0 2px 8px rgba(47,172,234,0.3)" }}>
            ⭐ View on Morningstar ↗
          </a>
          <a href={`https://finance.yahoo.com/quote/${symbol}`} target="_blank" rel="noopener" style={{ fontSize: 12, padding: "8px 12px", borderRadius: 6, background: COLORS.bg, color: COLORS.text, textDecoration: "none", border: `1px solid ${COLORS.border}` }}>Yahoo ↗</a>
          <a href={`https://www.google.com/finance/quote/${symbol}:NASDAQ`} target="_blank" rel="noopener" style={{ fontSize: 12, padding: "8px 12px", borderRadius: 6, background: COLORS.bg, color: COLORS.text, textDecoration: "none", border: `1px solid ${COLORS.border}` }}>Google Finance ↗</a>
        </div>
      </div>

      {/* Loading / error states */}
      {loading && (
        <div style={{ padding: "20px 24px", marginBottom: 16, background: COLORS.surface, borderRadius: 10, border: `1px solid ${COLORS.borderLight}` }}>
          <LoadingBar label={`Loading ${symbol} fundamentals, price history, and earnings…`} height={6} />
          <div style={{ marginTop: 10, fontSize: 12, color: COLORS.textDim, lineHeight: 1.5 }}>
            We're fetching price action, P/E, PEG, EPS, quarterly revenue, and earnings dates from Yahoo Finance. ETFs will skip earnings-specific data.
          </div>
        </div>
      )}
      {error && (
        <div style={{ padding: 16, background: COLORS.danger + "15", borderRadius: 8, color: COLORS.danger, fontSize: 13, marginBottom: 16 }}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>Couldn't load data</div>
          <div>{error}</div>
          <div style={{ marginTop: 8, color: COLORS.text, fontSize: 12 }}>
            Use the <b>⭐ Morningstar</b> button above to view this ticker's full fundamentals on Morningstar's site.
          </div>
        </div>
      )}

      {/* Quick Stats banner — at-a-glance P/E, PEG, EPS, Revenue YoY + QoQ. Shown when fundamentals load.
          QoQ revenue growth is computed from the most recent two quarters of incomeQuarterly. */}
      {data && (data.pe != null || data.peg != null || data.revenueGrowth != null || data.incomeQuarterly?.length > 0) && (() => {
        // Compute QoQ revenue growth from the two most recent quarters (if available).
        const iq = data.incomeQuarterly || [];
        let qoqRevenue = null;
        let qoqLabel = "";
        if (iq.length >= 2 && iq[0]?.revenue != null && iq[1]?.revenue != null && iq[1].revenue !== 0) {
          qoqRevenue = (iq[0].revenue - iq[1].revenue) / Math.abs(iq[1].revenue);
          // Build a label like "Q4 vs Q3" using the endDates
          const fmtQ = (ds) => {
            if (!ds) return "";
            const d = new Date(ds);
            const m = d.getUTCMonth();
            const q = Math.floor(m / 3) + 1;
            return `Q${q} ${d.getUTCFullYear()}`;
          };
          qoqLabel = `${fmtQ(iq[0].endDate)} vs ${fmtQ(iq[1].endDate)}`;
        }
        const fmtPct1 = (v) => v == null ? "—" : (v >= 0 ? "+" : "") + (v * 100).toFixed(1) + "%";
        const cells = [
          { label: "P/E (TTM)",        value: data.pe != null ? data.pe.toFixed(1) : "—",          sub: "Trailing",                color: COLORS.text },
          { label: "Forward P/E",      value: data.forwardPE != null ? data.forwardPE.toFixed(1) : "—", sub: "Next 12mo est.",       color: COLORS.text },
          { label: "PEG Ratio",        value: data.peg != null ? data.peg.toFixed(2) : "—",       sub: "Below 1 = undervalued",   color: data.peg != null && data.peg < 1 ? COLORS.success : COLORS.text },
          { label: "Revenue (TTM)",    value: data.revenue != null ? fmtBig(data.revenue) : "—",  sub: "Last 12 months",           color: COLORS.text },
          { label: "Revenue YoY",      value: fmtPct1(data.revenueGrowth),                         sub: "Year over year",          color: data.revenueGrowth != null ? (data.revenueGrowth >= 0 ? COLORS.success : COLORS.danger) : COLORS.textMuted },
          { label: "Revenue QoQ",      value: fmtPct1(qoqRevenue),                                 sub: qoqLabel || "Quarter over quarter", color: qoqRevenue != null ? (qoqRevenue >= 0 ? COLORS.success : COLORS.danger) : COLORS.textMuted },
        ];
        return (
          <div style={{ marginBottom: 16, padding: "14px 16px", background: `linear-gradient(135deg, ${COLORS.surface} 0%, ${COLORS.bg} 100%)`, borderRadius: 10, border: `1px solid ${COLORS.borderLight}`, borderLeft: `3px solid ${COLORS.primary}` }}>
            <div style={{ fontSize: 10, color: COLORS.primary, textTransform: "uppercase", letterSpacing: 2, fontWeight: 700, marginBottom: 10 }}>
              ⚡ Quick Stats
              <span style={{ marginLeft: 8, color: COLORS.textDim, fontWeight: 500, letterSpacing: 0.5 }}>at-a-glance fundamentals</span>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(130px, 1fr))", gap: 10 }}>
              {cells.map((c, i) => (
                <div key={i} style={{ padding: "8px 10px", background: COLORS.surface, borderRadius: 8, border: `1px solid ${COLORS.borderLight}` }}>
                  <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 0.5, fontWeight: 600 }}>{c.label}</div>
                  <div style={{ fontSize: 18, fontWeight: 800, color: c.color, marginTop: 2 }}>{c.value}</div>
                  {c.sub && <div style={{ fontSize: 10, color: COLORS.textDim, marginTop: 1 }}>{c.sub}</div>}
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Multi-window returns — based on price fetch alone */}
      {(returns.oneMonth != null || returns.ytd != null || returns.oneYear != null) && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(110px, 1fr))", gap: 8, marginBottom: 16 }}>
          {[
            ["1 Month", returns.oneMonth],
            ["60 Day", returns.sixtyDay],
            ["90 Day", returns.ninetyDay],
            ["YTD", returns.ytd],
            ["1 Year", returns.oneYear],
            ["3 Year", returns.threeYear],
