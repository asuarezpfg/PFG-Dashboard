function HRToolsuiteApp({ currentUser, actualUser, viewAs, setViewAs, people, onUpdatePeople, initialPage, onInitialPageConsumed, onExit }) {
  const [page, setPage] = useState(initialPage || "profile");
  // If a deep-link page is provided, navigate to it on mount/changeand clear the signal upstream.
  useEffect(() => {
    if (initialPage && initialPage !== page) setPage(initialPage);
    if (initialPage && onInitialPageConsumed) onInitialPageConsumed();
    // eslint-disable-next-line
  }, [initialPage]);
  const [reimbursements, setReimbursements] = useState([]);
  const [companyEvents, setCompanyEvents] = useState([]);
  const [eventRequests, setEventRequests] = useState([]);   // employee-requested events awaiting master approval
  const [profileRequests, setProfileRequests] = useState([]); // requests to change locked profile fields
  const [leaveRequests, setLeaveRequests] = useState([]);   // employee time-off requests
  const [remoteWorkLogs, setRemoteWorkLogs] = useState([]); // remote work documentation entries
  const [performanceReviews, setPerformanceReviews] = useState([]); // performance review documents
  const [bankedPto, setBankedPto] = useState([]);           // PTO banked for working on market-closed days
  const [announcements, setAnnouncements] = useState([]);   // firm-wide announcements posted by owners
  const [hrSettings, setHrSettings] = useState({
    notifyEmails: ["mbruce@pointerfg.com", "asuarez@pointerfg.com"],
    documents: [], // user-added documents beyond the built-ins
  });
  const [calDate, setCalDate] = useState(new Date());
  const [calFilters, setCalFilters] = useState({ holidays: true, birthdays: true, events: true });
  const isAdmin = currentUser?.isAdmin;
  const isOwnerUser = isOwner(currentUser);

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("pfg-hr-v1");
        if (r?.value) {
          const d = JSON.parse(r.value);
          setReimbursements(d.reimbursements || []);
          setCompanyEvents(d.companyEvents || []);
          setEventRequests(d.eventRequests || []);
          setProfileRequests(d.profileRequests || []);
          setLeaveRequests(d.leaveRequests || []);
          setRemoteWorkLogs(d.remoteWorkLogs || []);
          setPerformanceReviews(d.performanceReviews || []);
          setBankedPto(d.bankedPto || []);
          setAnnouncements(d.announcements || []);
          if (d.hrSettings) setHrSettings({ ...hrSettings, ...d.hrSettings });
        }
      } catch (e) {}
    })();
    // eslint-disable-next-line
  }, []);

  const saveHR = useCallback((next) => {
    const data = { reimbursements, companyEvents, eventRequests, profileRequests, leaveRequests, remoteWorkLogs, performanceReviews, bankedPto, announcements, hrSettings, ...next };
    if (next.reimbursements) setReimbursements(next.reimbursements);
    if (next.companyEvents) setCompanyEvents(next.companyEvents);
    if (next.eventRequests) setEventRequests(next.eventRequests);
    if (next.profileRequests) setProfileRequests(next.profileRequests);
    if (next.leaveRequests) setLeaveRequests(next.leaveRequests);
    if (next.remoteWorkLogs) setRemoteWorkLogs(next.remoteWorkLogs);
    if (next.performanceReviews) setPerformanceReviews(next.performanceReviews);
    if (next.bankedPto) setBankedPto(next.bankedPto);
    if (next.announcements) setAnnouncements(next.announcements);
    if (next.hrSettings) setHrSettings(next.hrSettings);
    try { window.storage.set("pfg-hr-v1", JSON.stringify(data)); } catch (e) { console.error(e); }
  }, [reimbursements, companyEvents, eventRequests, profileRequests, leaveRequests, remoteWorkLogs, performanceReviews, bankedPto, announcements, hrSettings]);

  const navItems = [
    { key: "profile", icon: IconUsers, label: "My Profile" },
    { key: "reimb", icon: IconDollar, label: "Reimbursements" },
    // Hide "Leave Request" from people whose PTO isn't tracked (Matt, Shelly, Alex).
    // Masters still see it when viewing as a regular employee.
    ...(currentUser.ptoApplicable === false ? [] : [{ key: "leave", icon: IconCalendar, label: "Leave Request" }]),
    { key: "remote", icon: IconCalendar, label: "Remote Work" },
    { key: "reviews", icon: IconClipboard, label: "Performance Review" },
    { key: "calendar", icon: IconCalendar, label: "Calendar" },
    { key: "documents", icon: IconClipboard, label: "Documents" },
    ...(isAdmin ? [{ key: "employees", icon: IconList, label: "Employees" }] : []),
    ...(isOwnerUser ? [{ key: "settings", icon: IconSettings, label: "Settings" }] : []),
  ];

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "#EDF2F8", fontFamily: "'DM Sans', 'Segoe UI', sans-serif", color: COLORS.text }}>
      {/* Sidebar */}
      <div style={{ width: 220, background: COLORS.surface, boxShadow: "2px 0 12px rgba(0,0,0,0.06)", zIndex: 2, display: "flex", flexDirection: "column", flexShrink: 0, position: "relative" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 4, background: COLORS.primary }} />
        <div style={{ padding: "20px 20px 12px", borderBottom: `1px solid ${COLORS.borderLight}` }}>
          <button onClick={onExit} style={{ background: "none", border: "none", cursor: "pointer", padding: 0, fontFamily: "inherit", display: "block", textAlign: "left" }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: COLORS.primary }}>PointerOS</div>
            <div style={{ fontSize: 10, color: COLORS.textDim, letterSpacing: 1.5 }}>HR Toolsuite</div>
          </button>
        </div>
        <nav style={{ flex: 1, padding: "12px 8px" }}>
          {navItems.map(n => (
            <button key={n.key} onClick={() => setPage(n.key)}
              style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 10, border: "none",
                background: page === n.key ? COLORS.primary + "0D" : "transparent",
                color: page === n.key ? COLORS.primary : COLORS.textMuted,
                fontSize: 13, fontWeight: page === n.key ? 600 : 500, borderLeft: page === n.key ? `3px solid ${COLORS.primary}` : "3px solid transparent", cursor: "pointer", marginBottom: 2, fontFamily: "inherit" }}>
              <n.icon size={18} /> {n.label}
            </button>
          ))}
        </nav>
        <div style={{ padding: 16, borderTop: `1px solid ${COLORS.borderLight}` }}>
          <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 8 }}>{currentUser.name}</div>
          <button onClick={onExit} style={{ background: "none", border: "none", color: COLORS.primary, fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: "inherit" }}>
            <IconChevron size={14} style={{ transform: "rotate(180deg)" }} /> Back to PointerOS
          </button>
        </div>
      </div>

      <div style={{ flex: 1, overflow: "auto", padding: 28 }}>
        {/* Top bar with view-switcher (only for owners) */}
        {actualUser?.isOwner && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, padding: "10px 16px", background: COLORS.surface, borderRadius: 10, border: `1px solid ${COLORS.border}` }}>
            <div style={{ fontSize: 12, color: COLORS.textMuted }}>
              {viewAs === "employee" ? (
                <span><b style={{ color: COLORS.warning }}>Previewing as Employee</b> — admin features hidden. Switch back to Master to manage HR.</span>
              ) : (
                <span>You're signed in as a <b>Master</b>. Use the toggle to preview the employee experience.</span>
              )}
            </div>
            <ViewSwitcher actualUser={actualUser} viewAs={viewAs} setViewAs={setViewAs} />
          </div>
        )}
        {page === "profile" && <HRProfileView currentUser={currentUser} reimbursements={reimbursements} people={people} onUpdatePeople={onUpdatePeople} isAdmin={isAdmin} isOwnerUser={isOwnerUser} setPage={setPage} hrSettings={hrSettings} profileRequests={profileRequests} saveHR={saveHR} companyEvents={companyEvents} leaveRequests={leaveRequests} bankedPto={bankedPto} performanceReviews={performanceReviews} />}
        {page === "reimb" && <HRReimbView currentUser={currentUser} reimbursements={reimbursements} saveHR={saveHR} isAdmin={isAdmin} hrSettings={hrSettings} />}
        {page === "leave" && <HRLeaveRequestView currentUser={currentUser} leaveRequests={leaveRequests} bankedPto={bankedPto} companyEvents={companyEvents} saveHR={saveHR} isOwnerUser={isOwnerUser} hrSettings={hrSettings} people={people} onUpdatePeople={onUpdatePeople} />}
        {page === "remote" && <HRRemoteWorkView currentUser={currentUser} remoteWorkLogs={remoteWorkLogs} saveHR={saveHR} isAdmin={isAdmin} people={people} />}
        {page === "reviews" && <HRPerformanceReviewView currentUser={currentUser} performanceReviews={performanceReviews} saveHR={saveHR} isAdmin={isAdmin} people={people} />}
        {page === "calendar" && <HRCalendarView calDate={calDate} setCalDate={setCalDate} calFilters={calFilters} setCalFilters={setCalFilters} people={people} companyEvents={companyEvents} eventRequests={eventRequests} saveHR={saveHR} isOwnerUser={isOwnerUser} currentUser={currentUser} hrSettings={hrSettings} />}
        {page === "documents" && <HRDocumentsView hrSettings={hrSettings} saveHR={saveHR} isOwnerUser={isOwnerUser} />}
        {page === "employees" && isAdmin && <HREmployeesView people={people} onUpdatePeople={onUpdatePeople} currentUser={currentUser} profileRequests={profileRequests} saveHR={saveHR} />}
        {page === "settings" && isOwnerUser && <HRSettingsView hrSettings={hrSettings} saveHR={saveHR} announcements={announcements} currentUser={currentUser} />}
      </div>
    </div>
  );
}

// PTO Accrual Modal — shows year-by-year breakdown with carry-forward

function PTOAccrualModal({ open, onClose, person }) {
  if (!person) return null;
  const summary = summarizePTO(person);
  const currentYear = new Date().getFullYear();
  return (
    <Modal open={open} onClose={onClose} title={`Time Off Accrual — ${person.name}`}>
      <div style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 16, lineHeight: 1.5 }}>
        Year-by-year breakdown of Paid Time Off (PTO). Unused days carry forward to the next calendar year (capped per the Employee Handbook, Part 5).
      </div>

      {/* Big balance number */}
      <div style={{ padding: "20px 24px", background: `linear-gradient(135deg, ${COLORS.primary} 0%, ${COLORS.primaryDark} 100%)`, color: "white", borderRadius: 10, marginBottom: 16 }}>
        <div style={{ fontSize: 11, opacity: 0.85, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 600 }}>Available Now</div>
        <div style={{ fontSize: 36, fontWeight: 800, lineHeight: 1, marginTop: 4 }}>
          {summary.totalAvailable}<span style={{ fontSize: 16, opacity: 0.9, marginLeft: 6, fontWeight: 400 }}>days</span>
        </div>
        <div style={{ fontSize: 12, opacity: 0.85, marginTop: 6 }}>
          {summary.totalUsedThisYear} used in {currentYear} · {summary.totalUsedAllTime} used since records began
        </div>
      </div>

      {/* Accrual chart — SVG bar visualization of granted (carried + allotted) vs used per year.
          Ending-balance line plotted across the top so the trend is visible at a glance. */}
      {summary.years.length > 0 && (() => {
        const years = summary.years;
        const W = 480, H = 180, padL = 36, padR = 12, padT = 16, padB = 28;
        const plotW = W - padL - padR;
        const plotH = H - padT - padB;
        const maxVal = Math.max(5, ...years.map(y => Math.max((y.carriedIn || 0) + (y.allot || 0), y.endingBalance || 0, y.used || 0)));
        const yTicks = 4;
        const groupW = plotW / Math.max(1, years.length);
        const barW = Math.min(28, (groupW - 8) / 2);
        const yPos = (v) => padT + plotH - (v / maxVal) * plotH;
        // Build the ending-balance polyline points
        const polyPts = years.map((y, i) => {
          const cx = padL + groupW * i + groupW / 2;
          return `${cx},${yPos(y.endingBalance || 0)}`;
        }).join(" ");
        return (
          <div style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Accrual Trend</div>
              <div style={{ display: "flex", gap: 12, fontSize: 11, color: COLORS.textMuted }}>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}><span style={{ width: 10, height: 10, background: COLORS.primary, borderRadius: 2, display: "inline-block" }} /> Granted</span>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}><span style={{ width: 10, height: 10, background: COLORS.danger, borderRadius: 2, display: "inline-block" }} /> Used</span>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}><span style={{ width: 16, height: 2, background: COLORS.gold, display: "inline-block" }} /> Ending</span>
              </div>
            </div>
            <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block", background: COLORS.bg, borderRadius: 8 }}>
              {/* Y-axis gridlines + labels */}
              {Array.from({ length: yTicks + 1 }, (_, i) => {
                const v = (maxVal / yTicks) * (yTicks - i);
                const y = padT + (plotH / yTicks) * i;
                return (
                  <g key={i}>
                    <line x1={padL} x2={W - padR} y1={y} y2={y} stroke={COLORS.borderLight} strokeWidth="1" />
                    <text x={padL - 6} y={y + 3} textAnchor="end" style={{ fontSize: 9, fill: COLORS.textMuted }}>{Math.round(v)}</text>
                  </g>
                );
              })}
              {/* Per-year bars */}
              {years.map((y, i) => {
                const cx = padL + groupW * i + groupW / 2;
                const grantedTotal = (y.carriedIn || 0) + (y.allot || 0);
                const grantedH = (grantedTotal / maxVal) * plotH;
                const usedH = (y.used / maxVal) * plotH;
                const isCurrent = y.year === currentYear;
                return (
                  <g key={y.year}>
                    {/* Granted bar (left) */}
                    <rect x={cx - barW - 2} y={padT + plotH - grantedH} width={barW} height={grantedH} fill={COLORS.primary} opacity={isCurrent ? 1 : 0.85} rx="2">
                      <title>{`${y.year} · Granted ${grantedTotal}d (carried ${y.carriedIn || 0}d + allotted ${y.allot || 0}d)`}</title>
                    </rect>
                    {/* Used bar (right) */}
                    <rect x={cx + 2} y={padT + plotH - usedH} width={barW} height={usedH} fill={COLORS.danger} opacity={isCurrent ? 1 : 0.85} rx="2">
                      <title>{`${y.year} · Used ${y.used}d`}</title>
                    </rect>
                    {/* Year label */}
                    <text x={cx} y={H - 10} textAnchor="middle" style={{ fontSize: 10, fontWeight: isCurrent ? 700 : 400, fill: isCurrent ? COLORS.primary : COLORS.textMuted }}>
                      {y.year}{isCurrent ? " ◀" : ""}
                    </text>
                  </g>
                );
              })}
              {/* Ending-balance polyline */}
              {years.length > 1 && <polyline points={polyPts} fill="none" stroke={COLORS.gold} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />}
              {/* Ending-balance dots */}
              {years.map((y, i) => {
                const cx = padL + groupW * i + groupW / 2;
                return <circle key={`d-${y.year}`} cx={cx} cy={yPos(y.endingBalance || 0)} r="3" fill={COLORS.gold} stroke="white" strokeWidth="1.5" />;
              })}
            </svg>
            <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 6, lineHeight: 1.5 }}>
              The blue bar shows how many days you had available that year (carried-in + allotted). The red bar shows how many you used. The gold line tracks your ending balance — rising means you're banking; falling means you're using.
            </div>
          </div>
        );
      })()}

      {/* Year-by-year ledger */}
      <div style={{ marginBottom: 8, fontSize: 12, fontWeight: 700, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Year Ledger</div>
      <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
        <thead>
          <tr style={{ background: COLORS.bg, textAlign: "left" }}>
            <th style={{ padding: "8px 10px", fontWeight: 600 }}>Year</th>
            <th style={{ padding: "8px 10px", fontWeight: 600, textAlign: "right" }}>Carried In</th>
            <th style={{ padding: "8px 10px", fontWeight: 600, textAlign: "right" }}>+ Allotted</th>
            <th style={{ padding: "8px 10px", fontWeight: 600, textAlign: "right" }}>− Used</th>
            <th style={{ padding: "8px 10px", fontWeight: 600, textAlign: "right" }}>= Ending</th>
          </tr>
        </thead>
        <tbody>
          {summary.years.map(y => {
            const isCurrent = y.year === currentYear;
            return (
              <tr key={y.year} style={{ borderTop: `1px solid ${COLORS.borderLight}`, background: isCurrent ? COLORS.primary + "11" : "transparent", fontWeight: isCurrent ? 600 : 400 }}>
                <td style={{ padding: "10px" }}>
                  {y.year} {isCurrent && <Badge color={COLORS.primary} style={{ marginLeft: 4 }}>NOW</Badge>}
                </td>
                <td style={{ padding: "10px", textAlign: "right" }}>{y.carriedIn}d</td>
                <td style={{ padding: "10px", textAlign: "right", color: COLORS.success }}>+{y.allot}d</td>
                <td style={{ padding: "10px", textAlign: "right", color: y.used > 0 ? COLORS.danger : COLORS.textMuted }}>{y.used > 0 ? "−" : ""}{y.used}d</td>
                <td style={{ padding: "10px", textAlign: "right", fontWeight: 700, color: COLORS.text }}>{y.endingBalance}d</td>
              </tr>
            );
          })}
        </tbody>
      </table>

      {/* Year-end carryover preview — only meaningful when there's a current-year entry */}
      {(() => {
        const cur = summary.years.find(y => y.year === currentYear);
        if (!cur) return null;
        const now = new Date();
        const yearStart = new Date(currentYear, 0, 1);
        const yearEnd = new Date(currentYear, 11, 31);
        const daysInYear = (yearEnd - yearStart) / 86400000 + 1;
        const daysElapsed = Math.max(1, Math.floor((now - yearStart) / 86400000) + 1);
        const daysRemaining = Math.max(0, daysInYear - daysElapsed);
        const monthsRemaining = (daysRemaining / 30.44).toFixed(1);
        const projectedCarryOver = cur.endingBalance;   // If no further days used
        const burnPace = cur.used > 0 ? (cur.used / daysElapsed) * daysInYear : 0;   // Projected if usage continues at same pace
        const projectedIfCurrent = Math.max(0, (cur.carriedIn + cur.allot) - Math.round(burnPace));
        return (
          <div style={{ marginTop: 16, padding: 14, background: COLORS.gold + "11", borderRadius: 8, borderLeft: `3px solid ${COLORS.gold}` }}>
            <div style={{ fontSize: 11, color: COLORS.primary, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 700, marginBottom: 8 }}>📅 End-of-Year Preview</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 10 }}>
              <div>
                <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 0.5, fontWeight: 600 }}>If you use 0 more days</div>
                <div style={{ fontSize: 20, fontWeight: 800, color: COLORS.gold, marginTop: 2 }}>{projectedCarryOver}d carries over</div>
                <div style={{ fontSize: 10, color: COLORS.textDim, marginTop: 1 }}>into {currentYear + 1}</div>
              </div>
              {cur.used > 0 && (
                <div>
                  <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 0.5, fontWeight: 600 }}>At current pace ({cur.used}d/{daysElapsed}d)</div>
                  <div style={{ fontSize: 20, fontWeight: 800, color: projectedIfCurrent > 0 ? COLORS.success : COLORS.danger, marginTop: 2 }}>~{projectedIfCurrent}d remains</div>
                  <div style={{ fontSize: 10, color: COLORS.textDim, marginTop: 1 }}>~{Math.round(burnPace)}d total used at year end</div>
                </div>
              )}
              <div>
                <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 0.5, fontWeight: 600 }}>Time remaining</div>
                <div style={{ fontSize: 20, fontWeight: 800, color: COLORS.text, marginTop: 2 }}>{daysRemaining}d</div>
                <div style={{ fontSize: 10, color: COLORS.textDim, marginTop: 1 }}>~{monthsRemaining} months until Dec 31</div>
              </div>
            </div>
          </div>
        );
      })()}

      <div style={{ marginTop: 16, fontSize: 11, color: COLORS.textDim, lineHeight: 1.5 }}>
        <b>How it works:</b> Each year begins with a carry-in balance from the previous year. The annual allotment is added on Jan 1. Used days are subtracted as taken. The ending balance carries into the next year.
      </div>

      <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 16 }}>
        <Button onClick={onClose}>Close</Button>
      </div>
    </Modal>
  );
}

// ============================================================
// WEEKLY SNAPSHOT WIDGET
// Surfaces what's happening this week at PFG:
//   - Birthdays (turning age this week)
//   - Work anniversaries (years at firm)
//   - 401(k) eligibility milestones (30/60/90 days from hire)
//   - Trading holidays
//   - Approved leave / out-of-office
//   - Banked PTO awaiting review
// Also includes a "Send Monday Digest" button that opens mailto with the
// snapshot body, addressed to all active employees.
// ============================================================
function WeeklySnapshotWidget({ currentUser, people, companyEvents, leaveRequests, bankedPto, performanceReviews, isOwnerUser }) {
  // Toggle between "this week" (Mon-Sun) and "next 14 days" planning view.
  const [horizon, setHorizon] = useState("week");   // "week" | "fortnight"

  const today = new Date(); today.setHours(0, 0, 0, 0);
  const dayOfWeek = today.getDay();   // 0 Sun .. 6 Sat
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;

  // Compute both windows so the toggle is fast. "week" = current Mon→Sun;
  // "fortnight" = today + 14 days (rolling lookahead).
  const weekStart = new Date(today); weekStart.setDate(today.getDate() + mondayOffset);
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6); weekEnd.setHours(23, 59, 59, 999);
  const fortnightStart = new Date(today);
  const fortnightEnd = new Date(today); fortnightEnd.setDate(today.getDate() + 13); fortnightEnd.setHours(23, 59, 59, 999);

  const rangeStart = horizon === "fortnight" ? fortnightStart : weekStart;
  const rangeEnd   = horizon === "fortnight" ? fortnightEnd   : weekEnd;
  const weekStart_ = rangeStart;   // legacy alias for the rest of this function
  const weekEnd_   = rangeEnd;
  const weekStartStr = rangeStart.toISOString().split("T")[0];
  const weekEndStr = rangeEnd.toISOString().split("T")[0];

  const inWeek = (dateStr) => dateStr && dateStr >= weekStartStr && dateStr <= weekEndStr;
  const fmtShort = (d) => d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });

  // Birthdays: project this year's date, check window
  const birthdays = [];
  (people || []).forEach(p => {
    if (!p.birthday || !p.active) return;
    const [yy, mm, dd] = p.birthday.split("-");
    const thisYearBday = `${weekStart_.getFullYear()}-${mm}-${dd}`;
    if (inWeek(thisYearBday)) {
      const turning = parseInt(yy, 10) ? (weekStart_.getFullYear() - parseInt(yy, 10)) : null;
      birthdays.push({ name: p.name, dateStr: thisYearBday, turning, date: new Date(thisYearBday + "T00:00:00") });
    }
    // also next year (handles late-Dec week wrap)
    if (weekEnd_.getFullYear() !== weekStart_.getFullYear()) {
      const nextYearBday = `${weekEnd_.getFullYear()}-${mm}-${dd}`;
      if (inWeek(nextYearBday)) {
        const turning = parseInt(yy, 10) ? (weekEnd_.getFullYear() - parseInt(yy, 10)) : null;
        birthdays.push({ name: p.name, dateStr: nextYearBday, turning, date: new Date(nextYearBday + "T00:00:00") });
      }
    }
  });

  // Work anniversaries
  const anniversaries = [];
  (people || []).forEach(p => {
    if (!p.dateOfHire || !p.active) return;
    const [yy, mm, dd] = p.dateOfHire.split("-");
    const thisYearAnniv = `${weekStart_.getFullYear()}-${mm}-${dd}`;
    if (inWeek(thisYearAnniv) && parseInt(yy, 10) < weekStart_.getFullYear()) {
      const years = weekStart_.getFullYear() - parseInt(yy, 10);
      anniversaries.push({ name: p.name, dateStr: thisYearAnniv, years, date: new Date(thisYearAnniv + "T00:00:00") });
    }
  });

  // Reviews to schedule (owner-only): anniversaries where the employee hasn't had a review
  // in the last 11 months (or ever). Uses performanceReviews prop to compute recency.
  const reviewsToSchedule = isOwnerUser ? anniversaries.filter(a => {
    // Match anniversary to person by name (unique enough for a small firm)
    const person = (people || []).find(p => p.name === a.name);
    if (!person) return false;
    // Find most recent review for this person by id
    const theirReviews = (performanceReviews || []).filter(r => r.subjectId === person.id);
    if (theirReviews.length === 0) return true;   // Never reviewed → definitely schedule
    const mostRecent = theirReviews.reduce((latest, r) => {
      if (!latest) return r;
      return new Date(r.reviewDate || r.createdAt || 0) > new Date(latest.reviewDate || latest.createdAt || 0) ? r : latest;
    }, null);
    const daysSince = (Date.now() - new Date(mostRecent.reviewDate || mostRecent.createdAt || 0)) / 86400000;
    return daysSince > 335;   // ~11 months
  }) : [];

  // 401(k) milestones — 30/60/90 days from hire
  const k401Milestones = [];
  (people || []).forEach(p => {
    if (!p.dateOfHire || !p.active) return;
    const hire = new Date(p.dateOfHire + "T00:00:00");
    [30, 60, 90].forEach(d => {
      const milestoneDate = new Date(hire); milestoneDate.setDate(hire.getDate() + d);
      const ds = milestoneDate.toISOString().split("T")[0];
      if (inWeek(ds)) {
        k401Milestones.push({ name: p.name, dateStr: ds, days: d, date: milestoneDate });
      }
    });
  });

  // Trading holidays — use the TRADING_HOLIDAYS lookup if available
  const holidays = [];
  if (typeof TRADING_HOLIDAYS !== "undefined" && TRADING_HOLIDAYS) {
    Object.entries(TRADING_HOLIDAYS).forEach(([ds, name]) => {
      if (inWeek(ds)) holidays.push({ name, dateStr: ds, date: new Date(ds + "T00:00:00") });
    });
  }

  // Approved leave overlapping this week
  const outOfOffice = [];
  (leaveRequests || []).forEach(r => {
    if (r.status !== "approved") return;
    const start = r.startDate;
    const end = r.endDate || r.startDate;
    if (end < weekStartStr || start > weekEndStr) return;
    outOfOffice.push({
      name: r.requestedByName,
      type: r.leaveType,
      startDate: start,
      endDate: end,
      reason: r.reason || "",
      date: new Date(start + "T00:00:00"),
    });
  });

  // Banked PTO submitted this week awaiting review (owner-only signal)
  const bankedPending = isOwnerUser
    ? (bankedPto || []).filter(b => b.status === "submitted")
    : [];

  // Recurring meetings this week (Monday huddle etc.)
  const recurringThisWeek = typeof projectRecurringEvents === "function"
    ? projectRecurringEvents(weekStart_, weekEnd_)
    : [];

  const totalItems = recurringThisWeek.length + birthdays.length + anniversaries.length + k401Milestones.length + holidays.length + outOfOffice.length + bankedPending.length + reviewsToSchedule.length;

  // === Build Monday Digest mailto body ===
  const generateDigestBody = () => {
    const lines = [];
    lines.push(`PointerOS — ${horizon === "fortnight" ? "Next 14 Days" : "Weekly Snapshot"}`);
    lines.push(`${horizon === "fortnight" ? "Looking ahead" : "Week of"}: ${fmtShort(weekStart_)} – ${fmtShort(weekEnd_)}`);
    lines.push("");
    if (holidays.length) {
      lines.push("MARKET HOLIDAYS:");
      holidays.forEach(h => lines.push(`  • ${fmtShort(h.date)} — ${h.name}`));
      lines.push("");
    }
    if (recurringThisWeek.length) {
      lines.push("RECURRING MEETINGS:");
      recurringThisWeek.forEach(r => lines.push(`  • ${fmtShort(r.date)} — ${r.title}${r.time ? " @ " + r.time + " " + (r.timezoneLabel || "") : ""}`));
      lines.push("");
    }
    if (outOfOffice.length) {
      lines.push("OUT OF OFFICE:");
      outOfOffice.forEach(o => {
        const range = o.startDate === o.endDate ? fmtShort(new Date(o.startDate + "T00:00:00")) : `${fmtShort(new Date(o.startDate + "T00:00:00"))} – ${fmtShort(new Date(o.endDate + "T00:00:00"))}`;
        lines.push(`  • ${o.name} — ${o.type} (${range})${o.reason ? ` — ${o.reason}` : ""}`);
      });
      lines.push("");
    }
    if (birthdays.length) {
      lines.push("BIRTHDAYS:");
      birthdays.forEach(b => lines.push(`  • ${fmtShort(b.date)} — ${b.name}${b.turning ? ` (turning ${b.turning})` : ""}`));
      lines.push("");
    }
    if (anniversaries.length) {
      lines.push("WORK ANNIVERSARIES:");
      anniversaries.forEach(a => lines.push(`  • ${fmtShort(a.date)} — ${a.name} (${a.years} year${a.years === 1 ? "" : "s"} at Pointer)`));
      lines.push("");
    }
    if (reviewsToSchedule.length) {
      lines.push("PERFORMANCE REVIEWS TO SCHEDULE:");
      reviewsToSchedule.forEach(r => lines.push(`  • ${r.name} — ${r.years}-year anniversary, review due (11+ months since last)`));
      lines.push("");
    }
    if (k401Milestones.length) {
      lines.push("401(k) ELIGIBILITY MILESTONES:");
      k401Milestones.forEach(m => lines.push(`  • ${fmtShort(m.date)} — ${m.name} reaches ${m.days}-day mark`));
      lines.push("");
    }
    if (totalItems === 0) lines.push("Nothing major on the calendar this week.");
    lines.push("");
    lines.push("— Generated by PointerOS · Sent from My Profile → Weekly Snapshot");
    return lines.join("\n");
  };

  const sendDigest = () => {
    const recipients = (people || [])
      .filter(p => p.active && !p.isTestAccount && p.email)
      .map(p => p.email);
    sendEmail({
      to: recipients,
      subject: `[PFG] ${horizon === "fortnight" ? "Next 14 Days" : "Weekly Snapshot"} — ${fmtShort(weekStart_)} – ${fmtShort(weekEnd_)}`,
      body: generateDigestBody(),
    });
  };

  // Layout helpers
  const Section = ({ title, count, color, children }) => (
    <div style={{ padding: "10px 12px", background: COLORS.surface, borderRadius: 8, border: `1px solid ${COLORS.borderLight}`, borderLeft: `3px solid ${color}` }}>
      <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700, marginBottom: 6 }}>{title} <span style={{ color, fontWeight: 700, marginLeft: 4 }}>· {count}</span></div>
      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>{children}</div>
    </div>
  );

  return (
    <Card style={{ padding: 18, marginBottom: 16, background: "linear-gradient(135deg, #F8FBFF 0%, #FFFFFF 60%)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 14 }}>
        <div>
          <div style={{ fontSize: 11, color: COLORS.primary, textTransform: "uppercase", letterSpacing: 2, fontWeight: 700 }}>
            📅 {horizon === "fortnight" ? "Next 14 Days" : "Weekly Snapshot"}
          </div>
          <div style={{ fontSize: 16, fontWeight: 700, color: COLORS.text, marginTop: 2 }}>
            {horizon === "fortnight" ? "Looking ahead: " : "Week of "}{fmtShort(weekStart_)} – {fmtShort(weekEnd_)}
          </div>
          <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2 }}>{totalItems} item{totalItems === 1 ? "" : "s"} on the calendar</div>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          {/* Horizon toggle: this week (Mon-Sun) vs next 14 days (rolling) */}
          <div style={{ display: "flex", background: COLORS.borderLight, borderRadius: 8, padding: 3 }}>
            <button onClick={() => setHorizon("week")} type="button"
              style={{ padding: "5px 12px", border: "none", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                background: horizon === "week" ? COLORS.surface : "transparent",
                color: horizon === "week" ? COLORS.text : COLORS.textMuted }}>This Week</button>
            <button onClick={() => setHorizon("fortnight")} type="button"
              style={{ padding: "5px 12px", border: "none", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit",
                background: horizon === "fortnight" ? COLORS.surface : "transparent",
                color: horizon === "fortnight" ? COLORS.text : COLORS.textMuted }}>Next 14 Days</button>
          </div>
          <Button onClick={sendDigest} disabled={totalItems === 0}>
            ✉ Send {horizon === "fortnight" ? "Lookahead" : "Monday Digest"}
          </Button>
        </div>
      </div>

      {totalItems === 0 ? (
        <div style={{ padding: 16, textAlign: "center", color: COLORS.textMuted, fontSize: 13, fontStyle: "italic" }}>
          {horizon === "fortnight"
            ? "Nothing major on the calendar in the next two weeks."
            : "Nothing major on the calendar this week. Quiet week ahead."}
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 10 }}>
          {holidays.length > 0 && (
            <Section title="Market Holidays" count={holidays.length} color={COLORS.danger}>
              {holidays.map(h => (
                <div key={h.dateStr} style={{ fontSize: 12 }}>
                  <b>{fmtShort(h.date)}</b> · {h.name}
                </div>
              ))}
            </Section>
          )}
          {recurringThisWeek.length > 0 && (
            <Section title="Recurring Meetings" count={recurringThisWeek.length} color={COLORS.primary}>
              {recurringThisWeek.map(r => (
                <div key={r.key} style={{ fontSize: 12 }}>
                  {r.icon} <b>{r.title}</b>
                  <div style={{ fontSize: 11, color: COLORS.textMuted, marginLeft: 18 }}>{fmtShort(r.date)}{r.time ? ` · ${r.time} ${r.timezoneLabel || ""}` : ""}</div>
                </div>
              ))}
            </Section>
          )}
          {outOfOffice.length > 0 && (
            <Section title="Out of Office" count={outOfOffice.length} color={COLORS.warning}>
              {outOfOffice.map((o, i) => (
                <div key={i} style={{ fontSize: 12 }}>
                  <b>{o.name}</b> · {o.type}
                  <div style={{ fontSize: 11, color: COLORS.textMuted }}>
                    {o.startDate === o.endDate ? fmtShort(new Date(o.startDate + "T00:00:00")) : `${fmtShort(new Date(o.startDate + "T00:00:00"))} – ${fmtShort(new Date(o.endDate + "T00:00:00"))}`}
                  </div>
                </div>
              ))}
            </Section>
          )}
          {birthdays.length > 0 && (
            <Section title="Birthdays" count={birthdays.length} color={COLORS.gold}>
              {birthdays.map((b, i) => (
                <div key={i} style={{ fontSize: 12 }}>
                  🎂 <b>{b.name}</b>{b.turning ? ` · turning ${b.turning}` : ""}
                  <div style={{ fontSize: 11, color: COLORS.textMuted, marginLeft: 18 }}>{fmtShort(b.date)}</div>
                </div>
              ))}
            </Section>
          )}
          {anniversaries.length > 0 && (
            <Section title="Work Anniversaries" count={anniversaries.length} color={COLORS.primary}>
              {anniversaries.map((a, i) => (
                <div key={i} style={{ fontSize: 12 }}>
                  🎉 <b>{a.name}</b> · {a.years} yr{a.years === 1 ? "" : "s"}
                  <div style={{ fontSize: 11, color: COLORS.textMuted, marginLeft: 18 }}>{fmtShort(a.date)}</div>
                </div>
              ))}
            </Section>
          )}
          {reviewsToSchedule.length > 0 && (
            <Section title="Reviews to Schedule" count={reviewsToSchedule.length} color={COLORS.danger}>
              {reviewsToSchedule.map((r, i) => (
                <div key={i} style={{ fontSize: 12 }}>
                  ⭐ <b>{r.name}</b> · anniversary
                  <div style={{ fontSize: 11, color: COLORS.textMuted, marginLeft: 18 }}>Review due — 11+ months since last</div>
                </div>
              ))}
            </Section>
          )}
          {k401Milestones.length > 0 && (
            <Section title="401(k) Eligibility" count={k401Milestones.length} color={COLORS.success}>
              {k401Milestones.map((m, i) => (
                <div key={i} style={{ fontSize: 12 }}>
                  <b>{m.name}</b> · {m.days}-day mark
                  <div style={{ fontSize: 11, color: COLORS.textMuted }}>{fmtShort(m.date)}</div>
                </div>
              ))}
            </Section>
          )}
          {bankedPending.length > 0 && (
            <Section title="Banked PTO Awaiting Review" count={bankedPending.length} color={COLORS.gold}>
              {bankedPending.map(b => (
                <div key={b.id} style={{ fontSize: 12 }}>
                  <b>{b.userName}</b> · {b.date}
                  <div style={{ fontSize: 11, color: COLORS.textMuted }}>{b.reason}</div>
                </div>
              ))}
            </Section>
          )}
        </div>
      )}
    </Card>
  );
}

function HRProfileView({ currentUser, reimbursements, people, onUpdatePeople, isAdmin, isOwnerUser, setPage, hrSettings, profileRequests, saveHR, companyEvents, leaveRequests, bankedPto, performanceReviews }) {
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({});
  const [tab, setTab] = useState("overview");
  const [ptoModalOpen, setPtoModalOpen] = useState(false);

  // Change-request modal — for fields employees cannot edit themselves
  const [requestField, setRequestField] = useState(null); // { key, label, currentVal }
  const [requestProposed, setRequestProposed] = useState("");
  const [requestReason, setRequestReason] = useState("");

  // Password change state — every user can change their own password.
  const [showChangePw, setShowChangePw] = useState(false);

    const summary = `You're requesting a change to "${requestField.label}":\n\n` +

`A profile-field change request has been submitted in PointerOS.

Employee: ${currentUser.name} ${currentUser.email ? "<" + currentUser.email + ">" : ""}
Field: ${requestField.label}
Current value: ${requestField.currentVal ?? "(empty)"}
Proposed value: ${requestProposed}

Reason / notes:
${requestReason || "(none provided)"}

Approve or deny in: PointerOS → HR Toolsuite → Employees (admin view).

— Automated message from PointerOS`;

      {/* Profile change request modal */}
      {requestField && (

          {requestField.key === "enrolled401k" ? (

      {/* My pending profile requests */}
      {!editing && profileRequests && profileRequests.filter(r => r.requestedBy === currentUser.id).length > 0 && (
        <Card style={{ padding: 20, marginBottom: 16 }}>

            </tbody>

        </Card>
      )}

      {/* Time-Off History — transaction log of leaves taken */}
      {!editing && (() => {
        // Build a unified list of leave events from militaryLeaves + unpaidLeaves
        const events = [];
        (currentUser.militaryLeaves || []).forEach((l, i) => {
          if (l.start && l.end) events.push({ ...l, type: "Military Service Leave", typeRef: "Handbook Part 5", color: COLORS.primary, idx: i });
        });
        (currentUser.unpaidLeaves || []).forEach((l, i) => {
          if (l.start && l.end) events.push({ ...l, type: "FMLA / Other Unpaid Leave", typeRef: "Handbook Part 5", color: COLORS.gold, idx: i });
        });
        // PTO history — could derive from ptoHistory if "used" days were dated; for now show the year-level usage
        const ptoEvents = [];
        Object.entries(currentUser.ptoHistory || {}).forEach(([yr, e]) => {
          if ((e?.used || 0) > 0) {
            ptoEvents.push({ start: yr + "-01-01", end: yr + "-12-31", type: `Paid Personal Time (${yr})`, typeRef: "Handbook Part 5", color: COLORS.success, days: e.used });
          }
        });
        const allEvents = [...events, ...ptoEvents].sort((a, b) => a.start.localeCompare(b.start));
        if (allEvents.length === 0) return null;

        const daysBetween = (s, e) => {
          const sd = new Date(s + "T00:00:00");
          const ed = new Date(e + "T00:00:00");
          if (isNaN(sd) || isNaN(ed) || ed < sd) return 0;
          return Math.round((ed - sd) / (1000 * 60 * 60 * 24)) + 1;
        };

        return (
          <Card style={{ padding: 20, marginBottom: 16 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4, flexWrap: "wrap", gap: 8 }}>
              <div style={{ fontSize: 14, fontWeight: 600 }}>Time-Off History</div>
              <HandbookLink topic="Part 5 — Holidays, Personal and Other Leave" label="Part 5 · Leave Policies" />
            </div>
            <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 14 }}>All leaves on record. Click the handbook link above to see categorization rules.</div>
            <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
              <thead><tr style={{ background: COLORS.bg, textAlign: "left" }}>
                <th style={{ padding: "8px 10px", fontWeight: 600 }}>Start</th>
                <th style={{ padding: "8px 10px", fontWeight: 600 }}>End</th>
                <th style={{ padding: "8px 10px", fontWeight: 600, textAlign: "right" }}>Days</th>
                <th style={{ padding: "8px 10px", fontWeight: 600 }}>Type</th>
              </tr></thead>
              <tbody>
                {allEvents.map((evt, i) => (
                  <tr key={i} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                    <td style={{ padding: "8px 10px", color: COLORS.text, fontFamily: "ui-monospace, monospace" }}>{evt.start}</td>
                    <td style={{ padding: "8px 10px", color: COLORS.text, fontFamily: "ui-monospace, monospace" }}>{evt.end}</td>
                    <td style={{ padding: "8px 10px", textAlign: "right", fontWeight: 600 }}>{evt.days != null ? evt.days : daysBetween(evt.start, evt.end)}</td>
                    <td style={{ padding: "8px 10px" }}>
                      <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                        <span style={{ width: 8, height: 8, borderRadius: "50%", background: evt.color }} />
                        <span>{evt.type}</span>
                      </span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        );
      })()}

      <Card style={{ padding: 20 }}>
        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>My Reimbursements</div>
        {myReimb.length === 0 ? (
          <div style={{ color: COLORS.textMuted, fontSize: 13, padding: 12 }}>No requests submitted yet.</div>
        ) : (
          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
            <thead><tr style={{ background: "#F8FAFC", textAlign: "left" }}>
              <th style={{ padding: "8px" }}>Date</th><th style={{ padding: "8px" }}>Category</th>
              <th style={{ padding: "8px" }}>Amount</th><th style={{ padding: "8px" }}>Description</th>
              <th style={{ padding: "8px" }}>Status</th>
            </tr></thead>
            <tbody>
              {myReimb.slice().reverse().map(r => (
                <tr key={r.id} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                  <td style={{ padding: "8px" }}>{r.date}</td>
                  <td style={{ padding: "8px" }}>{r.category}</td>
                  <td style={{ padding: "8px" }}>${r.amount.toFixed(2)}</td>
                  <td style={{ padding: "8px" }}>{r.desc || ""}</td>
                  <td style={{ padding: "8px" }}><Badge color={r.status === "approved" ? COLORS.success : r.status === "denied" ? COLORS.danger : COLORS.warning}>{r.status.toUpperCase()}</Badge></td>
                </tr>

        )}
      </Card>

      {/* Password management — self-serve, every user */}
      <Card style={{ padding: 20, marginTop: 16, borderLeft: `3px solid ${COLORS.gold}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
          <div>
            <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700 }}>Security</div>
            <div style={{ fontSize: 15, fontWeight: 600, marginTop: 4 }}>Change My Password</div>
            <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 4, lineHeight: 1.5 }}>
              Only you can change your password. Even masters cannot reset it. Lose it and you'll need to clear your browser data and re-set on next sign-in.
            </div>
          </div>
          <Button onClick={() => setShowChangePw(true)}>Change Password</Button>

      </Card>

      <Modal open={showChangePw} onClose={() => { setShowChangePw(false); setPwError(""); setPwOld(""); setPwNew(""); setPwConfirm(""); }} title="Change My Password">
        <Input label="Current Password" type="password" value={pwOld} onChange={v => { setPwOld(v); setPwError(""); }} placeholder="Enter current password" />
        <Input label="New Password" type="password" value={pwNew} onChange={v => { setPwNew(v); setPwError(""); }} placeholder="At least 6 characters" />
        <Input label="Confirm New Password" type="password" value={pwConfirm} onChange={v => { setPwConfirm(v); setPwError(""); }} placeholder="Re-enter new password" />

        {pwSuccess && <div style={{ color: COLORS.success, fontSize: 12, marginBottom: 8, fontWeight: 600 }}>✓ Password updated.</div>}
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 12 }}>
          <Button variant="ghost" onClick={() => { setShowChangePw(false); setPwError(""); }}>Cancel</Button>
