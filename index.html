                            <div style={{ width: 70, flexShrink: 0 }}>
                              <div style={{ fontSize: 12, fontWeight: 700, color: daysOut === 0 ? COLORS.primary : COLORS.text }}>{dateLabel}</div>
                              <div style={{ fontSize: 10, color: COLORS.textMuted }}>{e.time}</div>
                            </div>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontSize: 13, color: COLORS.text }}>{e.title}</div>
                            </div>
                            <Badge color={impactColor(e.impact)}>{e.impact.toUpperCase()}</Badge>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}
              </Card>
            </div>
          </div>

        {/* Economic calendar editor — owners only */}
        {page === "calendar-edit" && canEditOwnerStuff && (
          <EconCalendarEditor calendar={econCalendar} setCalendar={(c) => save({ econCalendar: c })} onBack={() => setPage("overview")} />

        {page === "models" && (
          <div>
            <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700, marginBottom: 6 }}>Models</h2>
            <p style={{ color: COLORS.textMuted, fontSize: 13, marginBottom: 20 }}>
              {canEditOwnerStuff ? "Upload, edit, and rebalance investment models." : "View-only — model editing is restricted to Matt Bruce and Alex Suarez."}

            {canEditOwnerStuff && (

                  {models[selectedModel].map((r, i) => (
                    <ModelHoldingRow
                      key={r.Symbol + "-" + i}

function FearGreedCard({ data }) {
  // Mapping: 0–25 extreme fear, 26–45 fear, 46–55 neutral, 56–75 greed, 76–100 extreme greed
  const ratingColor = (rating) => {
    const r = (rating || "").toLowerCase();
    if (r.includes("extreme fear")) return "#991B1B";
    if (r.includes("fear")) return "#DC2626";
    if (r.includes("neutral")) return "#D97706";
    if (r.includes("extreme greed")) return "#15803D";
    if (r.includes("greed")) return "#16A34A";
    return COLORS.textMuted;
  };
  const score = data?.score;
  const angle = score != null ? -90 + (score / 100) * 180 : -90;
  return (
    <Card style={{ padding: 18 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>

        <div style={{ padding: 24, textAlign: "center", color: COLORS.textMuted, fontSize: 13 }}>

        </div>
      ) : (
        <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
          {/* Half-circle gauge */}
          <div style={{ position: "relative", width: 160, height: 90, flexShrink: 0 }}>
            <svg width="160" height="90" viewBox="0 0 160 90">
              <defs>
                <linearGradient id="fgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stopColor="#991B1B" />
                  <stop offset="30%" stopColor="#DC2626" />

                <line x1="0" y1="0" x2="0" y2="-58" stroke={COLORS.text} strokeWidth="3" strokeLinecap="round" />
                <circle cx="0" cy="0" r="5" fill={COLORS.text} />

            </svg>

              <div style={{ fontSize: 28, fontWeight: 800, color: ratingColor(data.rating), lineHeight: 1 }}>{score}</div>
            </div>
          </div>

              <div>1 month ago: <b style={{ color: COLORS.text }}>{data.previousMonth}</b></div>
              <div>1 year ago: <b style={{ color: COLORS.text }}>{data.previousYear}</b></div>
            </div>

// MODEL HOLDING ROW — per-position view with YTD, mini chart, Morningstar
// ============================================================
function ModelHoldingRow({ symbol, targetPct, modelName, morningstarRating, canEdit, onRatingChange }) {
  const [data, setData] = useState(null);   // { ytd, last, closes (~YTD daily), ts }
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(false);
  const [expanded, setExpanded] = useState(false);
  const sparkRef = useRef(null);
  const sparkChart = useRef(null);
  const bigChartRef = useRef(null);
  const bigChartObj = useRef(null);

  // Don't fetch cash sleeves / non-tickers
  const isCash = !symbol || symbol.startsWith("$") || symbol === "CASH";

  useEffect(() => {
    if (isCash) { setLoading(false); return; }
    let cancelled = false;
    (async () => {
      setLoading(true);
      setError(false);
      try {
        const { closes, ts } = await fetchYahoo(symbol, "ytd", "1d");
        const clean = closes.filter(c => c !== null);
        if (clean.length < 2) throw new Error("not enough data");
        const ytd = ((clean[clean.length - 1] - clean[0]) / clean[0]) * 100;
        if (!cancelled) setData({ ytd, last: clean[clean.length - 1], closes, ts });
      } catch (e) {
        if (!cancelled) setError(true);
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [symbol, isCash]);

  // Sparkline
  useEffect(() => {
    if (!data || !sparkRef.current) return;
    if (sparkChart.current) { sparkChart.current.destroy(); sparkChart.current = null; }
    const cleanCloses = data.closes.filter(c => c !== null);
    const start = cleanCloses[0];
    const up = data.ytd >= 0;
    sparkChart.current = new Chart(sparkRef.current, {
      type: "line",
      data: {
        labels: cleanCloses.map((_, i) => i),
        datasets: [{
          data: cleanCloses.map(c => ((c - start) / start) * 100),
          borderColor: up ? COLORS.success : COLORS.danger,
          backgroundColor: (up ? COLORS.success : COLORS.danger) + "22",
          fill: true, pointRadius: 0, borderWidth: 1.5, tension: 0.2,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { x: { display: false }, y: { display: false } },
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        elements: { line: { cubicInterpolationMode: "monotone" } },
      },
    });
    return () => { if (sparkChart.current) { sparkChart.current.destroy(); sparkChart.current = null; } };
  }, [data]);

  // Big chart (expanded)
  useEffect(() => {
    if (!expanded || !data || !bigChartRef.current) return;
    if (bigChartObj.current) { bigChartObj.current.destroy(); bigChartObj.current = null; }
    const cleanCloses = data.closes.filter(c => c !== null);
    const cleanTs = (data.ts || []).filter((_, i) => data.closes[i] !== null);
    const up = data.ytd >= 0;
    bigChartObj.current = new Chart(bigChartRef.current, {
      type: "line",
      data: {
        labels: cleanTs.map(t => new Date(t * 1000).toLocaleDateString()),
        datasets: [{
          label: symbol,
          data: cleanCloses,
          borderColor: up ? COLORS.success : COLORS.danger,
          backgroundColor: (up ? COLORS.success : COLORS.danger) + "15",
          fill: true, pointRadius: 0, borderWidth: 2, tension: 0.2,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { title: { display: true, text: "Price ($)" } } },
        plugins: { legend: { display: false } },
      },
    });
    return () => { if (bigChartObj.current) { bigChartObj.current.destroy(); bigChartObj.current = null; } };
  }, [expanded, data, symbol]);

  const ratingValue = morningstarRating == null ? "" : String(morningstarRating);

  return (
    <div style={{ borderBottom: `1px solid ${COLORS.borderLight}` }}>
      <div style={{ display: "grid", gridTemplateColumns: "minmax(80px, 110px) minmax(70px, 90px) minmax(100px, 1fr) minmax(110px, 140px) minmax(100px, 140px) 30px", gap: 12, alignItems: "center", padding: "12px 4px" }}>
        {/* Symbol */}
        <div>
          <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.text }}>{symbol || "—"}</div>
          {isCash && <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 2 }}>Cash sleeve</div>}
        </div>
        {/* Target % */}
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Target</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.primaryDark }}>{targetPct != null ? targetPct + "%" : "—"}</div>
        </div>
        {/* YTD */}
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>YTD</div>
          {isCash ? <div style={{ fontSize: 13, color: COLORS.textMuted }}>—</div> :
           loading ? <div style={{ fontSize: 12, color: COLORS.textMuted }}>Loading…</div> :
           error ? <div style={{ fontSize: 12, color: COLORS.textMuted }}>—</div> :
           <div style={{ fontSize: 14, fontWeight: 700, color: data.ytd >= 0 ? COLORS.success : COLORS.danger }}>
             {data.ytd >= 0 ? "+" : ""}{data.ytd.toFixed(2)}%
           </div>}
        </div>
        {/* Sparkline */}
        <div onClick={() => !isCash && data && setExpanded(!expanded)} style={{ cursor: !isCash && data ? "pointer" : "default", height: 36 }} title={!isCash && data ? "Click to expand chart" : ""}>
          {isCash ? <div style={{ fontSize: 11, color: COLORS.textDim, textAlign: "center", lineHeight: "36px" }}>—</div> :
           loading ? <div style={{ fontSize: 11, color: COLORS.textDim, textAlign: "center", lineHeight: "36px" }}>…</div> :
           error ? <div style={{ fontSize: 11, color: COLORS.textDim, textAlign: "center", lineHeight: "36px" }}>data unavailable</div> :
           <canvas ref={sparkRef} />}
        </div>
        {/* Morningstar */}
        <div style={{ textAlign: "right" }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Morningstar</div>
          {canEdit ? (
            <select value={ratingValue} onChange={e => onRatingChange(e.target.value === "" ? null : parseInt(e.target.value))}
              style={{ padding: "3px 6px", borderRadius: 4, border: `1px solid ${COLORS.border}`, fontSize: 12, fontFamily: "inherit", background: COLORS.surface }}>
              <option value="">—</option>
              <option value="1">★</option>
              <option value="2">★★</option>
              <option value="3">★★★</option>
              <option value="4">★★★★</option>
              <option value="5">★★★★★</option>
            </select>
          ) : (
            <div style={{ fontSize: 14, color: COLORS.gold, fontWeight: 700, letterSpacing: 1 }}>
              {morningstarRating ? "★".repeat(morningstarRating) + "☆".repeat(5 - morningstarRating) : "—"}
            </div>
          )}
        </div>
        {/* Expand chevron */}
        <div style={{ textAlign: "center", color: COLORS.textMuted, cursor: !isCash && data ? "pointer" : "default", fontSize: 14 }}
             onClick={() => !isCash && data && setExpanded(!expanded)}>
          {!isCash && data && (expanded ? "▾" : "▸")}
        </div>
      </div>

      {expanded && data && (
        <div style={{ padding: "8px 4px 20px", background: COLORS.bg, borderRadius: 6 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, padding: "0 8px" }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.text }}>{symbol} · YTD Price</div>
            <div style={{ fontSize: 12, color: COLORS.textMuted }}>
              Last: <b style={{ color: COLORS.text }}>${data.last.toFixed(2)}</b>
            </div>
          </div>
          <div style={{ height: 220 }}><canvas ref={bigChartRef} /></div>
        </div>
      )}
    </div>
  );
}

    setCalendar([...DEFAULT_ECON_CALENDAR]);

                <td style={{ padding: "8px" }}><Button size="sm" variant="ghost" onClick={() => removeEvent(calendar.indexOf(e))}><IconTrash size={12} /></Button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

// STOCK DASHBOARD (replaces the old options-positions tracker)
// — view-only for non-owners; owners can add/remove the universe
// ============================================================
function StockDashboard({ universe, setUniverse, canEdit }) {
  const [quotes, setQuotes] = useState({});            // { sym: { last, prev, pct, vol, dayHigh, dayLow, yearHigh, yearLow } }
  const [loading, setLoading] = useState(false);
  const [addForm, setAddForm] = useState({ sym: "", name: "" });

  const refresh = useCallback(async () => {
    setLoading(true);
    try {
      const syms = universe.map(u => u.sym);
      const batch = await fetchYahooBatch(syms);
      setQuotes(batch);
    } catch (e) {
      console.warn("[PFG] Stock dashboard fetch failed:", e.message);
    }
    setLoading(false);
  }, [universe]);

  useEffect(() => { refresh(); }, [refresh]);

  const addStock = () => {
    const sym = addForm.sym.trim().toUpperCase();
    if (!sym) { alert("Symbol required"); return; }
    if (universe.find(u => u.sym === sym)) { alert("Already in universe"); return; }
    setUniverse([...universe, { sym, name: addForm.name.trim() || sym }]);
    setAddForm({ sym: "", name: "" });
    setTimeout(refresh, 100);
  };
  const removeStock = (sym) => {
    if (!confirm("Remove " + sym + " from the universe?")) return;
    setUniverse(universe.filter(u => u.sym !== sym));
  };
  const resetUniverse = () => {
    if (!confirm("Reset to default top 10 S&P 500 holdings? Any custom symbols will be removed.")) return;
    setUniverse([...DEFAULT_STOCK_UNIVERSE]);
  };

  const fmtVol = (n) => {
    if (n == null) return "—";
    if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
    if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
    if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
    return n.toString();
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 18 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Stock Dashboard</h2>
          <p style={{ color: COLORS.textMuted, fontSize: 13, margin: "4px 0 0" }}>
            Live quotes for the firm's monitored universe. {canEdit ? "Owner-only edits — Matt & Alex can add/remove symbols." : "View-only — contact Matt or Alex to add symbols."}
          </p>
        </div>
        <Button size="sm" variant="ghost" onClick={refresh}>{loading ? "Refreshing…" : "↻ Refresh"}</Button>
      </div>

      <Card style={{ padding: 0, marginBottom: 16, overflow: "hidden" }}>
        <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ background: "#F8FAFC", textAlign: "left" }}>
              <th style={{ padding: "10px 12px" }}>Symbol</th>
              <th style={{ padding: "10px 12px" }}>Name</th>
              <th style={{ padding: "10px 12px", textAlign: "right" }}>Last</th>
              <th style={{ padding: "10px 12px", textAlign: "right" }}>Today %</th>
              <th style={{ padding: "10px 12px", textAlign: "right" }}>Day Range</th>
              <th style={{ padding: "10px 12px", textAlign: "right" }}>52W Range</th>
              <th style={{ padding: "10px 12px", textAlign: "right" }}>Volume</th>
              {canEdit && <th style={{ padding: "10px 12px" }}></th>}
            </tr>
          </thead>
          <tbody>
            {universe.map(stk => {
              const q = quotes[stk.sym];
              const color = !q || q.pct == null ? COLORS.textMuted : (q.pct >= 0 ? COLORS.success : COLORS.danger);
              const arrow = !q || q.pct == null ? "" : (q.pct >= 0 ? "▲" : "▼");
              // Year range bar: position of current price between yearLow and yearHigh
              let pctOfRange = null;
              if (q && q.yearHigh != null && q.yearLow != null && q.yearHigh > q.yearLow) {
                pctOfRange = ((q.last - q.yearLow) / (q.yearHigh - q.yearLow)) * 100;
                pctOfRange = Math.max(0, Math.min(100, pctOfRange));
              }
              return (
                <tr key={stk.sym} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                  <td style={{ padding: "10px 12px", fontWeight: 700 }}>{stk.sym}</td>
                  <td style={{ padding: "10px 12px", color: COLORS.textMuted }}>{stk.name}</td>
                  <td style={{ padding: "10px 12px", textAlign: "right", fontWeight: 600 }}>{q ? "$" + q.last.toFixed(2) : "—"}</td>
                  <td style={{ padding: "10px 12px", textAlign: "right", color, fontWeight: 700 }}>{q && q.pct != null ? arrow + " " + q.pct.toFixed(2) + "%" : "—"}</td>
                  <td style={{ padding: "10px 12px", textAlign: "right", fontSize: 12, color: COLORS.textMuted }}>
                    {q && q.dayLow != null && q.dayHigh != null ? `$${q.dayLow.toFixed(2)} – $${q.dayHigh.toFixed(2)}` : "—"}
                  </td>
                  <td style={{ padding: "10px 12px", textAlign: "right", fontSize: 12 }}>
                    {q && q.yearLow != null && q.yearHigh != null ? (
                      <div>
                        <div style={{ color: COLORS.textMuted }}>{`$${q.yearLow.toFixed(2)} – $${q.yearHigh.toFixed(2)}`}</div>
                        {pctOfRange != null && (
                          <div style={{ width: 120, height: 4, background: COLORS.borderLight, borderRadius: 2, marginLeft: "auto", marginTop: 3, position: "relative" }}>
                            <div style={{ position: "absolute", left: pctOfRange + "%", top: -2, width: 2, height: 8, background: COLORS.primary }} />
                          </div>
                        )}
                      </div>
                    ) : "—"}
                  </td>
                  <td style={{ padding: "10px 12px", textAlign: "right", fontSize: 12, color: COLORS.textMuted }}>{q ? fmtVol(q.vol) : "—"}</td>
                  {canEdit && (
                    <td style={{ padding: "8px" }}>
                      <Button size="sm" variant="ghost" onClick={() => removeStock(stk.sym)}><IconTrash size={12} /></Button>
                    </td>
                  )}
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>

      {canEdit && (
        <Card style={{ padding: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>Edit Universe (Owner)</div>
            <Button size="sm" variant="ghost" onClick={resetUniverse}>Reset to Top 10 S&P</Button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr auto", gap: 10, alignItems: "end" }}>
            <Input label="Symbol" value={addForm.sym} onChange={v => setAddForm({ ...addForm, sym: v })} placeholder="AAPL" />
            <Input label="Name (optional)" value={addForm.name} onChange={v => setAddForm({ ...addForm, name: v })} placeholder="Apple Inc." />
            <Button onClick={addStock} style={{ marginBottom: 12 }}><IconPlus size={14} /> Add Symbol</Button>
          </div>
        </Card>
      )}
    </div>
  );
}

function HRToolsuiteApp({ currentUser, actualUser, viewAs, setViewAs, people, onUpdatePeople, onExit }) {
  const [page, setPage] = useState("profile");
  const [reimbursements, setReimbursements] = useState([]);
  const [companyEvents, setCompanyEvents] = useState([]);
  const [eventRequests, setEventRequests] = useState([]);   // employee-requested events awaiting master approval
  const [profileRequests, setProfileRequests] = useState([]); // requests to change locked profile fields
  const [leaveRequests, setLeaveRequests] = useState([]);   // employee time-off requests
  const [hrSettings, setHrSettings] = useState({
    notifyEmails: ["matt@pointerfg.com", "alex@pointerfg.com"],
    documents: [], // user-added documents beyond the built-ins
  });
  const [calDate, setCalDate] = useState(new Date());
  const [calFilters, setCalFilters] = useState({ holidays: true, birthdays: true, events: true });
  const isAdmin = currentUser?.isAdmin;
  const isOwnerUser = isOwner(currentUser);

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("pfg-hr-v1");
        if (r?.value) {
          const d = JSON.parse(r.value);
          setReimbursements(d.reimbursements || []);
          setCompanyEvents(d.companyEvents || []);
          setEventRequests(d.eventRequests || []);
          setProfileRequests(d.profileRequests || []);
          setLeaveRequests(d.leaveRequests || []);
          if (d.hrSettings) setHrSettings({ ...hrSettings, ...d.hrSettings });
        }
      } catch (e) {}
    })();
    // eslint-disable-next-line
  }, []);

  const saveHR = useCallback((next) => {
    const data = { reimbursements, companyEvents, eventRequests, profileRequests, leaveRequests, hrSettings, ...next };
    if (next.reimbursements) setReimbursements(next.reimbursements);
    if (next.companyEvents) setCompanyEvents(next.companyEvents);
    if (next.eventRequests) setEventRequests(next.eventRequests);
    if (next.profileRequests) setProfileRequests(next.profileRequests);
    if (next.leaveRequests) setLeaveRequests(next.leaveRequests);
    if (next.hrSettings) setHrSettings(next.hrSettings);
    try { window.storage.set("pfg-hr-v1", JSON.stringify(data)); } catch (e) { console.error(e); }
  }, [reimbursements, companyEvents, eventRequests, profileRequests, leaveRequests, hrSettings]);

  const navItems = [
    { key: "profile", icon: IconUsers, label: "My Profile" },
    { key: "reimb", icon: IconDollar, label: "Reimbursements" },
    { key: "leave", icon: IconCalendar, label: "Leave Request" },
    { key: "calendar", icon: IconCalendar, label: "Calendar" },
    { key: "documents", icon: IconClipboard, label: "Documents" },
    ...(isAdmin ? [{ key: "employees", icon: IconList, label: "Employees" }] : []),
    ...(isOwnerUser ? [{ key: "settings", icon: IconSettings, label: "Settings" }] : []),
  ];

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: "#EDF2F8", fontFamily: "'DM Sans', 'Segoe UI', sans-serif", color: COLORS.text }}>
      {/* Sidebar */}
      <div style={{ width: 220, background: COLORS.surface, boxShadow: "2px 0 12px rgba(0,0,0,0.06)", zIndex: 2, display: "flex", flexDirection: "column", flexShrink: 0, position: "relative" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 4, background: COLORS.primary }} />
        <div style={{ padding: "20px 20px 12px", borderBottom: `1px solid ${COLORS.borderLight}` }}>
          <button onClick={onExit} style={{ background: "none", border: "none", cursor: "pointer", padding: 0, fontFamily: "inherit", display: "block", textAlign: "left" }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: COLORS.primary }}>PointerOS</div>
            <div style={{ fontSize: 10, color: COLORS.textDim, letterSpacing: 1.5 }}>HR Toolsuite</div>
          </button>
        </div>
        <nav style={{ flex: 1, padding: "12px 8px" }}>
          {navItems.map(n => (
            <button key={n.key} onClick={() => setPage(n.key)}
              style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 10, border: "none",
                background: page === n.key ? COLORS.primary + "0D" : "transparent",
                color: page === n.key ? COLORS.primary : COLORS.textMuted,
                fontSize: 13, fontWeight: page === n.key ? 600 : 500, borderLeft: page === n.key ? `3px solid ${COLORS.primary}` : "3px solid transparent", cursor: "pointer", marginBottom: 2, fontFamily: "inherit" }}>
              <n.icon size={18} /> {n.label}
            </button>
          ))}
        </nav>
        <div style={{ padding: 16, borderTop: `1px solid ${COLORS.borderLight}` }}>
          <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 8 }}>{currentUser.name}</div>
          <button onClick={onExit} style={{ background: "none", border: "none", color: COLORS.primary, fontSize: 12, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: "inherit" }}>
            <IconChevron size={14} style={{ transform: "rotate(180deg)" }} /> Back to PointerOS
          </button>
        </div>
      </div>

      <div style={{ flex: 1, overflow: "auto", padding: 28 }}>
        {/* Top bar with view-switcher (only for owners) */}
        {actualUser?.isOwner && (
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, padding: "10px 16px", background: COLORS.surface, borderRadius: 10, border: `1px solid ${COLORS.border}` }}>
            <div style={{ fontSize: 12, color: COLORS.textMuted }}>
              {viewAs === "employee" ? (
                <span><b style={{ color: COLORS.warning }}>Previewing as Employee</b> — admin features hidden. Switch back to Master to manage HR.</span>
              ) : (
                <span>You're signed in as a <b>Master</b>. Use the toggle to preview the employee experience.</span>
              )}
            </div>
            <ViewSwitcher actualUser={actualUser} viewAs={viewAs} setViewAs={setViewAs} />
          </div>
        )}
        {page === "profile" && <HRProfileView currentUser={currentUser} reimbursements={reimbursements} people={people} onUpdatePeople={onUpdatePeople} isAdmin={isAdmin} isOwnerUser={isOwnerUser} setPage={setPage} hrSettings={hrSettings} profileRequests={profileRequests} saveHR={saveHR} />}
        {page === "reimb" && <HRReimbView currentUser={currentUser} reimbursements={reimbursements} saveHR={saveHR} isAdmin={isAdmin} hrSettings={hrSettings} />}
        {page === "leave" && <HRLeaveRequestView currentUser={currentUser} leaveRequests={leaveRequests} saveHR={saveHR} isOwnerUser={isOwnerUser} hrSettings={hrSettings} people={people} onUpdatePeople={onUpdatePeople} />}
        {page === "calendar" && <HRCalendarView calDate={calDate} setCalDate={setCalDate} calFilters={calFilters} setCalFilters={setCalFilters} people={people} companyEvents={companyEvents} eventRequests={eventRequests} saveHR={saveHR} isOwnerUser={isOwnerUser} currentUser={currentUser} hrSettings={hrSettings} />}
        {page === "documents" && <HRDocumentsView hrSettings={hrSettings} saveHR={saveHR} isOwnerUser={isOwnerUser} />}
        {page === "employees" && isAdmin && <HREmployeesView people={people} onUpdatePeople={onUpdatePeople} currentUser={currentUser} profileRequests={profileRequests} saveHR={saveHR} />}
        {page === "settings" && isOwnerUser && <HRSettingsView hrSettings={hrSettings} saveHR={saveHR} />}
      </div>
    </div>
  );
}

function PTOAccrualModal({ open, onClose, person }) {
  if (!person) return null;
  const summary = summarizePTO(person);
  const currentYear = new Date().getFullYear();
  return (
    <Modal open={open} onClose={onClose} title={`Time Off Accrual — ${person.name}`}>
      <div style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 16, lineHeight: 1.5 }}>
        Year-by-year breakdown of PTO. Unused days carry forward to the next calendar year (capped per the Employee Handbook, Part 5).
      </div>

      {/* Big balance number */}
      <div style={{ padding: "20px 24px", background: `linear-gradient(135deg, ${COLORS.primary} 0%, ${COLORS.primaryDark} 100%)`, color: "white", borderRadius: 10, marginBottom: 16 }}>
        <div style={{ fontSize: 11, opacity: 0.85, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 600 }}>Available Now</div>
        <div style={{ fontSize: 36, fontWeight: 800, lineHeight: 1, marginTop: 4 }}>
          {summary.totalAvailable}<span style={{ fontSize: 16, opacity: 0.9, marginLeft: 6, fontWeight: 400 }}>days</span>
        </div>
        <div style={{ fontSize: 12, opacity: 0.85, marginTop: 6 }}>
          {summary.totalUsedThisYear} used in {currentYear} · {summary.totalUsedAllTime} used since records began
        </div>
      </div>

      {/* Year-by-year ledger */}
      <div style={{ marginBottom: 8, fontSize: 12, fontWeight: 700, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Year Ledger</div>
      <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
        <thead>
          <tr style={{ background: COLORS.bg, textAlign: "left" }}>
            <th style={{ padding: "8px 10px", fontWeight: 600 }}>Year</th>
            <th style={{ padding: "8px 10px", fontWeight: 600, textAlign: "right" }}>Carried In</th>
            <th style={{ padding: "8px 10px", fontWeight: 600, textAlign: "right" }}>+ Allotted</th>
            <th style={{ padding: "8px 10px", fontWeight: 600, textAlign: "right" }}>− Used</th>
            <th style={{ padding: "8px 10px", fontWeight: 600, textAlign: "right" }}>= Ending</th>
          </tr>
        </thead>
        <tbody>
          {summary.years.map(y => {
            const isCurrent = y.year === currentYear;
            return (
              <tr key={y.year} style={{ borderTop: `1px solid ${COLORS.borderLight}`, background: isCurrent ? COLORS.primary + "11" : "transparent", fontWeight: isCurrent ? 600 : 400 }}>
                <td style={{ padding: "10px" }}>
                  {y.year} {isCurrent && <Badge color={COLORS.primary} style={{ marginLeft: 4 }}>NOW</Badge>}
                </td>
                <td style={{ padding: "10px", textAlign: "right" }}>{y.carriedIn}d</td>
                <td style={{ padding: "10px", textAlign: "right", color: COLORS.success }}>+{y.allot}d</td>
                <td style={{ padding: "10px", textAlign: "right", color: y.used > 0 ? COLORS.danger : COLORS.textMuted }}>{y.used > 0 ? "−" : ""}{y.used}d</td>
                <td style={{ padding: "10px", textAlign: "right", fontWeight: 700, color: COLORS.text }}>{y.endingBalance}d</td>
              </tr>
            );
          })}
        </tbody>
      </table>

      <div style={{ marginTop: 16, fontSize: 11, color: COLORS.textDim, lineHeight: 1.5 }}>
        <b>How it works:</b> Each year begins with a carry-in balance from the previous year. The annual allotment is added on Jan 1. Used days are subtracted as taken. The ending balance carries into the next year.
      </div>

      <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 16 }}>
        <Button onClick={onClose}>Close</Button>
      </div>
    </Modal>
  );
}

function HRProfileView({ currentUser, reimbursements, people, onUpdatePeople, isAdmin, isOwnerUser, setPage, hrSettings, profileRequests, saveHR }) {
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({});
  const [tab, setTab] = useState("overview");
  const [ptoModalOpen, setPtoModalOpen] = useState(false);

  // Change-request modal — for fields employees cannot edit themselves
  const [requestField, setRequestField] = useState(null); // { key, label, currentVal }
  const [requestProposed, setRequestProposed] = useState("");
  const [requestReason, setRequestReason] = useState("");

  // Whether the current user can directly edit admin-controlled fields
  const canEditAdminFields = isAdmin;
  const canEditOwnerFields = isOwnerUser;

  const openRequestModal = (key, label, currentVal) => {
    setRequestField({ key, label, currentVal });
    setRequestProposed(typeof currentVal === "boolean" ? (currentVal ? "Unenroll me" : "Enroll me") : (currentVal || ""));
    setRequestReason("");
  };
  const closeRequestModal = () => { setRequestField(null); setRequestProposed(""); setRequestReason(""); };
  const submitRequest = () => {
    if (!requestField) return;
    const req = {
      id: uid(),
      type: "profile-field",
      field: requestField.key,
      fieldLabel: requestField.label,
      currentValue: String(requestField.currentVal ?? ""),
      proposedValue: requestProposed,
      reason: requestReason,
      requestedBy: currentUser.id,
      requestedByName: currentUser.name,
      requestedByEmail: currentUser.email || "",
      status: "pending",
      submitted: new Date().toISOString(),
    };
    const next = [...(profileRequests || []), req];
    saveHR({ profileRequests: next });
    const recipients = hrSettings?.notifyEmails?.length ? hrSettings.notifyEmails : ["matt@pointerfg.com", "alex@pointerfg.com"];
    const body =
`A profile-field change request has been submitted in PointerOS.

Employee: ${currentUser.name} ${currentUser.email ? "<" + currentUser.email + ">" : ""}
Field: ${requestField.label}
Current value: ${requestField.currentVal ?? "(empty)"}
Proposed value: ${requestProposed}

Reason / notes:
${requestReason || "(none provided)"}

Approve or deny in: PointerOS → HR Toolsuite → Employees (admin view).

— Automated message from PointerOS`;
    sendEmail({
      to: recipients,
      subject: `[PFG Profile Request] ${currentUser.name} — change "${requestField.label}"`,

    });
    closeRequestModal();
    alert("Request sent. Matt and Alex will review.");

  const isEligible = eligDaysOut != null && eligDaysOut <= 0;
  const leaveDaysTotal = totalLeaveDays(currentUser);

    if (!form.name.trim()) { alert("Name is required"); return; }

    const cleanLeaves = (arr) => (arr || []).filter(l => l && l.start && l.end);

      ...p,
      name: form.name.trim(),
      email: form.email.trim(),
      role: form.role.trim(),
      birthday: form.birthday,
      dateOfHire: form.dateOfHire,

            onClick={() => setPtoModalOpen(true)}

            onMouseLeave={e => { e.currentTarget.style.boxShadow = ""; }}
            title="Click to see year-by-year accrual">
        <div style={{ padding: "18px 24px 16px", background: `linear-gradient(135deg, ${COLORS.primary} 0%, ${COLORS.primaryDark} 100%)`, color: "white", position: "relative" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div style={{ fontSize: 11, opacity: 0.85, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 600 }}>Time Off</div>

          </div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 14, marginTop: 6, flexWrap: "wrap" }}>
            <div>
              <span style={{ fontSize: 40, fontWeight: 800, lineHeight: 1 }}>{bal}</span>
              <span style={{ fontSize: 16, opacity: 0.9, marginLeft: 6 }}>days available</span>

              <Input label="Birthday" type="date" value={form.birthday} onChange={v => setForm({ ...form, birthday: v })} />
            ) : (
              <LockedFieldDisplay

              )}
            </div>
            {(form.unpaidLeaves || []).length === 0 ? (
              <div style={{ fontSize: 12, color: COLORS.textDim, fontStyle: "italic", padding: 8 }}>No unpaid leave periods.</div>
            ) : (form.unpaidLeaves || []).map((l, i) => (

                    <input type="date" value={l.start || ""} onChange={e => updateLeave("unpaid", i, "start", e.target.value)} style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit" }} />
                    <span style={{ fontSize: 12, color: COLORS.textMuted }}>to</span>

            <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 4, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>Current value</div>
            <div style={{ padding: 8, background: COLORS.bg, borderRadius: 6, fontSize: 13, color: COLORS.text, fontFamily: "ui-monospace, monospace" }}>{requestField.currentVal != null && requestField.currentVal !== "" ? String(requestField.currentVal) : "(empty)"}</div>
          </div>
          {requestField.key === "enrolled401k" ? (
            <Select label="Proposed change" value={requestProposed} onChange={setRequestProposed}
              options={[{ value: "Enroll me", label: "Enroll me" }, { value: "Unenroll me", label: "Unenroll me" }]} />

          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 16 }}>
            <Button variant="ghost" onClick={closeRequestModal}>Cancel</Button>
            <Button onClick={submitRequest}>Submit Request & Notify</Button>
          </div>
        </Modal>
      )}

      {/* My pending profile requests */}
      {!editing && profileRequests && profileRequests.filter(r => r.requestedBy === currentUser.id).length > 0 && (
        <Card style={{ padding: 20, marginBottom: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>My Profile Change Requests</div>
          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
            <thead><tr style={{ background: COLORS.bg, textAlign: "left" }}>

              <th style={{ padding: "8px" }}>Submitted</th>
              <th style={{ padding: "8px" }}>Status</th>
            </tr></thead>
            <tbody>
              {profileRequests.filter(r => r.requestedBy === currentUser.id).slice().reverse().map(r => (
                <tr key={r.id} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                  <td style={{ padding: "8px" }}>{r.fieldLabel}</td>
                  <td style={{ padding: "8px", fontFamily: "ui-monospace, monospace" }}>{r.proposedValue}</td>
                  <td style={{ padding: "8px", color: COLORS.textMuted, fontSize: 12 }}>{new Date(r.submitted).toLocaleDateString()}</td>
                  <td style={{ padding: "8px" }}><Badge color={r.status === "approved" ? COLORS.success : r.status === "denied" ? COLORS.danger : COLORS.gold}>{r.status.toUpperCase()}</Badge></td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      )}

      {/* Time-Off History — transaction log of leaves taken */}
      {!editing && (() => {
        // Build a unified list of leave events from militaryLeaves + unpaidLeaves
        const events = [];
        (currentUser.militaryLeaves || []).forEach((l, i) => {
          if (l.start && l.end) events.push({ ...l, type: "Military Service Leave", typeRef: "Handbook Part 5", color: COLORS.primary, idx: i });
        });
        (currentUser.unpaidLeaves || []).forEach((l, i) => {
          if (l.start && l.end) events.push({ ...l, type: "FMLA / Other Unpaid Leave", typeRef: "Handbook Part 5", color: COLORS.gold, idx: i });
        });
        // PTO history — could derive from ptoHistory if "used" days were dated; for now show the year-level usage
        const ptoEvents = [];
        Object.entries(currentUser.ptoHistory || {}).forEach(([yr, e]) => {
          if ((e?.used || 0) > 0) {
            ptoEvents.push({ start: yr + "-01-01", end: yr + "-12-31", type: `Paid Personal Time (${yr})`, typeRef: "Handbook Part 5", color: COLORS.success, days: e.used });
          }
        });
        const allEvents = [...events, ...ptoEvents].sort((a, b) => a.start.localeCompare(b.start));
        if (allEvents.length === 0) return null;

        const daysBetween = (s, e) => {
          const sd = new Date(s + "T00:00:00");
          const ed = new Date(e + "T00:00:00");
          if (isNaN(sd) || isNaN(ed) || ed < sd) return 0;
          return Math.round((ed - sd) / (1000 * 60 * 60 * 24)) + 1;
        };

        return (
          <Card style={{ padding: 20, marginBottom: 16 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4, flexWrap: "wrap", gap: 8 }}>
              <div style={{ fontSize: 14, fontWeight: 600 }}>Time-Off History</div>
              <HandbookLink topic="Part 5 — Holidays, Personal and Other Leave" label="Part 5 · Leave Policies" />
            </div>
            <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 14 }}>All leaves on record. Click the handbook link above to see categorization rules.</div>
            <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
              <thead><tr style={{ background: COLORS.bg, textAlign: "left" }}>
                <th style={{ padding: "8px 10px", fontWeight: 600 }}>Start</th>
                <th style={{ padding: "8px 10px", fontWeight: 600 }}>End</th>
                <th style={{ padding: "8px 10px", fontWeight: 600, textAlign: "right" }}>Days</th>
                <th style={{ padding: "8px 10px", fontWeight: 600 }}>Type</th>
              </tr></thead>
              <tbody>

                  <tr key={i} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                    <td style={{ padding: "8px 10px", color: COLORS.text, fontFamily: "ui-monospace, monospace" }}>{evt.start}</td>
                    <td style={{ padding: "8px 10px", color: COLORS.text, fontFamily: "ui-monospace, monospace" }}>{evt.end}</td>
                    <td style={{ padding: "8px 10px", textAlign: "right", fontWeight: 600 }}>{evt.days != null ? evt.days : daysBetween(evt.start, evt.end)}</td>
                    <td style={{ padding: "8px 10px" }}>
                      <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                        <span style={{ width: 8, height: 8, borderRadius: "50%", background: evt.color }} />
                        <span>{evt.type}</span>
                      </span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        );
      })()}

          <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>

              <th style={{ padding: "8px" }}>Amount</th><th style={{ padding: "8px" }}>Description</th>
              <th style={{ padding: "8px" }}>Status</th>
            </tr></thead>

              {myReimb.slice().reverse().map(r => (
                <tr key={r.id} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
