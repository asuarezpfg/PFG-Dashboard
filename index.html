                  {r}
                </button>
              ))}
              <button onClick={() => { if (priceChartRef.current) try { priceChartRef.current.resetZoom(); } catch (e) {} }}
                title="Reset zoom"
                style={{ padding: "5px 10px", borderRadius: 4, border: `1px solid ${COLORS.border}`, background: COLORS.surface, color: COLORS.textMuted, fontFamily: "inherit", fontSize: 11, fontWeight: 600, cursor: "pointer", marginLeft: 4 }}>
                ⟲ Reset
              </button>
            </div>
          </div>
          <div style={{ height: 280 }}><canvas ref={priceCanvasRef} /></div>
        </Card>
      )}

      {/* Fundamentals — show banner if failed, else collapsible sections */}
      {fundamentalsError && (
        <Card style={{ padding: 14, marginBottom: 16, background: COLORS.gold + "15", borderLeft: `4px solid ${COLORS.gold}` }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.text, marginBottom: 4 }}>Fundamentals unavailable</div>
          <div style={{ fontSize: 11, color: COLORS.textMuted, lineHeight: 1.5 }}>
            Yahoo's fundamentals endpoint failed for this ticker. Try the ⭐ Morningstar link above for P/E, dividend, EPS history, and more.
          </div>
          <div style={{ fontSize: 10, color: COLORS.textDim, marginTop: 6, fontFamily: "ui-monospace, monospace" }}>{fundamentalsError}</div>
        </Card>
      )}

      {data && (
        <div>
          {/* === Key Metrics (collapsible) === */}
          <div style={{ marginBottom: 12 }}>
            <SectionHeader keyName="metrics" title="Key Metrics" sub="P/E, PEG, EPS, margins, growth — click to collapse" />
            {expanded.metrics && (
              <Card style={{ padding: 14, marginTop: 0 }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 12 }}>
                  {[
                    ["Market Cap", fmtBig(data.marketCap)],
                    ["P/E (TTM)", fmtNum(data.pe)],
                    ["Forward P/E", fmtNum(data.forwardPE)],
                    ["PEG Ratio", fmtNum(data.peg)],
                    ["EPS (TTM)", "$" + fmtNum(data.eps)],
                    ["EPS (Fwd)", "$" + fmtNum(data.epsForward)],
                    ["Profit Margin", fmtPct(data.profitMargin)],
                    ["Operating Margin", fmtPct(data.operatingMargin)],
                    ["Gross Margin", fmtPct(data.grossMargin)],
                    ["Beta", fmtNum(data.beta)],
                    ["52W High", "$" + fmtNum(data.fiftyTwoWeekHigh)],
                    ["52W Low", "$" + fmtNum(data.fiftyTwoWeekLow)],
                    ["Revenue (TTM)", fmtBig(data.revenue)],
                    ["Revenue Growth YoY", fmtPct(data.revenueGrowth)],
                    ["Earnings Growth YoY", fmtPct(data.earningsGrowth)],
                    ["Return on Equity", fmtPct(data.returnOnEquity)],
                    ["Debt / Equity", fmtNum(data.debtToEquity)],
                  ].map(([label, val], i) => (
                    <div key={i}>
                      <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</div>
                      <div style={{ fontSize: 15, fontWeight: 700, color: COLORS.text, marginTop: 2 }}>{val}</div>
                    </div>
                  ))}
                </div>
              </Card>
            )}
          </div>

          {/* === Earnings & Revenue (collapsible) === */}
          {(data.earningsHistory.length > 0 || data.incomeQuarterly.length > 0) && (
            <div style={{ marginBottom: 12 }}>
              <SectionHeader keyName="earnings" title="Earnings & Revenue" sub="EPS surprise, quarter-over-quarter revenue, last 4-8 quarters" />
              {expanded.earnings && (
                <>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 12, marginBottom: 12 }}>
                    {data.earningsHistory.length > 0 && (
                      <Card style={{ padding: 14 }}>
                        <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8, fontWeight: 600 }}>EPS — Last Quarters (Actual vs Estimate)</div>
                        <div style={{ height: 180 }}><canvas ref={earningsCanvasRef} /></div>
                      </Card>
                    )}
                    {data.incomeQuarterly.length > 0 && (
                      <Card style={{ padding: 14 }}>
                        <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8, fontWeight: 600 }}>Revenue — Last Quarters</div>
                        <div style={{ height: 180 }}><canvas ref={revenueCanvasRef} /></div>
                      </Card>
                    )}
                  </div>
                  {data.earningsHistory.length > 0 && (
                    <Card style={{ padding: 14 }}>
                      <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8, fontWeight: 600 }}>Earnings History</div>
                      <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse" }}>
                        <thead><tr style={{ background: COLORS.bg, textAlign: "left" }}>
                          <th style={{ padding: "6px 10px" }}>Period</th>
                          <th style={{ padding: "6px 10px" }}>Quarter</th>
                          <th style={{ padding: "6px 10px", textAlign: "right" }}>EPS Actual</th>
                          <th style={{ padding: "6px 10px", textAlign: "right" }}>EPS Estimate</th>
                          <th style={{ padding: "6px 10px", textAlign: "right" }}>Surprise %</th>
                        </tr></thead>
                        <tbody>
                          {data.earningsHistory.map((e, i) => (
                            <tr key={i} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                              <td style={{ padding: "6px 10px" }}>{e.period}</td>
                              <td style={{ padding: "6px 10px", color: COLORS.textMuted }}>{e.quarter || "—"}</td>
                              <td style={{ padding: "6px 10px", textAlign: "right", fontWeight: 600 }}>${fmtNum(e.epsActual)}</td>
                              <td style={{ padding: "6px 10px", textAlign: "right", color: COLORS.textMuted }}>${fmtNum(e.epsEstimate)}</td>
                              <td style={{ padding: "6px 10px", textAlign: "right", color: (e.surprisePct ?? 0) >= 0 ? COLORS.success : COLORS.danger, fontWeight: 600 }}>
                                {e.surprisePct != null ? (e.surprisePct >= 0 ? "+" : "") + fmtNum(e.surprisePct) + "%" : "—"}
                              </td>
                            </tr>
                          ))}

                      </table>
                    </Card>
                  )}
                </>
              )}
            </div>
          )}

          {/* === Dividend (collapsible) === */}
          <div style={{ marginBottom: 12 }}>
            <SectionHeader keyName="dividend" title="Dividend & Upcoming Events" sub="Yield, payout ratio, ex-dividend date, next earnings" />
            {expanded.dividend && (
              <Card style={{ padding: 14 }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12 }}>

                  <div>
                    <div style={{ fontSize: 11, color: COLORS.textMuted }}>Dividend Rate</div>
                    <div style={{ fontSize: 18, fontWeight: 700, color: COLORS.text }}>${fmtNum(data.dividendRate)}/yr</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 11, color: COLORS.textMuted }}>Payout Ratio</div>
                    <div style={{ fontSize: 18, fontWeight: 700, color: COLORS.text }}>{fmtPct(data.payoutRatio)}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 11, color: COLORS.textMuted }}>Ex-Dividend Date</div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: COLORS.text }}>{fmtDate(data.nextDividendDate || data.exDividendDate)}</div>
                  </div>
                  <div>
                    <div style={{ fontSize: 11, color: COLORS.textMuted }}>Next Earnings</div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: COLORS.text }}>{fmtDate(data.nextEarningsDate)}</div>

                      <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2 }}>Est. EPS: ${fmtNum(data.nextEarningsEstimate)}</div>

                </div>
              </Card>
            )}
          </div>

          {/* === Sentiment / Analyst (collapsible) === */}
          <div style={{ marginBottom: 12 }}>
            <SectionHeader keyName="sentiment" title="Sentiment & Analyst View" sub="Beta, momentum, recommendations" />
            {expanded.sentiment && (
              <Card style={{ padding: 14 }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12 }}>
                  <div>
                    <div style={{ fontSize: 11, color: COLORS.textMuted }}>Beta vs S&P</div>
                    <div style={{ fontSize: 18, fontWeight: 700, color: COLORS.text }}>{fmtNum(data.beta)}</div>
                    <div style={{ fontSize: 10, color: COLORS.textDim, marginTop: 2 }}>1 = market · &gt;1 = more volatile</div>

                  <div>
                    <div style={{ fontSize: 11, color: COLORS.textMuted }}>52W Range</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.text }}>
                      ${fmtNum(data.fiftyTwoWeekLow)} – ${fmtNum(data.fiftyTwoWeekHigh)}

                    {data.fiftyTwoWeekHigh && lastPrice && (
                      <div style={{ fontSize: 10, color: COLORS.textDim, marginTop: 2 }}>
                        {((lastPrice - data.fiftyTwoWeekLow) / (data.fiftyTwoWeekHigh - data.fiftyTwoWeekLow) * 100).toFixed(0)}% of range
                      </div>
                    )}
                  </div>
                  <div style={{ gridColumn: "1 / -1" }}>
                    <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 6 }}>Live sentiment indicators</div>
                    <div style={{ fontSize: 12, color: COLORS.textMuted, lineHeight: 1.6 }}>
                      For analyst ratings, target prices, and ownership data, use the <b>⭐ Morningstar</b> button at the top. Real-time analyst consensus and price targets require a paid data feed and aren't available through free APIs.
                    </div>
                  </div>
                </div>
              </Card>
            )}
          </div>
        </div>
      )}
    </Modal>
  );
}

function StockDashboard({ universe, setUniverse, canEdit }) {
  const [quotes, setQuotes] = useState({});            // { sym: { last, prev, pct, vol, dayHigh, dayLow, yearHigh, yearLow } }
  const [loading, setLoading] = useState(false);
  const [addForm, setAddForm] = useState({ sym: "", name: "" });
  const [detailSymbol, setDetailSymbol] = useState(null);   // clicking a row opens this

  const refresh = useCallback(async () => {
    setLoading(true);
    try {
      const syms = universe.map(u => u.sym);
      const batch = await fetchYahooBatch(syms);
      setQuotes(batch);
    } catch (e) {
      console.warn("[PFG] Stock dashboard fetch failed:", e.message);
    }
    setLoading(false);
  }, [universe]);

  useEffect(() => { refresh(); }, [refresh]);

  const addStock = () => {
    const sym = addForm.sym.trim().toUpperCase();
    if (!sym) { alert("Symbol required"); return; }
    if (universe.find(u => u.sym === sym)) { alert("Already in universe"); return; }
    setUniverse([...universe, { sym, name: addForm.name.trim() || sym }]);
    setAddForm({ sym: "", name: "" });
    setTimeout(refresh, 100);
  };
  const removeStock = (sym) => {
    if (!confirm("Remove " + sym + " from the universe?")) return;
    setUniverse(universe.filter(u => u.sym !== sym));
  };
  const resetUniverse = () => {
    if (!confirm("Reset to default top 10 S&P 500 holdings? Any custom symbols will be removed.")) return;
    setUniverse([...DEFAULT_STOCK_UNIVERSE]);
  };

  const fmtVol = (n) => {
    if (n == null) return "—";
    if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
    if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
    if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
    return n.toString();
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 18 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Stock Dashboard</h2>
          <p style={{ color: COLORS.textMuted, fontSize: 13, margin: "4px 0 0" }}>
            Live quotes for the firm's monitored universe. {canEdit ? "Owner-only edits — Matt & Alex can add/remove symbols." : "View-only — contact Matt or Alex to add symbols."}
          </p>
        </div>
        <Button size="sm" variant="ghost" onClick={refresh}>{loading ? "Refreshing…" : "↻ Refresh"}</Button>
      </div>

      <Card style={{ padding: 0, marginBottom: 16, overflow: "hidden" }}>
        <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ background: "#F8FAFC", textAlign: "left" }}>
              <th style={{ padding: "10px 12px" }}>Symbol</th>
              <th style={{ padding: "10px 12px" }}>Name</th>
              <th style={{ padding: "10px 12px", textAlign: "right" }}>Last</th>
              <th style={{ padding: "10px 12px", textAlign: "right" }}>Today %</th>
              <th style={{ padding: "10px 12px", textAlign: "right" }}>Day Range</th>
              <th style={{ padding: "10px 12px", textAlign: "right" }}>52W Range</th>
              <th style={{ padding: "10px 12px", textAlign: "right" }}>Volume</th>
              {canEdit && <th style={{ padding: "10px 12px" }}></th>}
            </tr>
          </thead>
          <tbody>
            {universe.map(stk => {
              const q = quotes[stk.sym];
              const color = !q || q.pct == null ? COLORS.textMuted : (q.pct >= 0 ? COLORS.success : COLORS.danger);
              const arrow = !q || q.pct == null ? "" : (q.pct >= 0 ? "▲" : "▼");
              // Year range bar: position of current price between yearLow and yearHigh
              let pctOfRange = null;
              if (q && q.yearHigh != null && q.yearLow != null && q.yearHigh > q.yearLow) {
                pctOfRange = ((q.last - q.yearLow) / (q.yearHigh - q.yearLow)) * 100;
                pctOfRange = Math.max(0, Math.min(100, pctOfRange));
              }
              return (
                <tr key={stk.sym} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                  <td style={{ padding: "10px 12px", fontWeight: 700 }}>
                    <TickerAction symbol={stk.sym} onOpenDetail={setDetailSymbol} />
                  </td>
                  <td style={{ padding: "10px 12px", color: COLORS.textMuted }}>{stk.name}</td>
                  <td style={{ padding: "10px 12px", textAlign: "right", fontWeight: 600 }}>{q ? "$" + q.last.toFixed(2) : "—"}</td>
                  <td style={{ padding: "10px 12px", textAlign: "right", color, fontWeight: 700 }}>{q && q.pct != null ? arrow + " " + q.pct.toFixed(2) + "%" : "—"}</td>
                  <td style={{ padding: "10px 12px", textAlign: "right", fontSize: 12, color: COLORS.textMuted }}>
                    {q && q.dayLow != null && q.dayHigh != null ? `$${q.dayLow.toFixed(2)} – $${q.dayHigh.toFixed(2)}` : "—"}
                  </td>
                  <td style={{ padding: "10px 12px", textAlign: "right", fontSize: 12 }}>
                    {q && q.yearLow != null && q.yearHigh != null ? (
                      <div>
                        <div style={{ color: COLORS.textMuted }}>{`$${q.yearLow.toFixed(2)} – $${q.yearHigh.toFixed(2)}`}</div>
                        {pctOfRange != null && (
                          <div style={{ width: 120, height: 4, background: COLORS.borderLight, borderRadius: 2, marginLeft: "auto", marginTop: 3, position: "relative" }}>
                            <div style={{ position: "absolute", left: pctOfRange + "%", top: -2, width: 2, height: 8, background: COLORS.primary }} />
                          </div>
                        )}
                      </div>
                    ) : "—"}
                  </td>
                  <td style={{ padding: "10px 12px", textAlign: "right", fontSize: 12, color: COLORS.textMuted }}>{q ? fmtVol(q.vol) : "—"}</td>
                  {canEdit && (
                    <td style={{ padding: "8px" }}>
                      <Button size="sm" variant="ghost" onClick={() => removeStock(stk.sym)}><IconTrash size={12} /></Button>
                    </td>
                  )}
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>

      {canEdit && (
        <Card style={{ padding: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>Edit Universe (Owner)</div>
            <Button size="sm" variant="ghost" onClick={resetUniverse}>Reset to Top 10 S&P</Button>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr auto", gap: 10, alignItems: "end" }}>
            <Input label="Symbol" value={addForm.sym} onChange={v => setAddForm({ ...addForm, sym: v })} placeholder="AAPL" />
            <Input label="Name (optional)" value={addForm.name} onChange={v => setAddForm({ ...addForm, name: v })} placeholder="Apple Inc." />
            <Button onClick={addStock} style={{ marginBottom: 12 }}><IconPlus size={14} /> Add Symbol</Button>
          </div>
        </Card>
      )}

      <StockDetailModal symbol={detailSymbol} open={!!detailSymbol} onClose={() => setDetailSymbol(null)} />
    </div>
  );
}

function MacroDashboard() {
  const [macroTab, setMacroTab] = useState("dashboard"); // "dashboard" | "recession" | "calendar"
  const [yieldCurve, setYieldCurve] = useState([]);
  const [fedRate, setFedRate] = useState(null);
  const [fedHistory, setFedHistory] = useState([]);
  const [mortgageRate, setMortgageRate] = useState(null);
  const [mortgageHistory, setMortgageHistory] = useState([]);
  const [tenYrHistory, setTenYrHistory] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const yieldCanvasRef = useRef(null);
  const yieldChartRef = useRef(null);
  const fedCanvasRef = useRef(null);
  const fedChartRef = useRef(null);
  const tenYrCanvasRef = useRef(null);
  const tenYrChartRef = useRef(null);

  const loadAll = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [curve, fed, mortgage, tenYr] = await Promise.all([
        fetchYieldCurve(),
        fetchFRED("DFF", 365),
        fetchFRED("MORTGAGE30US", 365),
        fetchFRED("DGS10", 365),
      ]);
      setYieldCurve(curve);
      setFedHistory(fed);
      setFedRate(fed[fed.length - 1]?.value ?? null);
      setMortgageHistory(mortgage);
      setMortgageRate(mortgage[mortgage.length - 1]?.value ?? null);
      setTenYrHistory(tenYr);
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);

// ============================================================
// RECESSION MONITOR — Franklin-style indicator grid.
// 12 FRED indicators across Consumer / Business Activity / Financial categories.
// Owner-editable thresholds saved to localStorage.
// Shows current quarter-end + 2 prior quarter-ends.
// ============================================================
function RecessionMonitor() {
  const [indicatorData, setIndicatorData] = useState({}); // { id: { period1: {value, status, date}, period2:..., period3:... } }
  const [loading, setLoading] = useState(false);
  const [progress, setProgress] = useState({ done: 0, total: RECESSION_INDICATORS.length });
  const [error, setError] = useState(null);
  const [thresholds, setThresholds] = useState({});
  const [editingThresholds, setEditingThresholds] = useState(false);
  const [canEdit, setCanEdit] = useState(false);

  // Detect if current user can edit — check if HR settings show them as owner
  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("pfg-current-user-can-edit-recession");
        if (r?.value === "true") setCanEdit(true);
      } catch (e) {}
    })();
  }, []);

  // Load saved thresholds (fall back to defaults)
  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get(RECESSION_THRESHOLDS_KEY);
        if (r?.value) {
          setThresholds(JSON.parse(r.value));
          return;
        }
      } catch (e) {}
      // No saved data — initialize from defaults
      const defaults = {};
      RECESSION_INDICATORS.forEach(ind => {
        defaults[ind.id] = { ...ind.thresholds };
      });
      setThresholds(defaults);
    })();
  }, []);

  // Compute the 3 quarter-end dates (current + 2 prior)
  const periodDates = useMemo(() => {
    const now = new Date();
    const dates = [];
    // Walk back through prior quarter-ends
    const month = now.getMonth();
    const year = now.getFullYear();
    // Determine current quarter end
    let qEnd;
    if (month < 3) qEnd = new Date(year - 1, 11, 31);       // last year Q4
    else if (month < 6) qEnd = new Date(year, 2, 31);        // Q1
    else if (month < 9) qEnd = new Date(year, 5, 30);        // Q2
    else if (month < 12) qEnd = new Date(year, 8, 30);       // Q3
    else qEnd = new Date(year, 11, 31);                       // Q4
    for (let i = 0; i < 3; i++) {
      dates.push(new Date(qEnd));
      qEnd = new Date(qEnd.getFullYear(), qEnd.getMonth() - 3, qEnd.getDate());
    }
    return dates;
  }, []);

  // Helper to score a value given an indicator
  const scoreValue = (indicator, value) => {
    if (value == null || isNaN(value)) return "missing";
    const t = thresholds[indicator.id] || indicator.thresholds;
    const goodThresh = t.good;
    const cautionThresh = t.caution;
    if (indicator.goodWhen === "above") {
      // higher = better
      if (value >= goodThresh) return "good";
      if (value >= cautionThresh) return "caution";
      return "bad";
    } else {
      // lower = better
      if (value <= goodThresh) return "good";
      if (value <= cautionThresh) return "caution";
      return "bad";
    }
  };

  const loadAll = useCallback(async () => {
    setLoading(true); setError(null);
    setProgress({ done: 0, total: RECESSION_INDICATORS.length });

    // Helper: pick a value at-or-before a target date from a FRED time series
    const valueNearDate = (series, targetDate) => {
      if (!series || series.length === 0) return null;
      // Series is sorted ascending by date. Find latest entry <= target.
      const targetTime = targetDate.getTime();
      let latest = null;
      for (const pt of series) {
        const t = new Date(pt.date + "T00:00:00").getTime();
        if (t <= targetTime) latest = pt;
        else break;
      }
      return latest;
    };

    try {
      const out = {};
      let done = 0;
      // For real fed funds rate, we need CPI series too
      const cpiSeries = await fetchFRED("CPIAUCSL", 1300).catch(() => []);
      for (const ind of RECESSION_INDICATORS) {
        try {
          // Fetch 3+ years of data so we can compute YoY and have prior periods
          const series = await fetchFRED(ind.series, 1300).catch(() => []);
          const periodValues = {};
          periodDates.forEach((d, idx) => {
            let value = null;
            const pt = valueNearDate(series, d);
            if (!pt) { periodValues["p" + idx] = { value: null, date: null }; return; }
            if (ind.transform === "level") {
              value = pt.value;
              // For real fed funds: subtract CPI YoY
              if (ind.id === "fedfunds_real") {
                const cpiNow = valueNearDate(cpiSeries, d);
                // CPI a year before
                const yearAgo = new Date(d); yearAgo.setFullYear(yearAgo.getFullYear() - 1);
                const cpiYearAgo = valueNearDate(cpiSeries, yearAgo);
                if (cpiNow && cpiYearAgo && cpiYearAgo.value) {
                  const cpiYoY = ((cpiNow.value - cpiYearAgo.value) / cpiYearAgo.value) * 100;
                  value = pt.value - cpiYoY;
                }
              }
            } else if (ind.transform === "yoyPct") {
              // YoY: compare to value 12 months earlier
              const yearAgo = new Date(d); yearAgo.setFullYear(yearAgo.getFullYear() - 1);
              const ptYearAgo = valueNearDate(series, yearAgo);
              if (ptYearAgo && ptYearAgo.value) {
                value = ((pt.value - ptYearAgo.value) / ptYearAgo.value) * 100;
              }
            }
            periodValues["p" + idx] = { value, date: pt.date, rawValue: pt.value };
          });
          out[ind.id] = periodValues;
        } catch (e) {
          out[ind.id] = { p0: { value: null }, p1: { value: null }, p2: { value: null } };
        }
        done++;
        setProgress({ done, total: RECESSION_INDICATORS.length });
      }
      setIndicatorData(out);
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  }, [periodDates]);

  useEffect(() => { loadAll(); }, [loadAll]);

  // Save thresholds when edited
  const saveThresholds = () => {
    try {
      window.storage.set(RECESSION_THRESHOLDS_KEY, JSON.stringify(thresholds));
    } catch (e) {}
    setEditingThresholds(false);
  };
  const resetThresholds = () => {
    const defaults = {};
    RECESSION_INDICATORS.forEach(ind => { defaults[ind.id] = { ...ind.thresholds }; });
    setThresholds(defaults);
  };

  // Compute overall signal per period: count how many indicators are bad/caution
  const overallByPeriod = periodDates.map((_, pIdx) => {
    let good = 0, caution = 0, bad = 0, missing = 0;
    RECESSION_INDICATORS.forEach(ind => {
      const v = indicatorData[ind.id]?.["p" + pIdx]?.value;
      const status = scoreValue(ind, v);
      if (status === "good") good++;
      else if (status === "caution") caution++;
      else if (status === "bad") bad++;
      else missing++;
    });
    let signal = "good";
    if (bad >= 3) signal = "bad";
    else if (bad + caution >= 5) signal = "caution";
    else if (caution >= 4) signal = "caution";
    return { good, caution, bad, missing, signal };
  });

  const StatusIcon = ({ status, size = 14 }) => {
    if (status === "good") return <span style={{ color: "#1FB67D", fontSize: size, fontWeight: 700 }}>↑</span>;
    if (status === "caution") return <span style={{ color: "#EAC82E", fontSize: size, fontWeight: 700 }}>●</span>;
    if (status === "bad") return <span style={{ color: "#D9534F", fontSize: size, fontWeight: 700 }}>✕</span>;
    return <span style={{ color: COLORS.textDim, fontSize: size }}>—</span>;
  };

  const fmtValue = (ind, val) => {
    if (val == null || isNaN(val)) return "—";
    return val.toFixed(2) + ind.unit;
  };

  const formatPeriodHeader = (d) => d.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });

  // Group indicators by category
  const grouped = {};
  RECESSION_INDICATORS.forEach(ind => {
    if (!grouped[ind.category]) grouped[ind.category] = [];
    grouped[ind.category].push(ind);
  });

  return (
    <div>
      {/* Header */}
      <Card style={{ padding: 18, marginBottom: 16, background: `linear-gradient(135deg, ${COLORS.bg} 0%, ${COLORS.surface} 100%)`, borderTop: `3px solid ${COLORS.primary}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 }}>
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: COLORS.primary }} />
              <div style={{ fontSize: 11, color: COLORS.primary, textTransform: "uppercase", letterSpacing: 2, fontWeight: 700 }}>PointerOS Recession Monitor</div>
            </div>
            <div style={{ fontSize: 18, fontWeight: 700, color: COLORS.text, marginTop: 4 }}>US Recession Risk Indicators</div>
            <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 4, lineHeight: 1.5, maxWidth: 720 }}>
              12 indicators across Consumer, Business Activity, and Financial buckets — all sourced from FRED. Each indicator's threshold is editable. Signals: <b style={{ color: "#1FB67D" }}>↑ Expansion</b>, <b style={{ color: "#EAC82E" }}>● Caution</b>, <b style={{ color: "#D9534F" }}>✕ Recession</b>.
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {!editingThresholds && (
              <Button size="sm" variant="ghost" onClick={() => setEditingThresholds(true)}>Edit Thresholds</Button>
            )}
            {editingThresholds && (
              <>
                <Button size="sm" variant="ghost" onClick={resetThresholds}>Reset defaults</Button>
                <Button size="sm" onClick={saveThresholds}>Save</Button>
              </>
            )}
            <Button size="sm" variant="ghost" onClick={loadAll} disabled={loading}>{loading ? `${progress.done}/${progress.total}…` : "↻ Reload"}</Button>
          </div>
        </div>
        {loading && (
          <div style={{ marginTop: 10, height: 4, background: COLORS.bg, borderRadius: 2, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${(progress.done / progress.total) * 100}%`, background: COLORS.primary, transition: "width 0.2s" }} />
          </div>
        )}
        {error && <div style={{ marginTop: 10, padding: 8, background: COLORS.danger + "11", borderRadius: 6, fontSize: 11, color: COLORS.danger }}>{error}</div>}
      </Card>

      {/* The grid */}
      <Card style={{ padding: 0, overflow: "hidden" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr style={{ background: COLORS.primary, color: "white" }}>
              <th style={{ padding: "10px 14px", textAlign: "left", width: 130 }}></th>
              <th style={{ padding: "10px 14px", textAlign: "left" }}>Indicator</th>
              {periodDates.map((d, i) => (
                <th key={i} style={{ padding: "10px 14px", textAlign: "center", fontWeight: 700 }}>{formatPeriodHeader(d)}</th>
              ))}
              {editingThresholds && (
                <>
                  <th style={{ padding: "10px 14px", textAlign: "center", background: COLORS.primaryDark }}>Good ≥/≤</th>
                  <th style={{ padding: "10px 14px", textAlign: "center", background: COLORS.primaryDark }}>Caution ≥/≤</th>
                </>
              )}
            </tr>
          </thead>
          <tbody>
            {Object.entries(grouped).map(([cat, items]) => (
              <React.Fragment key={cat}>
                {items.map((ind, idx) => (
                  <tr key={ind.id} style={{ borderTop: `1px solid ${COLORS.borderLight}`, background: idx % 2 === 0 ? COLORS.surface : "#FAFBFC" }}>
                    {idx === 0 && (
                      <td rowSpan={items.length} style={{ padding: "10px 14px", borderRight: `1px solid ${COLORS.border}`, background: COLORS.bg, fontWeight: 700, fontSize: 11, textTransform: "uppercase", letterSpacing: 1, color: COLORS.textMuted, verticalAlign: "middle", writingMode: items.length > 3 ? "vertical-rl" : "horizontal-tb", textAlign: "center" }}>
                        {cat}
                      </td>
                    )}
                    <td style={{ padding: "10px 14px" }}>
                      <div style={{ fontWeight: 600, color: COLORS.text }}>{ind.label}</div>
                      <div style={{ fontSize: 10, color: COLORS.textDim, marginTop: 2 }}>
                        <a href={`https://fred.stlouisfed.org/series/${ind.series}`} target="_blank" rel="noopener" style={{ color: COLORS.primary, textDecoration: "none" }}>{ind.series} ↗</a>
                        <span style={{ marginLeft: 6 }}>{ind.transform === "yoyPct" ? "YoY %" : "level"}</span>
                      </div>
                    </td>
                    {periodDates.map((_, pIdx) => {
                      const v = indicatorData[ind.id]?.["p" + pIdx]?.value;
                      const status = scoreValue(ind, v);
                      return (
                        <td key={pIdx} style={{ padding: "10px 14px", textAlign: "center" }}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                            <StatusIcon status={status} size={18} />
                            <span style={{ fontSize: 12, color: COLORS.textMuted, fontFamily: "ui-monospace, monospace" }}>{fmtValue(ind, v)}</span>
                          </div>
                        </td>
                      );
                    })}
                    {editingThresholds && (
                      <>
                        <td style={{ padding: "6px 8px", textAlign: "center", background: "#F0F8FE" }}>
                          <input type="number" step="0.1" value={thresholds[ind.id]?.good ?? ""}
                            onChange={e => setThresholds(prev => ({ ...prev, [ind.id]: { ...prev[ind.id], good: parseFloat(e.target.value) || 0 } }))}
                            style={{ width: 60, padding: "3px 6px", fontSize: 11, border: `1px solid ${COLORS.border}`, borderRadius: 4, fontFamily: "inherit", textAlign: "right" }} />
                        </td>
                        <td style={{ padding: "6px 8px", textAlign: "center", background: "#F0F8FE" }}>
                          <input type="number" step="0.1" value={thresholds[ind.id]?.caution ?? ""}
                            onChange={e => setThresholds(prev => ({ ...prev, [ind.id]: { ...prev[ind.id], caution: parseFloat(e.target.value) || 0 } }))}
                            style={{ width: 60, padding: "3px 6px", fontSize: 11, border: `1px solid ${COLORS.border}`, borderRadius: 4, fontFamily: "inherit", textAlign: "right" }} />
                        </td>
                      </>
                    )}
                  </tr>
                ))}
              </React.Fragment>
            ))}
            {/* Overall signal row */}
            <tr style={{ borderTop: `2px solid ${COLORS.primary}`, background: COLORS.bg }}>
              <td style={{ padding: "12px 14px" }}></td>
              <td style={{ padding: "12px 14px", fontWeight: 800, color: COLORS.text }}>Overall Signal</td>
              {overallByPeriod.map((p, i) => (
                <td key={i} style={{ padding: "12px 14px", textAlign: "center" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                    <StatusIcon status={p.signal} size={22} />
                    <span style={{ fontSize: 11, color: COLORS.textMuted }}>
                      <b style={{ color: "#1FB67D" }}>{p.good}↑</b> / <b style={{ color: "#EAC82E" }}>{p.caution}●</b> / <b style={{ color: "#D9534F" }}>{p.bad}✕</b>
                    </span>
                  </div>
                </td>
              ))}
              {editingThresholds && <><td></td><td></td></>}
            </tr>
          </tbody>
        </table>
      </Card>

      {/* Legend */}
      <Card style={{ padding: 14, marginTop: 12 }}>
        <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8, fontWeight: 600 }}>How to read this</div>
        <div style={{ display: "flex", gap: 18, flexWrap: "wrap", fontSize: 12, color: COLORS.text }}>
          <div><StatusIcon status="good" size={14} /> <b>Expansion</b> — indicator above the good threshold</div>
          <div><StatusIcon status="caution" size={14} /> <b>Caution</b> — between caution and good</div>
          <div><StatusIcon status="bad" size={14} /> <b>Recession Risk</b> — past the caution threshold</div>
        </div>
        <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 10, lineHeight: 1.5 }}>
          <b>Overall Signal rule:</b> ≥3 indicators in Recession Risk → Recession signal. ≥4 in Caution OR ≥5 combined Caution+Risk → Caution signal. Otherwise Expansion. Thresholds are PointerOS defaults — owners can edit them via the "Edit Thresholds" button. Data sourced from FRED (St. Louis Fed). Note: ISM PMI and Conference Board Consumer Confidence aren't freely available; we use manufacturer's new orders (AMTMNO) as a PMI proxy.
        </div>
      </Card>
    </div>
  );
}

  const upcoming = useMemo(() => projectUpcomingReleases(14), []);
  const impactColor = (impact) => impact === "high" ? COLORS.danger : impact === "medium" ? COLORS.gold : COLORS.textMuted;

  if (upcoming.length === 0) {
    return (
      <Card style={{ padding: 14, borderLeft: `3px solid ${COLORS.textMuted}` }}>
        <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700, marginBottom: 6 }}>📅 Next 2 Weeks</div>
        <div style={{ fontSize: 12, color: COLORS.textMuted, fontStyle: "italic" }}>Nothing on the radar.</div>
      </Card>
    );
  }

  return (
    <Card style={{ padding: 14, borderLeft: `3px solid ${COLORS.gold}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700 }}>📅 Next 2 Weeks — Economic Releases</div>
        <div style={{ fontSize: 10, color: COLORS.textDim }}>{upcoming.length} events</div>
      </div>
      <div style={{ display: compact ? "block" : "grid", gridTemplateColumns: compact ? "none" : "repeat(auto-fit, minmax(220px, 1fr))", gap: 8 }}>
        {upcoming.slice(0, compact ? 6 : 12).map((r, i) => {
          const daysUntil = Math.ceil((r.date - new Date()) / (1000 * 60 * 60 * 24));
          return (
            <div key={r.id + "-" + i} style={{ padding: "8px 10px", background: COLORS.bg, borderRadius: 6, borderLeft: `3px solid ${impactColor(r.impact)}`, marginBottom: compact ? 6 : 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.text }}>{r.name}</div>
                <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: 3, background: impactColor(r.impact), color: "white", fontWeight: 700, flexShrink: 0 }}>{r.impact.toUpperCase()}</span>
              </div>
              <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2 }}>
                {r.date.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })} · in {daysUntil}d{r.fomcLabel ? ` · ${r.fomcLabel}` : ""}
              </div>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

function EconomicCalendar() {
  // Sub-tab inside the calendar: "past" (released, last 12 months from FRED) or "future" (projected next 12 months)
  const [tab, setTab] = useState("past");

  // PAST data
  const [releases, setReleases] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filterImpact, setFilterImpact] = useState("all");
  const [filterSeries, setFilterSeries] = useState("ALL");
  const [sortBy, setSortBy] = useState("impact");  // "impact" | "date"

  // FUTURE projection (computed locally, no fetch)
  const [futureFilterImpact, setFutureFilterImpact] = useState("all");

  const loadAll = useCallback(async () => {
    setLoading(true); setError(null);
    const all = [];
    try {
      for (const rel of CALENDAR_RELEASES) {
        if (!rel.series) continue;  // skip FOMC (no FRED series)
        try {
          const series = await fetchFRED(rel.series, 400);
          if (!series || series.length < 2) continue;
          const cutoff = Date.now() - 365 * 24 * 60 * 60 * 1000;
          for (let i = 1; i < series.length; i++) {
            const pt = series[i];
            const ptDate = new Date(pt.date + "T00:00:00").getTime();
            if (ptDate < cutoff) continue;
            const prior = series[i - 1];
            let formattedValue, formattedPrior, change;
            if (rel.format === "yoy") {
              const lookback = i >= 12 ? 12 : i;
              const yearAgo = series[i - lookback];
              if (!yearAgo) continue;
              const yoy = ((pt.value - yearAgo.value) / yearAgo.value) * 100;
              const priorYoy = i >= 13 ? ((prior.value - series[i - 1 - lookback].value) / series[i - 1 - lookback].value) * 100 : null;
              formattedValue = yoy.toFixed(2) + "% YoY";
              formattedPrior = priorYoy != null ? priorYoy.toFixed(2) + "% YoY" : "—";
              change = priorYoy != null ? (yoy - priorYoy) : null;
            } else if (rel.format === "qoq") {
              const qoq = ((pt.value - prior.value) / prior.value) * 100 * 4;
              formattedValue = qoq.toFixed(2) + "%";
              formattedPrior = "—";
              change = null;
            } else if (rel.format === "delta") {
              const delta = pt.value - prior.value;
              formattedValue = (delta >= 0 ? "+" : "") + Math.round(delta / 1000).toLocaleString() + "K";
              formattedPrior = "—";
              change = delta;
            } else {
              formattedValue = pt.value.toFixed(2);
              formattedPrior = prior.value.toFixed(2);
              change = pt.value - prior.value;
            }
            all.push({
              date: pt.date,
              releaseId: rel.id,
              name: rel.name,
              series: rel.series,
              rawValue: pt.value,
              priorRawValue: prior.value,
              formattedValue,
              formattedPrior,
              change,
              impact: rel.impact,
              format: rel.format,
              desc: rel.desc,
            });
          }
        } catch (e) { /* skip series */ }
      }
      setReleases(all);
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  }, []);

  useEffect(() => { if (tab === "past") loadAll(); }, [loadAll, tab]);

  const impactRank = { high: 0, medium: 1, low: 2 };
  const filtered = releases.filter(r => {
    if (filterImpact !== "all" && r.impact !== filterImpact) return false;
    if (filterSeries !== "ALL" && r.releaseId !== filterSeries) return false;
    return true;
  });
  // Sort
  const sorted = [...filtered].sort((a, b) => {
    if (sortBy === "impact") {
      const ir = impactRank[a.impact] - impactRank[b.impact];
      if (ir !== 0) return ir;
      return new Date(b.date) - new Date(a.date);  // tiebreak by date desc
    }
    return new Date(b.date) - new Date(a.date);   // date desc
  });

  const impactColor = (impact) => impact === "high" ? COLORS.danger : impact === "medium" ? COLORS.gold : COLORS.textMuted;

  // FUTURE: projected next 12 months
  const futureReleases = useMemo(() => projectUpcomingReleases12Months(), []);
  const futureFiltered = futureReleases.filter(r => {
    if (futureFilterImpact !== "all") return r.impact === futureFilterImpact;
    return true;
  });
  // For Future, also a "Next 14 days" highlight section
  const next14Days = useMemo(() => projectUpcomingReleases(14), []);

  // Group future releases by month for the calendar view
  const futureByMonth = useMemo(() => {
    const groups = {};
    futureFiltered.forEach(r => {
      const key = r.date.toLocaleDateString("en-US", { year: "numeric", month: "long" });
      if (!groups[key]) groups[key] = [];
      groups[key].push(r);
    });
    return groups;
  }, [futureFiltered]);

  return (
    <div>
      {/* Past / Future tab switcher */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16, padding: 4, background: COLORS.bg, borderRadius: 10, flexWrap: "wrap" }}>
        {[
          { key: "past", label: "Past 12 Months — Actual Releases", icon: "◀" },
          { key: "future", label: "Next 12 Months — Projected", icon: "▶" },
        ].map(t => (
          <button key={t.key} onClick={() => setTab(t.key)}
            style={{
              flex: "1 1 200px", padding: "10px 14px", borderRadius: 8, border: "none",
              background: tab === t.key ? COLORS.surface : "transparent",
              color: tab === t.key ? COLORS.primaryDark : COLORS.textMuted,
              fontWeight: tab === t.key ? 700 : 500,
              fontSize: 13, fontFamily: "inherit", cursor: "pointer",
              boxShadow: tab === t.key ? "0 2px 6px rgba(0,0,0,0.08)" : "none",
              transition: "all 0.15s",
            }}>
            <span style={{ marginRight: 6, opacity: 0.8 }}>{t.icon}</span> {t.label}
          </button>
        ))}
      </div>

      {tab === "past" && (
        <>
          {/* Filters */}
          <div style={{ display: "flex", gap: 10, marginBottom: 14, flexWrap: "wrap", alignItems: "flex-end" }}>
            <div>
              <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600, marginBottom: 4 }}>Sort By</div>
              <select value={sortBy} onChange={e => setSortBy(e.target.value)}
                style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit", background: COLORS.surface, fontWeight: 600 }}>
                <option value="impact">Highest impact first</option>
                <option value="date">Most recent first</option>
              </select>
            </div>
            <div>
              <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600, marginBottom: 4 }}>Impact</div>
              <select value={filterImpact} onChange={e => setFilterImpact(e.target.value)}
                style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit", background: COLORS.surface }}>
                <option value="all">All ({releases.length})</option>
                <option value="high">High ({releases.filter(r => r.impact === "high").length})</option>
                <option value="medium">Medium ({releases.filter(r => r.impact === "medium").length})</option>
                <option value="low">Low ({releases.filter(r => r.impact === "low").length})</option>
              </select>
            </div>
            <div>
              <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600, marginBottom: 4 }}>Indicator</div>
              <select value={filterSeries} onChange={e => setFilterSeries(e.target.value)}
                style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit", background: COLORS.surface }}>
                <option value="ALL">All indicators</option>
                {CALENDAR_RELEASES.filter(r => r.series).map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
              </select>
            </div>
            <Button size="sm" variant="ghost" onClick={loadAll} disabled={loading}>{loading ? "Loading…" : "↻ Reload"}</Button>
          </div>

          {error && (
            <div style={{ padding: 10, background: COLORS.danger + "11", borderRadius: 6, fontSize: 12, color: COLORS.danger, marginBottom: 12 }}>{error}</div>
          )}
          {loading && sorted.length === 0 ? (
            <div style={{ padding: 40, textAlign: "center", color: COLORS.textMuted, fontSize: 13 }}>Loading 12 months of releases…</div>
          ) : (
            <Card style={{ padding: 0, overflow: "hidden" }}>
              <div style={{ maxHeight: 600, overflowY: "auto" }}>
                <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse" }}>
                  <thead>
                    <tr style={{ background: COLORS.bg, textAlign: "left", position: "sticky", top: 0 }}>
                      <th style={{ padding: "10px 14px", fontWeight: 700 }}>Release Date</th>
                      <th style={{ padding: "10px 14px", fontWeight: 700 }}>Indicator</th>
                      <th style={{ padding: "10px 14px", fontWeight: 700, textAlign: "right" }}>Actual</th>
                      <th style={{ padding: "10px 14px", fontWeight: 700, textAlign: "right" }}>Prior</th>
                      <th style={{ padding: "10px 14px", fontWeight: 700, textAlign: "right" }}>Change</th>
                      <th style={{ padding: "10px 14px", fontWeight: 700 }}>Impact</th>
                      <th style={{ padding: "10px 14px", fontWeight: 700 }}>FRED</th>
                    </tr>
                  </thead>
                  <tbody>
                    {sorted.length === 0 ? (
                      <tr><td colSpan={7} style={{ padding: 24, textAlign: "center", color: COLORS.textMuted }}>No releases match the filters.</td></tr>
                    ) : sorted.map((r, i) => (
                      <tr key={r.releaseId + "-" + r.date + "-" + i} style={{ borderTop: `1px solid ${COLORS.borderLight}` }}>
                        <td style={{ padding: "8px 14px", whiteSpace: "nowrap", color: COLORS.text, fontWeight: 600 }}>
                          {new Date(r.date + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}
                        </td>
                        <td style={{ padding: "8px 14px" }}>
                          <div style={{ fontWeight: 600 }}>{r.name}</div>
                          <div style={{ fontSize: 10, color: COLORS.textDim, marginTop: 2 }}>{r.desc}</div>
                        </td>
                        <td style={{ padding: "8px 14px", textAlign: "right", fontFamily: "ui-monospace, monospace", fontWeight: 700, color: COLORS.text }}>{r.formattedValue}</td>
                        <td style={{ padding: "8px 14px", textAlign: "right", fontFamily: "ui-monospace, monospace", color: COLORS.textMuted }}>{r.formattedPrior}</td>
                        <td style={{ padding: "8px 14px", textAlign: "right", fontFamily: "ui-monospace, monospace", fontWeight: 600, color: r.change == null ? COLORS.textMuted : (r.change >= 0 ? COLORS.success : COLORS.danger) }}>
                          {r.change == null ? "—" : (r.change >= 0 ? "▲ " : "▼ ") + Math.abs(r.change).toFixed(2)}
                        </td>
                        <td style={{ padding: "8px 14px" }}>

// RISK PROFILE TOOLSUITE
// Top-level toolsuite (like HR). Sliding-scale, emotional/narrative
// risk tolerance questionnaire designed to be filled with the client
// in the room. Generates a profile band + allocation guidance.
// Mailto handoff: opens user's mail client with a pre-filled summary

// ============================================================

// Sliding-scale questions. Each scored 0-100.
// goodWhen: which end of the slider corresponds to "higher risk capacity".
// "right" = right end is risk-tolerant. "left" = left end is risk-tolerant.
// weight is how heavily this contributes to the final score.
const RISK_SLIDERS = [

// Convert weighted-average 0-100 score to a profile band.
function scoreToProfile(score) {
  if (score < 20) return RISK_PROFILES[0];     // Conservative
  if (score < 40) return RISK_PROFILES[1];     // Moderate Conservative
  if (score < 60) return RISK_PROFILES[2];     // Balanced
  if (score < 80) return RISK_PROFILES[3];     // Growth
  return RISK_PROFILES[4];                      // Aggressive Growth
}

// Single labeled slider component used across all questions.

function RiskProfileToolsuite({ currentUser, onExit }) {
  const [page, setPage] = useState("assessment");  // "assessment" | "history" | "settings"
  // Defaults to middle (50) so it's not biased toward a profile — the advisor
  // must actually move each slider to confirm the answer.
  const [values, setValues] = useState(() => {
    const o = {};
    RISK_SLIDERS.forEach(s => { o[s.id] = 50; });
    return o;
  });
  const [touched, setTouched] = useState({});  // which sliders user has interacted with
  const [clientName, setClientName] = useState("");
  const [clientEmail, setClientEmail] = useState("");
  const [submittedAt, setSubmittedAt] = useState(null);  // when current result was saved
  const [history, setHistory] = useState([]);
  const [showResult, setShowResult] = useState(false);

  // Load history on mount
  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("pfg-risk-history-v1");
        if (r?.value) setHistory(JSON.parse(r.value));
      } catch (e) {}
    })();
  }, []);

  // Persist history when it changes
  const saveHistory = useCallback((next) => {
    setHistory(next);
    try { window.storage.set("pfg-risk-history-v1", JSON.stringify(next)); } catch (e) {}
  }, []);

  const setSliderValue = (id, v) => {
    setValues(prev => ({ ...prev, [id]: v }));
    setTouched(prev => ({ ...prev, [id]: true }));
    if (showResult) setShowResult(false);   // invalidate result if they keep tuning
  };

  // Compute weighted score 0-100. "goodWhen: right" means raw value already maps
  // (0=conservative, 100=aggressive). "goodWhen: left" would flip it.
  const totalWeight = RISK_SLIDERS.reduce((s, q) => s + q.weight, 0);
  const score = RISK_SLIDERS.reduce((s, q) => {
    const raw = values[q.id] ?? 50;
    const oriented = q.goodWhen === "right" ? raw : (100 - raw);
    return s + (oriented * q.weight);
  }, 0) / totalWeight;
  const profile = scoreToProfile(score);
  const allTouched = RISK_SLIDERS.every(s => touched[s.id]);

  const newAssessment = () => {
    const o = {};
    RISK_SLIDERS.forEach(s => { o[s.id] = 50; });
    setValues(o);
    setTouched({});
    setClientName("");
    setClientEmail("");
    setSubmittedAt(null);
    setShowResult(false);
    setPage("assessment");
  };

  const submitProfile = () => {
    setShowResult(true);
    const now = new Date();
    setSubmittedAt(now);
    // Save to history
    const entry = {
      id: "risk-" + now.getTime(),
      clientName: clientName.trim() || "(unnamed)",
      clientEmail: clientEmail.trim(),
      advisorName: currentUser?.name || "Unknown advisor",
      advisorEmail: currentUser?.email || "",
      timestamp: now.toISOString(),
      score: Math.round(score),
      profileName: profile.name,
      allocation: profile.allocation,
      values: { ...values },
    };
    saveHistory([entry, ...history].slice(0, 200));   // cap at 200 entries
  };

  // Generate mailto for sending summary to the client.
  const generateMailto = () => {
    const subject = encodeURIComponent(`Your Risk Profile Assessment — ${profile.name}`);
    const sliderSummary = RISK_SLIDERS.map(s => {
      const v = values[s.id];
      const display = s.displayAs === "percent" ? `${100 - v}% needed in 5 years` : `${v}/100`;
      return `  • ${s.title}: ${display}`;
    }).join("\n");

    const body = encodeURIComponent(
`Hi ${clientName || "[Client]"},

Thanks for sitting down with us to walk through your risk tolerance. Below is a summary of your assessment.

═══════════════════════════════════════════
RISK PROFILE: ${profile.name.toUpperCase()}
═══════════════════════════════════════════

Overall score: ${Math.round(score)}/100
Recommended allocation: ${profile.allocation}

About this profile:
${profile.desc}

Your answers:
${sliderSummary}

The PDF summary of your full assessment is attached. Let's discuss next steps when you've had time to look this over.

Best,
${currentUser?.name || ""}
Pointer Financial Group
${currentUser?.email || ""}

—————————————————————————————————————
This profile is for discussion purposes and is not a recommendation to buy or sell any security. Allocation guidance is a starting point — final portfolio construction will reflect your specific tax situation, account types, and broader financial plan.`
    );
    const to = clientEmail ? encodeURIComponent(clientEmail) : "";
    return `mailto:${to}?subject=${subject}&body=${body}`;
  };

  // Generate one-page branded PDF using jsPDF.
  // Layout:
  //  - Top: PointerOS gold header band with title
  //  - Client/advisor/date info row
  //  - Big profile band with allocation
  //  - Score bar visualization
  //  - 6-row slider results table
  //  - Footer with disclaimer
  // Page: US Letter (8.5" x 11"), portrait, 0.5" margins.
  const downloadPDF = () => {
    if (!window.jspdf) {
      alert("PDF library not loaded. Please refresh and try again.");
      return;
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "letter", orientation: "portrait" });

    const pageWidth = 612;   // 8.5 inches × 72 pt/in
    const pageHeight = 792;  // 11 inches

    doc.setFillColor(234, 200, 46);  // #EAC82E gold
    doc.rect(0, 70, pageWidth, 4, "F");

    doc.setFont("helvetica", "bold");
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(20);
    doc.text("PointerOS", margin, 38);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(234, 200, 46);
    doc.text("RISK TOLERANCE ASSESSMENT", margin, 56);

    doc.setFontSize(9);
    doc.setTextColor(255, 255, 255);
    doc.text("Pointer Financial Group", pageWidth - margin, 38, { align: "right" });
    doc.text("Confidential — Discussion Document", pageWidth - margin, 52, { align: "right" });

    // === CLIENT INFO ROW ===
    let y = 100;
    doc.setTextColor(60, 60, 60);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.text("CLIENT", margin, y);
    doc.text("ADVISOR", margin + 200, y);
    doc.text("DATE", margin + 400, y);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.setTextColor(20, 20, 20);
    doc.text(clientName || "(unnamed)", margin, y + 16);
    doc.text(currentUser?.name || "—", margin + 200, y + 16);
    doc.text(new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" }), margin + 400, y + 16);

    // === PROFILE BAND HERO ===
    y = 150;
    // Hex → RGB for the profile color
    const hexToRgb = (hex) => {
      const m = hex.replace("#", "").match(/.{2}/g);
      return m ? m.map(c => parseInt(c, 16)) : [100, 100, 100];
    };
    const [pr, pg, pb] = hexToRgb(profile.color);
    doc.setFillColor(pr, pg, pb);
    doc.rect(margin, y, contentWidth, 80, "F");
    // Lightened band beneath

    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.text("RISK PROFILE", margin + 20, y + 22);
    doc.setFontSize(26);
    doc.text(profile.name.toUpperCase(), margin + 20, y + 50);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.text(`Score: ${Math.round(score)} / 100`, margin + 20, y + 70);

    // Allocation strip
    doc.setTextColor(80, 80, 80);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8);
    doc.text("RECOMMENDED ALLOCATION", margin + 20, y + 95);

    doc.setFontSize(11);
    doc.setTextColor(20, 20, 20);
    doc.text(profile.allocation, margin + 20, y + 105);

    // === SCORE BAR ===
    y = 280;
    doc.setTextColor(60, 60, 60);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.text("RISK CAPACITY SCALE", margin, y);

    doc.setFillColor(229, 229, 229);
    doc.rect(margin, y + 10, contentWidth, 14, "F");

    doc.rect(margin, y + 10, fillWidth, 14, "F");

    const bands = ["Conservative", "Mod. Cons.", "Balanced", "Growth", "Aggressive"];

    // === SLIDER ANSWERS TABLE ===

    doc.setTextColor(60, 60, 60);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.text("YOUR ANSWERS", margin, y);

    y += 14;
    // Table header
    doc.setFillColor(247, 249, 251);
    doc.rect(margin, y, contentWidth, 18, "F");
    doc.setFontSize(8);
    doc.text("DIMENSION", margin + 8, y + 12);
    doc.text("RESPONSE", margin + contentWidth - 8, y + 12, { align: "right" });

    y += 18;
    doc.setFont("helvetica", "normal");
    doc.setTextColor(40, 40, 40);
    doc.setFontSize(10);

    RISK_SLIDERS.forEach((slider, i) => {
      const v = values[slider.id] ?? 50;
      const display = slider.displayAs === "percent" ? `${100 - v}% needed in 5 years` : `${v} / 100`;
      // Row stripe
      if (i % 2 === 0) {
        doc.setFillColor(252, 253, 254);
        doc.rect(margin, y, contentWidth, 28, "F");
      }
      doc.setFont("helvetica", "bold");
      doc.setFontSize(9);
      doc.setTextColor(20, 20, 20);
      doc.text(slider.title, margin + 8, y + 12);

      doc.setFont("helvetica", "normal");
      doc.setFontSize(8);
      doc.setTextColor(120, 120, 120);
      // Position label (which end of spectrum)
      const positionLabel = v < 25 ? slider.leftLabel : v > 75 ? slider.rightLabel : "Middle ground";
      const truncatedLabel = positionLabel.length > 70 ? positionLabel.slice(0, 70) + "…" : positionLabel;
      doc.text(truncatedLabel, margin + 8, y + 24);

      doc.setFont("helvetica", "bold");
      doc.setFontSize(10);
      doc.setTextColor(20, 20, 20);
      doc.text(display, margin + contentWidth - 8, y + 18, { align: "right" });

      y += 28;
    });

    // === PROFILE DESCRIPTION ===
    y += 8;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(9);
    doc.setTextColor(60, 60, 60);
    doc.text("PROFILE NOTES", margin, y);
    y += 14;
    doc.setFont("helvetica", "normal");
    doc.setFontSize(9);
    doc.setTextColor(40, 40, 40);
    const wrapped = doc.splitTextToSize(profile.desc, contentWidth);
    doc.text(wrapped, margin, y);
    y += wrapped.length * 12;

    // === FOOTER ===
    const footerY = pageHeight - 70;
    doc.setDrawColor(229, 229, 229);
    doc.line(margin, footerY, pageWidth - margin, footerY);
    doc.setFontSize(7);
    doc.setTextColor(140, 140, 140);
    const footerText = "This Risk Profile is for discussion purposes only and is not a recommendation to buy or sell any security. The recommended allocation is a starting point — final portfolio construction will reflect specific tax situation, account types, and broader financial plan. Profile validity assumes financial circumstances and goals remain materially unchanged.";
    const footerWrapped = doc.splitTextToSize(footerText, contentWidth);
    doc.text(footerWrapped, margin, footerY + 14);
    doc.text(`Generated ${new Date().toLocaleString("en-US")}  •  PointerOS / Pointer Financial Group`, margin, pageHeight - 18);

    // Save
    const safeClient = (clientName || "client").replace(/[^\w-]+/g, "_").slice(0, 40);
    const dateStr = new Date().toISOString().split("T")[0];
    doc.save(`RiskProfile_${safeClient}_${dateStr}.pdf`);
  };

  const formatDate = (iso) => new Date(iso).toLocaleString("en-US", { dateStyle: "medium", timeStyle: "short" });

  const navItems = [
    { key: "assessment", label: "New Assessment", icon: "🎯" },
    { key: "history",    label: `History (${history.length})`, icon: "📜" },

  return (

        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 4, background: COLORS.gold }} />

            <div style={{ fontSize: 10, color: COLORS.textDim, letterSpacing: 1.5 }}>Risk Profile</div>
          </button>
        </div>
        <nav style={{ flex: 1, padding: "12px 8px" }}>
          {navItems.map(n => (
            <button key={n.key} onClick={() => setPage(n.key)}
              style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 10, border: "none",
                background: page === n.key ? COLORS.gold + "22" : "transparent",
                color: page === n.key ? COLORS.text : COLORS.textMuted,

        <div style={{ padding: 16, borderTop: `1px solid ${COLORS.borderLight}`, fontSize: 11, color: COLORS.textDim, lineHeight: 1.5 }}>
          <div style={{ fontWeight: 700, color: COLORS.text, marginBottom: 4 }}>{currentUser?.name}</div>
          <div>{currentUser?.email}</div>

        <button onClick={onExit} style={{ margin: 16, padding: "8px 12px", border: `1px solid ${COLORS.border}`, background: COLORS.surface, borderRadius: 8, fontFamily: "inherit", fontSize: 12, color: COLORS.textMuted, cursor: "pointer" }}>
          ← Back to apps

      {/* Main */}
      <div style={{ flex: 1, padding: "28px 36px", overflowX: "hidden" }}>
        {page === "assessment" && (

}

function RiskProfiler() {
  const [answers, setAnswers] = useState({});
  const [showResult, setShowResult] = useState(false);
  const [clientName, setClientName] = useState("");
  const [clientDate, setClientDate] = useState(new Date().toISOString().split("T")[0]);

  const allAnswered = RISK_QUESTIONS.every(q => answers[q.id] != null);
  const score = Object.values(answers).reduce((sum, v) => sum + (v || 0), 0);
  const profile = RISK_PROFILES.find(p => score >= p.min && score <= p.max);

  const reset = () => {
    setAnswers({});
    setShowResult(false);
    setClientName("");
    setClientDate(new Date().toISOString().split("T")[0]);
  };

  const printResult = () => {
    window.print();
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 18 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Risk Tolerance Profiler</h2>
          <p style={{ color: COLORS.textMuted, fontSize: 13, margin: "4px 0 0" }}>
            5-question assessment to recommend a starting portfolio model. Use as a conversation starter — not a substitute for full financial planning.
          </p>
        </div>
        {showResult && (
          <div style={{ display: "flex", gap: 8 }}>
            <Button size="sm" variant="ghost" onClick={reset}>Start Over</Button>
            <Button size="sm" onClick={printResult}>Print</Button>
          </div>
        )}
      </div>

      {!showResult && (
        <>
          {/* Client info */}
          <Card style={{ padding: 18, marginBottom: 16 }}>
            <div style={{ fontSize: 12, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10, fontWeight: 600 }}>Client Information (optional)</div>
            <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 10 }}>
              <Input label="Client name" value={clientName} onChange={setClientName} placeholder="Jane Doe" />
              <Input label="Date" type="date" value={clientDate} onChange={setClientDate} />
            </div>
          </Card>

          {/* Questions */}
          {RISK_QUESTIONS.map((q, i) => (
            <Card key={q.id} style={{ padding: 18, marginBottom: 12 }}>
              <div style={{ display: "flex", gap: 12, alignItems: "flex-start", marginBottom: 12 }}>
                <div style={{ width: 28, height: 28, borderRadius: "50%", background: COLORS.primary, color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 13, flexShrink: 0 }}>{i + 1}</div>
                <div style={{ fontSize: 14, fontWeight: 600, color: COLORS.text, lineHeight: 1.4 }}>{q.text}</div>
              </div>
              <div style={{ marginLeft: 40, display: "flex", flexDirection: "column", gap: 6 }}>
                {q.options.map((opt, oi) => (
                  <label key={oi} style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", padding: "8px 12px", borderRadius: 6, background: answers[q.id] === opt.score ? COLORS.primary + "11" : "transparent", border: `1px solid ${answers[q.id] === opt.score ? COLORS.primary : COLORS.borderLight}` }}>
                    <input
                      type="radio"
                      name={q.id}
                      checked={answers[q.id] === opt.score}
                      onChange={() => setAnswers({ ...answers, [q.id]: opt.score })}
                      style={{ cursor: "pointer" }}
                    />
                    <span style={{ fontSize: 13, color: COLORS.text }}>{opt.label}</span>
                  </label>
                ))}
              </div>
            </Card>
          ))}

          <div style={{ display: "flex", justifyContent: "center", marginTop: 18 }}>
            <Button onClick={() => setShowResult(true)} disabled={!allAnswered}>
              {allAnswered ? `See Result (${Object.keys(answers).length} of ${RISK_QUESTIONS.length} answered)` : `Answer all ${RISK_QUESTIONS.length} questions to continue`}
            </Button>
          </div>
        </>
      )}

      {showResult && profile && (
        <Card style={{ padding: 0, overflow: "hidden" }}>
          <div style={{ padding: "24px 28px", background: `linear-gradient(135deg, ${profile.color} 0%, ${COLORS.primaryDark} 100%)`, color: "white" }}>
            {clientName && <div style={{ fontSize: 13, opacity: 0.85, marginBottom: 4 }}>For {clientName} · {clientDate}</div>}
            <div style={{ fontSize: 11, opacity: 0.85, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 600 }}>Risk Profile</div>
            <div style={{ fontSize: 34, fontWeight: 800, marginTop: 4, lineHeight: 1 }}>{profile.name}</div>
            <div style={{ fontSize: 14, opacity: 0.9, marginTop: 8 }}>Score: <b>{score} / 25</b></div>
          </div>
          <div style={{ padding: 24 }}>
            <div style={{ marginBottom: 18 }}>
              <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4, fontWeight: 600 }}>Recommended Allocation</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: COLORS.text }}>{profile.allocation}</div>
            </div>
            <div style={{ marginBottom: 18 }}>
              <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4, fontWeight: 600 }}>Strategy Description</div>
              <div style={{ fontSize: 14, color: COLORS.text, lineHeight: 1.6 }}>{profile.desc}</div>
            </div>

            <div style={{ marginBottom: 18 }}>
              <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8, fontWeight: 600 }}>Answer Summary</div>
              <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse" }}>
                <tbody>
                  {RISK_QUESTIONS.map((q, i) => {
                    const score = answers[q.id];
                    const choice = q.options.find(o => o.score === score);
                    return (
                      <tr key={q.id} style={{ borderTop: i === 0 ? "none" : `1px solid ${COLORS.borderLight}` }}>
                        <td style={{ padding: "8px 0", width: 24, color: COLORS.textMuted }}>{i + 1}.</td>
                        <td style={{ padding: "8px 0" }}>{q.text}</td>
                        <td style={{ padding: "8px 0", color: COLORS.primary, fontWeight: 600, textAlign: "right" }}>{choice?.label || "—"}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            <div style={{ padding: 12, background: COLORS.bg, borderRadius: 8, fontSize: 11, color: COLORS.textMuted, lineHeight: 1.5 }}>
              <b>Disclaimer:</b> This questionnaire is a starting point for risk-tolerance discussion, not investment advice. Final allocation should reflect the full client picture — financial goals, tax situation, existing holdings, liquidity needs, and other factors that a 5-question quiz cannot capture. All investments carry risk of loss.
            </div>
          </div>
        </Card>
      )}
    </div>
  );
}
