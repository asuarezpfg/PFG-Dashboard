// ============================================================
// WORKFLOWS PAGE (unified: plan tasks + batch tasks)
// ============================================================
function WorkflowsPage({ plans, people, currentUser, onUpdatePlan, onSelectPlan, batchTasks, batchTemplates, onUpdateBatchTasks }) {
  const [personFilter, setPersonFilter] = useState("mine");
  const [roleFilter, setRoleFilter] = useState("All");
  const [statusFilter, setStatusFilter] = useState("all_open");
  const [taskTypeFilter, setTaskTypeFilter] = useState("all");
  const [planSearch, setPlanSearch] = useState("");
  const [completeId, setCompleteId] = useState(null);
  const [completeNote, setCompleteNote] = useState("");
  const [confettiId, setConfettiId] = useState(null);
  const [editDueId, setEditDueId] = useState(null);
  const [editDueValue, setEditDueValue] = useState("");


  const allPlanTasks = [];
  plans.forEach(plan => {
    (plan.tasks || []).forEach(task => {
      const assignedPersonId = plan.roles?.[task.assignedRole] || null;
      allPlanTasks.push({ ...task, planName: plan.name, planId: plan.id, planSegment: plan.segment, assignedPersonId, _plan: plan, isBatch: false });
    });
  });

  const allBatchTasks = (batchTasks || []).map(t => ({ ...t, planName: "Batch", planId: null, planSegment: null, assignedPersonId: null, isBatch: true }));
  const allTasks = [...allPlanTasks, ...allBatchTasks];

  const filtered = allTasks.filter(t => {
    if (personFilter === "mine" && !t.isBatch && t.assignedPersonId !== currentUser.id) return false;
    if (roleFilter !== "All" && t.assignedRole !== roleFilter) return false;
    if (taskTypeFilter === "plan" && t.isBatch) return false;
    if (taskTypeFilter === "batch" && !t.isBatch) return false;
    if (planSearch && !t.isBatch && !t.planName.toLowerCase().includes(planSearch.toLowerCase())) return false;
    if (planSearch && t.isBatch && !"batch".includes(planSearch.toLowerCase())) return false;
    const urgency = getTaskUrgency(t);
    if (statusFilter === "all_open") return urgency !== "completed";
    if (statusFilter === "overdue") return urgency === "overdue";
    if (statusFilter === "grace") return urgency === "grace";
    if (statusFilter === "upcoming") return urgency === "upcoming";
    if (statusFilter === "future") return urgency === "future";
    if (statusFilter === "completed") return urgency === "completed";
    return true;
  });
  filtered.sort((a, b) => (a.dueDate || "9999") < (b.dueDate || "9999") ? -1 : 1);

  const countBase = allTasks.filter(t => {
    if (personFilter === "mine" && !t.isBatch && t.assignedPersonId !== currentUser.id) return false;
    if (roleFilter !== "All" && t.assignedRole !== roleFilter) return false;
    if (taskTypeFilter === "plan" && t.isBatch) return false;
    if (taskTypeFilter === "batch" && !t.isBatch) return false;
    if (planSearch && !t.isBatch && !t.planName.toLowerCase().includes(planSearch.toLowerCase())) return false;
    return true;
  });
  const counts = { overdue: 0, grace: 0, upcoming: 0, future: 0, completed: 0 };
  countBase.forEach(t => { counts[getTaskUrgency(t)]++; });

  const handleComplete = (taskId) => {
    const task = allTasks.find(t => t.id === taskId);
    if (!task) return;
    setConfettiId(taskId);
    if (task.isBatch) {
      onUpdateBatchTasks(batchTasks.map(t => t.id === taskId ? { ...t, completedAt: new Date().toISOString(), completedBy: currentUser.name, note: completeNote || t.note } : t));
    } else {
      const plan = task._plan;
      onUpdatePlan({ ...plan, tasks: plan.tasks.map(t => t.id === taskId ? { ...t, completedAt: new Date().toISOString(), completedBy: currentUser.name, note: completeNote || t.note } : t) });
    }
    setCompleteId(null); setCompleteNote(""); setTimeout(() => setConfettiId(null), 2000);
  };

  const handleDueDateChange = () => {
    const task = allTasks.find(t => t.id === editDueId);
    if (!task || !editDueValue) return;
    if (task.isBatch) {
      onUpdateBatchTasks(batchTasks.map(t => t.id === editDueId ? { ...t, dueDate: editDueValue } : t));
    } else {
      const plan = task._plan;
      onUpdatePlan({ ...plan, tasks: plan.tasks.map(t => t.id === editDueId ? { ...t, dueDate: editDueValue } : t) });
    }
    setEditDueId(null); setEditDueValue("");
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Workflows</h2>
      </div>
      <div style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 16 }}>
        {personFilter === "mine" ? `Showing your tasks (${currentUser.name})` : "Showing all tasks"}
        {planSearch && ` · Filtered by "${planSearch}"`}
      </div>

      {/* Filters */}
      <div style={{ background: "#FFFFFF", border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 16, marginBottom: 16, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
        {/* Row 1: Assigned To, Type, Plan Name */}
        <div style={{ display: "flex", gap: 20, alignItems: "end", paddingBottom: 12, borderBottom: `1px solid ${COLORS.borderLight}` }}>
          <div>
            <label style={{ fontSize: 10, color: COLORS.textDim, textTransform: "uppercase", letterSpacing: 1, marginBottom: 5, display: "block", fontWeight: 700 }}>Assigned To</label>
            <div style={{ display: "flex", gap: 4 }}>
              {[{ k: "mine", l: "My Tasks" }, { k: "all", l: "All People" }].map(f => (
                <button key={f.k} onClick={() => setPersonFilter(f.k)}
                  style={{ padding: "6px 14px", borderRadius: 8, border: `1px solid ${personFilter === f.k ? COLORS.primary : COLORS.border}`, background: personFilter === f.k ? COLORS.primary + "12" : "#FFFFFF", color: personFilter === f.k ? COLORS.primary : COLORS.textMuted, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
                  {f.l}
                </button>
              ))}
            </div>
          </div>
          <div style={{ width: 1, height: 36, background: COLORS.borderLight, flexShrink: 0 }} />
          <div>
            <label style={{ fontSize: 10, color: COLORS.textDim, textTransform: "uppercase", letterSpacing: 1, marginBottom: 5, display: "block", fontWeight: 700 }}>Type</label>
            <div style={{ display: "flex", gap: 4 }}>
              {[{ k: "all", l: "All" }, { k: "plan", l: "Plan Tasks" }, { k: "batch", l: "Batch Tasks" }].map(f => (
                <button key={f.k} onClick={() => setTaskTypeFilter(f.k)}
                  style={{ padding: "6px 14px", borderRadius: 8, border: `1px solid ${taskTypeFilter === f.k ? COLORS.purple : COLORS.border}`, background: taskTypeFilter === f.k ? COLORS.purple + "12" : "#FFFFFF", color: taskTypeFilter === f.k ? COLORS.purple : COLORS.textMuted, fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>
                  {f.l}
                </button>
              ))}
            </div>
          </div>
          <div style={{ width: 1, height: 36, background: COLORS.borderLight, flexShrink: 0 }} />
          <div style={{ flex: 1, maxWidth: 250 }}>
            <label style={{ fontSize: 10, color: COLORS.textDim, textTransform: "uppercase", letterSpacing: 1, marginBottom: 5, display: "block", fontWeight: 700 }}>Plan Name</label>
            <div style={{ position: "relative" }}>
              <IconSearch size={14} color={COLORS.textDim} style={{ position: "absolute", left: 10, top: 9 }} />
              <input value={planSearch} onChange={e => setPlanSearch(e.target.value)} placeholder="Search plan name..."
                style={{ width: "100%", padding: "6px 12px 6px 30px", borderRadius: 8, border: `1px solid ${COLORS.border}`, background: "#FFFFFF", color: COLORS.text, fontSize: 12, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
              {planSearch && <button onClick={() => setPlanSearch("")} style={{ position: "absolute", right: 8, top: 7, background: "none", border: "none", color: COLORS.textDim, cursor: "pointer" }}><IconX size={12} /></button>}
            </div>
          </div>
        </div>

        {/* Row 2: Status */}
        <div style={{ display: "flex", gap: 4, paddingTop: 12, paddingBottom: 12, borderBottom: `1px solid ${COLORS.borderLight}` }}>
          <label style={{ fontSize: 10, color: COLORS.textDim, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700, display: "flex", alignItems: "center", marginRight: 8 }}>Status</label>
          {[
            { k: "all_open", l: "All Open", color: COLORS.primary, count: counts.overdue + counts.grace + counts.upcoming + counts.future },
            { k: "overdue", l: "Overdue", color: COLORS.danger, count: counts.overdue },
            { k: "grace", l: "Grace Period", color: COLORS.warning, count: counts.grace },
            { k: "upcoming", l: "Due Soon", color: COLORS.success, count: counts.upcoming },
            { k: "future", l: "Future", color: COLORS.textMuted, count: counts.future },
            { k: "completed", l: "Completed", color: COLORS.textDim, count: counts.completed },
          ].map(s => (
            <button key={s.k} onClick={() => setStatusFilter(s.k)}
              style={{ padding: "6px 14px", borderRadius: 8, border: `1px solid ${statusFilter === s.k ? s.color : COLORS.border}`, background: statusFilter === s.k ? s.color + "12" : "#FFFFFF", color: statusFilter === s.k ? s.color : COLORS.textMuted, fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: "inherit", display: "flex", alignItems: "center", gap: 6 }}>
              {s.l}<span style={{ background: statusFilter === s.k ? s.color + "33" : COLORS.border, color: statusFilter === s.k ? s.color : COLORS.textDim, padding: "1px 6px", borderRadius: 99, fontSize: 10, fontWeight: 700 }}>{s.count}</span>
            </button>
          ))}
        </div>

        {/* Row 3: Role */}
        <div style={{ display: "flex", gap: 4, paddingTop: 12 }}>
          <label style={{ fontSize: 10, color: COLORS.textDim, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700, display: "flex", alignItems: "center", marginRight: 8 }}>Role</label>
          {["All", ...PLAN_ROLES].map(r => (
            <button key={r} onClick={() => setRoleFilter(r)}
              style={{ padding: "5px 10px", borderRadius: 8, border: `1px solid ${roleFilter === r ? COLORS.purple : COLORS.border}`, background: roleFilter === r ? COLORS.purple + "12" : "#FFFFFF", color: roleFilter === r ? COLORS.purple : COLORS.textMuted, fontSize: 11, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>
              {r}
            </button>
          ))}
        </div>
      </div>

      <div style={{ fontSize: 13, color: COLORS.textMuted, marginBottom: 12 }}>{filtered.length} tasks</div>

      <div style={{ display: "grid", gap: 4 }}>
        {filtered.map(task => {
          const urgency = getTaskUrgency(task);
          const uc = URGENCY_COLORS[urgency];
          const assignedPerson = !task.isBatch ? people.find(p => p.id === task.assignedPersonId) : null;
          const hasPriorIncomplete = task.groupId && task.order > 0 && !task.completedAt &&
            allTasks.some(t => t.groupId === task.groupId && (task.isBatch ? true : t.planId === task.planId) && t.parentDueDate === task.parentDueDate && t.order < task.order && !t.completedAt);
          return (
            <div key={task.id + (task.planId || "batch")} style={{ position: "relative", display: "flex", alignItems: "center", gap: 12, padding: "10px 16px", background: hasPriorIncomplete ? COLORS.bg : "#FFFFFF", borderRadius: 10, border: `1px solid ${hasPriorIncomplete ? COLORS.border + "88" : uc.border}`, opacity: hasPriorIncomplete ? 0.7 : 1, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
              {confettiId === task.id && <Confetti onDone={() => setConfettiId(null)} />}
              {!task.completedAt ? (
                <button onClick={(e) => { e.stopPropagation(); setCompleteId(task.id); }}
                  style={{ width: 28, height: 28, borderRadius: 8, border: `2px solid ${uc.badge}44`, background: "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <IconCheck size={14} color={uc.badge} style={{ opacity: 0.5 }} />
                </button>
              ) : (
                <button onClick={(e) => { e.stopPropagation(); const t = allTasks.find(x => x.id === task.id); if (!t) return; if (t.isBatch) { onUpdateBatchTasks(batchTasks.map(x => x.id === task.id ? { ...x, completedAt: null, completedBy: null } : x)); } else { const p = t._plan; onUpdatePlan({ ...p, tasks: p.tasks.map(x => x.id === task.id ? { ...x, completedAt: null, completedBy: null } : x) }); } }}
                  title="Re-open task"
                  style={{ width: 28, height: 28, borderRadius: 8, background: COLORS.success + "22", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <IconCheck size={14} color={COLORS.success} />
                </button>
              )}
              <div style={{ width: 4, height: 36, borderRadius: 2, background: uc.badge, flexShrink: 0, opacity: urgency === "future" ? 0.3 : 0.9 }} />
              {task.isBatch ? (
                <Badge color={COLORS.purple} style={{ fontSize: 9, padding: "2px 6px" }}>BATCH</Badge>
              ) : (
                <Badge color={segColor(task.planSegment)} style={{ minWidth: 30, textAlign: "center", fontSize: 10 }}>{task.planSegment}</Badge>
              )}
              <div style={{ flex: 1, cursor: task.planId ? "pointer" : "default" }} onClick={() => task.planId && onSelectPlan(task.planId)}>
                <div style={{ fontSize: 13, fontWeight: 500, color: task.completedAt ? COLORS.textDim : COLORS.text, textDecoration: task.completedAt ? "line-through" : "none" }}>
                  {task.parentTask && <span style={{ color: COLORS.textDim, fontWeight: 400 }}>{task.parentTask} › </span>}
                  {task.name}
                </div>
                <div style={{ fontSize: 11, color: COLORS.textDim }}>
                  {task.planName} · {task.assignedRole}
                  {assignedPerson && <span> · {assignedPerson.name}</span>}
                  {task.completedAt && <span> · Done {fmtDate(task.completedAt)} by {task.completedBy}</span>}
                  {hasPriorIncomplete && <span style={{ color: COLORS.warning }}> · Waiting on prior steps</span>}
                </div>
              </div>
              {task.dueDate && !task.completedAt && (
                <button onClick={(e) => { e.stopPropagation(); setEditDueId(task.id); setEditDueValue(task.dueDate); }}
                  style={{ background: "none", border: "none", cursor: "pointer", padding: 0 }} title="Click to change due date">
                  <Badge color={uc.badge} style={{ fontWeight: 600 }}>{fmtDate(task.dueDate)}</Badge>
                </button>
              )}
              {!task.completedAt && task.dueDate && urgency !== "future" && (
                <span style={{ fontSize: 10, fontWeight: 700, color: uc.text, textTransform: "uppercase", letterSpacing: 0.5, minWidth: 60, textAlign: "right" }}>{uc.label}</span>
              )}
            </div>
          );
        })}
        {filtered.length === 0 && <Card><div style={{ textAlign: "center", color: COLORS.textDim, padding: 40 }}>{allTasks.length === 0 ? "No tasks yet. Add plans and generate batch tasks to get started." : "No tasks match these filters."}</div></Card>}
      </div>

      <Modal open={!!completeId} onClose={() => setCompleteId(null)} title="Complete Task">
        <div style={{ fontSize: 14, marginBottom: 16 }}>Mark <strong>{allTasks.find(t => t.id === completeId)?.name}</strong> as complete?</div>
        <div style={{ fontSize: 12, color: COLORS.textDim, marginBottom: 8 }}>{allTasks.find(t => t.id === completeId)?.planName}</div>
        <TextArea label="Completion Note (optional)" value={completeNote} onChange={setCompleteNote} rows={3} />
        <div style={{ fontSize: 12, color: COLORS.textDim, marginBottom: 16 }}>Will be stamped: <strong>{currentUser.name}</strong> on <strong>{new Date().toLocaleDateString()}</strong></div>
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
          <Button variant="ghost" onClick={() => setCompleteId(null)}>Cancel</Button>
          <Button variant="success" onClick={() => handleComplete(completeId)}><IconCheck size={14} /> Complete</Button>
        </div>
      </Modal>

      <Modal open={!!editDueId} onClose={() => setEditDueId(null)} title="Change Due Date">
        <div style={{ fontSize: 14, marginBottom: 16 }}>Update due date for: <strong>{allTasks.find(t => t.id === editDueId)?.name}</strong></div>
        <Input label="New Due Date" type="date" value={editDueValue} onChange={setEditDueValue} />
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 8 }}>
          <Button variant="ghost" onClick={() => setEditDueId(null)}>Cancel</Button>
          <Button onClick={handleDueDateChange}>Save</Button>
        </div>
      </Modal>
    </div>
  );
}

// PEOPLE PAGE
// ============================================================
function PeoplePage({ people, onUpdate, currentUser }) {
  const [showAdd, setShowAdd] = useState(false);
  const [newPerson, setNewPerson] = useState({ name: "", role: "Advisor", email: "", password: "changeme" });
  const [editId, setEditId] = useState(null);
  const [editData, setEditData] = useState({});
  const [resetPwId, setResetPwId] = useState(null);
  const [newPassword, setNewPassword] = useState("");
  const [showChangePw, setShowChangePw] = useState(false);
  const [oldPw, setOldPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [pwError, setPwError] = useState("");

  const isAdmin = currentUser?.isAdmin;

  const handleAdd = () => {
    onUpdate([...people, { id: uid(), ...newPerson, active: true, isAdmin: false }]);
    setShowAdd(false);
    setNewPerson({ name: "", role: "Advisor", email: "", password: "changeme" });
  };

  const handleResetPassword = () => {
    if (!newPassword) return;
    onUpdate(people.map(p => p.id === resetPwId ? { ...p, password: newPassword } : p));
    setResetPwId(null); setNewPassword("");
  };

  const handleChangeMyPassword = () => {
    setPwError("");
    if (oldPw !== currentUser.password) { setPwError("Current password is incorrect"); return; }
    if (newPw.length < 4) { setPwError("New password must be at least 4 characters"); return; }
    if (newPw !== confirmPw) { setPwError("New passwords do not match"); return; }
    onUpdate(people.map(p => p.id === currentUser.id ? { ...p, password: newPw } : p));
    setShowChangePw(false); setOldPw(""); setNewPw(""); setConfirmPw("");
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>People</h2>
        <div style={{ display: "flex", gap: 8 }}>
          <Button variant="ghost" onClick={() => setShowChangePw(true)}>Change My Password</Button>
          {isAdmin && <Button onClick={() => setShowAdd(true)}><IconPlus size={16} /> Add Person</Button>}
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        {people.map(person => (
          <Card key={person.id} style={{ display: "flex", alignItems: "center", gap: 16, opacity: person.active === false ? 0.5 : 1 }}>
            <div style={{ width: 48, height: 48, borderRadius: 12, background: COLORS.primary + "22", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 18, color: COLORS.primary }}>
              {person.name.split(" ").map(n => n[0]).join("")}
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
                {person.name}
                {person.isAdmin && <Badge color={COLORS.warning} style={{ fontSize: 9, padding: "1px 6px" }}>Admin</Badge>}
                {person.active === false && <Badge color={COLORS.textDim} style={{ fontSize: 9, padding: "1px 6px" }}>Inactive</Badge>}
              </div>
              <div style={{ fontSize: 12, color: COLORS.textMuted }}>{person.role}</div>
              {person.email && <div style={{ fontSize: 11, color: COLORS.textDim }}>{person.email}</div>}
            </div>
            {isAdmin && (
              <div style={{ display: "flex", gap: 4 }}>
                <Button variant="ghost" size="sm" onClick={() => { setResetPwId(person.id); setNewPassword(""); }} title="Reset password">
                  <IconSettings size={14} />
                </Button>
                <Button variant="ghost" size="sm" onClick={() => { setEditId(person.id); setEditData({ ...person }); }}>
                  <IconEdit size={14} />
                </Button>
              </div>
            )}
          </Card>
        ))}
      </div>

      {/* Add Person Modal (Admin only) */}
      <Modal open={showAdd} onClose={() => setShowAdd(false)} title="Add Person">
        <Input label="Full Name" value={newPerson.name} onChange={v => setNewPerson({ ...newPerson, name: v })} />
        <Select label="Role" value={newPerson.role} onChange={v => setNewPerson({ ...newPerson, role: v })} options={["Advisor", "Educator", "Relationship Manager", "Investment Team", "Admin"]} />
        <Input label="Email" value={newPerson.email} onChange={v => setNewPerson({ ...newPerson, email: v })} />
        <Input label="Initial Password" value={newPerson.password} onChange={v => setNewPerson({ ...newPerson, password: v })} />
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 16 }}>
          <Button variant="ghost" onClick={() => setShowAdd(false)}>Cancel</Button>
          <Button onClick={handleAdd} disabled={!newPerson.name}>Add</Button>
        </div>
      </Modal>

      {/* Edit Person Modal (Admin only) */}
      <Modal open={!!editId} onClose={() => setEditId(null)} title="Edit Person">
        <Input label="Full Name" value={editData.name} onChange={v => setEditData({ ...editData, name: v })} />
        <Select label="Role" value={editData.role} onChange={v => setEditData({ ...editData, role: v })} options={["Advisor", "Educator", "Relationship Manager", "Investment Team", "Admin"]} />
        <Input label="Email" value={editData.email} onChange={v => setEditData({ ...editData, email: v })} />
        <div style={{ display: "flex", gap: 16, marginTop: 12 }}>
          <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, color: COLORS.textMuted, cursor: "pointer" }}>
            <input type="checkbox" checked={editData.isAdmin || false} onChange={e => setEditData({ ...editData, isAdmin: e.target.checked })} /> Admin
          </label>
          <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, color: COLORS.textMuted, cursor: "pointer" }}>
            <input type="checkbox" checked={editData.active !== false} onChange={e => setEditData({ ...editData, active: e.target.checked })} /> Active
          </label>
        </div>
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 16 }}>
          <Button variant="ghost" onClick={() => setEditId(null)}>Cancel</Button>
          <Button onClick={() => { onUpdate(people.map(p => p.id === editId ? { ...editData } : p)); setEditId(null); }}>Save</Button>
        </div>
      </Modal>

      {/* Reset Password Modal (Admin only) */}
      <Modal open={!!resetPwId} onClose={() => setResetPwId(null)} title="Reset Password">
        <div style={{ fontSize: 14, marginBottom: 16 }}>Set new password for: <strong>{people.find(p => p.id === resetPwId)?.name}</strong></div>
        <Input label="New Password" type="password" value={newPassword} onChange={setNewPassword} placeholder="Enter new password" />
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 8 }}>
          <Button variant="ghost" onClick={() => setResetPwId(null)}>Cancel</Button>
          <Button onClick={handleResetPassword} disabled={!newPassword}>Set Password</Button>
        </div>
      </Modal>

      {/* Change My Password Modal (any user) */}
      <Modal open={showChangePw} onClose={() => { setShowChangePw(false); setPwError(""); }} title="Change My Password">
        <Input label="Current Password" type="password" value={oldPw} onChange={v => { setOldPw(v); setPwError(""); }} />
        <Input label="New Password" type="password" value={newPw} onChange={v => { setNewPw(v); setPwError(""); }} />
        <Input label="Confirm New Password" type="password" value={confirmPw} onChange={v => { setConfirmPw(v); setPwError(""); }} />
        {pwError && <div style={{ color: COLORS.danger, fontSize: 12, marginBottom: 8 }}>{pwError}</div>}
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", marginTop: 8 }}>
          <Button variant="ghost" onClick={() => { setShowChangePw(false); setPwError(""); }}>Cancel</Button>
          <Button onClick={handleChangeMyPassword}>Update Password</Button>
        </div>
      </Modal>
    </div>
  );
}

// ============================================================
// TRENDS PAGE
// ============================================================
function TrendsPage({ plans }) {
  const segmentColors = { A: "#3B82F6", B: "#10B981", C: "#F59E0B", SIM: "#8B5CF6" };

  // Gather all asset snapshots with plan info
  const allSnapshots = [];
  plans.forEach(p => {
    (p.assetHistory || []).forEach(snap => {
      allSnapshots.push({ ...snap, planName: p.name, planId: p.id, segment: p.segment });
    });
  });

  // Assets by segment over time - aggregate by quarter
  const assetsByQuarter = {};
  allSnapshots.forEach(snap => {
    const d = new Date(snap.date);
    const qKey = d.getFullYear() + "-Q" + (Math.floor(d.getMonth() / 3) + 1);
    if (!assetsByQuarter[qKey]) assetsByQuarter[qKey] = { A: 0, B: 0, C: 0, SIM: 0 };
    assetsByQuarter[qKey][snap.segment] = (assetsByQuarter[qKey][snap.segment] || 0) + snap.total;
  });
  const quarterKeys = Object.keys(assetsByQuarter).sort();

  // Total participants over time
  const totalParticipants = plans.reduce((s, p) => s + (p.participants?.total || 0), 0);

  // Top 10 plans by assets
  const planAssets = plans.map(p => {
    const latest = p.assetHistory?.length ? p.assetHistory[p.assetHistory.length - 1].total : 0;
    return { name: p.name, assets: latest, segment: p.segment };
  }).sort((a, b) => b.assets - a.assets).slice(0, 10);
  const maxAsset = planAssets.length > 0 ? planAssets[0].assets : 1;

  // QoQ movers
  const qoqMovers = plans.map(p => {
    const h = p.assetHistory || [];
    if (h.length < 2) return null;
    const latest = h[h.length - 1].total;
    const prev = h[h.length - 2].total;
    const change = prev > 0 ? ((latest - prev) / prev * 100) : 0;
    return { name: p.name, segment: p.segment, latest, prev, change };
  }).filter(Boolean).sort((a, b) => Math.abs(b.change) - Math.abs(a.change)).slice(0, 10);

  const barHeight = 28;

  return (
    <div>
      <h2 style={{ margin: "0 0 24px", fontSize: 22, fontWeight: 700 }}>Trends</h2>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 20 }}>
        {/* Assets by Segment */}
        <Card>
          <h4 style={{ margin: "0 0 16px", fontSize: 14, color: COLORS.textMuted }}>Assets by Segment</h4>
          {quarterKeys.length === 0 && <div style={{ color: COLORS.textDim, fontSize: 13 }}>No asset data yet. Add asset snapshots to plans to see trends.</div>}
          {quarterKeys.length > 0 && (
            <div>
              {quarterKeys.map(qk => {
                const data = assetsByQuarter[qk];
                const total = Object.values(data).reduce((s, v) => s + v, 0);
                return (
                  <div key={qk} style={{ marginBottom: 12 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                      <span style={{ fontWeight: 600 }}>{qk}</span>
                      <span style={{ color: COLORS.textDim }}>{fmt$(total)}</span>
                    </div>
                    <div style={{ display: "flex", height: 12, borderRadius: 6, overflow: "hidden", background: COLORS.bg }}>
                      {SEGMENTS.map(seg => {
                        const pct = total > 0 ? (data[seg] / total * 100) : 0;
                        return pct > 0 ? <div key={seg} style={{ width: pct + "%", background: segmentColors[seg], transition: "width 0.3s" }} title={`${seg}: ${fmt$(data[seg])}`} /> : null;
                      })}
                    </div>
                  </div>
                );
              })}
              <div style={{ display: "flex", gap: 12, marginTop: 8, fontSize: 11 }}>
                {SEGMENTS.map(s => <span key={s} style={{ display: "flex", alignItems: "center", gap: 4, color: COLORS.textDim }}><span style={{ width: 8, height: 8, borderRadius: 2, background: segmentColors[s] }} />{s}</span>)}
              </div>
            </div>
          )}
        </Card>

        {/* Total Participants */}
        <Card>
          <h4 style={{ margin: "0 0 16px", fontSize: 14, color: COLORS.textMuted }}>Participants by Segment</h4>
          {plans.length === 0 && <div style={{ color: COLORS.textDim, fontSize: 13 }}>No plans yet.</div>}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            {SEGMENTS.map(seg => {
              const segPlans = plans.filter(p => p.segment === seg);
              const total = segPlans.reduce((s, p) => s + (p.participants?.total || 0), 0);
              const contributing = segPlans.reduce((s, p) => s + (p.participants?.contributing || 0), 0);
              return (
                <div key={seg} style={{ textAlign: "center", padding: 12, background: COLORS.bg, borderRadius: 8 }}>
                  <Badge color={segmentColors[seg]} style={{ marginBottom: 6 }}>{seg}</Badge>
                  <div style={{ fontSize: 20, fontWeight: 700 }}>{total.toLocaleString()}</div>
                  <div style={{ fontSize: 11, color: COLORS.textDim }}>participants</div>
                  {total > 0 && <div style={{ fontSize: 11, color: COLORS.primary, marginTop: 2 }}>{contributing} contributing ({(contributing/total*100).toFixed(0)}%)</div>}
                </div>
              );
            })}
          </div>

// ============================================================
// FINANCIAL DATA HELPERS (Yahoo Finance — Worker primary, free proxies as fallback)
// ============================================================
// Preferred path: a user-deployed Cloudflare Worker (see Settings → "Worker URL").
// Falls back to free public CORS proxies if the Worker is missing or fails.
const WORKER_URL_KEY = "pfg-worker-url";

// Read worker URL from localStorage on every call so the user can update without reload
function getWorkerUrl() {
  try {
    const u = localStorage.getItem(WORKER_URL_KEY);
    return u && u.trim() ? u.trim().replace(/\/$/, "") : null;
  } catch (e) { return null; }
}
function setWorkerUrl(url) {
  try {
    if (url && url.trim()) localStorage.setItem(WORKER_URL_KEY, url.trim());
    else localStorage.removeItem(WORKER_URL_KEY);
  } catch (e) {}
}

// Proxy chain — Worker first (if configured), then free fallbacks.
function buildProxyChain() {
  const chain = [];
  const worker = getWorkerUrl();
  if (worker) {
    chain.push({
      name: "Cloudflare Worker",
      url: (u) => `${worker}/?url=${encodeURIComponent(u)}`,
      isWorker: true,
    });
  }
  chain.push(
    { name: "corsproxy.io", url: (u) => `https://corsproxy.io/?url=${encodeURIComponent(u)}` },
    { name: "allorigins.win/raw", url: (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` },
    { name: "corsfix.com", url: (u) => `https://proxy.corsfix.com/?${u}` },
  );
  return chain;
}

// Module-scoped state: index of the proxy that's currently working
let _preferredProxyIdx = 0;
// Tracks last error for surfacing in UI
window.__pfgLastFetchError = null;

async function fetchThroughProxies(targetUrl, opts = {}) {
  const { expectJSON = true, timeoutMs = 8000 } = opts;
  const proxies = buildProxyChain();
  const tried = [];
  // Start from preferred, wrap around. When Worker is configured, always try it first.
  const startIdx = proxies[0]?.isWorker ? 0 : (_preferredProxyIdx % proxies.length);
  for (let i = 0; i < proxies.length; i++) {
    const idx = (startIdx + i) % proxies.length;
    const proxy = proxies[idx];
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), timeoutMs);
      const res = await fetch(proxy.url(targetUrl), { signal: ctrl.signal });
      clearTimeout(timer);
      if (!res.ok) {
        tried.push(`${proxy.name}: HTTP ${res.status}`);
        continue;
      }
      const text = await res.text();
      if (expectJSON) {
        try {
          const json = JSON.parse(text);
          _preferredProxyIdx = idx;
          window.__pfgLastFetchError = null;
          return json;
        } catch (e) {
          tried.push(`${proxy.name}: non-JSON response`);
          continue;
        }
      }
      _preferredProxyIdx = idx;
      window.__pfgLastFetchError = null;
      return text;
    } catch (e) {
      tried.push(`${proxy.name}: ${e.name === "AbortError" ? "timeout" : e.message}`);
    }
  }
  const err = new Error("All proxies failed: " + tried.join(" | "));
  window.__pfgLastFetchError = err.message;
  console.warn("[PFG] fetch failed for", targetUrl, "—", tried);
  throw err;
}

// ============================================================
// IN-MEMORY DATA CACHE
// Reduces redundant Yahoo/FRED calls when components remount or
// share data needs. Keys are namespaced per-fetcher. TTL is per-key.
//   - Chart series: 5 minutes (price data settles slowly)
//   - Batch quotes: 30 seconds (live updates)
//   - FRED series: 1 hour (macro data updates daily at most)
//   - quoteSummary: 5 minutes
//   - ETF holdings: 1 day
// Setting localStorage flag "pfg-debug-cache" = "1" logs hits/misses.
// ============================================================
const pfgCache = new Map();
const pfgInflight = new Map();    // dedupe concurrent requests for same key
function cacheGet(key) {
  const entry = pfgCache.get(key);
  if (!entry) return null;
  if (Date.now() > entry.expiresAt) {
    pfgCache.delete(key);
    return null;
  }
  if (typeof localStorage !== "undefined" && localStorage.getItem("pfg-debug-cache") === "1") {
    console.log("[cache HIT]", key);
  }
  return entry.value;
}
function cacheSet(key, value, ttlMs) {
  pfgCache.set(key, { value, expiresAt: Date.now() + ttlMs });
}
async function cached(key, ttlMs, fn) {
  const hit = cacheGet(key);
  if (hit !== null) return hit;
  // Dedupe in-flight requests for the same key
  if (pfgInflight.has(key)) {
    return pfgInflight.get(key);
  }
  if (typeof localStorage !== "undefined" && localStorage.getItem("pfg-debug-cache") === "1") {
    console.log("[cache MISS]", key);
  }
  const promise = (async () => {
    try {
      const val = await fn();
      cacheSet(key, val, ttlMs);
      return val;
    } finally {
      pfgInflight.delete(key);
    }
  })();
  pfgInflight.set(key, promise);
  return promise;
}
// Expose to window for manual clearing in console
if (typeof window !== "undefined") {
  window.pfgClearCache = () => { pfgCache.clear(); pfgInflight.clear(); console.log("Cache cleared."); };
}

async function fetchYahoo(symbol, range = "ytd", interval = "1d") {
  return cached(`yahoo:${symbol}:${range}:${interval}`, 5 * 60 * 1000, async () => {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=${range}&interval=${interval}`;
    const json = await fetchThroughProxies(url, { expectJSON: true });
    if (!json?.chart?.result?.[0]) {
      throw new Error("Yahoo returned no chart data for " + symbol);
    }
    const r = json.chart.result[0];
    return {
      closes: r.indicators?.quote?.[0]?.close || [],
      ts: r.timestamp || [],
      meta: r.meta || {},
    };
  });
}

// Batch quote fetcher: pulls many tickers in a single request.
// Returns { SYMBOL: { last, prev, pct, dayHigh, dayLow, yearHigh, yearLow, vol } }.
// Falls back to individual fetchYahoo calls if the batch endpoint fails.
async function fetchYahooBatch(symbols) {
  if (!symbols.length) return {};
  const cacheKey = `yahooBatch:${[...symbols].sort().join(",")}`;
  return cached(cacheKey, 30 * 1000, async () => {
    const out = {};
  // Yahoo's v7 quote endpoint supports comma-separated symbols.
  // Some proxies/edge versions block v7, so we try, and on failure split into chart calls.
  const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(symbols.join(","))}`;
  try {
    const json = await fetchThroughProxies(url, { expectJSON: true, timeoutMs: 10000 });
    const results = json?.quoteResponse?.result || [];
    for (const r of results) {
      const sym = r.symbol;
      const last = r.regularMarketPrice;
      const prev = r.regularMarketPreviousClose;
      if (last == null || prev == null) continue;
      out[sym] = {
        last, prev,
        pct: prev ? ((last - prev) / prev) * 100 : null,
        change: last - prev,
        dayHigh: r.regularMarketDayHigh ?? null,
        dayLow: r.regularMarketDayLow ?? null,
        yearHigh: r.fiftyTwoWeekHigh ?? null,
        yearLow: r.fiftyTwoWeekLow ?? null,
        vol: r.regularMarketVolume ?? null,
        name: r.shortName || r.longName || null,
      };
    }
    if (Object.keys(out).length === 0) throw new Error("Empty batch result");
    return out;
  } catch (e) {
    console.warn("[PFG] batch quote failed, falling back to per-symbol:", e.message);
    // Fallback: per-symbol chart calls
    for (const sym of symbols) {
      try {
        const { closes, meta } = await fetchYahoo(sym, "1d", "5m");
        const clean = closes.filter(x => x !== null);
        const last = clean[clean.length - 1];
        const prev = meta.chartPreviousClose || meta.previousClose;
        if (last == null || prev == null) continue;
        out[sym] = {
          last, prev,
          pct: prev ? ((last - prev) / prev) * 100 : null,
          change: last - prev,
          dayHigh: meta.regularMarketDayHigh ?? null,
          dayLow: meta.regularMarketDayLow ?? null,
          yearHigh: meta.fiftyTwoWeekHigh ?? null,
          yearLow: meta.fiftyTwoWeekLow ?? null,
          vol: meta.regularMarketVolume ?? null,
        };
      } catch (e2) { /* skip */ }
    }
    return out;
   }
  });
}

// Project a future release date given a cadence rule and a target month.
function projectReleaseDate(release, targetMonth /* Date pointing to first of target month */) {
  const year = targetMonth.getFullYear();
  const month = targetMonth.getMonth();

  if (release.cadence === "nthFridayOfMonth") {
    // First Friday of given month
    const d = new Date(year, month, 1);
    const firstFridayOffset = (5 - d.getDay() + 7) % 7;  // 5 = Friday in JS Date.getDay
    return new Date(year, month, 1 + firstFridayOffset + (release.n - 1) * 7);
  }
  if (release.cadence === "nthBusinessDayOfMonth") {
    // typicalDay = calendar day of month (e.g., CPI typically ~12th)
    // Roll forward to next weekday if it falls on weekend
    let d = new Date(year, month, release.typicalDay);
    while (d.getDay() === 0 || d.getDay() === 6) {
      d.setDate(d.getDate() + 1);
    }
    return d;
  }
  if (release.cadence === "quarterly") {
    // GDP advance comes out ~28 days after end of prior quarter.
    // Months when GDP releases: Jan (Q4 prior), Apr (Q1), Jul (Q2), Oct (Q3)
    if ([0, 3, 6, 9].includes(month)) {
      return new Date(year, month, release.typicalDay);
    }
    return null;  // no release this month
  }
  return null;
}

// Generate next-N-days of upcoming release dates across all indicators.
// Returns array sorted by date ascending.
function projectUpcomingReleases(days = 14) {
  const now = new Date();
  const cutoff = new Date(now.getTime() + days * 24 * 60 * 60 * 1000);
  const out = [];

  for (const rel of CALENDAR_RELEASES) {
    if (rel.cadence === "weeklyDow") {
      // Every Thursday from now to cutoff
      let d = new Date(now);
      const dow = rel.dayOfWeek;
      // Find next instance of dayOfWeek strictly after today
      const daysAhead = (dow - d.getDay() + 7) % 7 || 7;
      d.setDate(d.getDate() + daysAhead);
      while (d <= cutoff) {
        out.push({ ...rel, date: new Date(d) });
        d.setDate(d.getDate() + 7);
      }
    } else if (rel.cadence === "fomc") {
      // FOMC_SCHEDULE_2026 has 2026 dates; iterate
      for (const mtg of FOMC_SCHEDULE_2026) {
        const d = new Date(mtg.date + "T14:00:00");
        if (d > now && d <= cutoff) {
          out.push({ ...rel, date: d, fomcLabel: mtg.label, fomcSEP: mtg.sep });
        }
      }
    } else {
      // Look 2 months ahead to be safe (in case cutoff straddles month boundary)
      for (let mOffset = 0; mOffset <= 2; mOffset++) {
        const m = new Date(now.getFullYear(), now.getMonth() + mOffset, 1);
        const d = projectReleaseDate(rel, m);
        if (d && d > now && d <= cutoff) {
          out.push({ ...rel, date: d });
        }
      }
    }
  }
  out.sort((a, b) => a.date - b.date);
  return out;
}

// Generate next 12 months of upcoming releases (used for the Future tab)
function projectUpcomingReleases12Months() {
  const now = new Date();
  const out = [];
  // Walk through next 12 months
  for (let mOffset = 0; mOffset <= 12; mOffset++) {
    const monthStart = new Date(now.getFullYear(), now.getMonth() + mOffset, 1);
    for (const rel of CALENDAR_RELEASES) {
      if (rel.cadence === "weeklyDow") {
        // For Jobless Claims, project every Thursday of this month
        let d = new Date(monthStart);
        const dow = rel.dayOfWeek;
        const daysAhead = (dow - d.getDay() + 7) % 7;
        d.setDate(d.getDate() + daysAhead);
        const monthEnd = new Date(monthStart.getFullYear(), monthStart.getMonth() + 1, 0);
        while (d <= monthEnd) {
          if (d > now) out.push({ ...rel, date: new Date(d) });
          d.setDate(d.getDate() + 7);
        }
      } else if (rel.cadence === "fomc") {
        // Only project from FOMC_SCHEDULE_2026 — for months beyond 2026 we just skip
        // (we don't have hardcoded data past the published schedule)
        for (const mtg of FOMC_SCHEDULE_2026) {
          const d = new Date(mtg.date + "T14:00:00");
          if (d.getFullYear() === monthStart.getFullYear() && d.getMonth() === monthStart.getMonth() && d > now) {
            out.push({ ...rel, date: d, fomcLabel: mtg.label, fomcSEP: mtg.sep });
          }
        }
      } else {
        const d = projectReleaseDate(rel, monthStart);
        if (d && d > now) out.push({ ...rel, date: d });
      }
    }
  }
  out.sort((a, b) => a.date - b.date);
  return out;
}

// Heatmap color for % change — green up, red down, gray flat
const heatColor = (pct) => {
  if (pct == null || isNaN(pct)) return "#F3F4F6";
  const clamped = Math.max(-3, Math.min(3, pct));
  if (clamped >= 0) {
    const intensity = Math.round((clamped / 3) * 180) + 40;
    return `rgb(22, ${100 + intensity / 2}, 74)`;
  } else {
    const intensity = Math.round((-clamped / 3) * 180) + 40;
    return `rgb(${180 + intensity / 4}, 38, 38)`;
  }
};

// financialData, calendarEvents
// ============================================================
// ============================================================
// Yahoo topHoldings — for ETFs, returns top 10 holdings with weights.
// Yahoo doesn't always return this; failures are non-fatal.
// ============================================================
async function fetchETFHoldings(symbol) {
  return cached(`etfHoldings:${symbol}`, 24 * 60 * 60 * 1000, async () => {
    const url = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${encodeURIComponent(symbol)}?modules=topHoldings`;
    try {
      const json = await fetchThroughProxies(url, { expectJSON: true, timeoutMs: 8000 });
      const r = json?.quoteSummary?.result?.[0]?.topHoldings;
      if (!r) return null;
      const u = (obj) => obj && typeof obj === "object" && "raw" in obj ? obj.raw : (obj ?? null);
      return {
        holdings: (r.holdings || []).map(h => ({
          symbol: h.symbol,
          name: typeof h.holdingName === "string" ? h.holdingName : u(h.holdingName),
          weight: u(h.holdingPercent),
        })),
        sectorWeights: (r.sectorWeightings || []).map(s => {
          const entries = Object.entries(s)[0] || [];
          return { name: entries[0], weight: u(entries[1]) };
        }),
      };
    } catch (e) {
      return null;
    }
  });
}

async function fetchYahooQuoteSummary(symbol) {
  return cached(`quoteSummary:${symbol}`, 5 * 60 * 1000, async () => {
    // Yahoo's quoteSummary can be picky — if you request a module that
    // doesn't apply to the security type (e.g. earningsHistory on an ETF),
    // the whole call returns 404. We split into two requests: a "core" set
    // that works for everything, and a "stock-only" set we tolerate failing.
    const coreModules = ["summaryDetail", "price", "defaultKeyStatistics"].join(",");
    const stockModules = ["earnings", "earningsHistory", "earningsTrend", "incomeStatementHistoryQuarterly", "financialData", "calendarEvents"].join(",");
    const u = (obj) => obj && typeof obj === "object" && "raw" in obj ? obj.raw : (obj ?? null);

    const coreUrl = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${encodeURIComponent(symbol)}?modules=${coreModules}`;
    const stockUrl = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${encodeURIComponent(symbol)}?modules=${stockModules}`;

    // Core MUST succeed. Stock-only is best-effort.
    const coreJson = await fetchThroughProxies(coreUrl, { expectJSON: true, timeoutMs: 10000 });
    const core = coreJson?.quoteSummary?.result?.[0];
    if (!core) throw new Error("No quoteSummary data for " + symbol);
    let stock = null;
    try {
      const stockJson = await fetchThroughProxies(stockUrl, { expectJSON: true, timeoutMs: 10000 });
      stock = stockJson?.quoteSummary?.result?.[0];
    } catch (e) { /* expected for ETFs */ }

  const summary = core.summaryDetail || {};
  const stats = core.defaultKeyStatistics || {};
  const price = core.price || {};
  const fin = stock?.financialData || {};
  const earnings = stock?.earnings || {};
  const earningsHistory = stock?.earningsHistory?.history || [];
  const incomeQuarterly = stock?.incomeStatementHistoryQuarterly?.incomeStatementHistory || [];
  const cal = stock?.calendarEvents || {};
  return {
    symbol,
    name: u(price.longName) || u(price.shortName) || symbol,
    quoteType: u(price.quoteType),   // "EQUITY" | "ETF" | etc.
    marketCap: u(price.marketCap),
    last: u(price.regularMarketPrice),
    pe: u(summary.trailingPE),
    forwardPE: u(summary.forwardPE),
    peg: u(stats.pegRatio),
    eps: u(stats.trailingEps),
    epsForward: u(stats.forwardEps),
    dividendRate: u(summary.dividendRate),
    dividendYield: u(summary.dividendYield),
    payoutRatio: u(summary.payoutRatio),
    exDividendDate: u(summary.exDividendDate),
    fiftyTwoWeekHigh: u(summary.fiftyTwoWeekHigh),
    fiftyTwoWeekLow: u(summary.fiftyTwoWeekLow),
    beta: u(summary.beta),
    profitMargin: u(fin.profitMargins),
    grossMargin: u(fin.grossMargins),
    operatingMargin: u(fin.operatingMargins),
    revenue: u(fin.totalRevenue),
    revenueGrowth: u(fin.revenueGrowth),
    earningsGrowth: u(fin.earningsGrowth),
    debtToEquity: u(fin.debtToEquity),
    returnOnEquity: u(fin.returnOnEquity),
    earningsHistory: earningsHistory.map(e => ({
      quarter: u(e.quarter) ? new Date(u(e.quarter) * 1000).toISOString().split("T")[0] : null,
      epsActual: u(e.epsActual),
      epsEstimate: u(e.epsEstimate),
      surprisePct: u(e.surprisePercent),
      period: e.period,
    })),
    incomeQuarterly: incomeQuarterly.map(q => ({
      endDate: u(q.endDate) ? new Date(u(q.endDate) * 1000).toISOString().split("T")[0] : null,
      revenue: u(q.totalRevenue),
      netIncome: u(q.netIncome),
      grossProfit: u(q.grossProfit),
      operatingIncome: u(q.operatingIncome),
    })),
    nextEarningsDate: cal?.earnings?.earningsDate?.[0] ? new Date(u(cal.earnings.earningsDate[0]) * 1000) : null,
    nextEarningsEstimate: u(cal?.earnings?.earningsAverage),
    nextDividendDate: u(cal?.exDividendDate) ? new Date(u(cal.exDividendDate) * 1000) : null,
    };
  });
}

// ============================================================
// FRED (Federal Reserve Economic Data) — free macro data with CORS support.
// Without an API key, we use FRED's "fredgraph" CSV endpoint that's open to all.
// Series IDs: https://fred.stlouisfed.org/categories
//   DFF      → Federal Funds Effective Rate
//   DGS10    → 10-Year Treasury Constant Maturity
//   DGS2     → 2-Year, DGS5 → 5Y, DGS30 → 30Y, DGS1MO → 1M, DGS3MO → 3M, etc.
//   MORTGAGE30US → 30-Year Fixed Mortgage Rate (US Avg)
// ============================================================
async function fetchFRED(seriesId, daysBack = 365) {
  return cached(`fred:${seriesId}:${daysBack}`, 60 * 60 * 1000, async () => {
    const start = new Date(); start.setDate(start.getDate() - daysBack);
    const startStr = start.toISOString().split("T")[0];
    const url = `https://fred.stlouisfed.org/graph/fredgraph.csv?id=${seriesId}&cosd=${startStr}`;
    try {
      const text = await fetchThroughProxies(url, { expectJSON: false });
      const lines = text.split("\n").filter(Boolean);
      const data = [];
      for (let i = 1; i < lines.length; i++) {
        const [date, val] = lines[i].split(",");
        const n = parseFloat(val);
        if (!isNaN(n)) data.push({ date, value: n });
      }
      return data;
    } catch (e) {
      console.warn("FRED fetch failed for", seriesId, e.message);
      return [];
    }
  });
}

// Fetch the full US Treasury yield curve (one point each maturity, latest values)
const YIELD_CURVE_SERIES = [
  { label: "1M",  series: "DGS1MO" },
  { label: "3M",  series: "DGS3MO" },
  { label: "6M",  series: "DGS6MO" },
  { label: "1Y",  series: "DGS1" },
  { label: "2Y",  series: "DGS2" },
  { label: "3Y",  series: "DGS3" },
  { label: "5Y",  series: "DGS5" },
  { label: "7Y",  series: "DGS7" },
  { label: "10Y", series: "DGS10" },
  { label: "20Y", series: "DGS20" },
  { label: "30Y", series: "DGS30" },
];

async function fetchYieldCurve() {
  const out = [];
  for (const m of YIELD_CURVE_SERIES) {
    const data = await fetchFRED(m.series, 14);
    const last = data[data.length - 1];
    out.push({ ...m, value: last?.value ?? null, date: last?.date ?? null });
  }
  return out;
}

async function fetchFearGreed() {
  return cached("fearGreed", 5 * 60 * 1000, async () => {
    // CNN's endpoint returns history starting from the date in the URL path.
    // To get ~1 year of history we pass a date 12 months ago.
    const d = new Date();
    d.setFullYear(d.getFullYear() - 1);
    const dateStr = d.toISOString().split("T")[0];
    const url = `https://production.dataviz.cnn.io/index/fearandgreed/graphdata/${dateStr}`;
    try {
      const data = await fetchThroughProxies(url, { expectJSON: true });
      const fg = data.fear_and_greed;
      if (!fg) return null;
      const hist = data?.fear_and_greed_historical?.data || [];
      return {
        score: Math.round(fg.score),
        rating: fg.rating,
        previousClose: Math.round(fg.previous_close),
        previousWeek: Math.round(fg.previous_1_week),
        previousMonth: Math.round(fg.previous_1_month),
        previousYear: Math.round(fg.previous_1_year),
        timestamp: fg.timestamp,
        historical: hist.map(d => ({ ts: d.x, score: d.y, rating: d.rating })),
      };
    } catch (e) {
      console.warn("Fear & Greed fetch failed:", e.message);
      return null;
    }
  });
}

// ============================================================
// MODEL BENCHMARK COMPARISON — model weighted avg returns vs index
// ============================================================
function ModelBenchmarkCard({ holdings, benchmark, onChangeBenchmark }) {
  const [modelStats, setModelStats] = useState(null);
  const [benchStats, setBenchStats] = useState(null);
  const [loading, setLoading] = useState(true);
  const chartRef = useRef(null);
  const chartObj = useRef(null);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoading(true);
      try {
        // For the model: weighted-average YTD and 1Y across all holdings
        let totalWeight = 0, ytdWeighted = 0, oneYearWeighted = 0;
        let modelPath = null; // cumulative weighted return path
        let modelTs = null;
        for (const h of holdings) {
          const sym = h.Symbol;
          const target = parseFloat(h["Target Percent"]) || 0;
          if (!sym || sym.startsWith("$") || sym === "CASH" || target <= 0) continue;
          try {
            const [ytdData, oneYearData] = await Promise.all([
              fetchYahoo(sym, "ytd", "1d"),
              fetchYahoo(sym, "1y", "1d").catch(() => null),
            ]);
            const clean = ytdData.closes.filter(c => c !== null);
            if (clean.length < 2) continue;
            const ytdPct = ((clean[clean.length - 1] - clean[0]) / clean[0]) * 100;
            ytdWeighted += ytdPct * target;
            if (oneYearData) {
              const yc = oneYearData.closes.filter(c => c !== null);
              if (yc.length >= 2) oneYearWeighted += ((yc[yc.length - 1] - yc[0]) / yc[0]) * 100 * target;
            }
            totalWeight += target;
            // Build path on first valid ticker (use as backbone). Weight others into it.
            if (!modelPath) {
              const start = clean[0];
              modelPath = clean.map(c => ((c - start) / start) * 100 * (target / 100));
              modelTs = ytdData.ts.filter((_, i) => ytdData.closes[i] !== null);
            } else if (modelPath.length === clean.length) {
              const start = clean[0];
              for (let i = 0; i < clean.length; i++) {
                modelPath[i] += ((clean[i] - start) / start) * 100 * (target / 100);
              }
            }
          } catch (e) { /* skip */ }
        }
        if (totalWeight > 0) {
          if (!cancelled) setModelStats({ ytd: ytdWeighted / totalWeight * 100 / 100, oneYear: oneYearWeighted / totalWeight * 100 / 100, path: modelPath, ts: modelTs });
        }
        // For the benchmark
        try {
          const [bYtd, bOneYear] = await Promise.all([
            fetchYahoo(benchmark, "ytd", "1d"),
            fetchYahoo(benchmark, "1y", "1d").catch(() => null),
          ]);
          const cb = bYtd.closes.filter(c => c !== null);
          if (cb.length >= 2) {
            const ytdB = ((cb[cb.length - 1] - cb[0]) / cb[0]) * 100;
            let oneYearB = null;
            if (bOneYear) {
              const yc = bOneYear.closes.filter(c => c !== null);
              if (yc.length >= 2) oneYearB = ((yc[yc.length - 1] - yc[0]) / yc[0]) * 100;
            }
            const benchStart = cb[0];
            const benchPath = cb.map(c => ((c - benchStart) / benchStart) * 100);
            const benchTs = bYtd.ts.filter((_, i) => bYtd.closes[i] !== null);
            if (!cancelled) setBenchStats({ ytd: ytdB, oneYear: oneYearB, path: benchPath, ts: benchTs });
          }
        } catch (e) { /* skip */ }
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [holdings, benchmark]);

  // Comparison chart
  useEffect(() => {
    if (!chartRef.current || !modelStats?.path || !benchStats?.path) return;
    if (chartObj.current) { chartObj.current.destroy(); chartObj.current = null; }
    const labels = (benchStats.ts || []).map(t => new Date(t * 1000).toLocaleDateString());
    const benchmarkName = BENCHMARK_OPTIONS.find(b => b.sym === benchmark)?.name || benchmark;
    chartObj.current = new Chart(chartRef.current, {
      type: "line",
      data: {
        labels,
        datasets: [
          { label: "Model (weighted)", data: modelStats.path, borderColor: COLORS.primary, backgroundColor: "transparent", pointRadius: 0, borderWidth: 2.5, tension: 0.2 },
          { label: benchmarkName, data: benchStats.path, borderColor: COLORS.gold, backgroundColor: "transparent", pointRadius: 0, borderWidth: 2.5, borderDash: [4, 3], tension: 0.2 },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { ticks: { callback: (v) => v.toFixed(1) + "%" } } },
        plugins: { legend: { position: "bottom" }, tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toFixed(2)}%` } } },
      },
    });
    return () => { if (chartObj.current) chartObj.current.destroy(); };
  }, [modelStats, benchStats, benchmark]);

  const modelYtd = modelStats?.ytd;
  const benchYtd = benchStats?.ytd;
  const modelYear = modelStats?.oneYear;
  const benchYear = benchStats?.oneYear;

  return (
    <Card style={{ padding: 18, marginBottom: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 600 }}>Model vs Benchmark</div>
          <div style={{ fontSize: 11, color: COLORS.textMuted }}>Weighted by target % · YTD and rolling 12-month</div>
        </div>
        <select value={benchmark} onChange={e => onChangeBenchmark(e.target.value)}
          style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit", background: COLORS.surface }}>
          {BENCHMARK_OPTIONS.map(b => <option key={b.sym} value={b.sym}>{b.name}</option>)}
        </select>
      </div>

      {loading ? (
        <div style={{ padding: 32, textAlign: "center", color: COLORS.textMuted, fontSize: 13 }}>Loading model and benchmark data…</div>
      ) : (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 12, marginBottom: 14 }}>
            <div style={{ padding: 12, background: COLORS.primary + "11", borderRadius: 8, borderLeft: `3px solid ${COLORS.primary}` }}>
              <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>Model · YTD</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: modelYtd >= 0 ? COLORS.success : COLORS.danger, marginTop: 2 }}>{modelYtd != null ? (modelYtd >= 0 ? "+" : "") + modelYtd.toFixed(2) + "%" : "—"}</div>
            </div>
            <div style={{ padding: 12, background: COLORS.gold + "22", borderRadius: 8, borderLeft: `3px solid ${COLORS.gold}` }}>
              <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>Benchmark · YTD</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: benchYtd >= 0 ? COLORS.success : COLORS.danger, marginTop: 2 }}>{benchYtd != null ? (benchYtd >= 0 ? "+" : "") + benchYtd.toFixed(2) + "%" : "—"}</div>
            </div>
            <div style={{ padding: 12, background: COLORS.primary + "11", borderRadius: 8, borderLeft: `3px solid ${COLORS.primary}` }}>
              <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>Model · 1Y</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: modelYear >= 0 ? COLORS.success : COLORS.danger, marginTop: 2 }}>{modelYear != null ? (modelYear >= 0 ? "+" : "") + modelYear.toFixed(2) + "%" : "—"}</div>
            </div>
            <div style={{ padding: 12, background: COLORS.gold + "22", borderRadius: 8, borderLeft: `3px solid ${COLORS.gold}` }}>
              <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>Benchmark · 1Y</div>
              <div style={{ fontSize: 22, fontWeight: 800, color: benchYear >= 0 ? COLORS.success : COLORS.danger, marginTop: 2 }}>{benchYear != null ? (benchYear >= 0 ? "+" : "") + benchYear.toFixed(2) + "%" : "—"}</div>
            </div>
          </div>

          {modelStats?.path && benchStats?.path && (
            <div style={{ height: 260 }}><canvas ref={chartRef} /></div>
          )}

          <div style={{ marginTop: 10, fontSize: 11, color: COLORS.textDim, lineHeight: 1.5 }}>
            Model performance shown is calculated as the weighted average return of each holding by target %. Cash sleeves and zero-weight positions are excluded.
          </div>
        </>
      )}
    </Card>
  );
}

    if (next.optionsPositions) setOptionsPositions(next.optionsPositions);
    if (next.stockUniverse) setStockUniverse(next.stockUniverse);
    if (next.econCalendar) setEconCalendar(next.econCalendar);
    if (next.modelRatings) setModelRatings(next.modelRatings);
    if (next.refreshMinutes) setRefreshMinutes(next.refreshMinutes);
    try { window.storage.set("pfg-investments-v1", JSON.stringify(data)); } catch (e) { console.error(e); }
  }, [models, lastRebalanced, optionsPositions, stockUniverse, econCalendar, modelRatings, refreshMinutes]);

  // ---- Live Overview fetcher (runs on auto-refresh) ----
  // Strategy: batch-fetch all needed symbols in ONE request (or two if too many),
  // which reduces ~60 fetches to ~1-2. Massive reliability + speed improvement.
  const loadOverview = useCallback(async () => {
    // Gather every symbol we need
    const indexSyms = BENCHMARKS.map(b => b.symbol);
    const sectorSyms = SECTOR_ETFS.map(s => s.sym);
    const indicatorSyms = KEY_INDICATORS.map(i => i.sym);
    const universeSyms = stockUniverse.map(s => s.sym);
    const breadthSyms = BREADTH_SAMPLE;
    const allSyms = Array.from(new Set([
      ...indexSyms, ...sectorSyms, ...indicatorSyms, ...universeSyms, ...breadthSyms,
    ]));

    let batchData = {};
    let batchOk = true;
    try {
      // Split into chunks of 50 to be conservative with URL length
      const chunkSize = 50;
      for (let i = 0; i < allSyms.length; i += chunkSize) {
        const chunk = allSyms.slice(i, i + chunkSize);
        const chunkData = await fetchYahooBatch(chunk);
        Object.assign(batchData, chunkData);
      }
      if (Object.keys(batchData).length === 0) batchOk = false;
    } catch (e) {
      console.warn("[PFG] batch overview load failed:", e.message);
      batchOk = false;
    }

    // 1) Indices
    const quotes = {};
    for (const b of BENCHMARKS) {
      const q = batchData[b.symbol];
      if (q) quotes[b.symbol] = { last: q.last, prev: q.prev, change: q.change, changePct: q.pct };
    }
    setLiveQuotes(quotes);

    // 2) Sectors
    setSectorData(SECTOR_ETFS.map(s => {
      const q = batchData[s.sym];
      return q ? { ...s, pct: q.pct, last: q.last } : { ...s, pct: null };
    }));

    // 3) Indicators
    setIndicatorData(KEY_INDICATORS.map(ind => {
      const q = batchData[ind.sym];
      return q ? { ...ind, last: q.last, prev: q.prev, pct: q.pct } : { ...ind, last: null };
    }));

    // 4) Movers
    const moverRows = [];
    for (const stk of stockUniverse) {
      const q = batchData[stk.sym];
      if (q) moverRows.push({ ...stk, last: q.last, pct: q.pct });
    }
    moverRows.sort((a, b) => b.pct - a.pct);
    setMoversData({ gainers: moverRows.slice(0, 5), losers: moverRows.slice(-5).reverse() });

    // 5) Fear & Greed (separate fetch, different source)
    try {
      const fg = await fetchFearGreed();
      setFearGreed(fg);
    } catch (e) { /* graceful */ }

    // 6) Breadth
    let adv = 0, dec = 0, unch = 0, sampled = 0;
    for (const sym of BREADTH_SAMPLE) {
      const q = batchData[sym];
      if (!q) continue;
      sampled++;
      if (q.change > 0.01) adv++;
      else if (q.change < -0.01) dec++;
      else unch++;
    }
    setBreadthData({ advancers: adv, decliners: dec, unchanged: unch, total: sampled });

    // Diagnostics
    if (!batchOk || Object.keys(batchData).length === 0) {
      setFetchError(window.__pfgLastFetchError || "All market-data requests failed. CORS proxies may be unreachable. Try again in a minute.");
    } else if (Object.keys(batchData).length < allSyms.length / 2) {
      setFetchError(`Partial data: ${Object.keys(batchData).length} of ${allSyms.length} symbols returned.`);
    } else {
      setFetchError(null);
    }

    setLastUpdated(new Date());
  }, [stockUniverse]);

  // Trigger overview fetch on mount and whenever refreshTick changes
  useEffect(() => {
    if (page === "overview") loadOverview();

  // Auto-refresh timer
  useEffect(() => {

  // ---- Benchmarks loader ----
  const loadBenchmarks = useCallback(async () => {
    setLoading(true);
    const interval = range === "1d" ? "5m" : (range === "5d" ? "30m" : "1d");
    const rows = [];
    const datasets = [];
    for (const b of BENCHMARKS) {
      try {
        const { closes, ts, meta } = await fetchYahoo(b.symbol, range, interval);
        const clean = closes.filter(x => x !== null);
        if (clean.length < 2) continue;
        const first = clean[0], last = clean[clean.length - 1];
        const period = ((last - first) / first) * 100;
        const prev = meta.chartPreviousClose || meta.previousClose;
        const today = prev ? ((last - prev) / prev) * 100 : null;
        rows.push({ name: b.name, symbol: b.symbol, latest: last, today, period });
        datasets.push({
          label: b.name, flag: b.flag, borderColor: b.color,
          data: closes.map(c => c === null ? null : ((c - first) / first) * 100),
          timestamps: ts,
        });
      } catch (e) {
        rows.push({ name: b.name, symbol: b.symbol, error: true });
      }
    }
    // Model weighted return
    if (selectedModel && models[selectedModel]) {
      let totalW = 0, wPeriod = 0, wToday = 0, hasToday = true;
      for (const row of models[selectedModel]) {
        const sym = row.Symbol;
        const w = parseFloat(row["Target Percent"]) || 0;
        if (!sym || sym.startsWith("$")) continue;
        try {
          const { closes, meta } = await fetchYahoo(sym, range, interval);
          const clean = closes.filter(x => x !== null);
          if (clean.length < 2) continue;
          const period = (clean[clean.length - 1] - clean[0]) / clean[0] * 100;
          wPeriod += period * w;
          totalW += w;
          const prev = meta.chartPreviousClose || meta.previousClose;
          if (prev) wToday += ((clean[clean.length - 1] - prev) / prev) * 100 * w;
          else hasToday = false;
        } catch (e) {}
      }
      if (totalW > 0) {
        rows.push({
          name: `${selectedModel} (Model)`, symbol: "—",
          latest: null, today: hasToday ? wToday / totalW : null,
          period: wPeriod / totalW, isModel: true,
        });
      }
    }
    setBenchData({ rows, datasets });
    setLoading(false);
  }, [range, selectedModel, models]);

  useEffect(() => { loadBenchmarks(); }, [loadBenchmarks]);

        {page === "overview" && (

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 18 }}>
              <div>
                <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Market Overview</h2>
                <p style={{ color: COLORS.textMuted, fontSize: 13, margin: "4px 0 0" }}>

                </span>
                <select value={refreshMinutes} onChange={e => { const m = parseInt(e.target.value); setRefreshMinutes(m); save({ refreshMinutes: m }); }}
                  style={{ padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.border}`, fontSize: 12, fontFamily: "inherit" }}>
                  <option value="1">Every 1 min</option>

                      {breadthData.advancers > breadthData.decliners ? <span style={{ color: COLORS.success }}>Positive breadth</span> :

              {/* Economic Calendar */}

                {(() => {

                  const horizon = new Date(today); horizon.setDate(horizon.getDate() + 14);
                  const upcoming = econCalendar
                    .filter(e => { const d = new Date(e.date + "T00:00:00"); return d >= today && d <= horizon; })
                    .sort((a, b) => a.date.localeCompare(b.date))
                    .slice(0, 8);
                  if (upcoming.length === 0) return <div style={{ fontSize: 13, color: COLORS.textMuted, padding: 12 }}>No events in the next 14 days.</div>;

                    <div style={{ maxHeight: 260, overflowY: "auto" }}>

                          </div>
                        );
                      })}
                    </div>
                  );
                })()}
              </Card>
            </div>
            </>
            )}
          </div>

  );
}

function FearGreedCard({ data }) {
  // Mapping: 0–25 extreme fear, 26–45 fear, 46–55 neutral, 56–75 greed, 76–100 extreme greed
  const ratingColor = (rating) => {
    const r = (rating || "").toLowerCase();
    if (r.includes("extreme fear")) return "#991B1B";
    if (r.includes("fear")) return "#DC2626";
    if (r.includes("neutral")) return "#D97706";
    if (r.includes("extreme greed")) return "#15803D";
    if (r.includes("greed")) return "#16A34A";
    return COLORS.textMuted;
  };
  const score = data?.score;
  const angle = score != null ? -90 + (score / 100) * 180 : -90;

  // Historical chart
  const histCanvasRef = useRef(null);
  const histChartRef = useRef(null);
  useEffect(() => {
    if (!data?.historical?.length || !histCanvasRef.current) return;
    if (histChartRef.current) { histChartRef.current.destroy(); histChartRef.current = null; }
    const hist = data.historical;
    // Take last 6 months — denser data is easier to read on a small chart
    const sixMonthMs = 183 * 24 * 60 * 60 * 1000;
    const cutoff = Date.now() - sixMonthMs;
    const recent = hist.filter(h => h.ts >= cutoff).sort((a, b) => a.ts - b.ts);
    if (recent.length < 2) return;

    const ratingFromScore = (s) => {
      if (s <= 25) return { label: "Extreme Fear", color: "#991B1B" };
      if (s <= 45) return { label: "Fear", color: "#DC2626" };
      if (s <= 55) return { label: "Neutral", color: "#D97706" };
      if (s <= 75) return { label: "Greed", color: "#16A34A" };
      return { label: "Extreme Greed", color: "#15803D" };
    };

    histChartRef.current = new Chart(histCanvasRef.current, {
      type: "line",
      data: {
        labels: recent.map(h => new Date(h.ts)),
        datasets: [{
          label: "F&G Score",
          data: recent.map(h => h.score),
          borderColor: "#D97706",
          backgroundColor: "rgba(217,119,6,0.1)",
          fill: true,
          pointRadius: 0,
          pointHoverRadius: 5,
          pointHoverBackgroundColor: "#D97706",
          borderWidth: 2,
          tension: 0.3,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        scales: {
          y: { min: 0, max: 100, ticks: { stepSize: 25, callback: (v) => v } },
          x: {
            type: "time",
            time: { unit: "month", displayFormats: { month: "MMM yyyy" } },
            ticks: { maxTicksLimit: 6, autoSkip: true },
          },
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: (ctxs) => {
                const ts = ctxs[0].parsed.x;
                return new Date(ts).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
              },
              label: (ctx) => {
                const score = ctx.parsed.y;
                const rating = ratingFromScore(score);
                return [`Score: ${score}`, `Rating: ${rating.label}`];
              },
            },
          },
        },
      },
    });
    return () => { if (histChartRef.current) histChartRef.current.destroy(); };
  }, [data]);

  return (
    <Card style={{ padding: 18 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>CNN Fear &amp; Greed Index</div>
        <a href="https://edition.cnn.com/markets/fear-and-greed" target="_blank" rel="noopener" style={{ fontSize: 11, color: COLORS.primary, textDecoration: "none" }}>cnn.com ↗</a>
      </div>
      {data == null ? (
        <div style={{ padding: 24, textAlign: "center", color: COLORS.textMuted, fontSize: 13 }}>
          Loading… <div style={{ fontSize: 11, marginTop: 6, color: COLORS.textDim }}>If this stays empty, the data source may be temporarily unreachable.</div>
        </div>
      ) : (
        <>
          <div style={{ display: "flex", gap: 16, alignItems: "center", marginBottom: 14 }}>
            {/* Half-circle gauge */}
            <div style={{ position: "relative", width: 160, height: 90, flexShrink: 0 }}>
              <svg width="160" height="90" viewBox="0 0 160 90">
                <defs>
                  <linearGradient id="fgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stopColor="#991B1B" />
                    <stop offset="30%" stopColor="#DC2626" />
                    <stop offset="50%" stopColor="#D97706" />
                    <stop offset="70%" stopColor="#16A34A" />
                    <stop offset="100%" stopColor="#15803D" />
                  </linearGradient>
                </defs>
                <path d="M 15 85 A 65 65 0 0 1 145 85" fill="none" stroke="url(#fgGrad)" strokeWidth="14" strokeLinecap="round" />
                {/* Needle */}
                <g transform={`translate(80,85) rotate(${angle})`}>
                  <line x1="0" y1="0" x2="0" y2="-58" stroke={COLORS.text} strokeWidth="3" strokeLinecap="round" />
                  <circle cx="0" cy="0" r="5" fill={COLORS.text} />
                </g>
              </svg>
              <div style={{ position: "absolute", left: 0, right: 0, top: 30, textAlign: "center" }}>
                <div style={{ fontSize: 28, fontWeight: 800, color: ratingColor(data.rating), lineHeight: 1 }}>{score}</div>
              </div>
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 16, fontWeight: 700, color: ratingColor(data.rating), textTransform: "capitalize", marginBottom: 8 }}>{data.rating}</div>
              <div style={{ fontSize: 11, color: COLORS.textMuted, lineHeight: 1.6 }}>
                <div>Prev close: <b style={{ color: COLORS.text }}>{data.previousClose}</b></div>
                <div>1 week ago: <b style={{ color: COLORS.text }}>{data.previousWeek}</b></div>
                <div>1 month ago: <b style={{ color: COLORS.text }}>{data.previousMonth}</b></div>
                <div>1 year ago: <b style={{ color: COLORS.text }}>{data.previousYear}</b></div>
              </div>
            </div>
          </div>
          {/* 1Y rolling chart */}
          {data.historical && data.historical.length > 0 && (
            <div>
              <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600, marginBottom: 4 }}>6-Month Trend</div>
              <div style={{ height: 140 }}><canvas ref={histCanvasRef} /></div>
            </div>
          )}
        </>
      )}
    </Card>
  );
}
