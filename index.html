// SECTOR DONUT
// Compact SVG donut chart showing the Stock Universe's sector breakdown.
// Uses SECTOR_META colors. Empty/Unsectored entries grouped at the end.
// ============================================================
function SectorDonut({ universe }) {
  if (!universe || universe.length === 0) return null;

  // Aggregate counts per sector
  const counts = {};
  universe.forEach(s => {
    const key = s.sector || "Unsectored";
    counts[key] = (counts[key] || 0) + 1;
  });
  const total = universe.length;
  const entries = Object.entries(counts)
    .map(([sector, count]) => ({ sector, count, pct: count / total }))
    .sort((a, b) => b.count - a.count);

  // If only one sector (or one sector + unsectored), the donut isn't informative
  if (entries.length <= 1) return null;

  // Build SVG arcs. Donut: outer r=70, inner r=42, viewBox 160x160 centered.
  const cx = 80, cy = 80, rOuter = 70, rInner = 42;
  const arc = (startAngle, endAngle) => {
    const sx = cx + rOuter * Math.cos(startAngle);
    const sy = cy + rOuter * Math.sin(startAngle);
    const ex = cx + rOuter * Math.cos(endAngle);
    const ey = cy + rOuter * Math.sin(endAngle);
    const sxi = cx + rInner * Math.cos(endAngle);
    const syi = cy + rInner * Math.sin(endAngle);
    const exi = cx + rInner * Math.cos(startAngle);
    const eyi = cy + rInner * Math.sin(startAngle);
    const largeArc = (endAngle - startAngle) > Math.PI ? 1 : 0;
    return `M ${sx} ${sy} A ${rOuter} ${rOuter} 0 ${largeArc} 1 ${ex} ${ey} L ${sxi} ${syi} A ${rInner} ${rInner} 0 ${largeArc} 0 ${exi} ${eyi} Z`;
  };

  let cursor = -Math.PI / 2;   // start at 12 o'clock
  const slices = entries.map(e => {
    const angle = e.pct * 2 * Math.PI;
    const meta = e.sector === "Unsectored" ? { color: COLORS.textDim } : sectorMeta(e.sector);
    const path = arc(cursor, cursor + angle);
    const slice = { ...e, path, color: meta.color };
    cursor += angle;
    return slice;
  });

  return (
    <Card style={{ padding: 16, marginBottom: 16 }}>
      <div style={{ display: "flex", gap: 18, alignItems: "center", flexWrap: "wrap" }}>
        <div style={{ flexShrink: 0 }}>
          <svg width="160" height="160" viewBox="0 0 160 160">
            {slices.map((s, i) => (
              <path key={i} d={s.path} fill={s.color} stroke="white" strokeWidth="1.5" />
            ))}
            <text x={cx} y={cy - 4} textAnchor="middle" style={{ fontSize: 24, fontWeight: 800, fill: COLORS.text }}>{total}</text>
            <text x={cx} y={cy + 14} textAnchor="middle" style={{ fontSize: 10, fill: COLORS.textMuted, letterSpacing: 1 }}>TICKERS</text>
          </svg>
        </div>
        <div style={{ flex: 1, minWidth: 240 }}>
          <div style={{ fontSize: 10, color: COLORS.primary, textTransform: "uppercase", letterSpacing: 2, fontWeight: 700, marginBottom: 8 }}>📊 Universe by Sector</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 6 }}>
            {slices.map((s, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
                <span style={{ width: 10, height: 10, borderRadius: 2, background: s.color, flexShrink: 0 }} />
                <span style={{ flex: 1, color: COLORS.text }}>{s.sector}</span>
                <span style={{ color: COLORS.textMuted, fontWeight: 700 }}>{s.count}</span>
                <span style={{ color: COLORS.textDim, fontSize: 11, minWidth: 38, textAlign: "right" }}>{(s.pct * 100).toFixed(0)}%</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </Card>
  );
}

// ============================================================
// COMPARE TICKERS
// Side-by-side comparison of two symbols. Pulls fundamentals via
// fetchYahooQuoteSummary and renders a stat grid that highlights the
// stronger value per row in green and the weaker in dim color.
// "Stronger" varies by metric: higher revenue growth = better,
// lower P/E (when positive) = better, etc.
// ============================================================
function CompareTickers({ universe }) {
  const [open, setOpen] = useState(false);
  const [symA, setSymA] = useState("");
  const [symB, setSymB] = useState("");
  const [dataA, setDataA] = useState(null);
  const [dataB, setDataB] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const universeOptions = (universe || []).map(u => ({ value: u.sym, label: `${u.sym} — ${u.name}` }));

  const runCompare = async () => {
    setError("");
    if (!symA || !symB) { setError("Pick two tickers to compare."); return; }
    if (symA === symB) { setError("Pick two different tickers."); return; }
    setLoading(true); setDataA(null); setDataB(null);
    try {
      const [a, b] = await Promise.all([
        fetchYahooQuoteSummary(symA),
        fetchYahooQuoteSummary(symB),
      ]);
      setDataA(a); setDataB(b);
    } catch (e) {
      setError("Couldn't load one or both tickers: " + e.message);
    }
    setLoading(false);
  };

  // Compare two numbers given a "higher is better" preference.
  // Returns: { winnerA, winnerB } booleans (false/false if tie or null).
  const compareCell = (a, b, higherBetter) => {
    if (a == null || b == null || a === b) return { winnerA: false, winnerB: false };
    if (higherBetter) return { winnerA: a > b, winnerB: b > a };
    return { winnerA: a < b, winnerB: b < a };
  };

  const fmtBig = (n) => n == null ? "—" : n >= 1e12 ? "$" + (n / 1e12).toFixed(2) + "T" : n >= 1e9 ? "$" + (n / 1e9).toFixed(2) + "B" : n >= 1e6 ? "$" + (n / 1e6).toFixed(2) + "M" : "$" + Number(n).toFixed(0);
  const fmtPct1 = (v) => v == null ? "—" : (v >= 0 ? "+" : "") + (v * 100).toFixed(1) + "%";
  const fmtNum = (n, dec = 2) => n == null ? "—" : Number(n).toFixed(dec);

  // Define metric rows: { label, value(a/b), higherBetter, formatter }
  const metricRows = (dataA && dataB) ? [
    { label: "Last Price",        a: dataA.last,            b: dataB.last,            higherBetter: null,  fmt: v => v == null ? "—" : "$" + Number(v).toFixed(2) },
    { label: "Market Cap",        a: dataA.marketCap,       b: dataB.marketCap,       higherBetter: null,  fmt: fmtBig },
    { label: "P/E (TTM)",         a: dataA.pe,              b: dataB.pe,              higherBetter: false, fmt: v => fmtNum(v, 1) },
    { label: "Forward P/E",       a: dataA.forwardPE,       b: dataB.forwardPE,       higherBetter: false, fmt: v => fmtNum(v, 1) },
    { label: "PEG Ratio",         a: dataA.peg,             b: dataB.peg,             higherBetter: false, fmt: v => fmtNum(v, 2) },
    { label: "EPS (TTM)",         a: dataA.eps,             b: dataB.eps,             higherBetter: true,  fmt: v => v == null ? "—" : "$" + Number(v).toFixed(2) },
    { label: "Revenue (TTM)",     a: dataA.revenue,         b: dataB.revenue,         higherBetter: true,  fmt: fmtBig },
    { label: "Revenue Growth YoY", a: dataA.revenueGrowth,  b: dataB.revenueGrowth,   higherBetter: true,  fmt: fmtPct1 },
    { label: "Earnings Growth YoY", a: dataA.earningsGrowth, b: dataB.earningsGrowth, higherBetter: true,  fmt: fmtPct1 },
    { label: "Profit Margin",     a: dataA.profitMargin,    b: dataB.profitMargin,    higherBetter: true,  fmt: fmtPct1 },
    { label: "Operating Margin",  a: dataA.operatingMargin, b: dataB.operatingMargin, higherBetter: true,  fmt: fmtPct1 },
    { label: "Return on Equity",  a: dataA.returnOnEquity,  b: dataB.returnOnEquity,  higherBetter: true,  fmt: fmtPct1 },
    { label: "Debt / Equity",     a: dataA.debtToEquity,    b: dataB.debtToEquity,    higherBetter: false, fmt: v => fmtNum(v, 2) },
    { label: "Dividend Yield",    a: dataA.dividendYield,   b: dataB.dividendYield,   higherBetter: true,  fmt: fmtPct1 },
    { label: "Beta (5Y)",         a: dataA.beta,            b: dataB.beta,            higherBetter: null,  fmt: v => fmtNum(v, 2) },
    { label: "52W High",          a: dataA.fiftyTwoWeekHigh, b: dataB.fiftyTwoWeekHigh, higherBetter: null, fmt: v => v == null ? "—" : "$" + Number(v).toFixed(2) },
    { label: "52W Low",           a: dataA.fiftyTwoWeekLow,  b: dataB.fiftyTwoWeekLow,  higherBetter: null, fmt: v => v == null ? "—" : "$" + Number(v).toFixed(2) },
  ] : [];

  const aName = dataA?.name || symA;
  const bName = dataB?.name || symB;

  return (
    <Card style={{ padding: 0, marginBottom: 16, overflow: "hidden" }}>
      <div style={{ padding: "14px 18px", borderBottom: open ? `1px solid ${COLORS.borderLight}` : "none", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", background: open ? `${COLORS.primary}08` : "transparent" }}
        onClick={() => setOpen(!open)}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.text }}>
            ⚖️ Compare Two Tickers
          </div>
          <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 2 }}>
            Side-by-side fundamentals. Pick any two from your universe.
          </div>
        </div>
        <span style={{ fontSize: 16, color: COLORS.textMuted, transform: open ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.15s" }}>▾</span>
      </div>

      {open && (
        <div style={{ padding: 18 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: 10, alignItems: "end", marginBottom: 12 }}>
            <Select label="Ticker A" value={symA} onChange={setSymA} options={[{ value: "", label: "Select…" }, ...universeOptions]} />
            <Select label="Ticker B" value={symB} onChange={setSymB} options={[{ value: "", label: "Select…" }, ...universeOptions]} />
            <Button onClick={runCompare} disabled={loading || !symA || !symB} style={{ marginBottom: 12 }}>
              {loading ? <><Spinner size={12} /> <span style={{ marginLeft: 6 }}>Comparing…</span></> : "Compare →"}
            </Button>
          </div>

          {loading && (
            <div style={{ padding: 16, background: COLORS.bg, borderRadius: 8 }}>
              <LoadingBar label={`Fetching fundamentals for ${symA} and ${symB}…`} height={5} />
            </div>
          )}

          {error && (
            <div style={{ padding: 12, background: COLORS.danger + "15", color: COLORS.danger, borderRadius: 8, fontSize: 13 }}>{error}</div>
          )}

          {dataA && dataB && !loading && (
            <div>
              {/* Header row with both names */}
              <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr 1fr", gap: 0, padding: "10px 12px", background: `linear-gradient(135deg, ${COLORS.primary}10, ${COLORS.surface})`, borderRadius: 8, marginBottom: 8 }}>
                <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700 }}>Metric</div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 14, fontWeight: 800, color: COLORS.primary }}>{symA}</div>
                  <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={aName}>{aName}</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 14, fontWeight: 800, color: COLORS.primary }}>{symB}</div>
                  <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={bName}>{bName}</div>
                </div>
              </div>

              {/* Metric rows with winner highlighting */}
              <div style={{ display: "flex", flexDirection: "column" }}>
                {metricRows.map((m, i) => {
                  const cmp = m.higherBetter == null
                    ? { winnerA: false, winnerB: false }
                    : compareCell(m.a, m.b, m.higherBetter);
                  return (
                    <div key={i} style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr 1fr", gap: 0, padding: "8px 12px", borderTop: i === 0 ? "none" : `1px solid ${COLORS.borderLight}`, alignItems: "center" }}>
                      <div style={{ fontSize: 12, color: COLORS.textMuted }}>{m.label}</div>
                      <div style={{ textAlign: "right", fontSize: 13, fontWeight: cmp.winnerA ? 800 : 500,
                          color: cmp.winnerA ? COLORS.success : (cmp.winnerB ? COLORS.textDim : COLORS.text) }}>
                        {m.fmt(m.a)}{cmp.winnerA && <span style={{ marginLeft: 6, fontSize: 11 }}>★</span>}
                      </div>
                      <div style={{ textAlign: "right", fontSize: 13, fontWeight: cmp.winnerB ? 800 : 500,
                          color: cmp.winnerB ? COLORS.success : (cmp.winnerA ? COLORS.textDim : COLORS.text) }}>
                        {m.fmt(m.b)}{cmp.winnerB && <span style={{ marginLeft: 6, fontSize: 11 }}>★</span>}
                      </div>
                    </div>
                  );
                })}
              </div>

              <div style={{ marginTop: 12, padding: "8px 12px", background: COLORS.bg, borderRadius: 6, fontSize: 11, color: COLORS.textDim, lineHeight: 1.5 }}>
                ★ marks the more favorable value per row. P/E and PEG: lower is generally better (avoiding overpriced).
                Margins, revenue growth, EPS, ROE: higher is better. Beta and prices have no "winner."
                This is a snapshot, not investment advice — review the full Stock Detail modal for context.
              </div>
            </div>
          )}
        </div>
      )}
    </Card>
  );
}

// ============================================================
// SORT HEAD — clickable column header for sortable tables
// Small helper used by StockDashboard. Renders text + a sort direction indicator
// (▲ for asc, ▼ for desc). Hides the indicator when the column isn't the active
// sort column, so the header stays visually calm.
// ============================================================
function SortHead({ col, label, align, sortCol, sortDir, onClick }) {
  const active = sortCol === col;
  return (
    <button type="button" onClick={() => onClick(col)}
      style={{
        width: "100%",
        display: "flex",
        alignItems: "center",
        gap: 4,
        justifyContent: align === "right" ? "flex-end" : "flex-start",
        padding: "10px 12px",
        border: "none",
        background: active ? COLORS.primary + "0D" : "transparent",
        color: active ? COLORS.primary : COLORS.text,
        fontWeight: active ? 700 : 600,
        fontSize: 13,
        cursor: "pointer",
        fontFamily: "inherit",
        transition: "background 0.15s",
      }}
      onMouseEnter={e => { if (!active) e.currentTarget.style.background = COLORS.bg; }}
      onMouseLeave={e => { if (!active) e.currentTarget.style.background = "transparent"; }}>
      {label}
      <span style={{ fontSize: 9, opacity: active ? 1 : 0.25, marginLeft: 2 }}>
        {active ? (sortDir === "asc" ? "▲" : "▼") : "▲"}
      </span>
    </button>
  );
}

function StockDashboard({ universe, setUniverse, canEdit, refreshMinutes }) {
  const [quotes, setQuotes] = useState({});            // { sym: { last, prev, pct, vol, dayHigh, dayLow, yearHigh, yearLow } }
  const [loading, setLoading] = useState(false);
  const [addForm, setAddForm] = useState({ sym: "", name: "", sector: "" });
  const [detailSymbol, setDetailSymbol] = useState(null);   // clicking a row opens this
  const [search, setSearch] = useState("");   // free-text filter by symbol or name
  const [sectorFilter, setSectorFilter] = useState(null);   // null = all sectors
  // Timestamp of last successful refresh, used to compute countdown to next auto-refresh.
  const [lastRefresh, setLastRefresh] = useState(null);
  const [now, setNow] = useState(Date.now());   // ticks every second for the countdown
  // Bulk paste import — opens modal with textarea + optional sector applied to all
  const [bulkOpen, setBulkOpen] = useState(false);
  const [bulkText, setBulkText] = useState("");
  const [bulkSector, setBulkSector] = useState("");
  // Sorting — click any column header. First click sets asc; second click reverses. null = default order.
  const [sortCol, setSortCol] = useState(null);   // "sym" | "name" | "sector" | "last" | "pct" | "vol"
  const [sortDir, setSortDir] = useState("asc");
  const toggleSort = (col) => {
    if (sortCol === col) setSortDir(sortDir === "asc" ? "desc" : "asc");
    else { setSortCol(col); setSortDir(col === "pct" || col === "vol" || col === "last" ? "desc" : "asc"); }
  };
  // Build sort comparator from current sort state
  const applySort = (rows) => {
    if (!sortCol) return rows;
    const dir = sortDir === "asc" ? 1 : -1;
    const numCols = new Set(["last", "pct", "vol", "dayHigh", "dayLow", "yearHigh", "yearLow"]);
    return rows.slice().sort((a, b) => {
      let va, vb;
      if (sortCol === "sym" || sortCol === "name" || sortCol === "sector") {
        va = (a[sortCol] || "").toString().toLowerCase();
        vb = (b[sortCol] || "").toString().toLowerCase();
        if (va < vb) return -1 * dir;
        if (va > vb) return 1 * dir;
        return 0;
      }
      // Numeric — pull from quotes; fall back to -Infinity so undefined always sorts last regardless of direction
      const qa = quotes[a.sym] || {};
      const qb = quotes[b.sym] || {};
      va = qa[sortCol];
      vb = qb[sortCol];
      const aMissing = va === undefined || va === null || isNaN(va);
      const bMissing = vb === undefined || vb === null || isNaN(vb);
      if (aMissing && bMissing) return 0;
      if (aMissing) return 1;   // missing values always drop to the end
      if (bMissing) return -1;
      return (va - vb) * dir;
    });
  };
  // Bulk selection — set of symbols selected via row checkbox. Owner-only UI.
  const [selectedSyms, setSelectedSyms] = useState(() => new Set());
  const toggleSelected = (sym) => {
    setSelectedSyms(prev => {
      const next = new Set(prev);
      if (next.has(sym)) next.delete(sym); else next.add(sym);
      return next;
    });
  };
  const clearSelection = () => setSelectedSyms(new Set());
  // Bulk-assign sector to all selected tickers
  const bulkAssignSector = (newSector) => {
    if (selectedSyms.size === 0) return;
    setUniverse(universe.map(s => selectedSyms.has(s.sym) ? { ...s, sector: newSector || undefined } : s));
  };
  // Bulk-remove all selected tickers
  const bulkRemoveSelected = () => {
    if (selectedSyms.size === 0) return;
    const n = selectedSyms.size;
    if (!confirm(`Remove ${n} selected ticker${n === 1 ? "" : "s"} from the universe? This can't be undone.`)) return;
    setUniverse(universe.filter(s => !selectedSyms.has(s.sym)));
    clearSelection();
  };

  const refresh = useCallback(async () => {
    setLoading(true);
    try {
      const syms = universe.map(u => u.sym);
      const batch = await fetchYahooBatch(syms);
      setQuotes(batch);
      setLastRefresh(Date.now());
    } catch (e) {
      console.warn("[PFG] Stock dashboard fetch failed:", e.message);
    }
    setLoading(false);
  }, [universe]);

  useEffect(() => { refresh(); }, [refresh]);

  // Auto-refresh timer — fires refresh() every refreshMinutes minutes.
  // Uses the same setting as the Overview tab so both stay in sync.
  useEffect(() => {
    const mins = Math.max(1, refreshMinutes || 5);
    const id = setInterval(() => refresh(), mins * 60 * 1000);
    return () => clearInterval(id);
  }, [refreshMinutes, refresh]);

  // Countdown ticker — updates every second to display "next refresh in Xm Ys"
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);

  const addStock = () => {
    const sym = addForm.sym.trim().toUpperCase();
    if (!sym) { alert("Symbol required"); return; }
    if (universe.find(u => u.sym === sym)) { alert("Already in universe"); return; }
    setUniverse([...universe, { sym, name: addForm.name.trim() || sym, sector: addForm.sector || undefined }]);
    setAddForm({ sym: "", name: "", sector: "" });
    setTimeout(refresh, 100);
  };
  // Bulk paste import — accepts comma OR newline OR space separated tickers, optionally
  // applies a chosen sector to every imported entry. Dedupes against existing universe.
  const bulkAdd = () => {
    const raw = bulkText
      .split(/[\s,]+/)
      .map(s => s.trim().toUpperCase())
      .filter(Boolean);
    if (raw.length === 0) { alert("Paste at least one ticker symbol."); return; }
    // Dedupe input + filter against existing universe
    const existing = new Set(universe.map(u => u.sym));
    const seen = new Set();
    const toAdd = [];
    let skipped = 0;
    raw.forEach(sym => {
      if (seen.has(sym) || existing.has(sym)) { skipped++; return; }
      seen.add(sym);
      toAdd.push({ sym, name: sym, sector: bulkSector || undefined });
    });
    if (toAdd.length === 0) {
      alert(`No new tickers to add. ${skipped} duplicate${skipped === 1 ? "" : "s"} or already-present skipped.`);
      return;
    }
    setUniverse([...universe, ...toAdd]);
    setBulkOpen(false);
    setBulkText("");
    setBulkSector("");
    setTimeout(refresh, 100);
    setTimeout(() => {
      const msg = `Added ${toAdd.length} new ticker${toAdd.length === 1 ? "" : "s"}${skipped > 0 ? ` · skipped ${skipped} duplicate${skipped === 1 ? "" : "s"}` : ""}`;
      if (window.pfgToast) window.pfgToast(msg, "success");
      else alert(msg);
    }, 50);
  };
  // Set / clear / change the sector for an existing universe entry.
  const updateSector = (sym, newSector) => {
    setUniverse(universe.map(s => s.sym === sym ? { ...s, sector: newSector || undefined } : s));
  };
  const removeStock = (sym) => {
    if (!confirm("Remove " + sym + " from the universe?")) return;
    setUniverse(universe.filter(u => u.sym !== sym));
  };
  const resetUniverse = () => {
    if (!confirm("Reset to default top 10 S&P 500 holdings? Any custom symbols will be removed.")) return;
    setUniverse([...DEFAULT_STOCK_UNIVERSE]);
  };

  const fmtVol = (n) => {
    if (n == null) return "—";
    if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
    if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
    if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
    return n.toString();
  };

  return (
    <div>
      {/* Today's Pulse — universe-wide sentiment computed from loaded quotes.
          Only renders when we have quote data (skipped during initial load / errors). */}
      {(() => {
        const withQuotes = universe.filter(s => quotes[s.sym]?.pct != null);
        if (withQuotes.length === 0) return null;
        const enriched = withQuotes.map(s => ({ sym: s.sym, name: s.name, sector: s.sector, pct: quotes[s.sym].pct }));
        const gainers = enriched.filter(e => e.pct > 0);
        const losers  = enriched.filter(e => e.pct < 0);
        const flat    = enriched.filter(e => e.pct === 0);
        const sorted  = [...enriched].sort((a, b) => b.pct - a.pct);
        const bestMover  = sorted[0];
        const worstMover = sorted[sorted.length - 1];
        const avgMove    = enriched.reduce((s, e) => s + e.pct, 0) / enriched.length;
        // Sector averages
        const sectorAgg = {};
        enriched.forEach(e => {
          const key = e.sector || "Unsectored";
          if (!sectorAgg[key]) sectorAgg[key] = { sum: 0, n: 0 };
          sectorAgg[key].sum += e.pct; sectorAgg[key].n += 1;
        });
        const sectorAvgs = Object.entries(sectorAgg).map(([sector, v]) => ({ sector, avg: v.sum / v.n, n: v.n })).sort((a, b) => b.avg - a.avg);
        const bestSector  = sectorAvgs[0];
        const worstSector = sectorAvgs[sectorAvgs.length - 1];
        const pctColor = (v) => v > 0 ? COLORS.success : v < 0 ? COLORS.danger : COLORS.textMuted;
        const fmtPct = (v) => (v > 0 ? "+" : "") + v.toFixed(2) + "%";
        const totalCounted = gainers.length + losers.length + flat.length;
        const gPct = (gainers.length / totalCounted) * 100;
        const rPct = (losers.length  / totalCounted) * 100;
        return (
          <Card style={{ padding: 16, marginBottom: 16, background: `linear-gradient(135deg, ${COLORS.bg} 0%, ${COLORS.surface} 100%)`, borderLeft: `3px solid ${avgMove >= 0 ? COLORS.success : COLORS.danger}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
              <div>
                <div style={{ fontSize: 10, color: COLORS.primary, textTransform: "uppercase", letterSpacing: 2, fontWeight: 700 }}>⚡ Today's Pulse</div>
                <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 2 }}>Universe-wide sentiment · {enriched.length} of {universe.length} tickers reporting</div>
              </div>
              <div style={{ fontSize: 12, color: COLORS.textMuted }}>
                Avg move: <b style={{ color: pctColor(avgMove) }}>{fmtPct(avgMove)}</b>
              </div>
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ display: "flex", height: 20, borderRadius: 4, overflow: "hidden", background: COLORS.borderLight }}>
                {gPct > 0 && <div style={{ width: gPct + "%", background: COLORS.success, display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontSize: 10, fontWeight: 700 }}>{gainers.length} ▲</div>}
                {rPct > 0 && <div style={{ width: rPct + "%", background: COLORS.danger,  display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontSize: 10, fontWeight: 700 }}>{losers.length} ▼</div>}
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: COLORS.textMuted, marginTop: 2 }}>
                <span>{Math.round(gPct)}% green</span>
                {flat.length > 0 && <span>{flat.length} flat</span>}
                <span>{Math.round(rPct)}% red</span>
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 10 }}>
              {bestMover && (
                <div style={{ padding: "8px 10px", background: COLORS.surface, borderRadius: 6, borderLeft: `2px solid ${COLORS.success}` }}>
                  <div style={{ fontSize: 9, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 0.5, fontWeight: 700 }}>Top Mover</div>
                  <div style={{ fontSize: 14, fontWeight: 800, color: COLORS.text, marginTop: 2 }}>{bestMover.sym} <span style={{ color: COLORS.success, marginLeft: 4 }}>{fmtPct(bestMover.pct)}</span></div>
                  <div style={{ fontSize: 10, color: COLORS.textDim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{bestMover.name}</div>
                </div>
              )}
              {worstMover && worstMover.sym !== bestMover?.sym && (
                <div style={{ padding: "8px 10px", background: COLORS.surface, borderRadius: 6, borderLeft: `2px solid ${COLORS.danger}` }}>
                  <div style={{ fontSize: 9, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 0.5, fontWeight: 700 }}>Top Decliner</div>
                  <div style={{ fontSize: 14, fontWeight: 800, color: COLORS.text, marginTop: 2 }}>{worstMover.sym} <span style={{ color: COLORS.danger, marginLeft: 4 }}>{fmtPct(worstMover.pct)}</span></div>
                  <div style={{ fontSize: 10, color: COLORS.textDim, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{worstMover.name}</div>
                </div>
              )}
              {bestSector && sectorAvgs.length > 1 && (
                <div style={{ padding: "8px 10px", background: COLORS.surface, borderRadius: 6, borderLeft: `2px solid ${sectorMeta(bestSector.sector).color}` }}>
                  <div style={{ fontSize: 9, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 0.5, fontWeight: 700 }}>Best Sector</div>
                  <div style={{ fontSize: 13, fontWeight: 800, color: COLORS.text, marginTop: 2 }}>{bestSector.sector} <span style={{ color: pctColor(bestSector.avg), marginLeft: 4 }}>{fmtPct(bestSector.avg)}</span></div>
                  <div style={{ fontSize: 10, color: COLORS.textDim }}>Avg across {bestSector.n} ticker{bestSector.n === 1 ? "" : "s"}</div>
                </div>
              )}
              {worstSector && sectorAvgs.length > 1 && worstSector.sector !== bestSector?.sector && (
                <div style={{ padding: "8px 10px", background: COLORS.surface, borderRadius: 6, borderLeft: `2px solid ${sectorMeta(worstSector.sector).color}` }}>
                  <div style={{ fontSize: 9, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 0.5, fontWeight: 700 }}>Worst Sector</div>
                  <div style={{ fontSize: 13, fontWeight: 800, color: COLORS.text, marginTop: 2 }}>{worstSector.sector} <span style={{ color: pctColor(worstSector.avg), marginLeft: 4 }}>{fmtPct(worstSector.avg)}</span></div>
                  <div style={{ fontSize: 10, color: COLORS.textDim }}>Avg across {worstSector.n} ticker{worstSector.n === 1 ? "" : "s"}</div>
                </div>
              )}
            </div>
          </Card>
        );
      })()}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 18 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Stock Dashboard</h2>
          <p style={{ color: COLORS.textMuted, fontSize: 13, margin: "4px 0 0" }}>
            Live quotes for the firm's monitored universe. {canEdit ? "Owner-only edits — Matt & Alex can add/remove symbols." : "View-only — contact Matt or Alex to add symbols."}
          </p>
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
          <div style={{ position: "relative" }}>
            <input
              type="text"
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="Search symbol or name…"
              style={{ padding: "7px 10px 7px 30px", borderRadius: 8, border: `1px solid ${COLORS.border}`, fontSize: 12, fontFamily: "inherit", width: 220, background: COLORS.surface }}
            />
            <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: COLORS.textDim, fontSize: 12, pointerEvents: "none" }}>🔍</span>
            {search && (
              <button type="button" onClick={() => setSearch("")} title="Clear search"
                style={{ position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: COLORS.textMuted, cursor: "pointer", fontSize: 14, padding: "0 4px", fontFamily: "inherit" }}>×</button>
            )}
          </div>
          <Button size="sm" variant="ghost" onClick={() => {
            const headers = [["Symbol", "sym"], ["Name", "name"], ["Sector", "sector"], ["Last Price", "last"], ["Today %", "pct"], ["Day Low", "dayLow"], ["Day High", "dayHigh"], ["52W Low", "yearLow"], ["52W High", "yearHigh"], ["Volume", "vol"]];
            const rows = universe.map(s => {
              const q = quotes[s.sym] || {};
              return { sym: s.sym, name: s.name, sector: s.sector || "", last: q.last, pct: q.pct, dayLow: q.dayLow, dayHigh: q.dayHigh, yearLow: q.yearLow, yearHigh: q.yearHigh, vol: q.vol };
            });
            const ds = new Date().toISOString().split("T")[0];
            downloadCSV(`pfg_stock_universe_${ds}.csv`, headers, rows);
            window.pfgToast && window.pfgToast(`Exported ${rows.length} tickers to CSV`, "success");
          }}>⬇ CSV</Button>
          {/* Next-refresh countdown — shows how long until the auto-refresh timer fires */}
          {lastRefresh && refreshMinutes && (() => {
            const intervalMs = Math.max(1, refreshMinutes) * 60 * 1000;
            const elapsed = now - lastRefresh;
            const remaining = Math.max(0, intervalMs - elapsed);
            const totalSecs = Math.floor(remaining / 1000);
            const mm = Math.floor(totalSecs / 60);
            const ss = totalSecs % 60;
            const nextLabel = mm > 0 ? `${mm}m ${ss}s` : `${ss}s`;
            return (
              <span title={`Auto-refresh every ${refreshMinutes} min · adjust on Overview tab`}
                style={{ fontSize: 11, color: COLORS.textDim, padding: "5px 9px", background: COLORS.bg, borderRadius: 6, fontFamily: "ui-monospace, monospace" }}>
                Next: {nextLabel}
              </span>
            );
          })()}
          <Button size="sm" variant="ghost" onClick={refresh} disabled={loading}>
            {loading ? <><Spinner size={12} /> <span style={{ marginLeft: 6 }}>Refreshing…</span></> : "↻ Refresh"}
          </Button>
        </div>
      </div>

      {loading && (
        <div style={{ marginBottom: 12 }}>
          <LoadingBar label={`Fetching live quotes for ${universe.length} ticker${universe.length === 1 ? "" : "s"}…`} height={5} />
        </div>
      )}

      {/* Sector filter — chips show each sector present in the universe with a count. Click toggles. */}
      {(() => {
        // Build sector → count map from the current universe
        const sectorCounts = {};
        universe.forEach(s => {
          const key = s.sector || "Unsectored";
          sectorCounts[key] = (sectorCounts[key] || 0) + 1;
        });
        const sectorsPresent = Object.keys(sectorCounts).sort();
        if (sectorsPresent.length <= 1 && !sectorsPresent.includes("Unsectored")) return null;
        return (
          <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
            <span style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700, marginRight: 4 }}>Sector:</span>
            <button onClick={() => setSectorFilter(null)} type="button"
              style={{ padding: "4px 10px", borderRadius: 12, border: "none", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                background: sectorFilter === null ? COLORS.text : COLORS.borderLight,
                color: sectorFilter === null ? "white" : COLORS.textMuted }}>
              All · {universe.length}
            </button>
            {sectorsPresent.map(s => {
              const meta = s === "Unsectored" ? { color: COLORS.textDim, short: "Unsectored" } : sectorMeta(s);
              const active = sectorFilter === (s === "Unsectored" ? undefined : s);
              return (
                <button key={s} onClick={() => setSectorFilter(active ? null : (s === "Unsectored" ? undefined : s))} type="button"
                  style={{ padding: "4px 10px", borderRadius: 12, border: `1px solid ${active ? meta.color : "transparent"}`, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    background: active ? meta.color : meta.color + "22",
                    color: active ? "white" : meta.color }}>
                  {meta.short} · {sectorCounts[s]}
                </button>
              );
            })}
          </div>
        );
      })()}

      {/* Bulk action bar — appears when any tickers are selected (owner-only) */}
      {canEdit && selectedSyms.size > 0 && (
        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", marginBottom: 12, background: COLORS.primary, color: "white", borderRadius: 8, flexWrap: "wrap" }}>
          <div style={{ fontSize: 13, fontWeight: 700 }}>
            {selectedSyms.size} selected
          </div>
          <div style={{ flex: 1 }} />
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ fontSize: 11, opacity: 0.85 }}>Assign sector:</span>
            <select
              value=""
              onChange={e => { if (e.target.value) { bulkAssignSector(e.target.value === "__clear__" ? "" : e.target.value); e.target.value = ""; } }}
              style={{ padding: "5px 8px", borderRadius: 6, border: "none", fontSize: 12, fontFamily: "inherit", fontWeight: 600, cursor: "pointer", background: "white", color: COLORS.text }}>
              <option value="">Choose…</option>
              <option value="__clear__">— Clear sector —</option>
              {SECTOR_LIST.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <button type="button" onClick={bulkRemoveSelected}
            style={{ padding: "6px 12px", background: COLORS.danger, color: "white", border: "none", borderRadius: 6, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
            🗑 Remove Selected
          </button>
          <button type="button" onClick={clearSelection}
            style={{ padding: "6px 12px", background: "transparent", color: "white", border: `1px solid rgba(255,255,255,0.4)`, borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>
            Clear
          </button>
        </div>
      )}

      <Card style={{ padding: 0, marginBottom: 16, overflow: "hidden" }}>
        <table style={{ width: "100%", fontSize: 13, borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ background: "#F8FAFC", textAlign: "left" }}>
              {canEdit && (
                <th style={{ padding: "10px 4px 10px 12px", width: 24 }}>
                  {(() => {
                    // Header checkbox: select/deselect all currently visible rows (filtered set)
                    const q = search.trim().toLowerCase();
                    let visible = q ? universe.filter(s => (s.sym || "").toLowerCase().includes(q) || (s.name || "").toLowerCase().includes(q)) : universe;
                    if (sectorFilter) visible = visible.filter(s => s.sector === sectorFilter);
                    const allSelected = visible.length > 0 && visible.every(s => selectedSyms.has(s.sym));
                    return (
                      <input type="checkbox" checked={allSelected} title="Select all visible"
                        onChange={() => {
                          setSelectedSyms(prev => {
                            const next = new Set(prev);
                            if (allSelected) visible.forEach(s => next.delete(s.sym));
                            else visible.forEach(s => next.add(s.sym));
                            return next;
                          });
                        }} />
                    );
                  })()}
                </th>
              )}
              <th style={{ padding: 0 }}><SortHead col="sym" label="Symbol" align="left" sortCol={sortCol} sortDir={sortDir} onClick={toggleSort} /></th>
              <th style={{ padding: 0 }}><SortHead col="name" label="Name" align="left" sortCol={sortCol} sortDir={sortDir} onClick={toggleSort} /></th>
              <th style={{ padding: 0 }}><SortHead col="sector" label="Sector" align="left" sortCol={sortCol} sortDir={sortDir} onClick={toggleSort} /></th>
              <th style={{ padding: 0 }}><SortHead col="last" label="Last" align="right" sortCol={sortCol} sortDir={sortDir} onClick={toggleSort} /></th>
              <th style={{ padding: 0 }}><SortHead col="pct" label="Today %" align="right" sortCol={sortCol} sortDir={sortDir} onClick={toggleSort} /></th>
              <th style={{ padding: "10px 12px", textAlign: "right" }}>Day Range</th>
              <th style={{ padding: "10px 12px", textAlign: "right" }}>52W Range</th>
              <th style={{ padding: 0 }}><SortHead col="vol" label="Volume" align="right" sortCol={sortCol} sortDir={sortDir} onClick={toggleSort} /></th>
              {canEdit && <th style={{ padding: "10px 12px" }}></th>}
            </tr>
          </thead>
          <tbody>
            {(() => {
              const q = search.trim().toLowerCase();
              let filtered = q ? universe.filter(s => (s.sym || "").toLowerCase().includes(q) || (s.name || "").toLowerCase().includes(q)) : universe;
              if (sectorFilter) filtered = filtered.filter(s => s.sector === sectorFilter);
              filtered = applySort(filtered);
              if (filtered.length === 0) {
                return (
                  <tr><td colSpan={canEdit ? 9 : 7} style={{ padding: "20px 12px", textAlign: "center", color: COLORS.textMuted, fontSize: 13, fontStyle: "italic" }}>
                    {sectorFilter && q ? `No tickers match "${search}" in the ${sectorFilter} sector.` :
                     sectorFilter ? `No tickers in the ${sectorFilter} sector.` :
                     `No tickers match "${search}". Clear the search to see all ${universe.length}.`}
                  </td></tr>
                );
              }
              return filtered.map(stk => {
              const q = quotes[stk.sym];
              const color = !q || q.pct == null ? COLORS.textMuted : (q.pct >= 0 ? COLORS.success : COLORS.danger);
              const arrow = !q || q.pct == null ? "" : (q.pct >= 0 ? "▲" : "▼");
              // Year range bar: position of current price between yearLow and yearHigh
              let pctOfRange = null;
              if (q && q.yearHigh != null && q.yearLow != null && q.yearHigh > q.yearLow) {
                pctOfRange = ((q.last - q.yearLow) / (q.yearHigh - q.yearLow)) * 100;
                pctOfRange = Math.max(0, Math.min(100, pctOfRange));
              }
              return (
                <tr key={stk.sym} style={{ borderTop: `1px solid ${COLORS.borderLight}`, background: selectedSyms.has(stk.sym) ? COLORS.primary + "0A" : "transparent" }}>
                  {canEdit && (
                    <td style={{ padding: "10px 4px 10px 12px", width: 24 }}>
                      <input type="checkbox" checked={selectedSyms.has(stk.sym)} onChange={() => toggleSelected(stk.sym)} />
                    </td>
                  )}
                  <td style={{ padding: "10px 12px", fontWeight: 700 }}>
                    <TickerAction symbol={stk.sym} onOpenDetail={setDetailSymbol} />
                  </td>
                  <td style={{ padding: "10px 12px", color: COLORS.textMuted }}>{stk.name}</td>
                  <td style={{ padding: "10px 12px" }}>
                    {(() => {
                      const meta = sectorMeta(stk.sector);
                      if (canEdit) {
                        // Inline sector dropdown for owners — change without opening a modal
                        return (
                          <select value={stk.sector || ""} onChange={e => updateSector(stk.sym, e.target.value)}
                            onClick={e => e.stopPropagation()}
                            style={{ padding: "4px 8px", borderRadius: 12, border: "none", fontSize: 11, fontFamily: "inherit", fontWeight: 700, color: "white", background: stk.sector ? meta.color : COLORS.textDim, cursor: "pointer" }}>
                            <option value="">—</option>
                            {SECTOR_LIST.map(s => <option key={s} value={s}>{s}</option>)}
                          </select>
                        );
                      }
                      return (
                        <span style={{ display: "inline-block", padding: "3px 9px", borderRadius: 12, fontSize: 10, fontWeight: 700, color: "white", background: stk.sector ? meta.color : COLORS.textDim, letterSpacing: 0.5 }}>
                          {stk.sector ? meta.short.toUpperCase() : "—"}
                        </span>
                      );
                    })()}
                  </td>
                  <td style={{ padding: "10px 12px", textAlign: "right", fontWeight: 600 }}>{q ? "$" + q.last.toFixed(2) : "—"}</td>
                  <td style={{ padding: "10px 12px", textAlign: "right", color, fontWeight: 700 }}>{q && q.pct != null ? arrow + " " + q.pct.toFixed(2) + "%" : "—"}</td>
                  <td style={{ padding: "10px 12px", textAlign: "right", fontSize: 12, color: COLORS.textMuted }}>
                    {q && q.dayLow != null && q.dayHigh != null ? `$${q.dayLow.toFixed(2)} – $${q.dayHigh.toFixed(2)}` : "—"}
                  </td>
                  <td style={{ padding: "10px 12px", textAlign: "right", fontSize: 12 }}>
                    {q && q.yearLow != null && q.yearHigh != null ? (
                      <div>
                        <div style={{ color: COLORS.textMuted }}>{`$${q.yearLow.toFixed(2)} – $${q.yearHigh.toFixed(2)}`}</div>
                        {pctOfRange != null && (
                          <div style={{ width: 120, height: 4, background: COLORS.borderLight, borderRadius: 2, marginLeft: "auto", marginTop: 3, position: "relative" }}>
                            <div style={{ position: "absolute", left: pctOfRange + "%", top: -2, width: 2, height: 8, background: COLORS.primary }} />
                          </div>
                        )}
                      </div>
                    ) : "—"}
                  </td>
                  <td style={{ padding: "10px 12px", textAlign: "right", fontSize: 12, color: COLORS.textMuted }}>{q ? fmtVol(q.vol) : "—"}</td>
                  {canEdit && (
                    <td style={{ padding: "8px" }}>
                      <Button size="sm" variant="ghost" onClick={() => removeStock(stk.sym)}><IconTrash size={12} /></Button>
                    </td>
                  )}
                </tr>
              );
            });
            })()}
          </tbody>
        </table>
      </Card>

      {canEdit && (
        <Card style={{ padding: 20 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>Edit Universe (Owner)</div>
            <div style={{ display: "flex", gap: 8 }}>
              <Button size="sm" variant="ghost" onClick={() => setBulkOpen(true)}>📋 Bulk Import</Button>
              <Button size="sm" variant="ghost" onClick={resetUniverse}>Reset to Top 10 S&P</Button>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr 1fr auto", gap: 10, alignItems: "end" }}>
            <Input label="Symbol" value={addForm.sym} onChange={v => setAddForm({ ...addForm, sym: v })} placeholder="AAPL" />
            <Input label="Name (optional)" value={addForm.name} onChange={v => setAddForm({ ...addForm, name: v })} placeholder="Apple Inc." />
            <Select label="Sector (optional)" value={addForm.sector} onChange={v => setAddForm({ ...addForm, sector: v })}
              options={[{ value: "", label: "—" }, ...SECTOR_LIST.map(s => ({ value: s, label: s }))]} />
            <Button onClick={addStock} style={{ marginBottom: 12 }}><IconPlus size={14} /> Add Symbol</Button>
          </div>
        </Card>
      )}

      {/* Bulk paste-import modal — owner-only */}
      <Modal open={bulkOpen} onClose={() => setBulkOpen(false)} title="📋 Bulk Import Tickers">
        <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 12, lineHeight: 1.5 }}>
          Paste a list of symbols separated by commas, spaces, or newlines.
          Duplicates and tickers already in the universe are skipped automatically.
          The optional sector applies to all newly imported tickers — you can refine each one later from the table.
        </div>
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 4, fontWeight: 600 }}>Tickers</div>
          <textarea
            value={bulkText}
            onChange={e => setBulkText(e.target.value)}
            placeholder={"AAPL, MSFT, NVDA\nGOOG AMZN\nMETA, TSLA"}
            rows={6}
            style={{ width: "100%", padding: 10, borderRadius: 8, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "ui-monospace, monospace", resize: "vertical", boxSizing: "border-box" }}
          />
        </div>
        <div style={{ marginBottom: 16 }}>
          <Select label="Apply sector to all (optional)" value={bulkSector} onChange={setBulkSector}
            options={[{ value: "", label: "— Leave unsectored —" }, ...SECTOR_LIST.map(s => ({ value: s, label: s }))]} />
        </div>
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
          <Button variant="ghost" onClick={() => setBulkOpen(false)}>Cancel</Button>
          <Button onClick={bulkAdd} disabled={!bulkText.trim()}>Import</Button>
        </div>
      </Modal>

      <StockDetailModal symbol={detailSymbol} open={!!detailSymbol} onClose={() => setDetailSymbol(null)} />
    </div>
  );
}

// ============================================================
// MACRO DASHBOARD — yield curve, Fed funds, mortgage, client resources
// ============================================================
function MacroDashboard() {
  const [macroTab, setMacroTab] = useState("dashboard"); // "dashboard" | "recession" | "calendar"
  const [yieldCurve, setYieldCurve] = useState([]);
  const [fedRate, setFedRate] = useState(null);
  const [fedHistory, setFedHistory] = useState([]);
  const [mortgageRate, setMortgageRate] = useState(null);
  const [mortgageHistory, setMortgageHistory] = useState([]);
  const [tenYrHistory, setTenYrHistory] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const yieldCanvasRef = useRef(null);
  const yieldChartRef = useRef(null);
  const fedCanvasRef = useRef(null);
  const fedChartRef = useRef(null);
  const tenYrCanvasRef = useRef(null);
  const tenYrChartRef = useRef(null);

  const loadAll = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const [curve, fed, mortgage, tenYr] = await Promise.all([
        fetchYieldCurve(),
        fetchFRED("DFF", 365),
        fetchFRED("MORTGAGE30US", 365),
        fetchFRED("DGS10", 365),
      ]);
      setYieldCurve(curve);
      setFedHistory(fed);
      setFedRate(fed[fed.length - 1]?.value ?? null);
      setMortgageHistory(mortgage);
      setMortgageRate(mortgage[mortgage.length - 1]?.value ?? null);
      setTenYrHistory(tenYr);
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  }, []);

  useEffect(() => { loadAll(); }, [loadAll]);

  // Yield curve chart
  useEffect(() => {
    if (!yieldCanvasRef.current || yieldCurve.length === 0) return;
    if (yieldChartRef.current) { yieldChartRef.current.destroy(); yieldChartRef.current = null; }
    const valid = yieldCurve.filter(p => p.value != null);
    if (!valid.length) return;
    yieldChartRef.current = new Chart(yieldCanvasRef.current, {
      type: "line",
      data: {
        labels: valid.map(p => p.label),
        datasets: [{
          label: "US Treasury Yield (%)",
          data: valid.map(p => p.value),
          borderColor: COLORS.primary,
          backgroundColor: COLORS.primary + "22",
          fill: true, pointRadius: 4, pointBackgroundColor: COLORS.primary, borderWidth: 2, tension: 0.3,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          y: { title: { display: true, text: "Yield (%)" }, ticks: { callback: (v) => v.toFixed(2) + "%" } },
          x: { title: { display: true, text: "Maturity" } },
        },
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => ctx.raw.toFixed(2) + "%" } } },
      },
    });
    return () => { if (yieldChartRef.current) yieldChartRef.current.destroy(); };
  }, [yieldCurve]);

  // Fed funds rate history chart
  useEffect(() => {
    if (!fedCanvasRef.current || fedHistory.length === 0) return;
    if (fedChartRef.current) { fedChartRef.current.destroy(); fedChartRef.current = null; }
    fedChartRef.current = new Chart(fedCanvasRef.current, {
      type: "line",
      data: {
        labels: fedHistory.map(d => d.date),
        datasets: [{
          label: "Fed Funds Rate (%)",
          data: fedHistory.map(d => d.value),
          borderColor: COLORS.primaryDark,
          backgroundColor: COLORS.primaryDark + "15",
          fill: true, pointRadius: 0, borderWidth: 2, tension: 0.1,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { ticks: { callback: (v) => v.toFixed(2) + "%" } } },
        plugins: { legend: { display: false } },
      },
    });
    return () => { if (fedChartRef.current) fedChartRef.current.destroy(); };
  }, [fedHistory]);

  // 10Y treasury rolling
  useEffect(() => {
    if (!tenYrCanvasRef.current || tenYrHistory.length === 0) return;
    if (tenYrChartRef.current) { tenYrChartRef.current.destroy(); tenYrChartRef.current = null; }
    tenYrChartRef.current = new Chart(tenYrCanvasRef.current, {
      type: "line",
      data: {
        labels: tenYrHistory.map(d => d.date),
        datasets: [{
          label: "10Y Yield (%)",
          data: tenYrHistory.map(d => d.value),
          borderColor: COLORS.gold,
          backgroundColor: COLORS.gold + "22",
          fill: true, pointRadius: 0, borderWidth: 2, tension: 0.1,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { ticks: { callback: (v) => v.toFixed(2) + "%" } } },
        plugins: { legend: { display: false } },
      },
    });
    return () => { if (tenYrChartRef.current) tenYrChartRef.current.destroy(); };
  }, [tenYrHistory]);

  // Inversion detection
  const tenYrVal = yieldCurve.find(p => p.label === "10Y")?.value;
  const twoYrVal = yieldCurve.find(p => p.label === "2Y")?.value;
  const inverted = (tenYrVal != null && twoYrVal != null && tenYrVal < twoYrVal);
  const spread = (tenYrVal != null && twoYrVal != null) ? (tenYrVal - twoYrVal) : null;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 14 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 700 }}>Macro Dashboard</h2>
          <p style={{ color: COLORS.textMuted, fontSize: 13, margin: "4px 0 0" }}>
            US economic indicators, yield curve, FOMC schedule, recession monitor, economic calendar.
          </p>
        </div>
        {macroTab === "dashboard" && (
          <Button size="sm" variant="ghost" onClick={loadAll}>{loading ? "Loading…" : "↻ Refresh"}</Button>
        )}
      </div>

      {/* Macro sub-tab switcher */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16, padding: 4, background: COLORS.bg, borderRadius: 10, flexWrap: "wrap" }}>
        {[
          { key: "dashboard", label: "Rates & Curves", icon: "≡" },
          { key: "recession", label: "Recession Monitor", icon: "⚠" },
          { key: "calendar", label: "Economic Calendar", icon: "📅" },
        ].map(t => (
          <button key={t.key} onClick={() => setMacroTab(t.key)}
            style={{
              flex: "1 1 200px",
              padding: "10px 14px",
              borderRadius: 8,
              border: "none",
              background: macroTab === t.key ? COLORS.surface : "transparent",
              color: macroTab === t.key ? COLORS.primaryDark : COLORS.textMuted,
              fontWeight: macroTab === t.key ? 700 : 500,
              fontSize: 13,
              fontFamily: "inherit",
              cursor: "pointer",
              boxShadow: macroTab === t.key ? "0 2px 6px rgba(0,0,0,0.08)" : "none",
              transition: "all 0.15s",
            }}>
            <span style={{ marginRight: 6, opacity: 0.8 }}>{t.icon}</span> {t.label}
          </button>
        ))}
      </div>

      {macroTab === "recession" && <RecessionMonitor />}
      {macroTab === "calendar" && <EconomicCalendar />}

      {macroTab === "dashboard" && (
      <>

      {error && (
        <Card style={{ padding: 14, marginBottom: 16, background: COLORS.danger + "11", borderLeft: `4px solid ${COLORS.danger}` }}>
          <div style={{ fontSize: 12, color: COLORS.danger }}>Failed to load data: {error}</div>
        </Card>
      )}

      {/* Key rate cards */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginBottom: 16 }}>
        <Card style={{ padding: 16, borderLeft: `4px solid ${COLORS.primaryDark}` }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>Fed Funds Rate</div>
          <div style={{ fontSize: 28, fontWeight: 800, color: COLORS.primaryDark, marginTop: 4 }}>{fedRate != null ? fedRate.toFixed(2) + "%" : "—"}</div>
          <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 2 }}>FRED · DFF</div>
        </Card>
        <Card style={{ padding: 16, borderLeft: `4px solid ${COLORS.gold}` }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>10Y Treasury</div>
          <div style={{ fontSize: 28, fontWeight: 800, color: COLORS.text, marginTop: 4 }}>{tenYrVal != null ? tenYrVal.toFixed(2) + "%" : "—"}</div>
          <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 2 }}>FRED · DGS10</div>
        </Card>
        <Card style={{ padding: 16, borderLeft: `4px solid ${COLORS.primary}` }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>30Y Mortgage</div>
          <div style={{ fontSize: 28, fontWeight: 800, color: COLORS.text, marginTop: 4 }}>{mortgageRate != null ? mortgageRate.toFixed(2) + "%" : "—"}</div>
          <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 2 }}>FRED · MORTGAGE30US</div>
        </Card>
        <Card style={{ padding: 16, borderLeft: `4px solid ${inverted ? COLORS.danger : COLORS.success}` }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>10Y–2Y Spread</div>
          <div style={{ fontSize: 28, fontWeight: 800, color: inverted ? COLORS.danger : COLORS.success, marginTop: 4 }}>
            {spread != null ? (spread >= 0 ? "+" : "") + (spread * 100).toFixed(0) + " bps" : "—"}
          </div>
          <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 2 }}>{inverted ? "⚠ Inverted" : "Normal"}</div>
        </Card>
      </div>

      {/* Yield curve chart */}
      <Card style={{ padding: 18, marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 600 }}>US Treasury Yield Curve</div>
            <div style={{ fontSize: 11, color: COLORS.textMuted }}>Latest available point at each maturity</div>
          </div>
          <a href="https://www.treasury.gov/resource-center/data-chart-center/interest-rates/Pages/TextView.aspx?data=yield" target="_blank" rel="noopener" style={{ fontSize: 11, color: COLORS.primary, textDecoration: "none" }}>treasury.gov ↗</a>
        </div>
        <div style={{ height: 280 }}><canvas ref={yieldCanvasRef} /></div>
      </Card>

      {/* Fed rate + 10Y rolling */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(320px, 1fr))", gap: 12, marginBottom: 16 }}>
        <Card style={{ padding: 18 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>Fed Funds — 1 Year</div>
            <a href="https://fred.stlouisfed.org/series/DFF" target="_blank" rel="noopener" style={{ fontSize: 11, color: COLORS.primary, textDecoration: "none" }}>FRED ↗</a>
          </div>
          <div style={{ height: 200 }}><canvas ref={fedCanvasRef} /></div>
        </Card>
        <Card style={{ padding: 18 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>10Y Treasury — 1 Year</div>
            <a href="https://fred.stlouisfed.org/series/DGS10" target="_blank" rel="noopener" style={{ fontSize: 11, color: COLORS.primary, textDecoration: "none" }}>FRED ↗</a>
          </div>
          <div style={{ height: 200 }}><canvas ref={tenYrCanvasRef} /></div>
        </Card>
      </div>

      {/* FOMC — Next meeting + key resources */}
      {(() => {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const upcoming = FOMC_SCHEDULE_2026.filter(m => new Date(m.date + "T00:00:00") >= today);
        // Show next 3 meetings (not just 1)
        const nextThree = upcoming.slice(0, 3);
        // The last completed meeting
        const past = FOMC_SCHEDULE_2026.filter(m => new Date(m.date + "T00:00:00") < today);
        const last = past[past.length - 1] || null;
        return (
          <Card style={{ padding: 18, marginBottom: 16, background: COLORS.bg, borderLeft: `4px solid ${COLORS.primaryDark}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12, marginBottom: 12 }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.text }}>FOMC — Upcoming Meetings</div>
                <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2 }}>Federal Open Market Committee · next 3 scheduled meetings + last decision</div>
              </div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 10, marginBottom: 14 }}>
              {nextThree.map((mtg, i) => {
                const mtgDate = new Date(mtg.date + "T00:00:00");
                const daysUntil = Math.ceil((mtgDate - today) / (1000 * 60 * 60 * 24));
                const isNext = i === 0;
                return (
                  <div key={mtg.date} style={{ padding: 14, background: COLORS.surface, borderRadius: 8, borderTop: `3px solid ${isNext ? COLORS.gold : COLORS.primary}` }}>
                    <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>
                      {isNext ? "Next Meeting" : `Meeting ${i + 1}`}
                    </div>
                    <div style={{ fontSize: 18, fontWeight: 800, color: COLORS.text, marginTop: 4 }}>
                      {mtgDate.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}
                    </div>
                    <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 4 }}>
                      in {daysUntil} day{daysUntil === 1 ? "" : "s"}

                    <div style={{ fontSize: 10, color: COLORS.textMuted, marginTop: 2 }}>{mtg.note}</div>
                  </div>
                );
              })}
              {last && (
                <div style={{ padding: 14, background: COLORS.surface, borderRadius: 8, borderTop: `3px solid ${COLORS.textMuted}`, opacity: 0.8 }}>
                  <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 600 }}>Last Meeting</div>
                  <div style={{ fontSize: 18, fontWeight: 800, color: COLORS.text, marginTop: 4 }}>
