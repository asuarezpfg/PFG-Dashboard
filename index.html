window.storage = {
  async get(key) { const v = localStorage.getItem(key); return v ? { key, value: v } : null; },
  async set(key, value) { localStorage.setItem(key, value); return { key, value }; },
  async delete(key) { localStorage.removeItem(key); return { key, deleted: true }; },
  async list(prefix) { const keys = []; for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(!prefix||k.startsWith(prefix))keys.push(k);} return { keys }; }
};

// Register chartjs-plugin-zoom globally so any Chart instance can use it.
// The plugin attaches itself to window.ChartZoom (or similar) when loaded via CDN.
// In chart.js v3+, we must explicitly register it.
if (typeof window !== "undefined" && window.Chart) {
  // The plugin's UMD build exposes itself as a global; Chart.register accepts it.
  // Different builds expose under different names — try the common ones.
  const zoomPlugin = window.ChartZoom || window.chartjsPluginZoom || window["chartjs-plugin-zoom"];
  if (zoomPlugin) {
    try { window.Chart.register(zoomPlugin); } catch (e) { console.warn("Zoom plugin registration:", e.message); }
  }
}

// Each person carries a per-year PTO ledger:
//   ptoHistory: { "2024": { allot: 20, used: 0, carriedIn: 0 }, "2025": {...}, ... }
// "allot" = days granted that year. "used" = days used that year.
// "carriedIn" = days carried in from the prior year (computed but stored for clarity).
// Total available in a given year = allot + carriedIn.
// PTO is reset to 0 used for everyone since 2024, all unused balance rolls forward.

// ============================================================
// PASSWORD HASHING
// SHA-256 via Web Crypto API. Per-browser localStorage only.
// Not server-grade security, but better than plaintext "changeme":
//   - Hashes can't be reversed to plaintext
//   - Each user must set their own password on first login
//   - Masters CANNOT reset other users' passwords
// ============================================================
async function hashPassword(plainText) {
  if (!plainText || typeof plainText !== "string") return null;
  const enc = new TextEncoder().encode(plainText);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

// --- Confetti/Explosion Animation ---
const Confetti = ({ onDone }) => {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = 300, H = 200;
    canvas.width = W; canvas.height = H;
    const colors = ["#10B981","#3B82F6","#F59E0B","#EF4444","#8B5CF6","#EC4899"];
    const particles = Array.from({ length: 40 }, () => ({
      x: W/2, y: H/2,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 0.5) * 12 - 4,
      size: Math.random() * 6 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 15,
    }));
    let frame = 0;
    const animate = () => {
      ctx.clearRect(0, 0, W, H);
      let alive = false;
      particles.forEach(p => {
        if (p.life <= 0) return;
        alive = true;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.25;
        p.life -= 0.018;
        p.rotation += p.rotSpeed;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation * Math.PI / 180);
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
        ctx.restore();
      });
      frame++;
      if (alive && frame < 120) requestAnimationFrame(animate);
      else onDone?.();
    };
    animate();
  }, []);
  return <canvas ref={canvasRef} style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%,-50%)", pointerEvents: "none", zIndex: 50 }} />;
};

// Crosshair vertical line drawn through hovered point.

const crosshairPlugin = {
  id: "pfgCrosshair",
  afterDraw: (chart) => {
    const active = chart.tooltip?._active || chart.tooltip?.dataPoints;
    if (!active || active.length === 0) return;
    const ctx = chart.ctx;
    const x = active[0].element ? active[0].element.x : active[0].x;
    if (x == null) return;
    const top = chart.chartArea.top;
    const bottom = chart.chartArea.bottom;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x, top);
    ctx.lineTo(x, bottom);
    ctx.lineWidth = 1;
    ctx.strokeStyle = "#0B285388";
    ctx.setLineDash([4, 3]);
    ctx.stroke();
    ctx.restore();
  },
};

// Business days calculation (excludes weekends)
const getBusinessDaysDiff = (date1, date2) => {
  const d1 = new Date(date1); d1.setHours(0,0,0,0);
  const d2 = new Date(date2); d2.setHours(0,0,0,0);
  const sign = d2 >= d1 ? 1 : -1;
  const start = sign === 1 ? d1 : d2;
  const end = sign === 1 ? d2 : d1;
  let count = 0;
  const cur = new Date(start);
  while (cur < end) {
    cur.setDate(cur.getDate() + 1);
    const dow = cur.getDay();
    if (dow !== 0 && dow !== 6) count++;
  }
  return count * sign;
};

// Subtract N business days from a date
const subtractBusinessDays = (dateStr, bizDays) => {
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  let remaining = bizDays;
  while (remaining > 0) {
    d.setDate(d.getDate() - 1);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) remaining--;
  }
  return d.toISOString().split("T")[0];
};

// Generate next occurrence of a recurring task
const generateNextTask = (task, taskTemplates) => {
  if (!task.dueDate || task.frequency === "One-time" || task.frequency === "Ongoing" || task.custom) return null;
  const due = new Date(task.dueDate);
  let nextDate;
  if (task.frequency === "Monthly") nextDate = new Date(due.getFullYear(), due.getMonth() + 1, due.getDate());
  else if (task.frequency === "Quarterly") nextDate = new Date(due.getFullYear(), due.getMonth() + 3, due.getDate());
  else if (task.frequency === "Semi-annually") nextDate = new Date(due.getFullYear(), due.getMonth() + 6, due.getDate());
  else if (task.frequency === "Annually") nextDate = new Date(due.getFullYear() + 1, due.getMonth(), due.getDate());
  else if (task.frequency === "Every 3 years") nextDate = new Date(due.getFullYear() + 3, due.getMonth(), due.getDate());
  else return null;
  return { ...task, id: uid(), dueDate: nextDate.toISOString().split("T")[0], completedAt: null, completedBy: null, note: "" };
};

// Task urgency: "future" (white), "upcoming" (green), "grace" (orange), "overdue" (red), "completed" (done)
const getTaskUrgency = (task) => {
  if (task.completedAt) return "completed";
  if (!task.dueDate) return "future";
  const now = new Date(); now.setHours(0,0,0,0);
  const due = new Date(task.dueDate); due.setHours(0,0,0,0);
  const bizDaysUntilDue = getBusinessDaysDiff(now, due);
  const bizDaysPastDue = getBusinessDaysDiff(due, now);
  if (bizDaysUntilDue > 3) return "future";       // White: future
  if (bizDaysUntilDue >= 0) return "upcoming";     // Green: due today or within 3 biz days
  if (bizDaysPastDue <= 3) return "grace";          // Orange: within 3 biz days after due
  return "overdue";                                  // Red: more than 3 biz days past due
};

  if (symbol.startsWith("^") || symbol.includes("=")) {

const sendEmail = ({ to, cc, subject, body }) => {

  if (cc && cc.length) params.push("cc=" + encodeURIComponent(cc.join(",")));
  if (subject) params.push("subject=" + encodeURIComponent(subject));
  if (body) params.push("body=" + encodeURIComponent(body));

// Read a File object as base64 data URL — used for storing reimbursement receipts inline.
const readFileAsDataURL = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => resolve(reader.result);
  reader.onerror = () => reject(reader.error);
  reader.readAsDataURL(file);
});

// Resize an image File to a max square dimension, output as JPEG data URL.
// Used for profile photos so localStorage stays under budget.
const resizeImageToDataURL = (file, maxDim = 256, quality = 0.85) => new Promise((resolve, reject) => {
  if (!file || !file.type?.startsWith("image/")) { reject(new Error("Not an image")); return; }
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(maxDim / img.width, maxDim / img.height, 1);
      const w = Math.round(img.width * ratio);
      const h = Math.round(img.height * ratio);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => reject(new Error("Failed to decode image"));
    img.src = reader.result;
  };
  reader.onerror = () => reject(reader.error);
  reader.readAsDataURL(file);
});

// Trigger a download for a base64 data URL or external path.
const downloadFile = (src, filename) => {

// Generate a CSV file from an array of objects.
//   headers: [["display label", "object key"], ...] — preserves order
//   rows: array of source objects (or array-of-arrays with same length as headers)
// Handles commas, quotes, and newlines per RFC 4180.
const csvEscape = (val) => {
  if (val === null || val === undefined) return "";
  let s = String(val);
  // Render arrays/objects as JSON strings for predictable export
  if (typeof val === "object") {
    try { s = JSON.stringify(val); } catch (e) { s = "[Object]"; }
  }
  const needsQuotes = /[",\n\r]/.test(s);
  s = s.replace(/"/g, '""');
  return needsQuotes ? `"${s}"` : s;
};
const downloadCSV = (filename, headers, rows) => {
  const headerRow = headers.map(h => csvEscape(Array.isArray(h) ? h[0] : h)).join(",");
  const bodyRows = rows.map(r => {
    if (Array.isArray(r)) return r.map(csvEscape).join(",");
    return headers.map(h => {
      const key = Array.isArray(h) ? h[1] : h;
      // Support nested key paths separated by "."
      const path = key.split(".");
      let v = r;
      for (const k of path) { if (v == null) break; v = v[k]; }
      return csvEscape(v);
    }).join(",");
  });
  // BOM for Excel UTF-8 compatibility
  const csv = "\ufeff" + [headerRow, ...bodyRows].join("\r\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
};

const calc401kEligibility = (person) => {
  if (!person?.dateOfHire) return null;
  const start = new Date(person.dateOfHire + "T00:00:00");
  if (isNaN(start)) return null;
  const REQUIRED_DAYS = 365;

  // Build list of leave periods that count as excluded
  const leaves = [...(person.militaryLeaves || []), ...(person.unpaidLeaves || [])]
    .filter(l => l && l.start && l.end)
    .map(l => ({ start: new Date(l.start + "T00:00:00"), end: new Date(l.end + "T00:00:00") }))
    .filter(l => !isNaN(l.start) && !isNaN(l.end) && l.end >= l.start)
    .sort((a, b) => a.start - b.start);

  // Walk forward from start date until we have accumulated REQUIRED_DAYS of NON-leave days
  let cursor = new Date(start);
  let countedDays = 0;
  // Hard cap to prevent runaway in case of bad data
  const MAX_ITERATIONS = 365 * 20;
  let iter = 0;
  while (countedDays < REQUIRED_DAYS && iter < MAX_ITERATIONS) {
    const inLeave = leaves.some(l => cursor >= l.start && cursor <= l.end);
    if (!inLeave) countedDays++;
    if (countedDays >= REQUIRED_DAYS) break;
    cursor.setDate(cursor.getDate() + 1);
    iter++;
  }
  return cursor;
};

// Total excluded leave days (for display)
const totalLeaveDays = (person) => {
  if (!person) return 0;
  const leaves = [...(person.militaryLeaves || []), ...(person.unpaidLeaves || [])];
  let total = 0;
  leaves.forEach(l => {
    if (!l || !l.start || !l.end) return;
    const s = new Date(l.start + "T00:00:00");
    const e = new Date(l.end + "T00:00:00");
    if (isNaN(s) || isNaN(e) || e < s) return;
    total += Math.round((e - s) / (1000 * 60 * 60 * 24)) + 1;
  });
  return total;
};

// ============================================================
// Seniority — calendar duration from hire date to today.
// Returns { years, months, totalMonths, formatted: "2 years, 5 months" }
// ============================================================
const calcSeniority = (person, asOf = new Date()) => {
  if (!person?.dateOfHire) return null;
  const hire = new Date(person.dateOfHire + "T00:00:00");
  if (isNaN(hire)) return null;
  const ref = new Date(asOf);
  let years = ref.getFullYear() - hire.getFullYear();
  let months = ref.getMonth() - hire.getMonth();
  // Adjust if the day-of-month hasn't been reached this month yet
  if (ref.getDate() < hire.getDate()) months -= 1;
  if (months < 0) { years -= 1; months += 12; }
  const totalMonths = years * 12 + months;
  let formatted;
  if (years === 0 && months === 0) formatted = "Less than 1 month";
  else if (years === 0) formatted = `${months} month${months === 1 ? "" : "s"}`;
  else if (months === 0) formatted = `${years} year${years === 1 ? "" : "s"}`;
  else formatted = `${years} year${years === 1 ? "" : "s"}, ${months} month${months === 1 ? "" : "s"}`;
  return { years, months, totalMonths, formatted };
};

// ============================================================
// PTO summary — rolls forward across years, computes balance.
// Returns:
//   {
//     currentYear: "2026",
//     years: [{ year, allot, used, carriedIn, endingBalance }],   // chronological
//     totalAvailable: number,   // current year carriedIn + allot - used
//     totalUsedThisYear: number,
//     totalUsedAllTime: number,
//   }
// ============================================================
const summarizePTO = (person, asOf = new Date()) => {
  const history = person?.ptoHistory || {};
  const years = Object.keys(history).map(Number).sort((a, b) => a - b);
  if (years.length === 0) {
    // Legacy fallback: build from flat ptoUsed/ptoAllot
    const yr = asOf.getFullYear();
    return {
      currentYear: String(yr),
      years: [{ year: yr, allot: person?.ptoAllot || 0, used: person?.ptoUsed || 0, carriedIn: 0, endingBalance: (person?.ptoAllot || 0) - (person?.ptoUsed || 0) }],
      totalAvailable: (person?.ptoAllot || 0) - (person?.ptoUsed || 0),
      totalUsedThisYear: person?.ptoUsed || 0,
      totalUsedAllTime: person?.ptoUsed || 0,
    };
  }
  let running = 0;
  let totalUsed = 0;
  const expanded = years.map(yr => {
    const e = history[String(yr)];
    const carriedIn = running;
    const allot = e?.allot || 0;
    const used = e?.used || 0;
    const ending = carriedIn + allot - used;
    totalUsed += used;
    running = ending;
    return { year: yr, allot, used, carriedIn, endingBalance: ending };
  });
  const thisYr = asOf.getFullYear();
  const thisYearEntry = expanded.find(e => e.year === thisYr) || expanded[expanded.length - 1];
  return {
    currentYear: String(thisYearEntry?.year || thisYr),
    years: expanded,
    totalAvailable: thisYearEntry?.endingBalance ?? 0,
    totalUsedThisYear: thisYearEntry?.used ?? 0,
    totalUsedAllTime: totalUsed,
  };
};

// ============================================================
// 401(k) eligibility status — traffic light.
//   "ineligible"     → red    (eligibility date in the future)
//   "eligible-not-enrolled" → yellow (past eligibility date, enrolled401k !== true)
//   "enrolled"       → green  (past eligibility date, enrolled401k === true)
// ============================================================
const get401kStatus = (person, asOf = new Date()) => {
  const eligDate = calc401kEligibility(person);
  if (!eligDate) return { code: "unknown", label: "Date of hire needed", color: COLORS.textMuted };
  const today = new Date(asOf); today.setHours(0, 0, 0, 0);
  const elig = new Date(eligDate); elig.setHours(0, 0, 0, 0);
  if (elig > today) {
    const daysOut = Math.ceil((elig - today) / (1000 * 60 * 60 * 24));
    return { code: "ineligible", label: `Not yet eligible · ${daysOut} day${daysOut === 1 ? "" : "s"} out`, color: COLORS.danger, eligDate };
  }
  if (person?.enrolled401k === true) return { code: "enrolled", label: "Eligible · Enrolled", color: COLORS.success, eligDate };
  return { code: "eligible-not-enrolled", label: "Eligible · Not enrolled", color: COLORS.gold, eligDate };
};

      .page-break-before { page-break-before: always; }
      .page-break-after { page-break-after: always; }
      .avoid-break { page-break-inside: avoid; }

      /* Cards & Modals have shadows that don't print well */
      [class*="Card"] { box-shadow: none !important; }

      /* Reasonable default padding for printed pages */
      @page { margin: 0.5in; }
    }
    /* Screen-only helper — hide items that should only appear when printing */
    .print-only { display: none; }
    @media print { .print-only { display: block !important; } }
  `;
  document.head.appendChild(style);
})();

// ============================================================
// TOAST NOTIFICATIONS
// Lightweight global toast system. Exposes window.pfgToast(message, kind, options)
// where kind is "success" | "error" | "info" | "warning".
// Toasts appear bottom-right, stack vertically, auto-dismiss after 4s (or custom).
// Implementation is imperative — no React state needed — so any code path can call
// pfgToast() including plain event handlers, storage callbacks, etc.
// ============================================================
(() => {
  if (typeof document === "undefined") return;
  if (window.pfgToast) return;   // Already installed

  // Inject the animation keyframes + container styles once
  if (!document.getElementById("pfg-toast-styles")) {
    const style = document.createElement("style");
    style.id = "pfg-toast-styles";
    style.textContent = `
      @keyframes pfgToastIn {
        from { opacity: 0; transform: translateX(80px) scale(0.95); }
        to   { opacity: 1; transform: translateX(0) scale(1); }
      }
      @keyframes pfgToastOut {
        from { opacity: 1; transform: translateX(0) scale(1); }
        to   { opacity: 0; transform: translateX(80px) scale(0.95); }
      }
      #pfg-toast-container {
        position: fixed; bottom: 20px; right: 20px; z-index: 20000;
        display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
        pointer-events: none;
        max-width: min(400px, calc(100vw - 40px));
      }
      #pfg-toast-container .pfg-toast {
        pointer-events: auto;
        min-width: 240px; max-width: 400px;
        padding: 12px 16px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(11,40,83,0.18), 0 3px 8px rgba(11,40,83,0.08);
        font-family: 'DM Sans', 'Segoe UI', sans-serif;
        font-size: 13px; font-weight: 500; line-height: 1.4;
        background: #fff;
        border-left: 4px solid #2FACEA;
        color: #12263F;
        animation: pfgToastIn 0.22s ease-out;
        display: flex; align-items: flex-start; gap: 10px;
      }
      #pfg-toast-container .pfg-toast.pfg-toast--leaving {
        animation: pfgToastOut 0.2s ease-in forwards;
      }
      #pfg-toast-container .pfg-toast.pfg-toast--success { border-left-color: #1FB67D; }
      #pfg-toast-container .pfg-toast.pfg-toast--error   { border-left-color: #D9534F; }
      #pfg-toast-container .pfg-toast.pfg-toast--info    { border-left-color: #2FACEA; }
      #pfg-toast-container .pfg-toast.pfg-toast--warning { border-left-color: #EAC82E; }
      #pfg-toast-container .pfg-toast .pfg-toast__icon { font-size: 16px; line-height: 1.3; flex-shrink: 0; }
      #pfg-toast-container .pfg-toast .pfg-toast__body { flex: 1; word-break: break-word; }
      #pfg-toast-container .pfg-toast .pfg-toast__close {
        background: none; border: none; color: #94A3B8; cursor: pointer; font-size: 14px; padding: 0 2px; font-family: inherit; line-height: 1;
      }
      #pfg-toast-container .pfg-toast .pfg-toast__close:hover { color: #12263F; }
      @media print { #pfg-toast-container { display: none !important; } }
    `;
    document.head.appendChild(style);
  }

  let container = document.getElementById("pfg-toast-container");
  if (!container) {
    container = document.createElement("div");
    container.id = "pfg-toast-container";
    document.body.appendChild(container);
  }

  const iconFor = (kind) => ({
    success: "✓", error: "✕", warning: "⚠", info: "ⓘ",
  }[kind] || "ⓘ");

  window.pfgToast = (message, kind = "info", options = {}) => {
    if (!message) return;
    const duration = options.duration != null ? options.duration : 4000;
    const el = document.createElement("div");
    el.className = "pfg-toast pfg-toast--" + kind;
    const iconEl = document.createElement("span");
    iconEl.className = "pfg-toast__icon";
    iconEl.textContent = iconFor(kind);
    const body = document.createElement("div");
    body.className = "pfg-toast__body";
    body.textContent = message;
    const close = document.createElement("button");
    close.className = "pfg-toast__close";
    close.setAttribute("aria-label", "Dismiss");
    close.textContent = "×";
    el.appendChild(iconEl);
    el.appendChild(body);
    el.appendChild(close);
    container.appendChild(el);
    const dismiss = () => {
      if (!el.parentNode) return;
      el.classList.add("pfg-toast--leaving");
      setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 200);
    };
    close.addEventListener("click", dismiss);
    if (duration > 0) setTimeout(dismiss, duration);
    return dismiss;
  };
})();

// FIRMWIDE ANNOUNCEMENTS
// Owner-posted news that shows on every user's home dashboard.
// Data lives in HR storage as `announcements: [{ id, title, body, priority, postedBy, postedByName, postedAt }]`
// Priority: "normal" (blue) or "important" (gold with icon).
// Displays up to 3 most-recent by default; expands to show all.
// ============================================================
function AnnouncementsCard({ currentUser, onOpenHR }) {
  const [items, setItems] = useState(null);   // null while loading; [] when empty
  const [expanded, setExpanded] = useState(false);
  const isOwner = currentUser?.isOwner;

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const r = await window.storage.get("pfg-hr-v1");
        if (cancelled) return;
        const d = r?.value ? JSON.parse(r.value) : null;
        setItems((d?.announcements || []).slice().sort((a, b) => (b.postedAt || 0) > (a.postedAt || 0) ? 1 : -1));
      } catch (e) {
        if (!cancelled) setItems([]);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  if (items === null) return null;   // Skip render during load — no flicker
  // If empty AND user isn't an owner, don't take up space. Owners see the empty state prompting them to post.
  if (items.length === 0 && !isOwner) return null;

  const visible = expanded ? items : items.slice(0, 3);

  return (
    <Card style={{ padding: 14, marginBottom: 18, borderLeft: `3px solid ${COLORS.gold}`, background: `linear-gradient(135deg, ${COLORS.gold}0A 0%, ${COLORS.surface} 60%)` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8, marginBottom: items.length > 0 ? 10 : 0 }}>
        <div>
          <div style={{ fontSize: 10, color: COLORS.primary, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 700 }}>📢 Announcements</div>
          <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 2 }}>
            {items.length === 0 ? "No announcements yet." : `${items.length} posted${items.length > 3 ? ` · showing ${visible.length}` : ""}`}
          </div>
        </div>
        {isOwner && (
          <button onClick={() => onOpenHR && onOpenHR("settings")} type="button"
            style={{ background: "transparent", border: `1px solid ${COLORS.gold}66`, borderRadius: 6, padding: "4px 10px", fontSize: 11, fontWeight: 700, color: COLORS.primaryDark, cursor: "pointer", fontFamily: "inherit" }}>
            ✏️ Manage
          </button>
        )}
      </div>
      {items.length > 0 && (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {visible.map(a => (
            <div key={a.id} style={{ padding: "10px 12px", background: COLORS.surface, borderRadius: 6, borderLeft: `3px solid ${a.priority === "important" ? COLORS.danger : COLORS.primary}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.text }}>
                  {a.priority === "important" && <span style={{ marginRight: 4 }}>⚠️</span>}
                  {a.title}
                </div>
                <div style={{ fontSize: 10, color: COLORS.textDim }}>
                  {a.postedByName || "—"} · {a.postedAt ? new Date(a.postedAt).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : ""}
                </div>
              </div>
              {a.body && <div style={{ fontSize: 12, color: COLORS.textMuted, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{a.body}</div>}
            </div>
          ))}
          {items.length > 3 && (
            <button onClick={() => setExpanded(!expanded)} type="button"
              style={{ background: "none", border: "none", color: COLORS.primary, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", padding: "6px 0", textAlign: "left" }}>
              {expanded ? "Show fewer ▲" : `Show all ${items.length} announcements ▼`}
            </button>
          )}
        </div>
      )}
    </Card>
  );
}

// DATA BACKUP / RESTORE
// Owner tool to export the entire PFG data footprint (HR, Investments,
// Retirement Plans, Outlook, Risk History, Recession Thresholds, Worker URL)
// into a single JSON file, and to restore it back — either on the same machine
// after a browser data reset, or on a different machine to migrate.
//
// Storage keys covered:
//   pfg-hr-v1, pfg-investments-v1, pfg-outlook-v1, pfg-risk-history-v1,
//   pfg-recession-thresholds-v1, crm-data-v5, pfg-worker-url
// ============================================================
const PFG_BACKUP_KEYS = [
  { key: "pfg-hr-v1",                    label: "HR & Reimbursements" },
  { key: "pfg-investments-v1",           label: "Stock Universe & Models" },
  { key: "pfg-outlook-v1",               label: "Quarterly Outlook" },
  { key: "pfg-risk-history-v1",          label: "Risk Assessments" },
  { key: "pfg-recession-thresholds-v1",  label: "Recession Thresholds" },
  { key: "crm-data-v5",                  label: "Retirement Plans" },
  { key: "pfg-worker-url",               label: "Worker URL" },
  { key: "pfg-recent-cmd-v1",            label: "Command Palette History" },
];

function BackupRestore() {
  const [busy, setBusy] = useState(false);
  const fileInputRef = useRef(null);
  // Storage usage — computed by summing key + value lengths across PFG keys.
  // Recomputed on mount and after every restore.
  const [usage, setUsage] = useState(null);   // { totalBytes, perKey: {key: bytes} }
  const computeUsage = useCallback(async () => {
    const perKey = {};
    let total = 0;
    for (const { key } of PFG_BACKUP_KEYS) {
      try {
        const r = await window.storage.get(key);
        const v = r?.value ?? "";
        // Storage cost: each character in localStorage is stored as UTF-16 = 2 bytes.
        // Include the key name too — modern browsers count both toward the quota.
        const bytes = (key.length + String(v).length) * 2;
        perKey[key] = bytes;
        total += bytes;
      } catch (e) { perKey[key] = 0; }
    }
    setUsage({ totalBytes: total, perKey });
  }, []);
  useEffect(() => { computeUsage(); }, [computeUsage]);

  // Format bytes to human string. Approximate — the real limit varies by browser.
  const fmtBytes = (b) => {
    if (b == null) return "—";
    if (b < 1024) return `${b} B`;
    if (b < 1024 * 1024) return `${(b / 1024).toFixed(0)} KB`;
    return `${(b / 1024 / 1024).toFixed(2)} MB`;
  };
  // Typical browser localStorage quota. Not authoritative — some browsers allow more or less.
  const APPROX_QUOTA_MB = 5;
  const APPROX_QUOTA_BYTES = APPROX_QUOTA_MB * 1024 * 1024;
  const pct = usage ? Math.min(100, (usage.totalBytes / APPROX_QUOTA_BYTES) * 100) : 0;
  const pctColor = pct > 80 ? COLORS.danger : pct > 50 ? COLORS.warning : COLORS.success;

  const doExport = async () => {
    setBusy(true);
    const bundle = { pfgBackupVersion: 1, exportedAt: new Date().toISOString(), keys: {} };
    for (const { key } of PFG_BACKUP_KEYS) {
      try {
        // Storage abstraction handles both window.storage and localStorage
        const r = await window.storage.get(key);
        if (r && r.value != null) bundle.keys[key] = r.value;
      } catch (e) { /* skip missing keys */ }
    }
    const json = JSON.stringify(bundle, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const ds = new Date().toISOString().split("T")[0];
    a.download = `pfg_backup_${ds}.json`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
    setBusy(false);
    const bytes = new Blob([json]).size;
    const size = bytes > 1024 * 1024 ? (bytes / 1024 / 1024).toFixed(2) + "MB" : (bytes / 1024).toFixed(0) + "KB";
    if (window.pfgToast) window.pfgToast(`Backup exported (${Object.keys(bundle.keys).length} keys · ${size})`, "success");
  };

  const doImport = () => fileInputRef.current?.click();

  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    e.target.value = "";   // reset so re-selecting same file re-fires
    if (!file) return;
    if (!confirm(
      `Restore data from ${file.name}?\n\n` +
      `This will OVERWRITE every current data record in this browser (HR, plans, investments, outlook, risk history, thresholds).\n\n` +
      `You should export a fresh backup first if you're unsure. Continue?`
    )) return;
    setBusy(true);
    try {
      const text = await file.text();
      const bundle = JSON.parse(text);
      if (!bundle || typeof bundle !== "object" || !bundle.keys) throw new Error("Not a PFG backup file — missing 'keys' field.");
      let restored = 0;
      for (const { key } of PFG_BACKUP_KEYS) {
        if (bundle.keys[key] != null) {
          try {
            await window.storage.set(key, bundle.keys[key]);
            restored++;
          } catch (err) { console.error("[PFG] restore failed for", key, err); }
        }
      }
      setBusy(false);
      if (window.pfgToast) window.pfgToast(`Restored ${restored} data ${restored === 1 ? "record" : "records"} · reloading…`, "success", { duration: 2500 });
      // Reload so all React components re-hydrate from restored storage
      setTimeout(() => window.location.reload(), 1500);
    } catch (err) {
      setBusy(false);
      if (window.pfgToast) window.pfgToast("Restore failed: " + err.message, "error", { duration: 6000 });
      else alert("Restore failed: " + err.message);
    }
  };

  return (
    <Card style={{ padding: 20, marginBottom: 16, borderLeft: `4px solid ${COLORS.gold}` }}>
      <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>💾 Data Backup &amp; Restore</div>
      <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 14, lineHeight: 1.6 }}>
        PointerOS data lives in your browser's storage. Export a JSON backup for safekeeping, or restore from a previous backup to migrate to a different browser or recover after data loss.
      </div>

      {/* Storage usage — approximate; browsers commonly cap localStorage at ~5MB */}
      {usage && (
        <div style={{ padding: 12, background: COLORS.bg, borderRadius: 8, marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6, flexWrap: "wrap", gap: 8 }}>
            <div style={{ fontSize: 11, color: COLORS.textMuted, fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase" }}>Storage Usage</div>
            <div style={{ fontSize: 11, color: pct > 80 ? COLORS.danger : COLORS.textMuted }}>
              <strong style={{ color: COLORS.text }}>{fmtBytes(usage.totalBytes)}</strong> of ~{APPROX_QUOTA_MB} MB · {pct.toFixed(pct < 1 ? 2 : 1)}%
            </div>
          </div>
          {/* Bar */}
          <div style={{ height: 8, background: COLORS.borderLight, borderRadius: 4, overflow: "hidden" }}>
            <div style={{ width: `${Math.max(0.5, pct)}%`, height: "100%", background: pctColor, transition: "width 0.4s, background 0.3s" }} />
          </div>
          {pct > 80 && (
            <div style={{ marginTop: 8, fontSize: 11, color: COLORS.danger, fontWeight: 600 }}>
              ⚠ Approaching the browser's storage limit. Consider exporting a backup and pruning old data (calendar entries, activity history).
            </div>
          )}
          {pct > 50 && pct <= 80 && (
            <div style={{ marginTop: 8, fontSize: 11, color: COLORS.warning }}>
              About half full. Regular backups are a good habit.
            </div>
          )}
        </div>
      )}

      <div style={{ padding: 12, background: COLORS.bg, borderRadius: 8, marginBottom: 14 }}>
        <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 8, fontWeight: 700, letterSpacing: 0.5 }}>INCLUDED IN BACKUP</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 6 }}>
          {PFG_BACKUP_KEYS.map(k => (
            <div key={k.key} style={{ fontSize: 12, color: COLORS.text, display: "flex", gap: 6, alignItems: "center" }}>
              <span style={{ color: COLORS.success, fontWeight: 700 }}>✓</span>
              {k.label}
            </div>
          ))}
        </div>
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
        <Button onClick={doExport} disabled={busy}>⬇ Export Backup</Button>
        <Button variant="ghost" onClick={doImport} disabled={busy}>⬆ Restore from File</Button>
        <span style={{ fontSize: 11, color: COLORS.textDim, marginLeft: "auto" }}>
          Restore reloads the page automatically. Export before restoring if unsure.
        </span>
      </div>
      <input ref={fileInputRef} type="file" accept="application/json,.json" onChange={handleFile} style={{ display: "none" }} />
    </Card>
  );
}

function AnnouncementsEditor({ currentUser, announcements, saveHR }) {
  const [draft, setDraft] = useState({ title: "", body: "", priority: "normal" });
  const [editingId, setEditingId] = useState(null);

  const post = () => {
    const title = (draft.title || "").trim();
    if (!title) { alert("Please enter a title."); return; }
    const now = Date.now();
    if (editingId) {
      // Update existing
      const next = (announcements || []).map(a =>
        a.id === editingId
          ? { ...a, title, body: (draft.body || "").trim(), priority: draft.priority, editedAt: now }
          : a
      );
      saveHR({ announcements: next });
      setEditingId(null);
      if (window.pfgToast) window.pfgToast("Announcement updated", "success");
    } else {
      const entry = {
        id: "a-" + now + "-" + Math.random().toString(36).slice(2, 6),
        title,
        body: (draft.body || "").trim(),
        priority: draft.priority || "normal",
        postedBy: currentUser?.id,
        postedByName: currentUser?.name || "—",
        postedAt: now,
      };
      saveHR({ announcements: [...(announcements || []), entry] });
      if (window.pfgToast) window.pfgToast(`Posted "${title}" to the firm`, "success");
    }
    setDraft({ title: "", body: "", priority: "normal" });
  };

  const editEntry = (a) => {
    setDraft({ title: a.title || "", body: a.body || "", priority: a.priority || "normal" });
    setEditingId(a.id);
  };
  const cancelEdit = () => { setEditingId(null); setDraft({ title: "", body: "", priority: "normal" }); };

  const remove = (id) => {
    if (!confirm("Delete this announcement? It will disappear from everyone's home dashboard.")) return;
    saveHR({ announcements: (announcements || []).filter(a => a.id !== id) });
    if (editingId === id) cancelEdit();
  };

  const sorted = (announcements || []).slice().sort((a, b) => (b.postedAt || 0) - (a.postedAt || 0));

  return (
    <Card style={{ padding: 20, marginBottom: 16 }}>
      <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>📢 Firmwide Announcements</div>
      <div style={{ fontSize: 12, color: COLORS.textMuted, marginBottom: 14, lineHeight: 1.5 }}>
        Post news, policy updates, or celebrations. Announcements appear on every user's home dashboard.
        Mark "Important" for policy changes or time-sensitive items.
      </div>

      {/* Draft form */}
      <div style={{ padding: 14, background: COLORS.bg, borderRadius: 8, marginBottom: 14 }}>
        <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 6, fontWeight: 600 }}>
          {editingId ? "EDITING ANNOUNCEMENT" : "NEW ANNOUNCEMENT"}
        </div>
        <Input label="Title" value={draft.title} onChange={v => setDraft({ ...draft, title: v })} placeholder="e.g., Office closed Friday for Independence Day" />
        <div style={{ marginTop: 10 }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, marginBottom: 4, fontWeight: 600 }}>Body (optional)</div>
          <textarea
            value={draft.body}
            onChange={e => setDraft({ ...draft, body: e.target.value })}
            placeholder="Additional context, dates, or details…"
            rows={3}
            style={{ width: "100%", padding: 10, borderRadius: 8, border: `1px solid ${COLORS.border}`, fontSize: 13, fontFamily: "inherit", resize: "vertical", boxSizing: "border-box" }}
          />
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
          <Select label="Priority" value={draft.priority} onChange={v => setDraft({ ...draft, priority: v })}
            options={[{ value: "normal", label: "Normal" }, { value: "important", label: "Important (⚠️)" }]} />
          <div style={{ display: "flex", gap: 8 }}>
            {editingId && <Button variant="ghost" onClick={cancelEdit}>Cancel</Button>}
            <Button onClick={post} disabled={!draft.title.trim()}>{editingId ? "Save Changes" : "Post"}</Button>
          </div>
        </div>
      </div>

      {/* Existing announcements list */}
      {sorted.length === 0 ? (
        <div style={{ padding: 12, textAlign: "center", color: COLORS.textMuted, fontSize: 12, fontStyle: "italic" }}>
          No announcements yet. Post one above.
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700 }}>Posted ({sorted.length})</div>
          {sorted.map(a => (
            <div key={a.id} style={{ padding: "10px 12px", background: COLORS.surface, borderRadius: 6, border: `1px solid ${COLORS.borderLight}`, borderLeft: `3px solid ${a.priority === "important" ? COLORS.danger : COLORS.primary}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.text }}>
                  {a.priority === "important" && <span style={{ marginRight: 4 }}>⚠️</span>}
                  {a.title}
                </div>
                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  <span style={{ fontSize: 10, color: COLORS.textDim }}>
                    {a.postedByName} · {a.postedAt ? new Date(a.postedAt).toLocaleDateString(undefined, { month: "short", day: "numeric" }) : ""}
                    {a.editedAt && <span title={new Date(a.editedAt).toLocaleString()}> · edited</span>}
                  </span>
                  <Button size="sm" variant="ghost" onClick={() => editEntry(a)}>Edit</Button>
                  <Button size="sm" variant="ghost" onClick={() => remove(a.id)}>Delete</Button>
                </div>
              </div>
              {a.body && <div style={{ fontSize: 12, color: COLORS.textMuted, lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{a.body}</div>}
            </div>
          ))}
        </div>
      )}
    </Card>
  );
}

// ============================================================
// OWNER ACTION ITEMS
// A single-glance card for Matt/Alex showing everything that needs their
// attention: pending leaves, reimbursements, banked PTO, profile change
// requests. Each item deep-links into the right HR page.
//
// Reads pfg-hr-v1 storage directly on mount (same read-through pattern
// as HomeDashboardPeek). Only renders for owners.
// ============================================================
// ============================================================
// RECENT ACTIVITY FEED (owner-only)
// Read-only view of the last 5-8 significant actions across HR: reviewed
// leave requests, reviewed reimbursements, reviewed banked entries, and
// posted announcements. Derived from existing storage on mount — no new
// data model needed. Timestamps rendered as relative ("2h ago").
// ============================================================
function RecentActivityCard({ currentUser, isOwnerUser, onOpenHR }) {
  const [items, setItems] = useState(null);
  useEffect(() => {
    if (!isOwnerUser) return;
    let cancelled = false;
    (async () => {
      try {
        const r = await window.storage.get("pfg-hr-v1");
        if (cancelled) return;
        const d = r?.value ? JSON.parse(r.value) : {};
        const events = [];
        // Reviewed leaves (approved or denied)
        (d.leaveRequests || []).forEach(x => {
          if (x.status && x.status !== "pending" && x.reviewedAt) {
            events.push({
              kind: "leave", ts: x.reviewedAt,
              icon: x.status === "approved" ? "✓" : "✕",
              iconColor: x.status === "approved" ? COLORS.success : COLORS.danger,
              text: `${x.status === "approved" ? "Approved" : "Denied"} ${x.leaveType} for ${x.requestedByName} · ${x.startDate}${x.endDate && x.endDate !== x.startDate ? ` → ${x.endDate}` : ""}`,
              by: x.reviewedBy, page: "leave",
            });
          }
        });
        // Reviewed reimbursements
        (d.reimbursements || []).forEach(x => {
          if (x.reviewedAt && x.status && x.status !== "submitted") {
            const map = { approved: { i: "✓", c: COLORS.success, t: "Approved" }, paid: { i: "💵", c: COLORS.primary, t: "Marked paid" }, denied: { i: "✕", c: COLORS.danger, t: "Denied" }, inProgress: { i: "⋯", c: COLORS.warning, t: "Started" } };
            const meta = map[x.status] || { i: "•", c: COLORS.textDim, t: x.status };
            events.push({
              kind: "reimb", ts: x.reviewedAt,
              icon: meta.i, iconColor: meta.c,
              text: `${meta.t} $${(x.amount || 0).toFixed(2)} ${x.category || ""} from ${x.userName}`,
              by: x.reviewedBy, page: "reimb",
            });
          }
        });
        // Reviewed banked PTO
        (d.bankedPto || []).forEach(x => {
          if (x.reviewedAt && x.status && x.status !== "submitted") {
            events.push({
              kind: "banked", ts: x.reviewedAt,
              icon: x.status === "approved" ? "🏦" : "✕",
              iconColor: x.status === "approved" ? COLORS.success : COLORS.danger,
              text: `${x.status === "approved" ? "Approved" : "Denied"} banked PTO for ${x.userName} · ${x.date}`,
              by: x.reviewedBy, page: "leave",
            });
          }
        });
        // Posted announcements
        (d.announcements || []).forEach(x => {
          if (x.postedAt) {
            events.push({
              kind: "announce", ts: new Date(x.postedAt).toISOString(),
              icon: x.priority === "important" ? "⚠️" : "📢",
              iconColor: x.priority === "important" ? COLORS.danger : COLORS.gold,
              text: `Posted announcement: "${x.title}"`,
              by: x.postedByName, page: "settings",
            });
          }
        });
        // Sort newest first, keep top 6
        events.sort((a, b) => (b.ts || "").localeCompare(a.ts || ""));
        if (!cancelled) setItems(events.slice(0, 6));
      } catch (e) { if (!cancelled) setItems([]); }
    })();
    return () => { cancelled = true; };
  }, [isOwnerUser]);

  if (!isOwnerUser || items === null) return null;
  if (items.length === 0) return null;   // Fresh install — don't take up space

  // Format relative time
  const relTime = (iso) => {
    if (!iso) return "";
    const then = new Date(iso).getTime();
    const now = Date.now();
    const diff = Math.max(0, now - then);
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return "just now";
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    if (days < 7) return `${days}d ago`;
    const wks = Math.floor(days / 7);
    if (wks < 5) return `${wks}w ago`;
    const mos = Math.floor(days / 30);
    if (mos < 12) return `${mos}mo ago`;
    return `${Math.floor(days / 365)}y ago`;
  };

  return (
    <Card style={{ padding: 14, marginBottom: 16, borderLeft: `3px solid ${COLORS.primary}` }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
        <div>
          <div style={{ fontSize: 10, color: COLORS.primary, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 700 }}>🕒 Recent Activity</div>
          <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 2 }}>Last {items.length} action{items.length === 1 ? "" : "s"} across HR</div>
        </div>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {items.map((ev, i) => (
          <button key={i} type="button" onClick={() => onOpenHR && onOpenHR(ev.page)}
            style={{ background: "none", border: "none", padding: "6px 8px", borderRadius: 6, cursor: "pointer", textAlign: "left", fontFamily: "inherit", display: "flex", alignItems: "flex-start", gap: 10, transition: "background 0.15s" }}
            onMouseEnter={e => e.currentTarget.style.background = COLORS.bg}
            onMouseLeave={e => e.currentTarget.style.background = "none"}>
            <span style={{ fontSize: 14, color: ev.iconColor, flexShrink: 0, width: 20, textAlign: "center" }}>{ev.icon}</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 12, color: COLORS.text, lineHeight: 1.4 }}>{ev.text}</div>
              <div style={{ fontSize: 10, color: COLORS.textDim, marginTop: 2 }}>
                {ev.by || "—"} · {relTime(ev.ts)}
              </div>
            </div>
          </button>
        ))}
      </div>
    </Card>
  );
}

function OwnerActionItems({ onOpenHR, isOwnerUser }) {
  const [snap, setSnap] = useState(null);
  useEffect(() => {
    if (!isOwnerUser) return;
    let cancelled = false;
    (async () => {
      try {
        const r = await window.storage.get("pfg-hr-v1");
        if (cancelled) return;
        setSnap(r?.value ? JSON.parse(r.value) : {});
      } catch (e) { if (!cancelled) setSnap({}); }

    return () => { cancelled = true; };

  // Count each category
  const pendingLeaves = (snap.leaveRequests || []).filter(r => r.status === "submitted").length;

    { key: "banked",     count: pendingBanked,     label: "Banked PTO",         icon: "🏦", color: COLORS.gold,    page: "leave" },
    { key: "profile",    count: pendingProfile,    label: "Profile Change",     icon: "👤", color: COLORS.primaryDark, page: "employees" },

        <div>
          <div style={{ fontSize: 10, color: COLORS.primary, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 700 }}>⏳ Action Items · Owner</div>
          <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 2 }}>{total} item{total === 1 ? "" : "s"} awaiting your review</div>

      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 8 }}>

// ============================================================
// HOME DASHBOARD PEEK
// Compact 14-day firm-calendar peek shown above the tile grid on sign-in.
// Uses only App-level data (people + module-level constants) so it works
// without loading the HR Toolsuite state. For full snapshot incl. OOO leaves,
// users click into HR → My Profile.
// ============================================================
function HomeDashboardPeek({ people, onOpenHR, isOwnerUser }) {
  // Lightweight read of the HR storage on mount so the peek can surface
  // approved Out-of-Office leaves and (for owners) banked PTO awaiting review.
  // HRToolsuiteApp still owns the canonical state — this is a read-through view
  // of what's already been persisted. Re-mount on each home visit = fresh data.
  const [hrSnapshot, setHrSnapshot] = useState(null);
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const r = await window.storage.get("pfg-hr-v1");
        if (cancelled) return;
        setHrSnapshot(r?.value ? JSON.parse(r.value) : { leaveRequests: [], bankedPto: [] });
      } catch (e) {
        if (!cancelled) setHrSnapshot({ leaveRequests: [], bankedPto: [] });
      }
    })();
    return () => { cancelled = true; };
  }, []);

  const today = new Date(); today.setHours(0, 0, 0, 0);
  const horizonEnd = new Date(today); horizonEnd.setDate(today.getDate() + 13); horizonEnd.setHours(23, 59, 59, 999);
  const todayStr = today.toISOString().split("T")[0];
  const endStr = horizonEnd.toISOString().split("T")[0];
  const inWindow = (ds) => ds && ds >= todayStr && ds <= endStr;
  const fmt = (d) => d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });

  const items = [];   // { date, label, kind, color }

  // Birthdays (this year and next, to cover year wrap)
  (people || []).forEach(p => {
    if (!p.birthday || !p.active || p.isTestAccount) return;
    const [yy, mm, dd] = p.birthday.split("-");
    [today.getFullYear(), today.getFullYear() + 1].forEach(yr => {
      const ds = `${yr}-${mm}-${dd}`;
      if (!inWindow(ds)) return;
      const turning = parseInt(yy, 10) ? yr - parseInt(yy, 10) : null;
      items.push({ date: new Date(ds + "T00:00:00"), kind: "🎂", color: COLORS.gold, label: `${p.name}'s birthday${turning ? ` · turning ${turning}` : ""}` });
    });
  });

  // Work anniversaries
  (people || []).forEach(p => {
    if (!p.dateOfHire || !p.active || p.isTestAccount) return;
    const [yy, mm, dd] = p.dateOfHire.split("-");
    [today.getFullYear(), today.getFullYear() + 1].forEach(yr => {
      const ds = `${yr}-${mm}-${dd}`;
      if (!inWindow(ds) || parseInt(yy, 10) >= yr) return;
      const years = yr - parseInt(yy, 10);
      items.push({ date: new Date(ds + "T00:00:00"), kind: "🎉", color: COLORS.primary, label: `${p.name} · ${years} year${years === 1 ? "" : "s"} at Pointer` });
    });
  });

  // 401(k) milestones (30/60/90 days from hire)
  (people || []).forEach(p => {
    if (!p.dateOfHire || !p.active || p.isTestAccount) return;
    const hire = new Date(p.dateOfHire + "T00:00:00");
    [30, 60, 90].forEach(d => {
      const ms = new Date(hire); ms.setDate(hire.getDate() + d);
      const ds = ms.toISOString().split("T")[0];
      if (!inWindow(ds)) return;
      items.push({ date: ms, kind: "📈", color: COLORS.success, label: `${p.name} · ${d}-day 401(k) mark` });
    });
  });

  // Trading holidays
  if (typeof TRADING_HOLIDAYS !== "undefined") {
    Object.entries(TRADING_HOLIDAYS).forEach(([ds, name]) => {
      if (!inWindow(ds)) return;
      items.push({ date: new Date(ds + "T00:00:00"), kind: "🏦", color: COLORS.danger, label: name });
    });
  }

  // Recurring meetings (Monday team huddle)
  if (typeof projectRecurringEvents === "function") {
    projectRecurringEvents(today, horizonEnd).forEach(occ => {
      items.push({ date: occ.date, kind: occ.icon || "👥", color: COLORS.primary, label: `${occ.title}${occ.time ? ` · ${occ.time} ${occ.timezoneLabel || ""}` : ""}` });
    });
  }

  // Out of Office — approved leaves overlapping the 14-day window.
  // Pulled from the HR storage snapshot loaded on mount.
  (hrSnapshot?.leaveRequests || []).forEach(r => {
    if (r.status !== "approved") return;
    const start = r.startDate;
    const end = r.endDate || r.startDate;
    if (!start || end < todayStr || start > endStr) return;
    // Anchor the item to the start date (or today if it's already started)
    const anchorStr = start < todayStr ? todayStr : start;
    const icon = r.leaveType === "Sick" ? "🤒" : r.leaveType === "Military" ? "🎖" : r.leaveType === "Bereavement" ? "🕊" : "🏖";
    const rangeLabel = start === end ? "" : ` (through ${fmt(new Date(end + "T00:00:00"))})`;
    items.push({
      date: new Date(anchorStr + "T00:00:00"),
      kind: icon,
      color: COLORS.warning,
      label: `${r.requestedByName} · ${r.leaveType}${rangeLabel}`,
    });
  });

  // Banked PTO awaiting review (owner-only signal — Matt/Alex)
  const bankedPendingCount = isOwnerUser
    ? (hrSnapshot?.bankedPto || []).filter(b => b.status === "submitted").length
    : 0;

  items.sort((a, b) => a.date - b.date);

  if (items.length === 0) {
    return (
      <Card style={{ padding: 14, marginBottom: 18, borderLeft: `3px solid ${COLORS.borderLight}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
          <div>
            <div style={{ fontSize: 10, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 700 }}>📅 Next 14 Days</div>
            <div style={{ fontSize: 13, color: COLORS.textMuted, marginTop: 2 }}>Quiet two weeks ahead on the firm calendar.</div>
          </div>
          <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
            {bankedPendingCount > 0 && (
              <button onClick={() => onOpenHR && onOpenHR("leave")} type="button"
                style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 11px", background: COLORS.gold, color: COLORS.primaryDark, border: "none", borderRadius: 12, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                🏦 {bankedPendingCount} banked PTO awaiting review
              </button>
            )}
            {onOpenHR && <button onClick={() => onOpenHR()} type="button" style={{ background: "none", border: "none", color: COLORS.primary, fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>View full snapshot →</button>}
          </div>
        </div>
      </Card>
    );
  }

  // Show up to 6 items in the peek; rest accessible via the link to HR
  const visible = items.slice(0, 6);
  const overflow = items.length - visible.length;

  return (
    <Card style={{ padding: 14, marginBottom: 18, borderLeft: `3px solid ${COLORS.primary}`, background: "linear-gradient(135deg, #F8FBFF 0%, #FFFFFF 80%)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8, marginBottom: 10 }}>
        <div>
          <div style={{ fontSize: 10, color: COLORS.primary, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 700 }}>📅 Next 14 Days · Firm Calendar</div>
          <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 2 }}>
            {items.length} item{items.length === 1 ? "" : "s"} ahead{overflow > 0 ? ` · showing first ${visible.length}` : ""}
          </div>
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
          {bankedPendingCount > 0 && (
            <button onClick={() => onOpenHR && onOpenHR("leave")} type="button"
              style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "5px 11px", background: COLORS.gold, color: COLORS.primaryDark, border: "none", borderRadius: 12, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
              🏦 {bankedPendingCount} banked PTO awaiting review
            </button>
          )}
          {onOpenHR && <button onClick={() => onOpenHR()} type="button" style={{ background: "none", border: "none", color: COLORS.primary, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Full snapshot →</button>}
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 6 }}>
        {visible.map((it, i) => (
          <div key={i} style={{ padding: "6px 10px", background: COLORS.surface, borderRadius: 6, fontSize: 12, display: "flex", gap: 8, alignItems: "baseline", borderLeft: `2px solid ${it.color}` }}>
            <span style={{ fontSize: 13 }}>{it.kind}</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ color: COLORS.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={it.label}>{it.label}</div>
              <div style={{ fontSize: 10, color: COLORS.textMuted }}>{fmt(it.date)}</div>
            </div>
          </div>
        ))}
      </div>
    </Card>
  );
}

// ============================================================
// PROFILE SETUP WIZARD
// Shown on first login (after password-set) for any user whose
// profileSetupComplete is false. Collects: name, DOB, role, hire date,
// past PTO days used, and any military / unpaid leave periods.
// Persists to the people record + flips profileSetupComplete to true.
// ============================================================
function ProfileSetupWizard({ user, onComplete, onSkip }) {
  // Build a unified leave list at mount: every existing entry gets an isMilitary flag.
  // On submit, we split back into militaryLeaves / unpaidLeaves so storage shape is unchanged.
  const initialLeaves = [
    ...((user.militaryLeaves || []).map(l => ({ ...l, isMilitary: true }))),
    ...((user.unpaidLeaves || []).map(l => ({ ...l, isMilitary: false }))),
  ];

  const [form, setForm] = useState({
    name: user.name || "",
    birthday: user.birthday || "",
    role: user.role || "",
    dateOfHire: user.dateOfHire || "",
    pastPtoDays: 0,                      // PTO days used so far this year
    leaves: initialLeaves,               // unified [{ start, end, isMilitary }]
  });
  const [error, setError] = useState("");

  const addLeavePeriod = () => {
    setForm({ ...form, leaves: [...(form.leaves || []), { start: "", end: "", isMilitary: false }] });
  };
  const updateLeavePeriod = (idx, field, value) => {
    const next = [...(form.leaves || [])];
    next[idx] = { ...next[idx], [field]: value };
    setForm({ ...form, leaves: next });
  };
  const removeLeavePeriod = (idx) => {
    setForm({ ...form, leaves: (form.leaves || []).filter((_, i) => i !== idx) });
  };

  const submit = () => {
    setError("");
    if (!form.name.trim()) { setError("Name is required."); return; }
    if (!form.dateOfHire) { setError("Date of hire is required so PTO can be calculated."); return; }
    // Split unified leaves back into the two storage arrays
    const cleanLeaves = (arr) => (arr || []).filter(l => l && l.start && l.end);
    const cleaned = cleanLeaves(form.leaves);
    const militaryLeaves = cleaned.filter(l => l.isMilitary).map(({ isMilitary, ...rest }) => rest);
    const unpaidLeaves   = cleaned.filter(l => !l.isMilitary).map(({ isMilitary, ...rest }) => rest);

    // Apply pastPtoDays as the current-year ptoHistory used count
    const yr = String(new Date().getFullYear());
    const hist = { ...(user.ptoHistory || {}) };
    if (!hist[yr]) hist[yr] = { allot: user.ptoAllot || 0, used: 0, carriedIn: 0 };
    hist[yr] = { ...hist[yr], used: Math.max(0, Number(form.pastPtoDays) || 0) };

    const updates = {
      name: form.name.trim(),
      birthday: form.birthday || null,
      role: form.role.trim(),
      dateOfHire: form.dateOfHire,
      militaryLeaves: militaryLeaves,
      unpaidLeaves: unpaidLeaves,
      ptoHistory: hist,
      ptoUsed: Math.max(0, Number(form.pastPtoDays) || 0),
      profileSetupComplete: true,
    };
    onComplete(updates);
  };

  return (
    <div style={{ minHeight: "100vh", background: "#EDF2F8", padding: "40px 20px", fontFamily: "'DM Sans', 'Segoe UI', sans-serif" }}>
      <div style={{ maxWidth: 720, margin: "0 auto" }}>
        {/* Header */}
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ fontSize: 32, fontWeight: 800, color: COLORS.primary }}>PointerOS</div>
          <div style={{ color: COLORS.textMuted, fontSize: 12, letterSpacing: 2, marginBottom: 18 }}>Loyalty · Altruism · Expertise</div>
          <div style={{ fontSize: 24, fontWeight: 700, color: COLORS.text }}>Welcome, {(form.name || "there").split(" ")[0]}.</div>
          <div style={{ fontSize: 14, color: COLORS.textMuted, marginTop: 6, lineHeight: 1.5 }}>
            Let's get your profile set up. Fill in what's accurate; anything you don't know you can update later.
          </div>
        </div>

        {/* Form card */}
        <Card style={{ padding: 28, marginBottom: 16, background: COLORS.surface, borderLeft: `4px solid ${COLORS.gold}` }}>
          <div style={{ fontSize: 11, color: COLORS.gold, textTransform: "uppercase", letterSpacing: 2, fontWeight: 700, marginBottom: 6 }}>Profile</div>
          <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 18 }}>Tell us about yourself</div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 10 }}>
            <Input label="Full Name *" value={form.name} onChange={v => setForm({ ...form, name: v })} placeholder="Jane Doe" />
            <Input label="Date of Birth" type="date" value={form.birthday} onChange={v => setForm({ ...form, birthday: v })} />
            <Input label="Role / Title" value={form.role} onChange={v => setForm({ ...form, role: v })} placeholder="Advisor, Investment Analyst, etc." />
            <Input label="Date of Hire *" type="date" value={form.dateOfHire} onChange={v => setForm({ ...form, dateOfHire: v })} />
          </div>
        </Card>

        {/* PTO Card */}
        {user.ptoApplicable !== false && (
          <Card style={{ padding: 28, marginBottom: 16, background: COLORS.surface }}>
            <div style={{ fontSize: 11, color: COLORS.primary, textTransform: "uppercase", letterSpacing: 2, fontWeight: 700, marginBottom: 6 }}>Paid Time Off</div>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 8 }}>PTO already used this year</div>
            <p style={{ fontSize: 13, color: COLORS.textMuted, lineHeight: 1.5, marginBottom: 14 }}>
              How many PTO days have you already taken in {new Date().getFullYear()} before joining PointerOS? Leave at 0 if none.
            </p>
            <Input label="Days used so far" type="number" value={String(form.pastPtoDays)}
              onChange={v => setForm({ ...form, pastPtoDays: v })} placeholder="0" />
          </Card>
        )}

        {/* Leave history */}
        <Card style={{ padding: 28, marginBottom: 16, background: COLORS.surface }}>
          <div style={{ fontSize: 11, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: 2, fontWeight: 700, marginBottom: 6 }}>Leave History</div>
          <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 8 }}>Past military or unpaid leave</div>
          <p style={{ fontSize: 13, color: COLORS.textMuted, lineHeight: 1.5, marginBottom: 14 }}>
            Document any periods of unpaid leave so seniority and PTO accrual are calculated correctly. Add as many ranges as needed. Check "Military" if the period was active military service.
          </p>

          {/* Unified leave list — one row per period with an 'is military' checkbox */}
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.text }}>Leave periods</div>
              <Button size="sm" variant="ghost" onClick={addLeavePeriod}><IconPlus size={12} /> Add period</Button>
            </div>
            {(form.leaves || []).length === 0 ? (
              <div style={{ fontSize: 12, color: COLORS.textDim, fontStyle: "italic" }}>None entered.</div>
            ) : (
              (form.leaves || []).map((l, i) => (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto auto", gap: 8, marginBottom: 8, alignItems: "end", padding: "8px 10px", background: l.isMilitary ? "#FFF8E7" : COLORS.bg, borderRadius: 6, borderLeft: `3px solid ${l.isMilitary ? COLORS.gold : COLORS.border}` }}>
                  <Input label={`Start ${i+1}`} type="date" value={l.start || ""} onChange={v => updateLeavePeriod(i, "start", v)} />
                  <Input label="End" type="date" value={l.end || ""} onChange={v => updateLeavePeriod(i, "end", v)} />
                  <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: COLORS.text, cursor: "pointer", paddingBottom: 8, whiteSpace: "nowrap" }}>
                    <input type="checkbox" checked={!!l.isMilitary} onChange={e => updateLeavePeriod(i, "isMilitary", e.target.checked)}
                      style={{ width: 16, height: 16, cursor: "pointer" }} />
                    🎖 Military
                  </label>
                  <Button size="sm" variant="ghost" onClick={() => removeLeavePeriod(i)}><IconTrash size={12} /></Button>
                </div>
              ))
            )}
          </div>
        </Card>

        {/* Error + submit */}
        {error && (
          <div style={{ padding: 10, background: COLORS.danger + "11", borderRadius: 8, color: COLORS.danger, fontSize: 13, marginBottom: 14 }}>{error}</div>
        )}
        <div style={{ display: "flex", gap: 10, alignItems: "center", justifyContent: "space-between", flexWrap: "wrap" }}>
          <Button variant="ghost" onClick={onSkip} style={{ color: COLORS.textMuted }}>I'll do this later</Button>
          <Button onClick={submit} style={{ background: COLORS.gold, color: COLORS.primaryDark, padding: "12px 28px", fontSize: 14, fontWeight: 700 }}>
            Continue → Sign In to PointerOS
          </Button>
        </div>
        <div style={{ fontSize: 11, color: COLORS.textDim, textAlign: "center", marginTop: 14, lineHeight: 1.5 }}>
          Anything you enter here can be edited later from HR → My Profile. Changes to name, DOB, role, and date of hire after this will require administrator approval.
        </div>
      </div>
    </div>
  );
}

// ============================================================
// COMMAND PALETTE
// Global fuzzy-search modal opened with Cmd/Ctrl + K.
// Searches employees (name/username/email), stocks (from investment storage),
// and app navigation entries. Keyboard nav: ↑/↓ + Enter, Esc closes.
// ============================================================
function CommandPalette({ open, onClose, people, isOwnerUser, onNavigate }) {
  const [query, setQuery] = useState("");
  const [selectedIdx, setSelectedIdx] = useState(0);
  const [stockUniverse, setStockUniverse] = useState([]);
  const [recentIds, setRecentIds] = useState([]);   // ["nav:hr:profile", "stock:AAPL", "person:matt-bruce"]
  const inputRef = useRef(null);
  const resultsRef = useRef(null);

  // Load recents + stock universe on open
  useEffect(() => {
    if (!open) return;
    (async () => {
      try {
        const r = await window.storage.get("pfg-investments-v1");
        const d = r?.value ? JSON.parse(r.value) : null;
        setStockUniverse(d?.stockUniverse || []);
      } catch (e) { setStockUniverse([]); }
      try {
        const r2 = await window.storage.get("pfg-recent-cmd-v1");
        if (r2?.value) setRecentIds(JSON.parse(r2.value));
      } catch (e) { setRecentIds([]); }
    })();
    // Reset input focus on open
    setQuery("");
    setSelectedIdx(0);
    setTimeout(() => inputRef.current?.focus(), 50);
  }, [open]);

  // Push an entry into recents (dedupe + cap at 8)
  const rememberSelection = (id) => {
    if (!id) return;
    setRecentIds(prev => {
      const next = [id, ...prev.filter(x => x !== id)].slice(0, 8);
      try { window.storage.set("pfg-recent-cmd-v1", JSON.stringify(next)); } catch (e) {}
      return next;
    });
  };

  // Navigation entries — order matters (shown top of results when query is empty)
  const navEntries = [
    { id: "nav:home",             kind: "nav", icon: "🏠", label: "Home",                          action: () => onNavigate("home") },
    { id: "nav:hr:profile",       kind: "nav", icon: "👥", label: "HR Toolsuite · My Profile",     action: () => onNavigate("hr", "profile") },
    { id: "nav:hr:reimb",         kind: "nav", icon: "💳", label: "HR · Reimbursements",           action: () => onNavigate("hr", "reimb") },
    { id: "nav:hr:leave",         kind: "nav", icon: "🏖", label: "HR · Leave Request",            action: () => onNavigate("hr", "leave") },
    { id: "nav:hr:remote",        kind: "nav", icon: "🏠", label: "HR · Remote Work",              action: () => onNavigate("hr", "remote") },
    { id: "nav:hr:review",        kind: "nav", icon: "⭐", label: "HR · Performance Review",       action: () => onNavigate("hr", "review") },
    { id: "nav:hr:calendar",      kind: "nav", icon: "📅", label: "HR · Calendar",                 action: () => onNavigate("hr", "calendar") },
    { id: "nav:hr:documents",     kind: "nav", icon: "📁", label: "HR · Documents",                action: () => onNavigate("hr", "documents") },
    ...(isOwnerUser ? [
      { id: "nav:hr:employees",   kind: "nav", icon: "👤", label: "HR · Employees (Admin)",       action: () => onNavigate("hr", "employees") },
      { id: "nav:hr:settings",    kind: "nav", icon: "⚙️", label: "HR · Settings",                action: () => onNavigate("hr", "settings") },
      { id: "nav:investments",    kind: "nav", icon: "📈", label: "Investment Dashboard",         action: () => onNavigate("investments") },
      { id: "nav:retirement",     kind: "nav", icon: "🏦", label: "Retirement Plan Management",  action: () => onNavigate("retirement") },
    ] : []),
    { id: "nav:risk",             kind: "nav", icon: "🎯", label: "Risk Profile Toolsuite",         action: () => onNavigate("risk") },
  ];

  // Quick actions — searchable shortcuts to common actions.
  // Kept separate from navEntries so they show up in search results without cluttering the empty-state list.
  // `keywords` is a comma-separated string of aliases to match against the query, so power users
  // can type "book" or "trip" or "leave" and still hit the leave request page, etc.
  const actionEntries = [
    { id: "action:log-remote",   kind: "action", icon: "🏠", label: "Log a remote work day",  keywords: "remote work log wfh home",         action: () => onNavigate("hr", "remote") },
    { id: "action:submit-reimb", kind: "action", icon: "💳", label: "Submit a reimbursement", keywords: "expense receipt claim money spend", action: () => onNavigate("hr", "reimb") },
    { id: "action:request-leave", kind: "action", icon: "🏖", label: "Request time off",       keywords: "leave pto vacation sick day off",   action: () => onNavigate("hr", "leave") },
    { id: "action:bank-pto",     kind: "action", icon: "🏦", label: "Bank PTO for a market-closed day", keywords: "banked pto holiday", action: () => onNavigate("hr", "leave") },
    ...(isOwnerUser ? [
      { id: "action:post-announcement", kind: "action", icon: "📢", label: "Post firmwide announcement", keywords: "announce news update post",  action: () => onNavigate("hr", "settings") },
      { id: "action:export-backup",     kind: "action", icon: "💾", label: "Export data backup",         keywords: "backup export save json",     action: () => onNavigate("hr", "settings") },
    ] : []),
  ];

  // Build searchable results
  const results = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) {
      // Empty query: show recent items first (if any), then top nav entries.
      // Build a lookup map of all possible entries by ID for recents resolution.
      const allEntries = new Map();
      navEntries.forEach(e => allEntries.set(e.id, e));
      (people || []).forEach(p => {
        allEntries.set("person:" + p.id, {
          id: "person:" + p.id, kind: "person", icon: p.isTestAccount ? "🐕" : "👤",
          label: p.name, sub: `${p.role || "—"} · ${p.email}`,
          action: () => onNavigate("hr", "profile"),
        });
      });
      stockUniverse.forEach(s => {
        allEntries.set("stock:" + s.sym, {
          id: "stock:" + s.sym, kind: "stock", icon: "📊",
          label: s.sym, sub: `${s.name || ""}${s.sector ? " · " + s.sector : ""}`,
          action: () => onNavigate("investments", "stocks"),
        });
      });
      const recents = recentIds
        .map(id => allEntries.get(id))
        .filter(Boolean)
        .map(r => ({ ...r, _recent: true }));
      const seenIds = new Set(recents.map(r => r.id));
      const rest = navEntries.filter(n => !seenIds.has(n.id)).slice(0, Math.max(4, 8 - recents.length));
      return [...recents, ...rest];
    }
    const items = [];
    // People
    (people || []).forEach(p => {
      const hay = `${p.name || ""} ${p.username || ""} ${p.email || ""} ${p.role || ""}`.toLowerCase();
      if (hay.includes(q)) items.push({ id: "person:" + p.id, kind: "person", icon: p.isTestAccount ? "🐕" : "👤", label: p.name, sub: `${p.role || "—"} · ${p.email}`, action: () => onNavigate("hr", "profile") });
    });
    // Stocks
    stockUniverse.forEach(s => {
      const hay = `${s.sym || ""} ${s.name || ""} ${s.sector || ""}`.toLowerCase();
      if (hay.includes(q)) items.push({ id: "stock:" + s.sym, kind: "stock", icon: "📊", label: s.sym, sub: `${s.name || ""}${s.sector ? " · " + s.sector : ""}`, action: () => onNavigate("investments", "stocks") });
    });
    // Quick actions — match against both label and keyword aliases
    actionEntries.forEach(a => {
      const hay = `${a.label.toLowerCase()} ${a.keywords || ""}`.toLowerCase();
      if (hay.includes(q)) items.push(a);
    });
    // Nav
    navEntries.forEach(n => {
      if (n.label.toLowerCase().includes(q)) items.push(n);
    });
    return items.slice(0, 20);
  // eslint-disable-next-line
  }, [query, people, stockUniverse, isOwnerUser, recentIds]);

  // Keep selected in bounds
  useEffect(() => { if (selectedIdx >= results.length) setSelectedIdx(0); }, [results.length, selectedIdx]);

  // Handle keys for nav within the palette
  const onInputKey = (e) => {
    if (e.key === "ArrowDown") { e.preventDefault(); setSelectedIdx(i => Math.min(results.length - 1, i + 1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setSelectedIdx(i => Math.max(0, i - 1)); }
    else if (e.key === "Enter") { e.preventDefault(); const r = results[selectedIdx]; if (r) { rememberSelection(r.id); r.action(); onClose(); } }
  };

  // Scroll selected into view
  useEffect(() => {
    const el = resultsRef.current?.querySelector(`[data-idx="${selectedIdx}"]`);
    el?.scrollIntoView({ block: "nearest" });
  }, [selectedIdx]);

  if (!open) return null;

  const kindLabel = { nav: "PAGE", person: "EMPLOYEE", stock: "STOCK", action: "ACTION" };
  const kindColor = { nav: COLORS.primary, person: COLORS.gold, stock: COLORS.success, action: COLORS.warning };

  return (
    <div onClick={onClose} className="no-print" style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(11, 40, 83, 0.4)", zIndex: 10000, display: "flex", alignItems: "flex-start", justifyContent: "center", paddingTop: "10vh" }}>
      <div onClick={e => e.stopPropagation()} style={{ background: COLORS.surface, width: "min(640px, 92vw)", borderRadius: 12, boxShadow: "0 20px 60px rgba(0,0,0,0.3)", overflow: "hidden", border: `1px solid ${COLORS.borderLight}` }}>
        <div style={{ display: "flex", alignItems: "center", padding: "12px 16px", borderBottom: `1px solid ${COLORS.borderLight}`, gap: 10 }}>
          <span style={{ fontSize: 18, color: COLORS.textDim }}>🔍</span>
          <input
            ref={inputRef}
            value={query}
            onChange={e => setQuery(e.target.value)}
            onKeyDown={onInputKey}
            placeholder="Search employees, stocks, or pages…"
            style={{ flex: 1, border: "none", outline: "none", fontSize: 15, fontFamily: "inherit", background: "transparent", color: COLORS.text }}
          />
          <span style={{ fontSize: 10, color: COLORS.textDim, padding: "2px 6px", background: COLORS.bg, borderRadius: 4, fontWeight: 700, letterSpacing: 0.5 }}>ESC</span>
        </div>
        <div ref={resultsRef} style={{ maxHeight: "50vh", overflow: "auto" }}>
          {results.length === 0 ? (
            <div style={{ padding: 30, textAlign: "center", color: COLORS.textMuted, fontSize: 13 }}>
              No matches for "{query}"
            </div>
          ) : results.map((r, i) => {
            // Show a section header when the "recent" band ends OR at the very start of a recent band
            const prev = i > 0 ? results[i - 1] : null;
            const showRecentHeader = r._recent && !prev?._recent;
            const showSuggestedHeader = !r._recent && (prev?._recent || (i === 0 && !query.trim()));
            return (
              <React.Fragment key={i}>
                {showRecentHeader && (
                  <div style={{ padding: "6px 16px 2px", fontSize: 9, color: COLORS.textDim, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 700, background: COLORS.bg }}>Recent</div>
                )}
                {showSuggestedHeader && (
                  <div style={{ padding: "6px 16px 2px", fontSize: 9, color: COLORS.textDim, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 700, background: COLORS.bg }}>
                    {prev?._recent ? "Suggested" : "Jump to"}
                  </div>
                )}
                <button data-idx={i} onMouseEnter={() => setSelectedIdx(i)} onClick={() => { rememberSelection(r.id); r.action(); onClose(); }}
                  style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "10px 16px", border: "none", background: i === selectedIdx ? COLORS.primary + "0F" : "transparent", cursor: "pointer", fontFamily: "inherit", textAlign: "left", borderLeft: i === selectedIdx ? `3px solid ${COLORS.primary}` : "3px solid transparent" }}>
                  <span style={{ fontSize: 16, flexShrink: 0 }}>{r.icon}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.label}</div>
                    {r.sub && <div style={{ fontSize: 11, color: COLORS.textMuted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.sub}</div>}
                  </div>
